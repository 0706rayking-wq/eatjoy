 const rebuildDailyWrongs = (rebuildData.dailyWrongs || {})[rebuildTodayKey] || {};
 const rebuildPlayerCount = Math.max(0, Number(usingUserRebuild ? (personalDaily.correct || 0) : (rebuildDailyPlayers[rebuildPlayerKey] || 0)));
 const rebuildWrongCount = Math.max(0, Number(usingUserRebuild ? (personalDaily.wrong || 0) : (rebuildDailyWrongs[rebuildPlayerKey] || 0)));
 const rebuildRemaining = Math.max(0, REBUILD_PLAYER_LIMIT - rebuildPlayerCount);
 const rebuildWrongLocked = rebuildWrongCount >= REBUILD_WRONG_LIMIT;
 const getUserFacilityState = (user, facilityId) => user?.gameRebuild?.facilities?.[facilityId] || {};
 const getUserFacilityCorrect = (user, facilityId) => Math.max(0, Number(getUserFacilityState(user, facilityId).correct || 0));
 const getUserFacilityCompleted = (user, facilityId) => !!getUserFacilityState(user, facilityId).completed;
 const getFacilityProgress = (facilityId) => {
  const shared = ((rebuildData.facilities || {})[facilityId]) || {};
  const sharedTotal = Math.max(0, Number(shared.totalCorrect || 0));
  const userTotal = branchRebuildUsers.reduce((sum, user) => sum + getUserFacilityCorrect(user, facilityId), 0);
  const completedByUser = branchRebuildUsers.some(user => getUserFacilityCompleted(user, facilityId)) || getUserFacilityCompleted(liveRebuildUser, facilityId);
  const total = Math.max(0, Math.min(REBUILD_TARGET, sharedTotal + userTotal));
  const percent = Math.min(100, Math.floor((total / REBUILD_TARGET) * 100));
  return { total, percent, complete: !!shared.completed || !!shared.completedAt || sharedTotal >= REBUILD_TARGET || completedByUser || total >= REBUILD_TARGET };
 };
 const rebuildFacilityProgress = getFacilityProgress(selectedRebuildFacility);
 const rebuildTotal = rebuildFacilityProgress.total;
 const rebuildPercent = rebuildFacilityProgress.percent;
 const rebuildComplete = rebuildFacilityProgress.complete;
 const rebuildFacility = REBUILD_FACILITY_META[selectedRebuildFacility] || REBUILD_FACILITY_META.training;
 const normalizeRebuildQuestion = (item) => {
  if (Array.isArray(item)) return { q: item[0], opts: [item[1], item[2], item[3], item[4]], ans: Number(item[5] || 0) };
  return { q: item?.q || '食品安全重建題', opts: [item?.a, item?.b, item?.c, item?.d].filter(Boolean), ans: Number(item?.ansIdx || item?.ans || 0) };
 };
 const fallbackRebuildQuestions = [
  {q:'發現吐司有一小塊發霉，正確處理方式是？',opts:['切掉發霉處繼續吃','煮熟再吃','整包直接丟棄','放冷凍殺菌'],ans:2},
  {q:'冰箱冷藏標準溫度是？',opts:['0–4°C','6–10°C','15°C','-5°C以下'],ans:0},
  {q:'食品存放的「危險溫度帶」是？',opts:['0–7°C','7–60°C','60–100°C','100°C以上'],ans:1},
  {q:'梅納反應發生在什麼條件下？',opts:['冷水長時間泡發','高溫煎烤加工','低溫舒肥慢煮','醃漬加鹽靜置'],ans:1},
  {q:'「FIFO」在廚房管理中代表？',opts:['先進先出','先進後出','高溫保存','每日報廢'],ans:0},
 ];
 const pickRebuildQuestion = () => {
  const source = (config.questions && config.questions.length > 0 ? config.questions : fallbackRebuildQuestions).map(normalizeRebuildQuestion).filter(q => q.q && q.opts.length >= 4);
  return source[Math.floor(Math.random() * source.length)] || fallbackRebuildQuestions[0];
 };
 const startRebuildQuiz = (facilityId) => {
  setSelectedRebuildFacility(facilityId || 'training');
  setRebuildFeedback('');
  setRebuildQuiz(pickRebuildQuestion());
  setFrPhase('rebuild');
 };
 const rebuildTimeout = (promise, label='施工同步') => Promise.race([
  promise,
  new Promise((_, reject) => setTimeout(() => reject(new Error(label + '逾時')), 8000))
 ]);
 const savePersonalRebuild = async (updater) => {
  if (!currentUser?.phone) throw new Error('missing-player-phone');
  const ref = db.collection(getPublicPath('users')).doc(currentUser.phone);
  let baseUser = allUsers.find(u => u.phone === currentUser.phone) || currentUser || {};
  try {
   const snap = await rebuildTimeout(ref.get(), '讀取施工紀錄');
   if (snap.exists) baseUser = { ...baseUser, ...snap.data() };
  } catch (e) {
   console.warn('讀取施工紀錄失敗，使用目前快取資料', e);
  }
  const next = cloneRebuildSave(baseUser.gameRebuild);
  const result = updater(next) || {};
  await rebuildTimeout(ref.set({ gameRebuild: next }, { merge: true }), '寫入施工紀錄');
  return result;
 };
 const markSharedFacilityComplete = async (facilityId) => {
  const now = Date.now();
  const ref = db.doc(getPublicPath(`food_research_rebuild/${currentBranch}`));
  await rebuildTimeout(db.runTransaction(async tx => {
   const snap = await tx.get(ref);
   const data = snap.exists ? snap.data() : {};
   const facilities = { ...(data.facilities || {}) };
   const currentFacility = { ...(facilities[facilityId] || {}) };
   facilities[facilityId] = {
    ...currentFacility,
    totalCorrect: Math.max(REBUILD_TARGET, Number(currentFacility.totalCorrect || 0)),
    completed: true,
    completedAt: currentFacility.completedAt || now,
    updatedAt: now
   };
   tx.set(ref, { facilities, updatedAt: now, branch: currentBranch }, { merge: true });
  }), '同步完工狀態');
  setFacilityRebuild(prev => {
   const base = prev || { facilities: {}, dailyPlayers: {}, dailyWrongs: {} };
   const facilities = { ...(base.facilities || {}) };
   facilities[facilityId] = {
    ...(facilities[facilityId] || {}),
    totalCorrect: Math.max(REBUILD_TARGET, Number(facilities[facilityId]?.totalCorrect || 0)),
    completed: true,
    completedAt: facilities[facilityId]?.completedAt || now,
    updatedAt: now
   };
   return { ...base, facilities, updatedAt: now, branch: currentBranch };
  });
 };

 const answerRebuildQuestion = async (idx) => {
  if (!rebuildQuiz || rebuildSaving || rebuildComplete) return;
  if (rebuildWrongLocked) {
   setRebuildFeedback('你今天答錯已達 5 題，明天可以再參與施工。');
   return;
  }

  if (usingUserRebuild) {
   setRebuildSaving(true);
   try {
    const facilityId = selectedRebuildFacility || 'training';
    if (idx !== rebuildQuiz.ans) {
     const result = await savePersonalRebuild(saveData => {
      saveData.daily = saveData.daily || {};
      const day = { ...(saveData.daily[rebuildTodayKey] || {}) };
      const wrongs = Math.max(0, Number(day.wrong || 0));
      if (wrongs >= REBUILD_WRONG_LIMIT) return { status: 'wrongLocked', wrongs };
      const nextWrongs = wrongs + 1;
      saveData.daily[rebuildTodayKey] = { ...day, wrong: nextWrongs };
      return { status: nextWrongs >= REBUILD_WRONG_LIMIT ? 'wrongLockedNow' : 'wrong', wrongs: nextWrongs };
     });
     if (result.status === 'wrongLocked' || result.status === 'wrongLockedNow') {
      setRebuildFeedback('答錯已達 5 題，今天不能再參與施工。');
      setRebuildQuiz(null);
     } else {
      setRebuildFeedback(`答錯了，今日答錯 ${result.wrongs}/${REBUILD_WRONG_LIMIT} 題，換一題再試一次。`);
      setRebuildQuiz(pickRebuildQuestion());
     }
     return;
    }
    const facilityNow = getFacilityProgress(facilityId);
    if (facilityNow.complete) {
     setRebuildFeedback('重建已完成！設施已開放。');
     return;
    }
    if (rebuildWrongCount >= REBUILD_WRONG_LIMIT) {
     setRebuildFeedback('你今天答錯已達 5 題，明天可以再參與施工。');
     return;
    }
    if (rebuildPlayerCount >= REBUILD_PLAYER_LIMIT) {
     setRebuildFeedback('你今天已經貢獻滿 50 題了，明天可以再協助重建。');
     return;
    }
    const result = await savePersonalRebuild(saveData => {
     saveData.facilities = saveData.facilities || {};
     saveData.daily = saveData.daily || {};
     const day = { ...(saveData.daily[rebuildTodayKey] || {}) };
     const mine = Math.max(0, Number(day.correct || 0));
     const wrongs = Math.max(0, Number(day.wrong || 0));
     if (wrongs >= REBUILD_WRONG_LIMIT) return { status: 'wrongLocked' };
     if (mine >= REBUILD_PLAYER_LIMIT) return { status: 'limit' };
     const facility = { ...(saveData.facilities[facilityId] || {}) };
     facility.correct = Math.max(0, Number(facility.correct || 0)) + 1;
     facility.completed = facilityNow.total + 1 >= REBUILD_TARGET;
     facility.updatedAt = Date.now();
     saveData.facilities[facilityId] = facility;
     const nextMine = mine + 1;
     saveData.daily[rebuildTodayKey] = { ...day, correct: nextMine };
     return { status: facilityNow.total + 1 >= REBUILD_TARGET ? 'completedNow' : 'ok', mine: nextMine };
    });
    if (result.status === 'wrongLocked') {
     setRebuildFeedback('你今天答錯已達 5 題，明天可以再參與施工。');
    } else if (result.status === 'limit') {
     setRebuildFeedback('你今天已經貢獻滿 50 題了，明天可以再協助重建。');
    } else if (result.status === 'completedNow') {
     await markSharedFacilityComplete(facilityId);
     setRebuildFeedback(`${rebuildFacility.label}重建完成！現在可以進入使用。`);
    } else {
     setRebuildFeedback(`答對！你今日已貢獻 ${result.mine}/${REBUILD_PLAYER_LIMIT} 題。`);
     setRebuildQuiz(pickRebuildQuestion());
    }
   } catch (e) {
    console.error(e);
    setRebuildFeedback('同步施工紀錄失敗，請重新整理後再試。');
   } finally {
    setRebuildSaving(false);
   }
   return;
  }

  if (idx !== rebuildQuiz.ans) {
   setRebuildSaving(true);
   try {
    const ref = db.doc(getPublicPath(`food_research_rebuild/${currentBranch}`));
    const result = await db.runTransaction(async tx => {
     const snap = await tx.get(ref);
     const data = snap.exists ? snap.data() : {};
     const dailyWrongs = { ...(data.dailyWrongs || {}) };
     const todayWrongs = { ...((dailyWrongs[rebuildTodayKey]) || {}) };
     const wrongs = Math.max(0, Number(todayWrongs[rebuildPlayerKey] || 0));
     if (wrongs >= REBUILD_WRONG_LIMIT) return { status: 'wrongLocked', wrongs };
     const nextWrongs = wrongs + 1;
     todayWrongs[rebuildPlayerKey] = nextWrongs;
     dailyWrongs[rebuildTodayKey] = todayWrongs;
     tx.set(ref, { dailyWrongs, updatedAt: Date.now(), branch: currentBranch }, { merge: true });
     return { status: nextWrongs >= REBUILD_WRONG_LIMIT ? 'wrongLockedNow' : 'wrong', wrongs: nextWrongs };
    });
    if (result.status === 'wrongLocked' || result.status === 'wrongLockedNow') {
     setRebuildFeedback('答錯已達 5 題，今天不能再參與施工。');
     setRebuildQuiz(null);
    } else {
     setRebuildFeedback(`答錯了，今日答錯 ${result.wrongs}/${REBUILD_WRONG_LIMIT} 題，換一題再試一次。`);
     setRebuildQuiz(pickRebuildQuestion());
    }
   } catch (e) {
    console.error(e);
    setRebuildFeedback('同步答錯次數失敗，請稍後再試。');
   } finally {
    setRebuildSaving(false);
   }
   return;
  }
  if (rebuildRemaining <= 0) {
   setRebuildFeedback('你今天已經貢獻滿 50 題了，明天可以再協助重建。');
   return;
  }
  setRebuildSaving(true);
  try {
   const facilityId = selectedRebuildFacility || 'training';
   const ref = db.doc(getPublicPath(`food_research_rebuild/${currentBranch}`));
   const result = await db.runTransaction(async tx => {
    const snap = await tx.get(ref);
    const data = snap.exists ? snap.data() : {};
    const facilities = { ...(data.facilities || {}) };
    const currentFacility = { ...(facilities[facilityId] || {}) };
    const total = Math.max(0, Number(currentFacility.totalCorrect || 0));
    const dailyPlayers = { ...(data.dailyPlayers || {}) };
    const todayPlayers = { ...((dailyPlayers[rebuildTodayKey]) || {}) };
    const dailyWrongs = { ...(data.dailyWrongs || {}) };
    const todayWrongs = { ...((dailyWrongs[rebuildTodayKey]) || {}) };
    const mine = Math.max(0, Number(todayPlayers[rebuildPlayerKey] || 0));
    const wrongs = Math.max(0, Number(todayWrongs[rebuildPlayerKey] || 0));
    if (total >= REBUILD_TARGET || currentFacility.completed) return { status: 'complete' };
    if (wrongs >= REBUILD_WRONG_LIMIT) return { status: 'wrongLocked' };
    if (mine >= REBUILD_PLAYER_LIMIT) return { status: 'limit' };
    const nextTotal = Math.min(REBUILD_TARGET, total + 1);
    const nextMine = mine + 1;
    todayPlayers[rebuildPlayerKey] = nextMine;
    dailyPlayers[rebuildTodayKey] = todayPlayers;
    facilities[facilityId] = {
     ...currentFacility,
     totalCorrect: nextTotal,
     completed: nextTotal >= REBUILD_TARGET,
     updatedAt: Date.now()
    };
    tx.set(ref, {
     facilities,
     dailyPlayers,
     updatedAt: Date.now(),
     branch: currentBranch
    }, { merge: true });
    return { status: nextTotal >= REBUILD_TARGET ? 'completedNow' : 'ok', total: nextTotal, mine: nextMine };
   });
   if (result.status === 'complete') {
    setRebuildFeedback('重建已完成！設施已開放。');
   } else if (result.status === 'wrongLocked') {
    setRebuildFeedback('你今天答錯已達 5 題，明天可以再參與施工。');
   } else if (result.status === 'limit') {
    setRebuildFeedback('你今天已經貢獻滿 50 題了，明天可以再協助重建。');
   } else if (result.status === 'completedNow') {
    setRebuildFeedback(`${rebuildFacility.label}重建完成！現在可以進入使用。`);
   } else {
    setRebuildFeedback(`答對！你今日已貢獻 ${result.mine}/${REBUILD_PLAYER_LIMIT} 題。`);
    setRebuildQuiz(pickRebuildQuestion());
   }
  } catch (e) {
   console.error(e);
   setRebuildFeedback('同步重建進度失敗，請稍後再試。');
  } finally {
   setRebuildSaving(false);
  }
 };

 const setFacilityProgressForTest = async (facilityIds, mode) => {
  if (!isSuperAdmin || rebuildSaving) return;
  const ids = (Array.isArray(facilityIds) ? facilityIds : [facilityIds]).filter(Boolean);
  if (!ids.length) return;
  const actionLabel = mode === 'complete' ? '設為完成' : '歸零';
  const targetLabel = ids.length === 1 ? (REBUILD_FACILITY_META[ids[0]]?.label || ids[0]) : '四個設施';
  if (!window.confirm(`最高權限測試：確定要將「${targetLabel}」${actionLabel}嗎？`)) return;
  setRebuildSaving(true);
  try {
   const now = Date.now();
   const ref = db.doc(getPublicPath(`food_research_rebuild/${currentBranch}`));
   await db.runTransaction(async tx => {
    const snap = await tx.get(ref);
    const data = snap.exists ? snap.data() : {};
    const facilities = { ...(data.facilities || {}) };
    ids.forEach(id => {
     facilities[id] = {
      ...(facilities[id] || {}),
      totalCorrect: mode === 'complete' ? REBUILD_TARGET : 0,
      completed: mode === 'complete',
      updatedAt: now,
      testOverride: true
     };
    });
    tx.set(ref, { facilities, updatedAt: now, branch: currentBranch }, { merge: true });
   });
   if (mode === 'reset') {
    const usersToReset = branchRebuildUsers.filter(u => u.phone);
    for (let i = 0; i < usersToReset.length; i += 450) {
     const batch = db.batch();
     usersToReset.slice(i, i + 450).forEach(user => {
      const update = { gameRebuild: { facilities: {} } };
      ids.forEach(id => {
       update.gameRebuild.facilities[id] = {
        ...(user.gameRebuild?.facilities?.[id] || {}),
        correct: 0,
        updatedAt: now,
        resetBySuperAdmin: true
       };
      });
      batch.set(db.collection(getPublicPath('users')).doc(user.phone), update, { merge: true });
     });
     await batch.commit();
    }
   }
   setFacilityRebuild(prev => {
    const base = prev || { facilities: {}, dailyPlayers: {}, dailyWrongs: {} };
    const facilities = { ...(base.facilities || {}) };
    ids.forEach(id => {
     facilities[id] = {
      ...(facilities[id] || {}),
      totalCorrect: mode === 'complete' ? REBUILD_TARGET : 0,
      completed: mode === 'complete',
      updatedAt: now,
      testOverride: true
     };
    });
    return { ...base, facilities, updatedAt: now, branch: currentBranch };
   });
   setRebuildQuiz(null);
   setRebuildFeedback(`${targetLabel}已${mode === 'complete' ? '設為完成' : '歸零'}。`);
  } catch (e) {
   console.error(e);
   setRebuildFeedback('最高權限測試設定失敗，請稍後再試。');
  } finally {
   setRebuildSaving(false);
  }
 };

       }).catch(()=>{});

     }

     if (msg.data.type === 'FR_QUEST_KILL') {
      const s2 = loadSave(); const q2 = s2.quests;

     }
     if (msg.data.type === 'FR_PENALTY_RETURN') {
      // 需求4：遺失本場金幣 + 移除裝備武器/護符（從擁有清單也刪除）
      const pen = msg.data.penalty || {};
      const cur = loadSave();
      const newEquip = { ...cur.equip };
      const newWeapons = { ranged: [...(cur.weapons?.ranged||[])], melee: [...(cur.weapons?.melee||[])] };

     };

     const handleResetLeaderboard = async () => {
      const pwd = window.prompt("⚠️ 警告：這將會清空「全台所有分店」的排行榜紀錄！\n請輸入最高權限密碼「0706」確認執行：");
      if (pwd !== '0706') {
        if (pwd !== null) triggerNotify("密碼錯誤，已取消清空作業", "error");
        return;
      }
      setIsLoadingLeaderboard(true);
      try {
        await Promise.all(globalBranches.map(async (branch) => {
         const snapshot = await db.collection(getPublicPath(`game_leaderboard_${branch}`)).get();
         const batch = db.batch();
         snapshot.forEach(doc => { batch.delete(doc.ref); });
         await batch.commit();
        }));
        triggerNotify("全台排行榜已成功清空！", "success");
        fetchGlobalLeaderboard(); 
      } catch (error) {
        console.error("清空失敗", error);
        triggerNotify("清空失敗，請檢查網路狀態", "error");
      }
      setIsLoadingLeaderboard(false);
     };

     const makeResetFoodResearchSave = (resetAt) => ({
      training:{atk:0,def:0,hp:0,stam:0,stamRegen:0,crit:0},
      gold:0,
      ownedForms:[],
      equippedForm:'normal',
      equip:{ranged:'初始食材砲',melee:'初始鍋鏟',amulets:['','','']},
      weapons:{ranged:['初始食材砲'],melee:['初始鍋鏟']},
      amulets:[],
      treasury:[],
      quests:null,
      resetAt
     });

     const handleResetFoodResearchProgress = async () => {
      const pwd = window.prompt("\u26A0\uFE0F \u8B66\u544A\uFF1A\u9019\u6703\u91CD\u7F6E\u6240\u6709\u73A9\u5BB6\u7684\u98DF\u7814\u6240\u57F9\u80B2\u9032\u5EA6\u3002\n\u7D20\u8CEA\u3001\u91D1\u5E63\u3001\u6B66\u5668\u3001\u8B77\u7B26\u3001\u98DF\u7269\u578B\u614B\u90FD\u6703\u56DE\u5230\u521D\u59CB\u72C0\u614B\u3002\n\u8ACB\u8F38\u5165\u6700\u9AD8\u6B0A\u9650\u5BC6\u78BC\u300C0706\u300D\u78BA\u8A8D\u57F7\u884C\uFF1A");
      if (pwd !== '0706') {
       if (pwd !== null) triggerNotify("\u5BC6\u78BC\u932F\u8AA4\uFF0C\u5DF2\u53D6\u6D88\u91CD\u7F6E\u4F5C\u696D", "error");
       return;
      }
      if (!window.confirm("\u6700\u5F8C\u78BA\u8A8D\uFF1A\u78BA\u5B9A\u8981\u91CD\u7F6E\u6240\u6709\u73A9\u5BB6\u7684\u98DF\u7814\u6240\u57F9\u80B2\u9032\u5EA6\u55CE\uFF1F")) return;
      setIsResettingFoodResearch(true);
      try {
       const resetAt = Date.now();
       const resetSave = makeResetFoodResearchSave(resetAt);
       const snapshot = await db.collection(getPublicPath('users')).get();
       let batch = db.batch();
       let ops = 0;
       let total = 0;
       let clearedRewards = 0;
       const queueSet = async (ref, data) => {
        batch.set(ref, data, { merge: true });
        ops++;
        if (ops >= 450) {
         await batch.commit();
         batch = db.batch();
         ops = 0;
        }
       };
       for (const userDoc of snapshot.docs) {
        const userData = userDoc.data() || {};
        const phone = userData.phone || userDoc.id;
        await queueSet(userDoc.ref, { gameSave: resetSave, gameGold: 0, gameResetAt: resetAt });
        total++;
        if (phone) {
         const rewardSnap = await db.collection(getPublicPath(`warlog_${phone}`)).where('claimed','==',false).get().catch(()=>null);
         if (rewardSnap) {
          for (const rewardDoc of rewardSnap.docs) {
           const reward = rewardDoc.data() || {};
           if ((reward.coins || 0) > 0) {
            await queueSet(rewardDoc.ref, { coins: 0, claimed: true, resetClearedAt: resetAt });
            clearedRewards++;
           }
          }
         }
        }
       }
       if (ops > 0) await batch.commit();
       triggerNotify(`\u5DF2\u91CD\u7F6E ${total} \u4F4D\u73A9\u5BB6\u7684\u98DF\u7814\u6240\u57F9\u80B2\u9032\u5EA6\uFF0C\u6E05\u9664 ${clearedRewards} \u7B46\u672A\u9818\u91D1\u5E63`, "success");
      } catch (error) {
       console.error("reset food research progress failed", error);
       triggerNotify("\u91CD\u7F6E\u5931\u6557\uFF0C\u8ACB\u6AA2\u67E5\u7DB2\u8DEF\u72C0\u614B", "error");
      }
      setIsResettingFoodResearch(false);
     };

     useEffect(() => {
      fetchGlobalLeaderboard();
     }, [globalBranches, getPublicPath]);

     useEffect(() => {
      const unsub = db.doc(getPublicPath('system/game_config')).onSnapshot(d => {
        if(d.exists) setConfig(d.data());
      });
      return () => unsub();
     }, [getPublicPath]);

     useEffect(() => {
      const unsub = db.collection(getPublicPath('leftover_submissions')).onSnapshot(
       snap => setLeftoverAdminPending(snap.docs.map(d => ({ id:d.id, ...d.data() })).filter(s => (s.status || 'pending') === 'pending').sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))),
       () => setLeftoverAdminPending([])
      );
      return () => unsub();
     }, [getPublicPath]);

     const saveConfig = (updates) => {
      db.doc(getPublicPath('system/game_config')).set(updates, { merge: true });
     };

     const handleSaveActivity = (id, field, value) => {
      const newActivities = [...activitiesList];
      const idx = newActivities.findIndex(a => a.id === id);
      if (idx > -1) {
        newActivities[idx][field] = value;
        saveConfig({ activities: newActivities });
      } else if (config.activities === undefined && defaultActivities.find(a => a.id === id)) {
        const initialActivities = [...defaultActivities];
        initialActivities.find(a => a.id === id)[field] = value;
        saveConfig({ activities: initialActivities });
      }
     };

     const handleSaveQuestion = () => {
      if(!qForm.q || !qForm.a || !qForm.b || !qForm.c || !qForm.d) {
        triggerNotify("請填寫完整題目與四個選項", "error");
        return;
      }
      const newQ = { 
        q: qForm.q, 
        a: qForm.a, 
        b: qForm.b, 
        c: qForm.c, 
        d: qForm.d, 
        ansIdx: parseInt(qForm.ansIdx) 
      };
      const updatedQs = [...(config.questions || []), newQ];
      saveConfig({ questions: updatedQs });
      setShowModal(false);
      setQForm({ q: '', a: '', b: '', c: '', d: '', ansIdx: 0 });
      triggerNotify("題目已成功新增！", "success");
     };

     const handleDelete = (idx) => {
      if(!window.confirm("確定刪除此題？")) return;
      const updatedQs = config.questions.filter((_, i) => i !== idx);
      saveConfig({ questions: updatedQs });
      triggerNotify("題目已刪除", "info");
     };

     const approveLeftoverAdminSubmission = async (submission) => {
      if (!submission?.id || isReviewingLeftover) return;
      setIsReviewingLeftover(true);
      const review = leftoverAdminReviews[submission.id] || '合格，料理重生成功。';
      try {
       const progressRef = db.collection(getPublicPath('leftover_progress')).doc(submission.phone);
       const subRef = db.collection(getPublicPath('leftover_submissions')).doc(submission.id);
       await db.runTransaction(async tx => {
        const snap = await tx.get(progressRef);
        const data = snap.exists ? snap.data() : {};
        const approvedItems = Array.from(new Set([...(data.approvedItems || []), submission.itemId]));
        const comments = { ...(data.comments || {}), [submission.itemId]: review };
        tx.set(progressRef, {
         phone:submission.phone,
         userName:submission.userName,
         branch:submission.branch,
         approvedItems,
         comments,
         updatedAt:Date.now()
        }, { merge:true });
        tx.update(subRef, { status:'approved', review, reviewedAt:Date.now(), publicVisible:true });
       });
       triggerNotify("菜色已核准，員工進度已增加", "success");
      } catch (error) {
       console.error("leftover approve failed", error);
       triggerNotify("核准失敗，請稍後再試", "error");
      }
      setIsReviewingLeftover(false);
     };

     const rejectLeftoverAdminSubmission = async (submission) => {
      if (!submission?.id || isReviewingLeftover) return;
      setIsReviewingLeftover(true);
      const review = leftoverAdminReviews[submission.id] || '請補充菜色說明或重新拍攝成品照。';
      try {
       await db.collection(getPublicPath('leftover_submissions')).doc(submission.id).update({
        status:'rejected',
        review,
        reviewedAt:Date.now()
       });
       triggerNotify("菜色已退回，評語會顯示給員工", "info");
      } catch (error) {
       console.error("leftover reject failed", error);
       triggerNotify("退回失敗，請稍後再試", "error");
      }
      setIsReviewingLeftover(false);
     };

     const currentGlobalList = globalTab === 'scores' 
      ? globalLeaderboard.slice(0, 100) 
      : Object.values(globalLeaderboard.reduce((acc, curr) => {
        const key = curr.branch + '_' + curr.name; 
        if (!acc[key] || acc[key].score < curr.score) {
         acc[key] = curr;
        }
        return acc;
      }, {})).sort((a, b) => b.score - a.score).slice(0, 100); 

     return (
      <div className="space-y-6 animate-in fade-in">
        
        {/* --- 後台分頁導覽列 --- */}
        <div className="flex bg-slate-100 p-1.5 rounded-2xl overflow-x-auto no-scrollbar gap-1.5 shadow-inner">
         <button onClick={()=>setAdminTab('lobby')} className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${adminTab==='lobby'?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>活動卡片設定</button>
         <button onClick={()=>setAdminTab('snake_settings')} className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${adminTab==='snake_settings'?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>靈蛇識食-設定</button>
         <button onClick={()=>setAdminTab('snake_leaderboard')} className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${adminTab==='snake_leaderboard'?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>靈蛇識食-榜單</button>
         <button onClick={()=>setAdminTab('leftover_review')} className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${adminTab==='leftover_review'?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>廢材不廢-審核</button>
        </div>

        {/* === 分頁一：大廳卡片設定 === */}
        {adminTab === 'lobby' && (
         <div className="space-y-4">
           <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-xs font-bold text-amber-700 leading-relaxed shadow-inner mb-4">
            💡 提示：在這裡控制前台「限時活動大廳」各個主題卡片的外觀與開放狀態。<br/>若該活動尚未開發完成，請保持「隱藏狀態」，前台點擊時將會顯示「建置中」。
           </div>
           <div className="bg-red-50 p-4 rounded-2xl border border-red-200 shadow-sm mb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
             <h3 className="text-sm font-black text-red-700 flex items-center gap-2"><Icon name="rotate-ccw" size={16}/> {"\u98DF\u7814\u6240\u57F9\u80B2\u9032\u5EA6\u91CD\u7F6E"}</h3>
             <p className="text-[11px] font-bold text-red-500 mt-1 leading-relaxed">{"\u6700\u9AD8\u6B0A\u9650\u6E2C\u8A66\u7528\uFF1A\u6240\u6709\u73A9\u5BB6\u7684\u7D20\u8CEA\u3001\u91D1\u5E63\u3001\u6B66\u5668\u3001\u8B77\u7B26\u3001\u98DF\u7269\u578B\u614B\u56DE\u5230\u521D\u59CB\u72C0\u614B\u3002"}</p>
            </div>
            <button onClick={handleResetFoodResearchProgress} disabled={isResettingFoodResearch} className="bg-red-600 text-white px-4 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-all shadow-sm disabled:opacity-60 flex items-center justify-center gap-1">
             <Icon name="trash-2" size={14} /> {isResettingFoodResearch ? "\u91CD\u7F6E\u4E2D..." : "\u91CD\u7F6E\u6240\u6709\u73A9\u5BB6"}
            </button>
           </div>
           {activitiesList.map(act => (
            <div key={act.id} className={`glass-panel p-5 rounded-[2rem] bg-white border shadow-sm space-y-3 transition-all ${act.isOpen ? 'border-l-4 border-l-emerald-500' : 'opacity-80'}`}>
              <div className="flex justify-between items-center mb-2">
               <h3 className="font-black text-sm text-slate-800 flex items-center gap-2"><Icon name="layout-template" size={16} className="text-brand-red"/> 卡片：{act.title}</h3>
               <button onClick={() => handleSaveActivity(act.id, 'isOpen', !act.isOpen)}
                  className={`px-4 py-2 rounded-full text-[10px] font-black transition-all shadow-sm ${act.isOpen ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}>
                 {act.isOpen ? "✅ 前台開放中" : "🔒 已隱藏 (鎖定)"}
               </button>
              </div>
              <div className="grid grid-cols-2 gap-3">
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 pl-1">主標題</label><input value={act.title} onChange={e => handleSaveActivity(act.id, 'title', e.target.value)} className="w-full input-light p-3 rounded-xl text-xs font-bold outline-none" /></div>
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 pl-1">副標題</label><input value={act.subtitle} onChange={e => handleSaveActivity(act.id, 'subtitle', e.target.value)} className="w-full input-light p-3 rounded-xl text-xs font-bold outline-none" /></div>
              </div>
              <label className="block w-full bg-slate-50 border border-dashed border-slate-300 py-4 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-all mt-2">
               {act.img ? "✅ 卡片封面圖已設定 (點擊可更換)" : "+ 上傳卡片封面圖 (建議長寬比 4:3 或 16:9)"}
               <input type="file" className="hidden" accept="image/*" onChange={async (e)=>{
                 const file = e.target.files[0];
                 if (file) {
                  const r = new FileReader();
                  r.onloadend = async () => {
                    const compressed = await compressImage(r.result, 800, 0.6);
                    handleSaveActivity(act.id, 'img', compressed);
                    triggerNotify("封面圖上傳成功","success");
                  };
                  r.readAsDataURL(file);
                 }
               }}/>
              </label>
              {act.img && (
               <div className="relative mt-2">
                 <img src={act.img} className="w-full h-32 object-cover rounded-xl border shadow-inner" />
                 <button onClick={() => handleSaveActivity(act.id, 'img', null)} className="absolute top-2 right-2 bg-slate-900/60 hover:bg-red-500 text-white p-1.5 rounded-full backdrop-blur-sm transition-all"><Icon name="x" size={14}/></button>
                         </div>
                        )}
                       </div>
                     ))}
         </div>
        )}

        {/* === 分頁二：貪食蛇魔王與題庫設定 === */}
        {adminTab === 'snake_settings' && (
         <div className="space-y-6">
           <div className="glass-panel p-6 rounded-[2.5rem] bg-slate-900 text-white shadow-xl space-y-5">
            <div className="flex items-center justify-between border-b border-white/10 pb-4">
              <h3 className="font-black text-sm flex items-center gap-2"><Icon name="gamepad-2" className="text-brand-red"/> 靈蛇識食：內部設定</h3>
            </div>
            <div className="space-y-3">
              <label className="text-[10px] text-slate-400 font-bold">遊戲內魔王名稱</label>
              <input type="text" value={config.bossName || ''} onChange={(e) => saveConfig({ bossName: e.target.value })} className="w-full bg-white/10 p-3 rounded-xl text-sm outline-none text-white focus:ring-1 focus:ring-brand-red" placeholder="例：食安大魔王"/>
              
              <div className="grid grid-cols-2 gap-3 pt-2">
               <label className="block w-full bg-white/10 border border-dashed border-white/20 py-3 px-2 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-white/20 transition-all">
                 {config.bossImg ? "✅ 魔王大頭照已設 (點擊換)" : "+ 上傳魔王照 (正方形)"}
                 <input type="file" className="hidden" accept="image/*" onChange={async (e)=>{
                  const file = e.target.files[0];
                  if (file) {
                    const r = new FileReader();
                    r.onloadend = async () => {
                     const compressed = await compressImage(r.result, 400, 0.6);
                     saveConfig({ bossImg: compressed });
                     triggerNotify("魔王圖片上傳成功","success");
                    };
                    r.readAsDataURL(file);
                  }
                 }}/>
               </label>
               <label className="block w-full bg-white/10 border border-dashed border-white/20 py-3 px-2 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-white/20 transition-all">
                 {config.bgImg ? "✅ 遊戲背板圖已設 (點擊換)" : "+ 上傳遊戲背板浮水印"}
                 <input type="file" className="hidden" accept="image/*" onChange={async (e)=>{
                  const file = e.target.files[0];
                  if (file) {
                    const r = new FileReader();
                    r.onloadend = async () => {
                     const compressed = await compressImage(r.result, 800, 0.6);
                     saveConfig({ bgImg: compressed });
                     triggerNotify("背景圖片上傳成功","success");
                    };
                    r.readAsDataURL(file);
                  }
                 }}/>
               </label>
              </div>
            </div>
           </div>

           <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
            <div className="flex justify-between items-center">
              <h3 className="font-black text-brand-red text-sm flex items-center gap-2">
               <Icon name="list" size={18} /> 題庫管理 ({(config.questions || []).length}題)
              </h3>
              <button onClick={() => setShowModal(true)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-sm active:scale-95 transition-all">+ 新增題目</button>
            </div>
            <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
              {(config.questions || []).map((item, idx) => {
               const isArr = Array.isArray(item);
               const qText = isArr ? item[0] : item.q;
               const optA = isArr ? item[1] : item.a;
               const optB = isArr ? item[2] : item.b;
               const optC = isArr ? item[3] : item.c;
               const optD = isArr ? item[4] : item.d;
               const ans = isArr ? item[5] : item.ansIdx;

               return (
                 <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-start gap-4 shadow-sm">
                  <div className="flex-1">
                    <p className="font-black text-xs text-slate-800 mb-2">Q{idx+1}: {qText}</p>
                    <div className="grid grid-cols-2 gap-2 text-[10px] text-slate-500 font-bold">
                     <span className={`p-1.5 rounded-md ${ans===0?"bg-emerald-100 text-emerald-700 border-emerald-200 border":"bg-white border"}`}>A: {optA}</span>
                     <span className={`p-1.5 rounded-md ${ans===1?"bg-emerald-100 text-emerald-700 border-emerald-200 border":"bg-white border"}`}>B: {optB}</span>
                     <span className={`p-1.5 rounded-md ${ans===2?"bg-emerald-100 text-emerald-700 border-emerald-200 border":"bg-white border"}`}>C: {optC}</span>
                     <span className={`p-1.5 rounded-md ${ans===3?"bg-emerald-100 text-emerald-700 border-emerald-200 border":"bg-white border"}`}>D: {optD}</span>
                    </div>
                  </div>
                  <button onClick={() => handleDelete(idx)} className="text-slate-300 hover:text-red-500 p-2 bg-white rounded-lg border shadow-sm active:scale-90 transition-all"><Icon name="trash-2" size={16}/></button>
                 </div>
               );
              })}
              {!(config.questions?.length > 0) && <p className="text-center text-slate-400 text-xs py-8 glass-panel rounded-2xl">目前尚無題目，請點擊上方新增</p>}
            </div>
           </div>
         </div>
        )}

        {/* === 分頁三：貪食蛇全台傷害戰力榜 === */}
        {adminTab === 'snake_leaderboard' && (
         <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
           <div className="flex justify-between items-center border-b border-slate-100 pb-2">
            <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><Icon name="trophy" size={18} className="text-amber-500" /> 全台傷害戰力榜</h3>
            <div className="flex items-center gap-2">
              <button onClick={handleResetLeaderboard} disabled={isLoadingLeaderboard} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-3 py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all flex items-center gap-1 shadow-sm border border-red-100">
               <Icon name="trash-2" size={14} /> 清空榜單
              </button>
              <button onClick={fetchGlobalLeaderboard} disabled={isLoadingLeaderboard} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all flex items-center gap-1 shadow-sm">
               <Icon name="refresh-cw" size={14} className={isLoadingLeaderboard ? "animate-spin" : ""} /> {isLoadingLeaderboard ? '讀取中' : '更新'}
              </button>
            </div>
           </div>

           <div className="flex bg-slate-50 p-1 rounded-xl mb-4 w-full max-w-[320px]">
            <button onClick={() => setGlobalTab('scores')} className={`flex-1 py-1.5 text-xs font-black rounded-lg transition-all ${globalTab === 'scores' ? 'bg-white text-amber-600 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>歷史高分 (可重複)</button>
            <button onClick={() => setGlobalTab('employees')} className={`flex-1 py-1.5 text-xs font-black rounded-lg transition-all ${globalTab === 'employees' ? 'bg-white text-amber-600 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>員工實力榜 (不重複)</button>
           </div>
           
           <div className="space-y-3 max-h-[55vh] overflow-y-auto pr-2 custom-scrollbar">
            {isLoadingLeaderboard ? (
              <p className="text-center text-slate-400 text-xs py-8 animate-pulse">正在彙整全台分店數據...</p>

                 <div className="flex items-center gap-3">
                  <span className={`font-black text-xl w-6 text-center ${idx === 0 ? 'text-amber-500' : (idx === 1 ? 'text-slate-400' : 'text-slate-300')}`}>{idx + 1}</span>
                  <div>
                    <div className="font-bold text-slate-800 text-sm flex items-center gap-2">
                     {player.name}
                     <span className="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md font-bold shadow-inner">{player.branch}</span>
                    </div>
                    <p className="text-[9px] text-slate-400 mt-1 flex items-center gap-1"><Icon name="clock" size={10}/> {new Date(player.timestamp).toLocaleString()}</p>
                  </div>
                 </div>
                 <div className="text-right">
                  <span className="font-black text-brand-red text-2xl">{player.score}</span> <span className="text-[10px] text-slate-400 font-bold">點</span>
                 </div>
               </div>
              ))
            ) : (
              <p className="text-center text-slate-400 text-xs py-8 glass-panel rounded-2xl border border-dashed">目前全台尚無挑戰紀錄</p>
            )}
           </div>
         </div>
        )}

        {adminTab === 'leftover_review' && (
         <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border-b border-slate-100 pb-4">
           <div>
            <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><Icon name="clipboard-check" size={18} className="text-emerald-500" /> 廢材不廢待審菜色</h3>
            <p className="text-[11px] font-bold text-slate-400 mt-1">員工送審後會出現在這裡；合格才會增加七格進度。該店前 2 名菜色可額外再獲得嘉獎 1 支。</p>
           </div>
           <div className="bg-amber-50 text-amber-700 border border-amber-100 px-3 py-2 rounded-xl text-[10px] font-black">{leftoverAdminPending.length} 件待審</div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
           {leftoverAdminPending.length ? leftoverAdminPending.map(sub => (
            <div key={sub.id} className="bg-slate-50 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
             <img src={sub.photo} className="w-full h-44 object-cover rounded-xl border bg-white" />
             <div>
              <div className="text-sm font-black text-slate-800">{sub.dishName || '未填菜名'}</div>
              <div className="text-[10px] font-black text-amber-600 mt-1">{sub.itemLabel || '食材卡'}</div>
              <div className="text-[10px] font-bold text-slate-400 mt-1">{sub.branch || '未標示分店'} · {sub.userName || sub.phone || '未標示員工'}</div>
             </div>
             <div className="bg-white border border-slate-100 rounded-xl p-3 text-xs font-bold text-slate-600 leading-relaxed min-h-[64px]">{sub.dishDesc || '未填菜色介紹'}</div>
             <textarea value={leftoverAdminReviews[sub.id] || ''} onChange={e=>setLeftoverAdminReviews(prev=>({...prev,[sub.id]:e.target.value}))} placeholder="寫給員工的評語..." className="w-full input-light p-3 rounded-xl text-xs font-bold outline-none min-h-[72px]" />
             <div className="grid grid-cols-2 gap-2">
              <button onClick={()=>approveLeftoverAdminSubmission(sub)} disabled={isReviewingLeftover} className="bg-emerald-600 text-white py-3 rounded-xl text-[10px] font-black active:scale-95 transition-all disabled:opacity-60">合格</button>
              <button onClick={()=>rejectLeftoverAdminSubmission(sub)} disabled={isReviewingLeftover} className="bg-red-50 text-red-500 border border-red-100 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-all disabled:opacity-60">退回</button>
             </div>
            </div>
           )) : (
            <div className="col-span-full text-center py-12 text-slate-400 text-xs font-bold bg-slate-50 rounded-2xl border border-dashed">目前沒有待審菜色</div>
           )}
          </div>
         </div>
        )}

        {/* 新增題目彈窗 */}
        {showModal && (
         <div className="fixed inset-0 z-[10000] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 page-enter">
           <div className="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl relative">
            <div className="flex justify-between items-center mb-6">
              <h3 className="font-black text-lg text-slate-800 flex items-center gap-2"><Icon name="plus-circle" className="text-brand-red"/> 新增挑戰題目</h3>
              <button onClick={() => setShowModal(false)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors active:scale-90"><Icon name="x" size={20}/></button>
            </div>
            <div className="space-y-4">
              <div className="space-y-1.5">
               <label className="text-[10px] font-black text-slate-500 ml-1">題目內容</label>
               <textarea value={qForm.q} onChange={e=>setQForm({...qForm, q: e.target.value})} className="w-full input-light p-4 rounded-2xl text-sm font-bold outline-none border-slate-200 focus:border-brand-red focus:ring-1 focus:ring-brand-red" rows="2" placeholder="請輸入問題敘述..."></textarea>
              </div>
              <div className="grid grid-cols-2 gap-3">
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-500 ml-1">選項 A</label><input value={qForm.a} onChange={e=>setQForm({...qForm, a: e.target.value})} className="w-full input-light p-3 rounded-xl text-sm font-bold outline-none" placeholder="選項內容" /></div>
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-500 ml-1">選項 B</label><input value={qForm.b} onChange={e=>setQForm({...qForm, b: e.target.value})} className="w-full input-light p-3 rounded-xl text-sm font-bold outline-none" placeholder="選項內容" /></div>
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-500 ml-1">選項 C</label><input value={qForm.c} onChange={e=>setQForm({...qForm, c: e.target.value})} className="w-full input-light p-3 rounded-xl text-sm font-bold outline-none" placeholder="選項內容" /></div>
               <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-500 ml-1">選項 D</label><input value={qForm.d} onChange={e=>setQForm({...qForm, d: e.target.value})} className="w-full input-light p-3 rounded-xl text-sm font-bold outline-none" placeholder="選項內容" /></div>
              </div>
              <div className="space-y-1.5 pt-2">
               <label className="text-[10px] font-black text-emerald-600 ml-1">正確答案是？</label>
               <div className="relative">
                 <select value={qForm.ansIdx} onChange={e=>setQForm({...qForm, ansIdx: e.target.value})} className="w-full input-light p-4 rounded-xl text-sm font-black outline-none bg-emerald-50 border-emerald-200 text-emerald-700 appearance-none">
                  <option value={0}>A 選項為正解</option><option value={1}>B 選項為正解</option><option value={2}>C 選項為正解</option><option value={3}>D 選項為正解</option>
                 </select>
                 <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-emerald-600 pointer-events-none" />
               </div>
              </div>
              <button onClick={handleSaveQuestion} className="w-full mt-4 bg-brand-red text-white font-black py-4 rounded-2xl shadow-lg shadow-brand-red/20 active:scale-95 transition-all text-sm">確認儲存題目</button>
            </div>
           </div>
         </div>
        )}
      </div>
     );
    };
    const MonthlyReportAdminManager = ({ currentBranch, globalBranches, isSuperAdmin, report, triggerNotify, getPublicPath }) => {
     const [title, setTitle] = useState(report?.title || '');
     const [url, setUrl] = useState(report?.url || '');

     useEffect(() => {
      setTitle(report?.title || '');
      setUrl(report?.url || '');
     }, [report?.title, report?.url]);

     const publishReport = async () => {
      if (!isSuperAdmin) return triggerNotify("只有最高權限可發布廚房月報", "error");
      if (!title.trim() || !url.trim()) return triggerNotify("請填寫月報標題與簡報網址", "error");
      const now = Date.now();
      const targetBranches = globalBranches.length > 0 ? globalBranches : [currentBranch];
      try {
        await Promise.all(targetBranches.map(branch => (
         db.doc(getPublicPath(`content_status/branch_${branch}`)).set({
          kitchenReport: {
           title: title.trim(),
           url: url.trim(),
           publishedAt: now,
           readBy: []
          }
         }, { merge: true })
        )));
        triggerNotify(`廚房月報已佈達 ${targetBranches.length} 間分店`, "success");
      } catch (e) {
        triggerNotify("月報發布失敗", "error");
      }
     };

     return (
      <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
       <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><Icon name="presentation" size={18} className="text-brand-red" /> 廚房月報佈達</h3>
       <div>
        <p className="text-[10px] font-black text-slate-400 mb-1 uppercase">月報標題</p>
        <input value={title} onChange={e=>setTitle(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="例如：五月份廚房會議" />
       </div>
       <div>
        <p className="text-[10px] font-black text-slate-400 mb-1 uppercase">簡報網址</p>
        <input value={url} onChange={e=>setUrl(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="貼上 Google Slides / 簡報連結" />
       </div>
       <button onClick={publishReport} className="w-full bg-brand-red text-white font-black py-4 rounded-2xl active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
        <Icon name="send" size={16} /> 更新發布至所有分店
       </button>
       {report?.publishedAt && <p className="text-[10px] text-slate-400 text-center">目前版本發布時間：{new Date(report.publishedAt).toLocaleString()}</p>}
      </div>
     );
    };

    const WasteReportsAdminList = ({ reports = [], currentBranch, getPublicPath, triggerNotify }) => (
     <div className="space-y-3">
      {reports.length > 0 ? reports.map(r => (
       <div key={r.id} className="bg-white rounded-[2rem] border shadow-sm p-5">
        <div className="flex justify-between gap-3">
         <div className="min-w-0">
          <h4 className="font-black text-slate-800 break-words">{r.item}</h4>
          <p className="text-xs text-brand-red font-black mt-1">{r.qty}</p>
          <p className="text-xs text-slate-600 font-bold mt-2 whitespace-pre-wrap break-words">{r.reason}</p>
          <p className="text-[10px] text-slate-400 mt-3">{r.userName} · {new Date(r.timestamp || Date.now()).toLocaleString()}</p>
         </div>
         <button onClick={() => db.collection(getPublicPath(`ingredient_waste_${currentBranch}`)).doc(r.id).delete().then(()=>triggerNotify("報廢回報已刪除", "info"))} className="p-2 h-fit text-slate-300 hover:text-red-500 bg-slate-50 rounded-xl active:scale-95">
          <Icon name="trash-2" size={16} />
         </button>
        </div>
       </div>
      )) : <p className="text-center py-10 text-slate-400 text-xs">目前沒有食材報廢回報</p>}
     </div>
    );

    const AdminPage = ({ onBack, onLogout, announcements, standards, users, triggerNotify, menu, onboarding, benefits, rulesData, isSuperAdmin, currentBranch, setCurrentBranch, globalBranches, branchZones, getPublicPath, signatures, tickerText, setTickerText, globalRecipes, currentUser, contentStatus, publishContent, ingredientData, wasteReports }) => {
     const [tab, setTab] = useState('members');
     const [userPageLimit, setUserPageLimit] = useState(10);
     const [subCat, setSubCat] = useState('list');
     const [selectedZone, setSelectedZone] = useState('');
     const [signSubCat, setSignSubCat] = useState('廚房規則');
     const [newZoneName, setNewZoneName] = useState('');
     const [newBranchName, setNewBranchName] = useState('');
     const [expandedSig, setExpandedSig] = useState(null);
     const [activeRoleTab, setActiveRoleTab] = useState(ROLE_OPTIONS[0]);
     
     const [editingUser, setEditingUser] = useState(null);
     const [editFormData, setEditFormData] = useState({ role: '', branches: [] });

     useEffect(() => {
      if(branchZones && branchZones.length > 0 && !selectedZone) setSelectedZone(branchZones[0].id);
     }, [branchZones]);

     const visibleUsers = users.map(u => ({ ...u, normalizedRole: normalizeRole(u.role) })).filter(u => {
      const uBranches = Array.isArray(u.branch) ? u.branch : [u.branch].filter(Boolean);
      if (isSuperAdmin) {
        return uBranches.includes(currentBranch) || isSupervisorRole(u.role);
      } else {
        return uBranches.includes(currentBranch);
      }
     });
     const roleFilteredUsers = visibleUsers.filter(u => u.normalizedRole === activeRoleTab);

     const handleSaveUserEdit = async () => {
      if(editFormData.branches.length === 0) {
        triggerNotify("請至少選擇一間分店", "error");
        return;
      }
      try {
        await db.collection(getPublicPath('users')).doc(editingUser.phone).update({
         role: editFormData.role,
         branch: editFormData.branches
        });
        triggerNotify("員工資料更新成功", "success");
        setActiveRoleTab(editFormData.role);
        setEditingUser(null);
      } catch(e) { triggerNotify("更新失敗", "error"); }
     };

     return (
      <div className="p-4 pb-24 page-enter text-left font-bold">
        <div className="flex justify-between items-center mb-4"><BackButton onClick={onBack} title="管理後台" /><button onClick={onLogout} className="bg-red-50 text-red-600 font-black text-[10px] px-4 py-2 rounded-full border border-red-100 active:scale-90 transition-all">登出</button></div>
        
{/* 支援最高權限與多店主管：後台快速切換分店 */}
        {(isSuperAdmin || (Array.isArray(currentUser?.branch) && currentUser.branch.length > 1)) && (
         <div className="mb-6 bg-slate-900 text-white p-4 rounded-3xl flex items-center justify-between shadow-xl mb-2">
           <div>
            <p className="text-[10px] uppercase tracking-widest text-slate-400 mb-0.5">目前管理分店</p>
            <select 
              value={currentBranch} 
              onChange={e => setCurrentBranch(e.target.value)} 
              className="bg-transparent border-none text-lg font-black outline-none appearance-none cursor-pointer text-white"
            >
              {(isSuperAdmin ? globalBranches : currentUser.branch).map(b => (
               <option key={b} value={b} className="text-slate-900">{b}</option>
              ))}
            </select>
           </div>
           <Icon name="chevron-down" className="text-brand-red"/>
         </div>
        )}

        <div className="flex bg-slate-100 p-1.5 rounded-2xl overflow-x-auto no-scrollbar gap-1.5 mb-6 shadow-inner">
         {[{id:'members',n:'人員'},{id:'menu',n:'菜單'},{id:'content',n:'公告'},{id:'onboard',n:'入職'},{id:'ingredients',n:'食材'},{id:'rules',n:'守則'},{id:'safety',n:'各店巡視'},{id:'sign',n:'簽署'}, ...(isSuperAdmin ? [{id:'report',n:'月報'}, {id:'system',n:'系統設定'}, {id:'game',n:'限時活動'}] : [])].map(t => (
           <button key={t.id} onClick={()=>{setTab(t.id); setUserPageLimit(10); if(t.id==='rules') setSubCat('廚房規則'); else if(t.id==='sign') setSignSubCat('廚房規則'); else if(t.id==='ingredients') setSubCat('specs'); else setSubCat('list');}} className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${tab===t.id?'bg-brand-red text-white shadow-md':'text-slate-400'}`}>{t.n}</button>
         ))}
        </div>
        
        <div className="space-y-4">
         {tab === 'members' && (
           <div>
            <h3 className="text-xs text-slate-400 mb-2 pl-2">顯示：{isSuperAdmin ? `${currentBranch} 人員 & 全部分店主管` : `${currentBranch} 店內人員`}（{Math.min(userPageLimit, roleFilteredUsers.length)}/{roleFilteredUsers.length}）</h3>
            <div className="grid grid-cols-2 gap-2 mb-4">
             {ROLE_OPTIONS.map(r => {
              const count = visibleUsers.filter(u => u.normalizedRole === r).length;
              return (
               <button key={r} onClick={() => { setActiveRoleTab(r); setUserPageLimit(10); }} className={`px-3 py-3 rounded-2xl text-[10px] font-black border transition-all text-left ${activeRoleTab === r ? 'bg-brand-red text-white border-brand-red shadow-md' : 'bg-white text-slate-500 border-slate-100 shadow-sm'}`}>
                <span className="block truncate">{r}</span>
                <span className={`text-[9px] ${activeRoleTab === r ? 'text-white/70' : 'text-slate-300'}`}>{count} 人</span>
               </button>
              );
             })}
            </div>
            {roleFilteredUsers.slice(0, userPageLimit).map(u=>{
              const displayBranches = Array.isArray(u.branch) ? u.branch.join(', ') : u.branch;
              const roleMeta = ROLE_META[u.normalizedRole] || ROLE_META[ROLE_OPTIONS[0]];
              return (
              <div key={u.phone} className="glass-panel p-4 rounded-[2rem] border flex justify-between items-center bg-white mb-2 shadow-sm">
               <div className="flex-1 min-w-0 pr-2">
                 <p className="font-bold text-slate-800 mb-1 flex flex-wrap items-center gap-2">
                  {u.name} 
                  <span className={`text-[9px] px-2 py-0.5 rounded-full border whitespace-nowrap ${roleMeta.badge}`}>{u.normalizedRole}</span>
                  <span className="text-[9px] text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full whitespace-nowrap overflow-hidden text-ellipsis max-w-[120px]" title={displayBranches}>{displayBranches}</span>
                 </p>
                 <p className="text-[10px] text-slate-400">{u.phone}</p>
               </div>
               <div className="flex gap-1.5 shrink-0">
                 {u.status==='pending' ? (
                  <button onClick={()=>db.collection(getPublicPath('users')).doc(u.phone).update({status:'approved', role:u.normalizedRole})} className="bg-emerald-600 text-white px-3.5 py-2 rounded-xl text-[10px] font-black active:scale-95 shadow-sm">核准</button>
                 ) : (
                  <span className="text-[9px] font-black text-emerald-600 border px-2.5 py-1.5 rounded-lg bg-emerald-50 flex items-center">已授權</span>
                 )}
                 {/* 新增：編輯按鈕 */}
                 <button onClick={() => {
                  setEditingUser(u);
                  setEditFormData({
                    role: u.normalizedRole || ROLE_OPTIONS[0],
                    branches: Array.isArray(u.branch) ? u.branch : [u.branch].filter(Boolean)
                  });
                 }} className="p-2 text-slate-400 hover:text-blue-500 transition-all bg-slate-50 rounded-xl hover:bg-blue-50">
                  <Icon name="edit-3" size={16}/>
                 </button>
                 {/* 修改：加上防呆二次確認 */}
                 <button onClick={() => {
                  if(window.confirm(`確定要刪除「${u.name}」的帳號嗎？此動作無法復原。`)) {
                    db.collection(getPublicPath('users')).doc(u.phone).delete();
                    triggerNotify("員工帳號已刪除", "info");
                  }
                 }} className="p-2 text-slate-400 hover:text-red-500 transition-all bg-slate-50 rounded-xl hover:bg-red-50">
                  <Icon name="trash-2" size={16}/>
                 </button>
               </div>
              </div>
            )})}
            {visibleUsers.length === 0 && <p className="text-center text-slate-400 py-10 text-xs">尚無人員紀錄</p>}
            {visibleUsers.length > 0 && roleFilteredUsers.length === 0 && <p className="text-center text-slate-400 py-10 text-xs">此職位分頁目前沒有人員</p>}

            {/* ── 載入更多 / 收起 ── */}
            {roleFilteredUsers.length > userPageLimit && (
              <button onClick={() => setUserPageLimit(p => p + 10)}
               className="w-full mt-2 py-3 rounded-2xl text-xs font-black text-slate-600 bg-slate-100 border border-slate-200 active:scale-95 transition-all">
               ＋ 載入更多（還有 {roleFilteredUsers.length - userPageLimit} 人）
              </button>
            )}
            {roleFilteredUsers.length > 10 && roleFilteredUsers.length <= userPageLimit && (
              <button onClick={() => setUserPageLimit(10)}
               className="w-full mt-1 py-2 rounded-2xl text-[10px] font-bold text-slate-400 active:scale-95 transition-all">
               ▲ 收起清單
              </button>
            )}
           </div>
         )}
         
         {/* === 編輯人員 Modal === */}
         {editingUser && (
           <div className="fixed inset-0 z-[10000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 page-enter">
            <div className="bg-white rounded-[2.5rem] p-6 w-full max-w-sm shadow-2xl relative">
              <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
               <Icon name="user" className="text-brand-red" /> 變更員工資料
              </h3>
              <div className="space-y-4">
               <div>
                 <p className="text-[10px] font-black text-slate-500 mb-1">員工</p>
                 <p className="font-bold text-slate-800 bg-slate-50 p-3 rounded-xl border">{editingUser.name} ({editingUser.phone})</p>
               </div>
               <div>
                 <p className="text-[10px] font-black text-slate-500 mb-1">職位 / 權限</p>
                 <select
                  value={editFormData.role}
                  onChange={e => setEditFormData({...editFormData, role: e.target.value})}
                  className="w-full bg-white border border-slate-200 p-3 rounded-xl outline-none font-bold text-sm"
                 >
                  {ROLE_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
                 </select>
               </div>
               <div>
                 <p className="text-[10px] font-black text-slate-500 mb-2">
                  所屬分店 {isSuperAdmin ? '(可複選)' : '(僅最高權限可變更)'}
                 </p>
                 <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar p-3 bg-slate-50 rounded-xl border border-slate-100">
                  {globalBranches.map(b => (
                    <label key={b} className={`flex items-center gap-3 ${isSuperAdmin ? 'cursor-pointer' : 'cursor-not-allowed opacity-70'}`}>
                     <input
                       type="checkbox"
                       checked={editFormData.branches.includes(b)}
                       onChange={(e) => {
                        if (!isSuperAdmin) return; // 防呆：不是最高權限就不能改
                        if(e.target.checked) {
                          setEditFormData({...editFormData, branches: [...editFormData.branches, b]});
                        } else {
                          setEditFormData({...editFormData, branches: editFormData.branches.filter(br => br !== b)});
                        }
                       }}
                       disabled={!isSuperAdmin} // 鎖定勾選框
                       className="w-4 h-4 accent-brand-red rounded disabled:grayscale"
                     />
                     <span className="font-bold text-sm text-slate-700">{b}</span>
                    </label>
                  ))}
                 </div>
               </div>
               <div className="flex gap-3 pt-2">
                 <button onClick={() => setEditingUser(null)} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-xl active:scale-95 transition-all text-sm">取消</button>
                 <button onClick={handleSaveUserEdit} className="flex-1 bg-brand-red text-white font-black py-4 rounded-xl active:scale-95 transition-all shadow-lg shadow-brand-red/20 text-sm">儲存變更</button>
               </div>
              </div>
            </div>
           </div>
         )}
         
         {tab === 'menu' && (
          <div className="space-y-4">
           <div className="glass-panel p-5 rounded-[2rem] bg-white border shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
             <h3 className="font-black text-slate-800 text-sm">本季菜單發布提醒</h3>
             <p className="text-[10px] text-slate-400 mt-1">菜單內容編輯完成後，點「更新發布」才會讓首頁紅點提醒員工。</p>
            </div>
            <button onClick={() => publishContent('menu', '本季菜單已更新')} className="bg-brand-red text-white font-black px-5 py-3 rounded-xl text-xs active:scale-95 transition-all flex items-center justify-center gap-2">
             <Icon name="send" size={14} /> 更新發布
            </button>
           </div>
           <RecipeAdminManager categoryPath="menu/list" currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={menu?.items || []} triggerNotify={triggerNotify} getPublicPath={getPublicPath} categories={MENU_CATEGORIES} globalRecipes={globalRecipes} />
          </div>
         )}
         
         {tab === 'content' && (
           <div className="space-y-6">
            <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
              <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest"><Icon name="megaphone" size={16} className="text-brand-red" />跑馬燈 ({currentBranch})</h3>
              <textarea value={tickerText} onChange={e=>setTickerText(e.target.value)} rows="2" className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="公告文字..." />
              <button onClick={()=>db.doc(getPublicPath(`ticker/branch_${currentBranch}`)).set({ text: tickerText }).then(()=>triggerNotify(`跑馬燈已同步至 ${currentBranch}`,"success"))} className="w-full bg-slate-900 text-white font-black py-3 rounded-xl text-[10px]">更新分店跑馬燈</button>
            </div>
            <AnnouncementAdminManager currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} announcements={announcements} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
           </div>
         )}

         {tab === 'onboard' && (
           <div>
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
              {[{id:'list',n:'清單'},{id:'parking',n:'停車'},{id:'video',n:'動線'},{id:'eval',n:'考核'},{id:'wel',n:'福利'}].map(c=>(
               <button key={c.id} onClick={()=>setSubCat(c.id)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${subCat===c.id?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c.n}</button>
              ))}
            </div>
            {subCat === 'video' ? (
              <div className="space-y-4 bg-white p-6 rounded-[2.5rem] border shadow-sm">
               {[{f:'routeBusUrl', l:'大眾運輸引導影片連結'}, {f:'routeCarUrl', l:'自行前往引導影片連結'}].map(x => (
                 <div key={x.f} className="space-y-2">
                  <p className="text-[10px] font-black text-slate-400 ml-1 uppercase">{x.l}</p>
                  <input placeholder="貼上外部連結..." className="w-full input-light p-4 rounded-xl text-xs outline-none" onBlur={(e) => db.doc(getPublicPath(`onboarding/settings_${currentBranch}`)).set({ [x.f]: e.target.value }, {merge:true}).then(()=>triggerNotify("網址儲存成功","success"))} defaultValue={onboarding?.[x.f] || ''} />
                 </div>
               ))}
              </div>
            ) : (
              <UniversalListManager
               categoryPath={subCat==='list'?'onboarding/list':subCat==='parking'?'onboarding/parking':subCat==='eval'?'benefits/eval':'benefits/welfare'}
               currentBranch={currentBranch}
               globalBranches={globalBranches}
               isSuperAdmin={isSuperAdmin}
               items={subCat==='list'?(onboarding?.list || []):subCat==='parking'?(onboarding?.parking || []):subCat==='eval'?(benefits?.evaluation || []):(benefits?.welfare || [])}
               triggerNotify={triggerNotify}
               getPublicPath={getPublicPath}
              />
            )}
           </div>
         )}

         {tab === 'ingredients' && (
           <div>
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
              {[{id:'specs',n:'食材規格'},{id:'waste',n:'報廢回報'}].map(c=>(
               <button key={c.id} onClick={()=>setSubCat(c.id)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${subCat===c.id?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c.n}</button>
              ))}
            </div>
            {subCat === 'waste' ? (
             <WasteReportsAdminList reports={wasteReports} currentBranch={currentBranch} getPublicPath={getPublicPath} triggerNotify={triggerNotify} />
            ) : (
             <UniversalListManager categoryPath="ingredients/specs" currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={ingredientData?.specs || []} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
            )}
           </div>
         )}

         {tab === 'rules' && (
           <div>
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4 overflow-x-auto no-scrollbar">
              {RULE_CATEGORIES.map(c=>(<button key={c} onClick={()=>setSubCat(c)} className={`shrink-0 px-4 py-2 rounded-lg text-[10px] font-bold ${subCat===c?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c}</button>))}
            </div>
            <UniversalListManager categoryPath={`rules/${subCat}`} currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={rulesData[subCat] || []} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
           </div>
         )}

         {tab === 'safety' && (
           <div className="space-y-4">
            <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
              <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="layout-grid" size={18} /> {currentBranch} 區站管理</h3>
              <div className="flex gap-3">
               <input placeholder="新區站名稱..." value={newZoneName} onChange={e=>setNewZoneName(e.target.value)} className="flex-1 input-light p-4 rounded-xl text-sm min-w-0" />
               <button onClick={()=>{
                 if(!newZoneName.trim()) return;
                 const newZ = [...branchZones, { id: Date.now().toString(), name: newZoneName }];
                 db.doc(getPublicPath(`config/zones_${currentBranch}`)).set({ zones: newZ }).then(()=>{setNewZoneName(''); triggerNotify("區站新增成功", "success");});
               }} className="bg-slate-900 text-white px-6 py-4 rounded-xl text-sm font-black shrink-0 whitespace-nowrap shadow-sm">新增</button>
              </div>
              <div className="grid grid-cols-2 gap-2 mt-2">
               {branchZones.map(z => (
                 <div key={z.id} className="bg-slate-50 px-3 py-2 rounded-xl text-xs flex justify-between items-center border">
                  <span>{z.name}</span>
                  <button onClick={()=>{
                    const newZ = branchZones.filter(bz => bz.id !== z.id);
                    db.doc(getPublicPath(`config/zones_${currentBranch}`)).set({ zones: newZ });
                  }} className="text-slate-400 hover:text-red-500"><Icon name="x" size={14}/></button>
                 </div>
               ))}
              </div>
            </div>

            {branchZones.length > 0 && (
              <div className="glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white border text-left">
               <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="camera" size={18} /> {currentBranch} 巡視標準設定</h3>
               <select value={selectedZone} onChange={e=>setSelectedZone(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none">
                 {branchZones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
               </select>
               <div className="bg-slate-50 p-4 rounded-2xl space-y-3 border shadow-inner">
                 <input id="std-note" placeholder="檢查標註..." className="w-full input-light p-3 rounded-xl text-xs outline-none" />

                     <Icon name="trash-2" size={16} />
                    </button>
                    <Icon name={expandedSig === i ? "chevron-up" : "chevron-down"} size={16} className="text-slate-300 ml-1" />
                  </div>
                 </div>
                 {expandedSig === i && (
                  <div className="p-4 bg-slate-50 border-t">
                    <img src={s.signature} className="w-full h-32 object-contain bg-white rounded-xl border border-dashed border-slate-200" alt="簽名" />
                  </div>
                 )}
               </div>
              ))}
              {signatures.filter(s => s.category === `守則簽署 - ${signSubCat}` && (isSuperAdmin ? true : s.branch === currentBranch)).length === 0 && <p className="text-center py-10 text-slate-400 text-xs">目前無簽署紀錄</p>}
            </div>
           </div>
         )}
         {tab === 'report' && isSuperAdmin && (
           <MonthlyReportAdminManager currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} report={contentStatus?.kitchenReport || {}} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
         )}
         {tab === 'game' && <GameAdminManager getPublicPath={getPublicPath} triggerNotify={triggerNotify} globalBranches={globalBranches} />}
         {tab === 'system' && isSuperAdmin && (
           <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
            <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="building-2" size={18} /> 全域分店管理</h3>
            <div className="flex gap-3">
              <input placeholder="新分店名稱..." value={newBranchName} onChange={e=>setNewBranchName(e.target.value)} className="flex-1 input-light p-4 rounded-xl text-sm min-w-0" />
              <button onClick={()=>{
               if(!newBranchName.trim() || globalBranches.includes(newBranchName)) return;
               const newB = [...globalBranches, newBranchName.trim()];
               db.doc(getPublicPath('system/branches')).set({ list: newB }).then(()=>{
                 setNewBranchName(''); 
                 triggerNotify("分店新增成功", "success");
               });
              }} className="bg-slate-900 text-white px-6 py-4 rounded-xl text-sm font-black shrink-0 whitespace-nowrap shadow-sm">新增分店</button>
            </div>
            <div className="space-y-2 mt-4">
              {globalBranches.map(b => (
               <div key={b} className="bg-slate-50 p-4 rounded-2xl font-bold flex justify-between items-center border">
                 <span>{b}</span>
                 {globalBranches.length > 1 && (
                  <button onClick={()=>{
                    const newB = globalBranches.filter(i => i !== b);
                    db.doc(getPublicPath('system/branches')).set({ list: newB });
                    if(currentBranch === b) setCurrentBranch(newB[0]);
                  }} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                 )}
               </div>
              ))}
            </div>
           </div>
         )}
        </div>
      </div>
     );
    };
