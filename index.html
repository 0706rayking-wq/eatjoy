      } catch(e) {
        return null;
      }
     };

     const makeOrderingBranchAliases = (branch) => {
      const raw = String(branch || '').trim();
      const aliases = new Set([raw, raw.replace(/\s+/g, '')]);
      Array.from(aliases).forEach(name => {
        if (/lalaport/i.test(name)) {
         ['Lalaport', 'LaLaport', 'lalaport', 'LALAPORT'].forEach(v => aliases.add(name.replace(/lalaport/ig, v)));
        }
      });
      return Array.from(aliases).filter(Boolean);
     };

     const readOrderingDbByBranch = async (branch) => {
      const snap = await db.doc(getPublicPath(`ordering/db_${branch}`)).get();
      return snap.exists ? normalizeOrderingDb(snap.data()) : null;
     };

     const fetchLatestOrderingBackup = async (branch) => {
      try {
        const snap = await db.collection(getPublicPath(`ordering_backups/db_${branch}/items`))
         .orderBy('backupMeta.createdAt', 'desc')
         .limit(1)
         .get();
        if (!snap.empty) return normalizeOrderingDb(snap.docs[0].data());
      } catch(e) {
        try {
         const fallback = await db.collection(getPublicPath(`ordering_backups/db_${branch}/items`)).get();
         const docs = fallback.docs.map(d => d.data()).sort((a, b) => (b.backupMeta?.createdAt || 0) - (a.backupMeta?.createdAt || 0));
         if (docs[0]) return normalizeOrderingDb(docs[0]);
        } catch(err) {
         console.warn("讀取叫貨備份失敗", err);
        }
      }
      return null;
     };

     const findRestorableOrderingDb = async (branch) => {
      const aliases = makeOrderingBranchAliases(branch).filter(alias => alias !== branch);
      for (const alias of aliases) {
        const data = await readOrderingDbByBranch(alias).catch(() => null);
        if (data && isMeaningfulOrderingDb(data)) return { data, source: `舊分店名稱「${alias}」` };
      }

      const localBackup = loadOrderingLocalBackup(branch);
      if (localBackup && isMeaningfulOrderingDb(localBackup)) return { data: localBackup, source: "本機備份" };

      const remoteBackup = await fetchLatestOrderingBackup(branch);
      if (remoteBackup && isMeaningfulOrderingDb(remoteBackup)) return { data: remoteBackup, source: "雲端備份" };

      return null;
     };

     const backupOrderingDb = async (branch, data, reason = 'before_update') => {
      if (!branch || !isMeaningfulOrderingDb(data)) return;
      saveOrderingLocalBackup(branch, data);
      const now = Date.now();
      const lastAt = lastOrderingBackupAtRef.current[branch] || 0;
      if (reason === 'before_update' && now - lastAt < 30000) return;
      lastOrderingBackupAtRef.current[branch] = now;
      const backupDb = normalizeOrderingDb(data);
      db.collection(getPublicPath(`ordering_backups/db_${branch}/items`)).doc(String(now)).set({
        ...backupDb,
        backupMeta: {
         branch,
         createdAt: now,
         reason,
         itemCount: backupDb.ingredients.length,
         vendorCount: backupDb.vendors.length,
         historyCount: backupDb.history.length,
         version: 1
        }
      }).catch(e => console.warn("建立叫貨備份失敗", e));
     };

     const [orderQuantities, setOrderQuantities] = useState({});

     useEffect(() => {
      if (!selectedBranch) return;
      const docPath = getPublicPath(`ordering/db_${selectedBranch}`);
      let restoreAttempted = false;

      const applyOrderingDb = (data) => {
        const normalized = normalizeOrderingDb(data);
        setStoreDatabases(prev => ({ ...prev, [selectedBranch]: normalized }));
        setOrderQuantities(normalized.activeQuantities);
        saveOrderingLocalBackup(selectedBranch, normalized);
      };

      const restoreIfPossible = async () => {
        const restored = await findRestorableOrderingDb(selectedBranch);
        if (!restored || !isMeaningfulOrderingDb(restored.data)) return false;

        const restoredData = normalizeOrderingDb(restored.data);
        await db.doc(docPath).set({
         ...restoredData,
         restoredAt: Date.now(),
         restoredFrom: restored.source
        }, { merge: true });
        applyOrderingDb(restoredData);
        triggerNotify(`已從${restored.source}找回「${selectedBranch}」叫貨資料`, "success");
        return true;
      };

      const unsubscribe = db.doc(docPath).onSnapshot(async docSnap => {
        try {
         if (docSnap.exists) {
           const data = normalizeOrderingDb(docSnap.data());
           if (isMeaningfulOrderingDb(data)) {
            applyOrderingDb(data);
           } else if (!restoreAttempted) {
            restoreAttempted = true;
            const restored = await restoreIfPossible();
            if (!restored) applyOrderingDb(data);
           } else {
            applyOrderingDb(data);
           }
        } else if (!restoreAttempted) {
           restoreAttempted = true;
           const restored = await restoreIfPossible();
           if (!restored) applyOrderingDb(orderingDefaultDb);
        } else {
           applyOrderingDb(orderingDefaultDb);
        }
        } catch(e) {
         console.error("叫貨資料還原失敗:", e);
         triggerNotify("叫貨資料還原失敗，請檢查網路連線", "error");
        }
      }, err => {
        console.error("讀取叫貨資料庫失敗:", err);
        triggerNotify("讀取叫貨資料庫失敗", "error");
      });
      return () => unsubscribe();
     }, [selectedBranch]);

     const [view, setView] = useState('setup'); 
     const [adminTab, setAdminTab] = useState('ingredients');
     const [analyticsZone, setAnalyticsZone] = useState(null);
     const [expandedAnalyticsItem, setExpandedAnalyticsItem] = useState(null);
     const [analyticsMonth, setAnalyticsMonth] = useState(() => new Date().toISOString().substring(0, 7));
     
     const [orderDate, setOrderDate] = useState(() => {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.toISOString().split('T')[0];
     });

     const [selectedZone, setSelectedZone] = useState(null);
     const [searchQuery, setSearchQuery] = useState('');
     const [copyStatus, setCopyStatus] = useState({});
     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);
     const [editedOrderTexts, setEditedOrderTexts] = useState({});
     const [isResettingOrder, setIsResettingOrder] = useState(false);

     const [adminZoneFilter, setAdminZoneFilter] = useState('全部');
     const [adminVendorFilter, setAdminVendorFilter] = useState('全部');
     const [adminItemLimit, setAdminItemLimit] = useState(30); 
     
     const { customUnits, ALL_UNITS, addCustomUnit, removeCustomUnit } = useCustomUnits();
     const [newItem, setNewItem] = useState({ name: '', vendor: '', unit: '包', zone: '菜區' });
     const [newVendorName, setNewVendorName] = useState('');
     const [newZoneName, setNewZoneName] = useState('');

     const [editingIngredientId, setEditingIngredientId] = useState(null);
     const [editIngredientData, setEditIngredientData] = useState(null);

     const [editingVendorName, setEditingVendorName] = useState(null);
     const [editVendorNewName, setEditVendorNewName] = useState('');

     const updateCurrentDb = (newData) => {
      const updatedDb = normalizeOrderingDb({ ...currentDb, ...newData });
      setStoreDatabases(prev => ({ ...prev, [selectedBranch]: updatedDb }));
      saveOrderingLocalBackup(selectedBranch, updatedDb);
      backupOrderingDb(selectedBranch, currentDb).finally(() => {
       db.doc(getPublicPath(`ordering/db_${selectedBranch}`)).set({
        ...updatedDb,
        updatedAt: Date.now()
       }, { merge: true }).catch(e => {
        console.error("更新叫貨資料失敗", e);
        triggerNotify("儲存失敗，請檢查網路連線", "error");
       });
      });
     };

     const resetActiveOrderQuantities = async (manual = false) => {
      if (manual && !window.confirm(`確定要重置「${selectedBranch}」目前所有叫貨量嗎？`)) return;
      setIsResettingOrder(true);
      try {
        await db.doc(getPublicPath(`ordering/db_${selectedBranch}`)).set({ activeQuantities: {} }, { merge: true });
        setOrderQuantities({});
        setStoreDatabases(prev => ({
         ...prev,
         [selectedBranch]: { ...(prev[selectedBranch] || currentDb), activeQuantities: {} }
        }));
        triggerNotify(manual ? "叫貨量已手動重置" : "叫貨量已重置", "success");
      } catch(e) {
        console.error("重置叫貨量失敗", e);
        triggerNotify("重置叫貨量失敗", "error");
      } finally {
        setIsResettingOrder(false);
      }
     };

     const saveOrderToHistory = () => {
      const orderItems = currentDb.ingredients
        .map(item => ({
         name: item.name,
         qty: parseFloat(orderQuantities[item.id] || 0),
         unit: item.unit
        }))
        .filter(i => i.qty > 0);
        
      if (orderItems.length === 0) return;

      const existingRecordIndex = currentDb.history.findIndex(r => r && r.date === orderDate);
      let newHistory = [...currentDb.history];

      if (existingRecordIndex > -1) {
        newHistory[existingRecordIndex] = {
         ...newHistory[existingRecordIndex],
         timestamp: new Date().toLocaleString(),
         items: orderItems
        };
      } else {
        const newHistoryRecord = {
         id: Date.now(),
         date: orderDate,
         timestamp: new Date().toLocaleString(),
         items: orderItems
        };
        newHistory.push(newHistoryRecord);
      }

      if (newHistory.length > 365) {
        newHistory = newHistory.slice(-365);
      }

      updateCurrentDb({ history: newHistory });
     };

     const monthlyStats = useMemo(() => {
      const stats = {};
      currentDb.history.forEach(record => {
        if (record && (record.date || '').startsWith(analyticsMonth)) {
         (record.items || []).filter(Boolean).forEach(item => {
           stats[item.name] = (stats[item.name] || 0) + item.qty;
         });
        }
      });
      return stats;
     }, [currentDb.history, analyticsMonth]); // 👈 這裡的依賴陣列也要改

     const handleDragStart = (id) => setDraggedId(id);
     const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
     const handleDragEnd = () => {
      if (draggedId !== null && overId !== null) {
        const newIngredients = [...currentDb.ingredients];
        const fromIndex = newIngredients.findIndex(i => i.id === draggedId);
        const toIndex = newIngredients.findIndex(i => i.id === overId);
        if (fromIndex === -1 || toIndex === -1) {
         setDraggedId(null);
         setOverId(null);
         return;
        }
        const [movedItem] = newIngredients.splice(fromIndex, 1);
        newIngredients.splice(toIndex, 0, movedItem);
        updateCurrentDb({ ingredients: newIngredients });
      }
      setDraggedId(null);
      setOverId(null);
     };

        const groupedOrders = useMemo(() => {
         const list = currentDb.ingredients
           .map(item => ({ ...item, orderQty: parseFloat(orderQuantities[item.id] || 0) }))
           .filter(i => i.orderQty > 0);

         return list.reduce((acc, item) => {
           if (!acc[item.vendor]) acc[item.vendor] = [];
    
           const existingItem = acc[item.vendor].find(i => i.name === item.name);
    
           if (existingItem) {
            existingItem.orderQty += item.orderQty;
           } else {
            acc[item.vendor].push({ ...item });
           }
    
           return acc;
        }, {});
        }, [currentDb.ingredients, orderQuantities]);

     const activeOrderCount = useMemo(() => {
      return Object.values(orderQuantities || {}).filter(v => parseFloat(v || 0) > 0).length;
     }, [orderQuantities]);

     useEffect(() => {
      if (view === 'result') {
        const initialTexts = {};
        const [y, m, d] = orderDate.split('-');
        const dateStr = `${parseInt(m)}/${parseInt(d)}`;
        Object.entries(groupedOrders).forEach(([vendor, items]) => {
         let text = `${selectedBranch} ${dateStr}\n`;
         items.forEach(item => { text += `${item.name} ${item.orderQty}${item.unit}\n`; });
         initialTexts[vendor] = text.trim();
        });
        setEditedOrderTexts(initialTexts);
      }
     }, [view, groupedOrders, selectedBranch, orderDate]);

     const handleTextChange = (vendor, newText) => {
      setEditedOrderTexts(prev => ({ ...prev, [vendor]: newText }));
     };

     const handleShare = async (vendorName) => {
      saveOrderToHistory();
      const text = editedOrderTexts[vendorName] || "";

      // 1. 優先用 navigator.share（iOS 原生分享，可直接選 LINE）
      if (navigator.share) {
        try {
          await navigator.share({ title: `訂貨單-${vendorName}`, text });
          setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
          triggerNotify(`${vendorName} 訂單已分享！`, 'success');
          setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
          return;
        } catch (err) {
          // 用戶取消分享、或 share 失敗 → fallback 到複製
          if (err.name === 'AbortError') return; // 主動取消不需提示
        }
      }

      // 2. Fallback：複製到剪貼簿（現代 API）
      try {
        await navigator.clipboard.writeText(text);
        setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
        triggerNotify(`${vendorName} 訂單已複製！請貼到 LINE 傳送`, 'success');
        setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
      } catch (clipErr) {
        // 最後備援：舊版 execCommand
        try {
          const el = document.createElement('textarea');
          el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
          document.body.appendChild(el); el.focus(); el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
          triggerNotify(`${vendorName} 訂單已複製！請貼到 LINE 傳送`, 'success');
          setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
        } catch (e) {
          triggerNotify('複製失敗，請手動複製訂單內容', 'error');
        }
      }
     };

     const handleQuantityChange = (itemId, newVal) => {
      const val = Math.max(0, parseFloat(newVal) || 0);
      setOrderQuantities(prev => ({ ...prev, [itemId]: val }));
      
      const docRef = db.doc(getPublicPath(`ordering/db_${selectedBranch}`));
      docRef.update({
        [`activeQuantities.${itemId}`]: val
      }).catch(() => {
        docRef.set({ activeQuantities: { [itemId]: val } }, { merge: true });
      });
     };

     const Nav = ({ title, onBackAction, rightAction }) => (
      <div className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200 px-4 py-4 flex items-center justify-between shadow-sm" style={{background:"var(--s1, rgba(255,255,255,0.95))", borderColor:"var(--gold-border, #e2e8f0)"}}>
        <div className="flex items-center gap-3">
         {onBackAction && (
           <button onClick={onBackAction} className="w-10 h-10 bg-slate-100 rounded-xl active-scale btn-touch flex items-center justify-center" style={{background:"var(--s2, #f1f5f9)"}}>
            <OrderSymbolIcon name="ChevronLeft" className="text-slate-700" />
           </button>
         )}
         <h1 className="text-lg font-black text-slate-800 tracking-tight">{title}</h1>
        </div>
        {rightAction}
      </div>
     );

     return (
      <div className="text-slate-900 pb-24 selection:bg-rose-100 overflow-x-hidden page-enter" style={{background:"var(--s0, transparent)", color:"var(--t1, inherit)"}}>
        {/* 1. 設定頁面 */}
        {view === 'setup' && (
         <div className="max-w-md mx-auto px-6 pt-10">
           <div className="flex justify-center mb-8">
            <div className="bg-brand-red w-20 h-20 rounded-[2.5rem] shadow-2xl shadow-brand-red/20 flex items-center justify-center rotate-3 font-black text-white text-3xl">
              <OrderSymbolIcon name="Package" className="text-4xl" />
            </div>
           </div>
           <h2 className="text-3xl font-black text-center text-slate-800 mb-1">簡易下單系統</h2>
           <p className="text-center text-slate-400 text-sm mb-8 font-medium">各區下單完成後整合送出</p>

           <div className="bg-white rounded-[3rem] shadow-xl border border-white overflow-hidden">
            <div className="flex flex-col">
              <div className="bg-slate-50 px-8 py-5 border-b border-slate-100">
               <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{isSuperAdmin ? '選擇分店' : '當前分店'}</label>
               {isSuperAdmin ? (
                 <select value={selectedBranch} onChange={e => setSelectedBranch(e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black outline-none mt-1 text-brand-red">
                  {branches.map(b => <option key={b} value={b}>{b}</option>)}
                 </select>
               ) : (
                 <div className="w-full text-xl font-black mt-1 text-brand-red py-1">{selectedBranch}</div>
               )}
              </div>
              <div className="px-8 py-5 border-b border-slate-100">
               <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">進貨日期</label>
               <input type="date" value={orderDate} onChange={e => setOrderDate(e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black outline-none mt-1" />
              </div>
              
              <div className="p-8">
               <button onClick={() => setView('zone_select')} className="w-full bg-brand-red text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-brand-red/20 flex items-center justify-center gap-3 active-scale transition-all">
                 開始點貨 <OrderSymbolIcon name="ArrowRight" className="text-xl" />
               </button>
               
               <div className="grid grid-cols-2 gap-3 mt-4">
                 <button onClick={() => { setView('analytics'); setAnalyticsZone(null); setExpandedAnalyticsItem(null); }} className="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 active-scale transition-all">
                  <OrderSymbolIcon name="Chart" /> 數據分析報表
                 </button>
                 <button onClick={() => { setView('admin'); setAdminTab('ingredients'); }} className="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 active-scale transition-all">
                  <OrderSymbolIcon name="Settings" /> 食材廠商設定
                 </button>
               </div>
               <button
                onClick={() => resetActiveOrderQuantities(true)}
                disabled={isResettingOrder || activeOrderCount === 0}
                className={`w-full mt-3 py-4 rounded-2xl font-black text-xs flex items-center justify-center gap-2 border transition-all ${isResettingOrder || activeOrderCount === 0 ? 'bg-slate-50 text-slate-300 border-slate-100 cursor-not-allowed' : 'bg-rose-50 text-brand-red border-rose-100 active-scale shadow-sm'}`}
               >
                <OrderSymbolIcon name="RotateCcw" /> {isResettingOrder ? '重置中...' : `手動重置叫貨量${activeOrderCount > 0 ? `（${activeOrderCount} 項）` : ''}`}
               </button>
               <button onClick={onBack} className="w-full py-4 text-slate-400 font-bold text-xs uppercase mt-4">返回廚務OS</button>
              </div>
            </div>
           </div>
         </div>
        )}

        {/* 2. 區站選擇 */}
        {view === 'zone_select' && (
         <div className="max-w-md mx-auto">
           <Nav title={`${selectedBranch} - 區站`} onBackAction={() => setView('setup')} />
           <div className="p-6 space-y-6 pb-20 mt-4">
            <div className="grid grid-cols-1 gap-4">
              {currentDb.zones.map((zone) => {
               const zoneItems = currentDb.ingredients.filter(i => i.zone === zone.name);
               const activeCount = zoneItems.filter(i => (orderQuantities[i.id] || 0) > 0).length;
               return (
                 <button key={zone.name} onClick={() => { setSelectedZone(zone.name); setView('inventory'); }} className={`p-5 rounded-[2.5rem] border transition-all active-scale flex items-center justify-between bg-white shadow-sm hover:border-brand-red/30 ${activeCount > 0 ? 'border-brand-red/30 ring-4 ring-rose-50' : 'border-slate-100'}`}>
                  <div className="flex items-center gap-4">
                    <div className={`${zone.color} w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center font-black text-white text-2xl`}>
                     <OrderSymbolIcon name={zone.icon} />
                    </div>
                    <div className="text-left">
                     <h3 className="font-black text-lg text-slate-800">{zone.name}</h3>
                     <p className="text-xs font-bold text-slate-400">{activeCount > 0 ? `已點: ${activeCount} 項` : `清單共 ${zoneItems.length} 項`}</p>
                    </div>
                  </div>
                  <OrderSymbolIcon name="ChevronRight" className="text-slate-300 text-xl" />
                 </button>
               );
              })}
            </div>

            {Object.keys(groupedOrders).length > 0 && (
              <button 
               onClick={() => setView('result')} 
               className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-2xl flex items-center justify-center gap-2 active-scale transition-all mt-2"
              >
               <OrderSymbolIcon name="ClipboardCheck" /> 生成廠商訂單 ({Object.keys(groupedOrders).length})
              </button>
            )}
           </div>
         </div>
        )}

        {/* 3. 食材點貨頁面 */}
        {view === 'inventory' && (
         <div className="max-w-md mx-auto">
           <Nav title={selectedZone} onBackAction={() => { setView('zone_select'); setSearchQuery(''); }} />
           <div className="bg-white/80 backdrop-blur-md sticky top-[61px] z-40 px-4 py-4 border-b border-slate-100 shadow-sm" style={{background:"var(--s1, rgba(255,255,255,0.8))", borderColor:"var(--gold-border, #f1f5f9)"}}>
            <div className="relative flex items-center">
              <div className="absolute left-4 font-black text-slate-300 flex items-center"><OrderSymbolIcon name="Search" /></div>
              <input type="text" placeholder={`搜尋${selectedZone}...`} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 text-sm font-bold focus:ring-2 focus:ring-brand-red/50 outline-none" style={{color:"var(--t1, inherit)"}} />
            </div>
           </div>
           <div className="p-4 space-y-4 pb-40">
            {currentDb.ingredients.filter(i => i.zone === selectedZone && (i.name || '').includes(searchQuery)).map((item) => {
              const qty = orderQuantities[item.id] || 0;
              const isDragging = draggedId === item.id;
              const isOver = overId === item.id;
              return (
               <div key={item.id} draggable onDragStart={() => handleDragStart(item.id)} onDragOver={(e) => handleDragOver(e, item.id)} onDragEnd={handleDragEnd} className={`bg-white p-5 rounded-[2rem] border shadow-sm flex items-center justify-between transition-all duration-300 ${isDragging ? 'drag-ghost' : 'border-slate-100'} ${isOver ? 'border-brand-red/40 translate-y-1 shadow-md' : ''}`}>
                 <div className="flex items-center gap-4 flex-1 min-w-0">
                  <div className="p-1.5 text-slate-300 drag-handle font-black text-xl flex items-center"><OrderSymbolIcon name="GripVertical" /></div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-black text-slate-800 text-lg truncate leading-tight">{item.name}</h4>
                    <p className="text-[10px] font-black text-brand-red uppercase mt-0.5">{item.vendor}</p>
                  </div>
                 </div>
                 <div className="flex items-center gap-2 bg-slate-100/50 p-1.5 rounded-3xl shrink-0 ml-4">
                  <button onClick={() => handleQuantityChange(item.id, qty - 1)} className="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center active-scale btn-touch text-slate-400 font-black text-2xl"><OrderSymbolIcon name="Minus" /></button>
                  
                  <OrderQtyInput value={qty} onChange={(val) => handleQuantityChange(item.id, val)} unit={item.unit} />
                  
                  <button onClick={() => handleQuantityChange(item.id, qty + 1)} className="w-12 h-12 bg-brand-red rounded-2xl shadow-lg flex items-center justify-center text-white active-scale btn-touch font-black text-2xl"><OrderSymbolIcon name="Plus" /></button>
                 </div>
               </div>
              );
            })}
            <div className="mt-12 pt-6 border-t border-slate-200">
              <button 
               onClick={() => { setView('zone_select'); window.scrollTo(0,0); }}
               className="w-full bg-white border-2 border-brand-red text-brand-red py-5 rounded-3xl font-black text-lg active-scale transition-all shadow-lg flex items-center justify-center gap-2"
              >
               <OrderSymbolIcon name="ChevronLeft" /> 點貨完畢，返回區站選擇
              </button>
            </div>
           </div>
         </div>
        )}

        {/* 4. 結果頁面 */}
        {view === 'result' && (
         <div className="max-w-md mx-auto px-6">
           <Nav title="確認訂單並編輯" onBackAction={() => setView('zone_select')} />
           <div className="space-y-8 pb-32 mt-6">
            <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-xs font-bold text-amber-700 leading-relaxed">
              提示：點擊「發送」後系統會自動保存此次叫貨紀錄至數據報表中。
            </div>
            {Object.keys(groupedOrders).length === 0 ? (
              <div className="text-center py-24 bg-white rounded-[3rem] border border-dashed border-slate-200">
               <div className="font-black text-slate-200 text-5xl mb-4">?</div>
               <p className="text-slate-400 font-black">尚未叫貨</p>
              </div>
            ) : (
              Object.entries(groupedOrders).map(([vendor, items]) => (
               <div key={vendor} className="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden animate-in zoom-in-95 duration-300">
                 <div className="p-6 bg-slate-900 flex items-center justify-between">
                  <div>
                    <h3 className="text-white font-black text-xl">{vendor}</h3>
                    <p className="text-rose-200 text-[10px] font-bold uppercase mt-1 flex items-center gap-1"><OrderSymbolIcon name="Edit" className="w-3 h-3" /> 文字框可編輯</p>
                  </div>
                  <div className="bg-white/10 px-4 py-1.5 rounded-full text-[10px] text-white font-black uppercase">{items.length} 項</div>
                 </div>
                 <div className="p-6 space-y-5">
                  <textarea className="editable-order-text no-scrollbar" rows={Math.max(4, (editedOrderTexts[vendor]?.split('\n').length || 0) + 1)} value={editedOrderTexts[vendor] || ""} onChange={(e) => handleTextChange(vendor, e.target.value)} />
                  <button onClick={() => handleShare(vendor)} className={`w-full py-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg active-scale transition-all ${copyStatus[vendor] ? 'bg-emerald-500 text-white' : 'bg-brand-red text-white shadow-brand-red/20'}`}>
                    <OrderSymbolIcon name={copyStatus[vendor] ? "CheckCircle2" : "Share2"} /> {copyStatus[vendor] ? '紀錄已保存！已複製內容' : `發送訂單給 ${vendor}`}
                  </button>
                 </div>
               </div>
              ))
            )}
           </div>
         </div>
        )}

        {/* 數據分析報表頁面 (區站分類版) */}
        {view === 'analytics' && (
         <div className="max-w-md mx-auto">
           <Nav 
            title={`${selectedBranch} - 數據報表`} 
            onBackAction={() => {
              if (analyticsZone) {
               setAnalyticsZone(null);
               setExpandedAnalyticsItem(null);
              } else {
               setView('setup');
              }
            }} 
           />
           <div className="p-6 space-y-6">
            {!analyticsZone ? (
              <div className="space-y-4 animate-in fade-in">
               <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-xs font-bold text-amber-700 leading-relaxed shadow-inner flex flex-col gap-2">
                 <div className="flex justify-between items-center">
                  <span>💡 提示：請先選擇要檢視的月份 ➔</span>
                  <input 
                    type="month" 
                    value={analyticsMonth} 
                    onChange={(e) => setAnalyticsMonth(e.target.value)} 
                    className="bg-white border border-amber-300 text-amber-900 rounded-lg px-2 py-1.5 outline-none font-black text-sm shadow-sm"
                  />
                 </div>
                 <div className="text-amber-600/80 mt-1 border-t border-amber-200/50 pt-2">
                  目前正顯示 <span className="font-black text-brand-red">{analyticsMonth}</span> 累計叫貨數據。
                 </div>
               </div>
               <div className="grid grid-cols-2 gap-3">
                 {currentDb.zones.map(zone => {
                  const activeItemsCount = currentDb.ingredients.filter(i => 
                    i.zone === zone.name && monthlyStats[i.name] > 0
                  ).length;

                  return (
                    <button 
                     key={zone.name} 
                     onClick={() => {
                       setAnalyticsZone(zone.name);
                       window.scrollTo(0, 0);
                     }}
                     className="p-5 bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:border-brand-red/30 active:scale-95 transition-all text-left flex flex-col justify-between aspect-square group"
                    >                                              <div className={`${zone.color} w-12 h-12 rounded-2xl shadow-sm flex items-center justify-center font-black text-white text-xl mb-2 group-hover:scale-110 transition-transform`}>
                       <OrderSymbolIcon name={zone.icon} />
                     </div>
                     <div>
                       <h3 className="font-black text-slate-800 text-base">{zone.name}</h3>
                       <p className="text-[10px] font-bold text-slate-400 mt-1">
                        {activeItemsCount > 0 ? <span className="text-brand-red">已叫貨 {activeItemsCount} 項</span> : '尚無叫貨紀錄'}
                       </p>
                     </div>
                    </button>
                  );
                 })}
               </div>
              </div>
            ) : (
              <div className="space-y-4 animate-in slide-in-from-right-4 duration-300 pb-20">
               <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between relative z-10 mb-2">
                 <h3 className="font-black text-slate-800 text-lg flex items-center gap-2">
                  <span className="w-2.5 h-6 bg-brand-red rounded-full block"></span>
                  {analyticsZone}
                 </h3>
                 <span className="text-xs font-black text-brand-red bg-rose-50 px-3 py-1.5 rounded-full border border-rose-100">{analyticsMonth} 統計</span>
               </div>

               <div className="space-y-3">
                 {currentDb.ingredients
                  .filter(i => i.zone === analyticsZone)
                  .sort((a, b) => (monthlyStats[b.name] || 0) - (monthlyStats[a.name] || 0)) // 叫貨數量多的排在前面
                  .map(item => {
                    const totalQty = monthlyStats[item.name] || 0;
                    const isExpanded = expandedAnalyticsItem === item.name;

                    return (
                     <div key={item.id} className={`bg-white rounded-[1.5rem] border transition-all overflow-hidden ${isExpanded ? 'border-brand-red/40 shadow-md' : 'border-slate-100 shadow-sm'}`}>
                       <div 
                        onClick={() => setExpandedAnalyticsItem(isExpanded ? null : item.name)}
                        className={`p-5 flex justify-between items-center cursor-pointer active:bg-slate-50 transition-colors ${totalQty === 0 ? 'opacity-60 grayscale-[50%]' : ''}`}
                       >
                        <div className="flex-1 min-w-0 pr-4">
                          <h4 className="font-black text-slate-800 text-base truncate">{item.name}</h4>
                          <p className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">{item.vendor}</p>
                        </div>
                        <div className="text-right flex items-center gap-3 shrink-0">
                          <div className="text-right">
                           {totalQty > 0 ? (
                             <>
                              <span className="font-black text-brand-red text-xl">{totalQty}</span>
                              <span className="text-[10px] text-slate-400 font-bold ml-1">{item.unit}</span>
                             </>
                           ) : (
                             <span className="text-xs font-bold text-slate-300">0 {item.unit}</span>
                           )}
                          </div>
                          <Icon name={isExpanded ? "chevron-up" : "chevron-down"} size={18} className="text-slate-300" />
                        </div>
                       </div>

                       {/* 點擊展開：顯示本月叫貨明細 */}
                       {isExpanded && (
                        <div className="p-4 bg-slate-50 border-t border-slate-100 shadow-inner">
                          <h5 className="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-widest flex items-center gap-1.5"><Icon name="history" size={14}/> 本店近期紀錄</h5>
                          <div className="space-y-2">
                           {currentDb.history.slice().reverse()
                             .filter(r => (r.date || '').startsWith(analyticsMonth) && (r.items || []).filter(Boolean).some(i => i.name === item.name))
                             .slice(0, 5) // 顯示最近 5 筆
                             .map(record => {
                              const match = (record.items || []).filter(Boolean).find(i => i.name === item.name) || {};
                              return (
                                <div key={record.id} className="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                 <span className="text-xs font-bold text-slate-600">{record.date}</span>
                                 <span className="font-black text-slate-800 text-sm">+{match.qty} <span className="text-[10px] text-slate-400">{match.unit}</span></span>
                                </div>
                              )
                             })
                           }
                           {(!currentDb.history.some(r => (r.date || '').startsWith(analyticsMonth) && (r.items || []).filter(Boolean).some(i => i.name === item.name))) && (
                             <div className="text-center py-4 text-xs font-bold text-slate-400">本月尚無此食材的叫貨紀錄</div>
                           )}
                          </div>
                        </div>
                       )}
                     </div>
                    );
                  })}
                 {currentDb.ingredients.filter(i => i.zone === analyticsZone).length === 0 && (
                  <div className="text-center py-12 text-slate-400 text-xs font-bold bg-white rounded-[2rem] border border-dashed border-slate-200 shadow-sm">此區站尚未設定任何食材</div>
                 )}
               </div>
              </div>
            )}
           </div>
         </div>
        )}

        {/* 後台管理 */}
        {view === 'admin' && (
         <div className="max-w-md mx-auto">
           <Nav title={`${selectedBranch} - 管理`} onBackAction={() => setView('setup')} />
           <div className="flex bg-white border-b border-slate-100 px-4 py-3 gap-2 overflow-x-auto no-scrollbar shadow-sm sticky top-[61px] z-50">
            {[
              { id: 'ingredients', label: '食材', icon: 'Layers' }, 
              { id: 'vendors', label: '廠商', icon: 'Filter' }, 
              { id: 'zones', label: '區站', icon: 'LayoutGrid' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setAdminTab(tab.id)} className={`shrink-0 px-5 py-2.5 rounded-2xl text-xs font-black transition-all flex items-center gap-2 whitespace-nowrap ${adminTab === tab.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}>
               <OrderSymbolIcon name={tab.icon} /> {tab.label}
              </button>
            ))}
           </div>
           <div className="p-6 space-y-6 pb-20">
            {adminTab === 'ingredients' && (
              <div className="space-y-6">
               <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                 <h3 className="font-black text-slate-800 flex items-center gap-2"><OrderSymbolIcon name="Plus" className="text-brand-red" /> 新增食材</h3>
                 <input placeholder="食材名稱" className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none ring-1 ring-slate-100" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} />
                 <div className="grid grid-cols-2 gap-3">
                  <select className="bg-slate-50 rounded-xl p-4 font-bold outline-none" value={newItem.vendor} onChange={e => setNewItem({...newItem, vendor: e.target.value})}>
                    <option value="">選擇廠商</option>
                    {currentDb.vendors.map(v => <option key={v} value={v}>{v}</option>)}
                  </select>
                  <select className="bg-slate-50 rounded-xl p-4 font-bold outline-none" value={newItem.unit} onChange={e => setNewItem({...newItem, unit: e.target.value})}>
                    {ALL_UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                 </div>
                 <select className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none" value={newItem.zone} onChange={e => setNewItem({...newItem, zone: e.target.value})}>
                  {currentDb.zones.map(z => <option key={z.name} value={z.name}>{z.name}</option>)}
                 </select>
                 <button onClick={() => { if(newItem.name && newItem.vendor) { updateCurrentDb({ ingredients: [...currentDb.ingredients, { ...newItem, id: Date.now() }] }); setNewItem({ ...newItem, name: '', vendor: '', unit: '包', zone: currentDb.zones[0]?.name }); triggerNotify('新增食材成功', 'success'); } }} className="w-full bg-brand-red text-white p-5 rounded-2xl font-black shadow-lg">確認新增</button>
               </div>

               {/* 自訂單位管理 */}
               <div className="bg-white rounded-3xl p-4 mt-3">
                <div className="font-black text-sm text-slate-700 mb-3">📐 管理叫貨單位</div>
                {/* 新增自訂單位 */}
                <div className="flex gap-2 mb-3">
                 <input
                  id="newUnitInput"
                  placeholder="輸入新單位（如：整、捆、筒）"
                  className="flex-1 bg-slate-50 rounded-xl p-3 font-bold text-sm outline-none border border-slate-200"
                 />
                 <button
                  onClick={() => {
                   const el = document.getElementById('newUnitInput');
                   if (addCustomUnit(el.value)) { el.value = ''; triggerNotify('單位已新增', 'success'); }
                   else triggerNotify('單位已存在或為空', 'error');
                  }}
                  className="bg-brand-red text-white px-4 rounded-xl font-black text-sm">
                  新增
                 </button>
                </div>
                {/* 自訂單位列表 */}
                {customUnits.length > 0 && (
                 <div>
                  <div className="text-[10px] text-slate-400 font-bold mb-2">自訂單位（點✕刪除）</div>
                  <div className="flex flex-wrap gap-2">
                   {customUnits.map(u => (
                    <span key={u} className="bg-orange-100 text-orange-700 rounded-full px-3 py-1 text-xs font-black flex items-center gap-1">
                     {u}
                     <button onClick={() => { removeCustomUnit(u); triggerNotify('已刪除', 'success'); }}
                      className="text-orange-400 hover:text-orange-700 font-black leading-none">✕</button>
                    </span>
                   ))}
                  </div>
                 </div>
                )}
                {/* 全部單位預覽 */}
                <div className="mt-3 text-[10px] text-slate-400 font-bold">
                 全部單位：{ALL_UNITS.join(' · ')}
                </div>
               </div>

               <div className="bg-slate-200/50 p-4 rounded-3xl grid grid-cols-2 gap-2">
                 <select className="bg-white rounded-xl p-2 text-xs font-bold border-none shadow-sm" value={adminZoneFilter} onChange={e => {setAdminZoneFilter(e.target.value); setAdminItemLimit(30);}}><option value="全部">全部區站</option>{currentDb.zones.map(z => <option key={z.name} value={z.name}>{z.name}</option>)}</select>
                 <select className="bg-white rounded-xl p-2 text-xs font-bold border-none shadow-sm" value={adminVendorFilter} onChange={e => {setAdminVendorFilter(e.target.value); setAdminItemLimit(30);}}><option value="全部">全部廠商</option>{currentDb.vendors.map(v => <option key={v} value={v}>{v}</option>)}</select>
               </div>
               <div className="space-y-2">
                 {currentDb.ingredients
                  .filter(i => (adminZoneFilter === '全部' || i.zone === adminZoneFilter) && (adminVendorFilter === '全部' || i.vendor === adminVendorFilter))
                  .slice().reverse()
                  .slice(0, adminItemLimit)
                  .map(item => (
                  editingIngredientId === item.id ? (
                    <div key={item.id} className="bg-slate-50 p-5 rounded-[2.5rem] shadow-sm border border-brand-red/30 space-y-3">
                     <input placeholder="食材名稱" className="w-full bg-white rounded-xl p-3.5 font-bold outline-none ring-1 ring-slate-200" value={editIngredientData.name} onChange={e => setEditIngredientData({...editIngredientData, name: e.target.value})} />
                     <div className="grid grid-cols-2 gap-2">
                       <select className="bg-white rounded-xl p-3.5 font-bold outline-none text-sm" value={editIngredientData.vendor} onChange={e => setEditIngredientData({...editIngredientData, vendor: e.target.value})}>
                        <option value="">選擇廠商</option>
                        {currentDb.vendors.map(v => <option key={v} value={v}>{v}</option>)}
                       </select>
                       <select className="bg-white rounded-xl p-3.5 font-bold outline-none text-sm" value={editIngredientData.unit} onChange={e => setEditIngredientData({...editIngredientData, unit: e.target.value})}>
                        {ALL_UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                       </select>
                     </div>
                     <select className="w-full bg-white rounded-xl p-3.5 font-bold outline-none text-sm" value={editIngredientData.zone} onChange={e => setEditIngredientData({...editIngredientData, zone: e.target.value})}>
                       {currentDb.zones.map(z => <option key={z.name} value={z.name}>{z.name}</option>)}
                     </select>
                     <div className="flex gap-2 pt-2">
                       <button onClick={() => setEditingIngredientId(null)} className="flex-1 bg-slate-200 text-slate-600 p-3 rounded-xl font-bold active:scale-95 transition-all">取消</button>
                       <button onClick={() => {
                        if(editIngredientData.name && editIngredientData.vendor) {
                          const newIngredients = currentDb.ingredients.map(i => i.id === item.id ? editIngredientData : i);
                          updateCurrentDb({ ingredients: newIngredients });
                          setEditingIngredientId(null);
                          triggerNotify('食材更新成功', 'success');
                        }
                       }} className="flex-1 bg-brand-red text-white p-3 rounded-xl font-bold active:scale-95 transition-all shadow-lg">儲存</button>
                     </div>
                    </div>
                  ) : (
                    <div key={item.id} className="bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm border border-slate-50">
                     <div className="min-w-0 pr-4">
                       <p className="font-black text-slate-700 truncate">{item.name}</p>
                       <p className="text-[10px] font-bold text-slate-400 uppercase">{item.vendor} • {item.zone} • {item.unit}</p>
                     </div>
                     <div className="flex gap-1">
                       <button onClick={() => { setEditingIngredientId(item.id); setEditIngredientData(item); }} className="bg-slate-50 text-slate-400 hover:text-blue-500 p-2.5 rounded-xl"><OrderSymbolIcon name="Edit" /></button>
                       <button onClick={() => { if(window.confirm(`確定刪除「${item.name}」嗎？`)) updateCurrentDb({ ingredients: currentDb.ingredients.filter(i => i.id !== item.id) }); }} className="bg-rose-50 text-rose-400 hover:text-rose-600 p-2.5 rounded-xl"><OrderSymbolIcon name="Trash2" /></button>
                     </div>
                    </div>
                  )
                 ))}
                 
                 {/* 分頁載入更多按鈕 */}
                 {currentDb.ingredients.filter(i => (adminZoneFilter === '全部' || i.zone === adminZoneFilter) && (adminVendorFilter === '全部' || i.vendor === adminVendorFilter)).length > adminItemLimit && (
                  <button 
                    onClick={() => setAdminItemLimit(prev => prev + 30)} 
                    className="w-full py-4 mt-4 bg-slate-100 text-slate-500 font-black rounded-2xl active:scale-95 transition-all shadow-sm border border-slate-200"
                  >
                    載入更多食材 (目前顯示 {adminItemLimit} 筆)
                  </button>
                 )}
               </div>
              </div>
            )}
            {adminTab === 'vendors' && (
              <div className="space-y-6">
               <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex gap-3">
                 <input placeholder="新廠商名稱" className="flex-1 bg-slate-50 rounded-2xl p-4 font-bold outline-none ring-1 ring-slate-100 border-none min-w-0" value={newVendorName} onChange={e => setNewVendorName(e.target.value)} />
                 <button onClick={() => { if(newVendorName && !currentDb.vendors.includes(newVendorName)) { updateCurrentDb({ vendors: [...currentDb.vendors, newVendorName] }); setNewVendorName(''); triggerNotify('新增廠商成功', 'success'); } else if (currentDb.vendors.includes(newVendorName)) { triggerNotify('廠商已存在', 'error'); } }} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black shrink-0 whitespace-nowrap shadow-sm">新增</button>
               </div>
               <div className="grid grid-cols-2 gap-3">
                 {currentDb.vendors.map(v => (
                  editingVendorName === v ? (
                    <div key={v} className="bg-slate-50 p-4 rounded-[1.5rem] flex gap-2 items-center shadow-sm border border-brand-red/30 w-full col-span-2">
                     <input className="flex-1 bg-white rounded-xl p-3 font-bold outline-none ring-1 ring-slate-200 text-sm" value={editVendorNewName} onChange={e => setEditVendorNewName(e.target.value)} />

    // WarlogPhase 獨立子組件（避免 hook 在 if 中問題）
    const WarlogPhase = ({ currentUser, getPublicPath, loadSave, writeSave, campBg, cardStyle, NavBar, setFrPhase }) => {
     const { useState: useS, useEffect: useE } = React;
     const [warlogEntries, setWarlogEntries] = useS([]);
     const [wlLines, setWlLines] = useS(() => {
      const s = loadSave(); return s.warlogLines || { entry:'', defeat:'', rivalEntry:'', rivalDefeat:'' };
     });
     const [todayClaimed, setTodayClaimed] = useS(0);
     const MAX_DAILY_COINS = 300;
     const today = new Date().toDateString();

     useE(() => {
      if (!currentUser?.phone) return;
      const unsub = db.collection(getPublicPath(`warlog_${currentUser.phone}`))
       .orderBy('timestamp','desc').limit(30)
       .onSnapshot(snap => {
        const entries = snap.docs.map(d=>({id:d.id,...d.data()}));
        setWarlogEntries(entries);
        const claimed = entries.filter(e=>e.date===today&&e.claimed).reduce((s,e)=>s+(e.coins||0),0);
        setTodayClaimed(claimed);
       }, ()=>{});
      return () => unsub();
     }, [currentUser?.phone]);

     const saveLines = (newLines) => {
      setWlLines(newLines);
      writeSave({ warlogLines: newLines });
      if (currentUser?.phone) {
       db.collection(getPublicPath('users')).doc(currentUser.phone)
        .update({ warlogLines: newLines }).catch(()=>{});
      }
     };

     const claimEntry = async (entry) => {
      if (entry.claimed) return;
      if (todayClaimed >= MAX_DAILY_COINS) { alert('\u4ECA\u65E5\u6230\u6CC1\u91D1\u5E63\u5DF2\u9054\u4E0A\u9650 ' + MAX_DAILY_COINS + ' \uD83D\uDCB0'); return; }
      const canClaim = Math.min(entry.coins, MAX_DAILY_COINS - todayClaimed);
      const newGold = (loadSave().gold||0) + canClaim;
      writeSave({ gold: newGold });
      await db.collection(getPublicPath(`warlog_${currentUser.phone}`)).doc(entry.id).update({ claimed: true }).catch(()=>{});
     };

     const claimAllEntries = async () => {
      if (todayClaimed >= MAX_DAILY_COINS) { alert('\u4ECA\u65E5\u6230\u6CC1\u91D1\u5E63\u5DF2\u9054\u4E0A\u9650 ' + MAX_DAILY_COINS + ' \uD83D\uDCB0'); return; }
      const pending = warlogEntries.filter(e => e.coins > 0 && !e.claimed);
      if (pending.length === 0) { alert('\u76EE\u524D\u6C92\u6709\u53EF\u9818\u53D6\u7684\u91D1\u5E63'); return; }
      let remain = MAX_DAILY_COINS - todayClaimed;
      let gain = 0;
      const batch = db.batch();
      for (const entry of pending) {
       if (remain <= 0) break;
       const take = Math.min(entry.coins || 0, remain);
       if (take <= 0) continue;
       gain += take;
       remain -= take;
       batch.update(db.collection(getPublicPath(`warlog_${currentUser.phone}`)).doc(entry.id), { claimed: true });
      }
      if (gain <= 0) { alert('\u4ECA\u65E5\u6230\u6CC1\u91D1\u5E63\u5DF2\u9054\u4E0A\u9650 ' + MAX_DAILY_COINS + ' \uD83D\uDCB0'); return; }
      writeSave({ gold: (loadSave().gold||0) + gain });
      await batch.commit().catch(()=>{});
     };

     const typeLabel = {
      selected_as_partner: '🤝 被選為夥伴',
      rival_win: '🏆 亂入戰場獲勝',
      rival_lose: '💀 亂入戰場落敗',
      rival_lose_entry: '👻 被玩家擊敗',
      rival_selected: '👻 被亂入玩家選中出戰'
     };

     return (
      <div className="fixed inset-0 z-[10000] flex flex-col" style={campBg}>
       <NavBar title="戰況" onBack={()=>setFrPhase('camp')} />
       <div className="flex-1 overflow-y-auto p-4 space-y-3">
        <div style={{...cardStyle}}>
         <div style={{fontSize:'11px', fontWeight:900, color:'#fbbf24', marginBottom:'10px', letterSpacing:'1px'}}>✍️ 台詞設定</div>
         {[
          {key:'entry', label:'🗡️ 被選中出征台詞', ph: (currentUser?.name||'你')+'：「我來幫你」'},
          {key:'defeat', label:'💀 出征戰敗台詞', ph: (currentUser?.name||'你')+'：「下次一定贏回來」'},
          {key:'rivalEntry', label:'👻 亂入出場台詞', ph: (currentUser?.name||'你')+'：「讓我來考驗你！」'},
          {key:'rivalDefeat', label:'🏳️ 亂入戰敗台詞', ph: (currentUser?.name||'你')+'：「你果然很強...」'},
         ].map(item=>(
          <div key={item.key} style={{marginBottom:'8px'}}>
           <div style={{fontSize:'10px', color:'#8b949e', marginBottom:'4px', fontWeight:700}}>{item.label}</div>
           <input
            value={wlLines[item.key]||''}
            onChange={e=>{const nl={...wlLines,[item.key]:e.target.value};saveLines(nl);}}
            placeholder={item.ph}
            style={{width:'100%',background:'#0d1117',border:'1px solid #30363d',borderRadius:'8px',padding:'8px 10px',color:'#e6edf3',fontSize:'12px',fontWeight:700,outline:'none'}}
           />
          </div>
         ))}
        </div>
        <div style={{...cardStyle, display:'flex', justifyContent:'space-between', alignItems:'center', gap:'10px'}}>
         <div>
          <div style={{fontSize:'11px', color:'#8b949e', fontWeight:700}}>{"\u4ECA\u65E5\u5DF2\u9818\u53D6"}</div>
          <div style={{color:'#fde047', fontWeight:900, fontSize:'15px'}}>{"\uD83D\uDCB0"} {todayClaimed} / {MAX_DAILY_COINS}</div>
         </div>
         <button onClick={claimAllEntries}
          disabled={!warlogEntries.some(e=>e.coins>0&&!e.claimed) || todayClaimed>=MAX_DAILY_COINS}
          style={{background:'linear-gradient(135deg,#b08800,#fbbf24)',color:'#000',border:'none',borderRadius:'10px',padding:'8px 12px',fontWeight:900,fontSize:'11px',cursor:'pointer',opacity:(!warlogEntries.some(e=>e.coins>0&&!e.claimed)||todayClaimed>=MAX_DAILY_COINS)?.45:1,whiteSpace:'nowrap'}}>
          {"\u4E00\u9375\u9818\u53D6"}
         </button>
        </div>
        <div style={{fontSize:'11px', fontWeight:900, color:'#8b949e', letterSpacing:'1px', marginBottom:'6px'}}>📜 戰況紀錄</div>
        {warlogEntries.length === 0 ? (
         <div style={{textAlign:'center', padding:'30px 0', color:'#8b949e'}}>
          <div style={{fontSize:'32px', marginBottom:'8px'}}>🕊️</div>
          <div style={{fontSize:'12px', fontWeight:700}}>尚無戰況紀錄</div>
          <div style={{fontSize:'10px', marginTop:'4px'}}>出征或被選為夥伴後會出現紀錄</div>
         </div>
        ) : warlogEntries.map(e=>(
         <div key={e.id} style={{...cardStyle, display:'flex', alignItems:'center', gap:'10px',
          borderColor: e.claimed?'#21262d': e.type==='rival_lose'?'#7f1d1d':'#1a3a1a'}}>
          <div style={{fontSize:'20px', flexShrink:0}}>
           {e.type==='selected_as_partner'?'🤝':e.type==='rival_win'?'🏆':e.type==='rival_lose'||e.type==='rival_lose_entry'?'💀':'👻'}
          </div>
          <div style={{flex:1, minWidth:0}}>
           <div style={{fontSize:'11px', fontWeight:900, color: e.claimed?'#8b949e':'#e6edf3'}}>
            {typeLabel[e.type]||e.type}
           </div>
           <div style={{fontSize:'10px', color:'#8b949e', marginTop:'2px'}}>
            {e.type==='selected_as_partner'?`被 ${e.by} 選中出征，獲得 💰${e.coins}`:
             e.type==='rival_win'?`亂入並擊敗了 ${e.target||'對手'}，獲得 💰${e.coins}`:
             e.type==='rival_lose'?`亂入 ${e.target||'玩家'} 的戰場落敗`:
             e.type==='rival_lose_entry'?`在 ${e.by||'玩家'} 的遊戲中被擊敗`:
             `出現在 ${e.by||'玩家'} 的遊戲中`}
           </div>
           <div style={{fontSize:'9px', color:'#484f58', marginTop:'1px'}}>
            {new Date(e.timestamp||Date.now()).toLocaleString()}
           </div>
          </div>
          <div style={{flexShrink:0, textAlign:'right'}}>
           {e.coins>0 && !e.claimed && todayClaimed<MAX_DAILY_COINS ? (
            <button onClick={()=>claimEntry(e)}
             style={{background:'linear-gradient(135deg,#b08800,#fbbf24)',color:'#000',border:'none',
              borderRadius:'8px',padding:'6px 10px',fontWeight:900,fontSize:'11px',cursor:'pointer',whiteSpace:'nowrap'}}>
             領取 💰{e.coins}
            </button>
           ) : e.claimed ? (
            <span style={{fontSize:'10px',color:'#3fb950',fontWeight:900}}>已領取 ✓</span>
           ) : e.coins>0 ? (
            <span style={{fontSize:'10px',color:'#8b949e',fontWeight:700}}>今日上限</span>
           ) : null}
          </div>
         </div>
        ))}
       </div>
      </div>
     );
    };

    // ══ CampChat 聊天室組件 ══════════════════════════════════════════════
    const CampChat = ({ currentUser, currentBranch, getPublicPath, db, allUsers }) => {
     const { useState: uS, useEffect: uE, useRef: uR } = React;
     const [channel, setChannel] = uS('branch'); // 'branch' | 'all'
     const [messages, setMessages] = uS([]);
     const [input, setInput] = uS('');
     const [sending, setSending] = uS(false);
     const bottomRef = uR(null);

     uE(() => {
      if (!currentUser?.phone) return;
      // chat_branch 按分店隔離，chat_all 為跨店公頻（不走 getPublicPath）
      const colPath = channel === 'branch'
       ? getPublicPath(`chat_${currentBranch}`)
       : 'global_chat_all';
      const unsub = db.collection(colPath)
       .orderBy('ts', 'asc').limit(40)
       .onSnapshot(snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setMessages(msgs);
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
       }, (err) => { console.warn('chat error', err); });
      return () => unsub();
     }, [channel, currentUser?.phone, currentBranch]);

     const sendMsg = async () => {
      const text = input.trim();
      if (!text || !currentUser?.phone || sending) return;
      setSending(true);
      // chat_branch 按分店隔離，chat_all 為跨店公頻（不走 getPublicPath）
      const colPath = channel === 'branch'
       ? getPublicPath(`chat_${currentBranch}`)
       : 'global_chat_all';
      await db.collection(colPath).add({
       text, name: currentUser.name || '玩家',
       branch: currentBranch || '',
       phone: currentUser.phone,
       ts: Date.now()
      }).catch(() => {});
      setInput('');
      setSending(false);
     };

     const chLabel = { branch: `🏠 ${currentBranch || '本店'}`, all: '🌐 全分店' };

     return (
      <div style={{
       background:'#0d1117', borderTop:'1px solid #21262d',
       display:'flex', flexDirection:'column', maxHeight:'220px', minHeight:'160px', flexShrink:0
      }}>
       {/* Header */}
       <div style={{display:'flex', alignItems:'center', gap:'6px', padding:'6px 10px',
        borderBottom:'1px solid #21262d', flexShrink:0}}>
        <span style={{fontSize:'12px', fontWeight:900, color:'#8b949e'}}>聊天室</span>
        <div style={{display:'flex', gap:'6px', marginLeft:'4px'}}>
         {['branch','all'].map(ch => (
          <button key={ch} onClick={()=>setChannel(ch)}
           style={{
            padding:'3px 10px', borderRadius:'20px', border:'none', cursor:'pointer',
            fontSize:'11px', fontWeight:900,
            background: channel===ch ? '#1f6feb' : '#21262d',
            color: channel===ch ? '#fff' : '#8b949e',
           }}>
           {chLabel[ch]}
          </button>
         ))}
        </div>
       </div>

       {/* Messages */}
       <div style={{flex:1, overflowY:'auto', padding:'5px 10px', display:'flex', flexDirection:'column', gap:'6px'}}>
        {messages.length === 0 && (
         <div style={{color:'#484f58', fontSize:'11px', textAlign:'center', padding:'16px 0'}}>
          {channel==='branch'?'本店還沒有訊息':'跨店頻道還沒有訊息'}，來打個招呼吧 👋
         </div>
        )}
        {messages.map(m => {
         const isMine = m.phone === currentUser?.phone;
         return (
          <div key={m.id} style={{
           display:'flex', flexDirection: isMine?'row-reverse':'row',
           gap:'6px', alignItems:'flex-end'
          }}>
           <div style={{
            maxWidth:'72%', padding:'6px 10px', borderRadius: isMine?'12px 12px 2px 12px':'12px 12px 12px 2px',
            background: isMine ? '#1f6feb' : '#21262d',
            color: isMine ? '#fff' : '#e6edf3',
            fontSize:'12px', fontWeight:700, wordBreak:'break-all', lineHeight:1.4
           }}>
            {!isMine && <div style={{fontSize:'9px',color:'#8b949e',marginBottom:'3px',fontWeight:900}}>
             {m.branch && m.branch !== currentBranch ? `[${m.branch}] ` : ''}{m.name}
            </div>}
            {m.text}
           </div>
          </div>
         );
        })}
        <div ref={bottomRef} />
       </div>

       {/* Input */}
       <div style={{display:'flex', gap:'6px', padding:'6px 10px', borderTop:'1px solid #21262d', flexShrink:0}}>
        <input
         value={input}
         onChange={e => setInput(e.target.value)}
         onKeyDown={e => e.key === 'Enter' && !e.shiftKey && sendMsg()}
         placeholder={`傳送到 ${chLabel[channel]}...`}
         maxLength={100}
         style={{
          flex:1, background:'#161b22', border:'1px solid #30363d',
          borderRadius:'20px', padding:'8px 12px', color:'#e6edf3',
          fontSize:'12px', fontWeight:700, outline:'none'
         }}
        />
        <button onClick={sendMsg} disabled={sending || !input.trim()}
         style={{
          background: input.trim() ? '#1f6feb' : '#21262d',
          border:'none', borderRadius:'50%', width:'36px', height:'36px',
          cursor: input.trim() ? 'pointer' : 'not-allowed',
          color:'#fff', fontSize:'16px', flexShrink:0,
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'background .15s'
         }}>
         {sending ? '…' : '➤'}
        </button>
       </div>
      </div>
     );
    };

const dataUrlBytes = (dataUrl) => {
 const raw = String(dataUrl || '').split(',')[1] || '';
 return Math.ceil(raw.length * 3 / 4);
};
const compressLeftoverImage = async (base64) => {
 let maxWidth = 1100;
 let quality = .78;
 let output = await compressImage(base64, maxWidth, quality);
 while (dataUrlBytes(output) > 950000 && quality > .34) {
  quality -= .08;
  maxWidth = Math.max(640, maxWidth - 100);
  output = await compressImage(base64, maxWidth, quality);
 }
 return output;
};
const submitLeftoverDish = async (item) => {
 if (leftoverSaving || !currentUser?.phone) return;
 const form = leftoverDishForms[item.id] || {};
 const dishName = String(form.dishName || '').trim();
 const dishDesc = String(form.dishDesc || '').trim();
 const file = form.photoFile;
 if (!dishName || !dishDesc) {
  setLeftoverMessage('請先填寫菜名與菜色介紹。');
  return;
 }
 if (!file) {
  setLeftoverMessage('請先選擇菜色照片，再送審。');
  return;
 }
 setLeftoverSaving(true);
 setLeftoverMessage('照片壓縮與上傳中...');
 try {
  const reader = new FileReader();
  const base64 = await new Promise((resolve, reject) => {
   reader.onloadend = () => resolve(reader.result);
   reader.onerror = reject;
   reader.readAsDataURL(file);
  });
  const compressed = await compressLeftoverImage(base64);
  if (dataUrlBytes(compressed) > 1000000) throw new Error('too-large');
  await db.collection(getPublicPath('leftover_submissions')).add({
   itemId:item.id,
   itemLabel:item.label,
   dishName,
   dishDesc,
   phone:currentUser.phone,
   userName:currentUser.name || currentUser.phone,
   branch:currentBranch,
   photo:compressed,
   status:'pending',
   review:'',
   timestamp:Date.now()
  });
  setLeftoverDishForms(prev=>({...prev,[item.id]:{ dishName:'', dishDesc:'', photoFile:null, photoName:'' }}));
  setLeftoverMessage(`${item.label}「${dishName}」已送出，等待最高權限審核。`);
 } catch (e) {
  console.error(e);
  setLeftoverMessage('上傳失敗，請換一張照片或重新整理後再試。');
 } finally {
  setLeftoverSaving(false);
 }
};
const approveLeftoverSubmission = async (submission) => {
 if (!isSuperAdmin || !submission?.id) return;
 const review = leftoverReviewTexts[submission.id] || '合格，料理重生成功。';
 const progressRef = db.collection(getPublicPath('leftover_progress')).doc(submission.phone);
 const subRef = db.collection(getPublicPath('leftover_submissions')).doc(submission.id);
 await db.runTransaction(async tx => {
  const snap = await tx.get(progressRef);
  const data = snap.exists ? snap.data() : {};
  const approvedItems = Array.from(new Set([...(data.approvedItems || []), submission.itemId]));
  const comments = { ...(data.comments || {}), [submission.itemId]: review };
  tx.set(progressRef, {
   phone:submission.phone,
   userName:submission.userName,
   branch:submission.branch,
   approvedItems,
   comments,
   updatedAt:Date.now()
  }, { merge:true });
  tx.update(subRef, { status:'approved', review, reviewedAt:Date.now(), publicVisible:true });
 });
};
const rejectLeftoverSubmission = async (submission) => {

  reviewedAt:Date.now()
 });
