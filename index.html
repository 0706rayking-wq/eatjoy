               </div>
               <div className="flex gap-1.5 border-l pl-2 border-slate-100 shrink-0">
                 <button onClick={() => startEdit(a)} className="text-slate-400 hover:text-blue-500 p-1.5 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16}/></button>
                 <button onClick={() => deleteItem(a.id)} className="text-slate-400 hover:text-red-500 p-1.5 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16}/></button>
               </div>
              </div>
              <div className="bg-slate-50 p-3 rounded-xl border shadow-inner">
               <p className="text-[10px] font-black text-slate-500 mb-2 flex items-center gap-1"><Icon name="eye" size={12}/> 已讀取人員 ({a.readBy?.length || 0})</p>
               <div className="flex flex-wrap gap-1">
                 {a.readBy && a.readBy.length > 0 ? a.readBy.map(name => (
                  <span key={name} className="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md font-bold">{name}</span>
                 )) : <span className="text-[10px] text-slate-400">尚未有人讀取</span>}
               </div>
              </div>
            </div>
           </div>
         ))}
         {(announcements||[]).length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">目前尚無分店公告</p>}
        </div>
      </div>
     );
    };

    const SignaturePad = ({ onSave }) => {
     const canvasRef = useRef(null);
     const [isDrawing, setIsDrawing] = useState(false);
     const getPos = (e) => {
      const rect = canvasRef.current.getBoundingClientRect();
      const clientX = (e.clientX || (e.touches && e.touches[0].clientX));
      const clientY = (e.clientY || (e.touches && e.touches[0].clientY));
      const x = (clientX - rect.left) * (canvasRef.current.width / rect.width);
      const y = (clientY - rect.top) * (canvasRef.current.height / rect.height);
      return { x, y };
     };
     const startDrawing = (e) => {
      if (e.type === 'touchstart') e.preventDefault();
      const pos = getPos(e);
      const ctx = canvasRef.current.getContext('2d');
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
      ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
      setIsDrawing(true);
     };
     const draw = (e) => {
      if (!isDrawing) return;
      const pos = getPos(e);
      const ctx = canvasRef.current.getContext('2d');
      ctx.lineTo(pos.x, pos.y); ctx.stroke();
     };
     return (
      <div className="glass-panel p-6 rounded-[2.5rem] mt-8 bg-white border border-slate-200 text-center shadow-lg">
        <h4 className="font-black text-slate-800 mb-4 flex items-center justify-center gap-2 font-bold"><Icon name="pen-tool" size={18} className="text-brand-red" />確認閱讀完畢並簽名</h4>
        <canvas ref={canvasRef} width={600} height={300} className="signature-canvas mb-4 mx-auto shadow-inner" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={()=>setIsDrawing(false)} onMouseLeave={()=>setIsDrawing(false)} onTouchStart={startDrawing} onTouchEnd={()=>setIsDrawing(false)} onTouchMove={draw}></canvas>
        <div className="flex gap-3">
         <button onClick={() => canvasRef.current.getContext('2d').clearRect(0,0,600,300)} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs uppercase">重寫</button>
         <button onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-[2] py-3 rounded-xl bg-brand-red text-white font-black text-xs uppercase active:scale-95 transition-all">提交簽署</button>
        </div>
      </div>
     );
    };

           <button onClick={() => setMode('admin')} className={`flex-1 py-2.5 rounded-[0.85rem] font-bold text-xs transition-all ${mode === 'admin' ? 'bg-white shadow-sm text-brand-red' : 'text-slate-400'}`}>管理員</button>
         </div>
         
         <div className="space-y-4">
           <div className="relative">
            <select value={branch} onChange={e => setBranch(e.target.value)} className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm appearance-none text-slate-700 px-5 text-left bg-white">

     return (
      <input
        type="text"
        value={localVal}
        onChange={e => setLocalVal(e.target.value)}
        onBlur={() => { if(localVal !== (value || '')) onChange(localVal); }}
        onKeyDown={e => { if(e.key === 'Enter') e.target.blur(); }}
        readOnly={readOnly}
        className={className}
        maxLength={maxLength}
        placeholder={placeholder}
        autoFocus={autoFocus}
      />
     );
    };

           const updatedMonthData = updateCallback(currentMonthData);

           transaction.set(docRef, {

         dayOfWeek: ['日', '一', '二', '三', '四', '五', '六'][date.getDay()],

         newColors[cellKey] = 'bg-yellow-300';

     const addStaff = () => {

     const calculateOffDays = (shifts = {}) => {
      let count = 0;
      daysInMonth.forEach(day => {
        const code = shifts[day.dateString];
        if (!code) return;
        const rule = shiftRules.find(r => r.code === code);
        if (rule && rule.type === 'off') {
         count++;

         count++;
        }
      });
      return count;
     };

     const calculateDailyStats = (dateString) => {

        const rule = shiftRules.find(r => r.code === shiftCode);

         if (rule.type === 'morning' || rule.type === 'full') morning++;
         if (rule.type === 'evening' || rule.type === 'full') evening++;
         if (rule.type !== 'off') total++;

         total++;
        }
      });
      return { morning, evening, total };
     };

     const getTitleColorStyle = useCallback((title) => {

        const bg = roleColors[title];
        const hex = bg.replace('#', '');
        const r = parseInt(hex.substr(0, 2), 16) || 255;
        const g = parseInt(hex.substr(2, 2), 16) || 255;
        const b = parseInt(hex.substr(4, 2), 16) || 255;
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        const text = (yiq >= 128) ? '#1e293b' : '#ffffff';
        return { backgroundColor: bg, color: text };
      }
      const colors = [
        {bg: '#dcfce7', text: '#065f46'}, {bg: '#dbeafe', text: '#3730a3'}, 
        {bg: '#ffedd5', text: '#c2410c'}, {bg: '#fce7f3', text: '#be123c'}, 
        {bg: '#e0e7ff', text: '#3f0071'}, {bg: '#f3e8ff', text: '#4338ca'}, 
        {bg: '#cffafe', text: '#1e40af'},

      let hash = 0;
      for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);

         <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
           <button onClick={handleDownloadImage} disabled={isDownloading} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#3b82f6] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap disabled:opacity-50">
            <Icon name="image" size={14} /> {isDownloading ? "處理中" : "存為圖片"}
           </button>
           <button onClick={handlePrint} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#059669] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
            <Icon name="printer" size={14} /> 列印
           </button>
           {isManager && (
            <>
              <button onClick={importPreviousData} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#4f46e5] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
               <Icon name="copy" size={14} /> 載入上月
              </button>
              <button onClick={() => setIsHighlightMode(!isHighlightMode)} className={`flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap ${isHighlightMode ? 'bg-yellow-400 text-[#713f12] border border-[#eab308] shadow-inner' : 'bg-[#f1f5f9] text-[#334155] border border-[#cbd5e1]'}`}>
               <Icon name="edit-3" size={14} /> {isHighlightMode ? '結束標記' : '標記修改'}
              </button>
              <button onClick={() => publishContent('schedule', `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月班表已更新`)} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-brand-red text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
               <Icon name="send" size={14} /> 更新發布
              </button>
              <button onClick={addStaff} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#1e293b] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="plus" size={14} /> 新增</button>
              <button onClick={() => setShowSettings(!showSettings)} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#f1f5f9] text-[#334155] rounded-xl border border-[#cbd5e1] active:scale-95 transition-all text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="settings" size={14} /> 設定</button>
            </>
           )}
         </div>
        </div>

        <div className="p-4">
         {isManager && showSettings && (
           <div className="mb-4 p-5 bg-[#eff6ff] border border-[#bfdbfe] rounded-3xl shadow-sm text-left animate-in slide-in-from-top-2">
            <h3 className="font-black text-[#1e40af] mb-3 flex items-center gap-2 text-sm"><Icon name="settings" size={16} /> 班別代碼與統計歸類設定</h3>
            <div className="flex flex-wrap gap-2 mb-4">
              {shiftRules.map((rule, idx) => (
               <div key={idx} className="flex items-center bg-[#ffffff] py-1.5 px-3 rounded-xl shadow-sm border border-[#bfdbfe] text-xs font-bold group">
                 <span className="w-8 text-center text-[#1d4ed8]">{rule.code}</span>
                 <span className="mx-2 text-[#cbd5e1]">|</span>
                 <select value={rule.type} onChange={(e) => { const newRules = [...shiftRules]; newRules[idx].type = e.target.value; setShiftRules(newRules); }} className="outline-none bg-transparent text-[#475569] cursor-pointer appearance-none">
                  <option value="morning">早班</option><option value="evening">晚班</option><option value="full">全天(早+晚)</option><option value="off">休假(不計入)</option>
                 </select>
                 <button onClick={() => removeShiftRule(rule.code)} className="ml-2 text-[#cbd5e1] hover:text-[#ef4444] opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button>
               </div>
              ))}
            </div>
            <div className="pt-3 border-t border-[#bfdbfe] flex flex-wrap items-center gap-2">
              <input type="text" value={newShiftCode} onChange={(e) => setNewShiftCode(e.target.value)} placeholder="代碼 (例: A-7)" className="px-3 py-2 text-xs rounded-xl border border-[#cbd5e1] outline-none w-28 uppercase font-bold" maxLength={4} />
              <select value={newShiftType} onChange={(e) => setNewShiftType(e.target.value)} className="px-3 py-2 text-xs rounded-xl border border-[#cbd5e1] outline-none font-bold">
               <option value="morning">歸類：早班</option><option value="evening">歸類：晚班</option><option value="full">歸類：全天</option><option value="off">歸類：休假</option>
              </select>
              <button onClick={addShiftRule} disabled={!newShiftCode.trim()} className="px-4 py-2 bg-[#2563eb] text-[#ffffff] text-xs font-bold rounded-xl active:scale-95 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-1"><Icon name="plus" size={14} /> 新增班別</button>
            </div>

            <div className="mt-6 pt-4 border-t border-[#bfdbfe]">
              <h3 className="font-black text-[#1e40af] mb-3 flex items-center gap-2 text-sm"><Icon name="palette" size={16} /> 職位顏色自訂</h3>
              <div className="flex flex-wrap gap-2">
               {Array.from(new Set(staffList.map(s => s.title).filter(Boolean))).map(role => (
                 <div key={role} className="flex items-center bg-[#ffffff] py-1 pl-3 pr-2 rounded-xl shadow-sm border border-[#bfdbfe] text-xs font-bold gap-2">
                  <span className="text-[#334155] max-w-[80px] truncate" title={role}>{role}</span>
                  <input 
                    type="color" 
                    value={roleColors[role] || '#ffffff'} 
                    onChange={(e) => updateData({ roleColors: { ...(roleColors || {}), [role]: e.target.value } })}
                    className="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent"
                  />
                  {roleColors[role] && (
                    <button onClick={() => {
                     const newColors = {...roleColors};
                     delete newColors[role];
                     db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`)).update({
                       roleColors: newColors
                     }).catch(() => {
                       updateData({ roleColors: newColors });
                     });
                    }} className="text-[#cbd5e1] hover:text-[#ef4444]"><Icon name="x" size={14} /></button>
                  )}
                 </div>
               ))}
               {Array.from(new Set(staffList.map(s => s.title).filter(Boolean))).length === 0 && <span className="text-xs text-[#64748b]">尚無職位，請先於下方班表新增人員。</span>}
              </div>
              <p className="text-[10px] text-[#3b82f6] mt-2">提示：點擊色塊可自訂該職位的背景顏色，未設定則使用系統自動配色。列印時也會自動套用！</p>
            </div>
           </div>
         )}

         <div className="bg-[#ffffff] rounded-[2rem] shadow-sm border border-slate-400 overflow-hidden mb-8">
           <div className="flex items-center justify-between p-4 bg-[#f8fafc] border-b border-slate-400">
            <button onClick={() => changeMonth(-1)} className="p-2 bg-[#ffffff] rounded-xl shadow-sm active:scale-90 transition-all text-[#475569] border border-[#cbd5e1]"><Icon name="chevron-left" size={18} /></button>
            <div className="font-black text-[#1e293b] flex items-center gap-2 text-xl"><Icon name="calendar" size={20} className="text-brand-red" /> {currentDate.getFullYear()} 年 {currentDate.getMonth() + 1} 月</div>
            <button onClick={() => changeMonth(1)} className="p-2 bg-[#ffffff] rounded-xl shadow-sm active:scale-90 transition-all text-[#475569] border border-[#cbd5e1]"><Icon name="chevron-right" size={18} /></button>
           </div>

           <div className="overflow-x-auto overflow-y-visible custom-scrollbar bg-[#ffffff] relative pb-2 w-full">
            <div ref={tableRef} className="w-max min-w-full bg-[#ffffff] relative">
              <table className="w-full border-collapse min-w-max text-xs select-none schedule-table">
               <thead>
                 <tr>
                  <th colSpan={3} className="bg-[#d1fae5] border border-[#64748b] p-2 text-lg font-black tracking-widest sticky left-0 top-0 z-[60] shadow-sm" style={{ height: '40px' }}>{currentDate.getMonth() + 1}月</th>
                  {daysInMonth.map(day => (
                    <th key={`date-${day.dateNum}`} className={`border border-[#64748b] p-1 text-center font-black text-base w-9 sticky top-0 z-[50] shadow-sm ${getHeaderBg(day.dateString, day.isWeekend)}`} style={{ height: '40px', borderLeft: isRedDay(day.dateString, day.isWeekend) ? '2px solid #f43f5e' : undefined }}>{day.dateNum}</th>
                  ))}
                 </tr>
                 <tr>
                  <th className="bg-[#10b981] border border-[#64748b] p-1 w-[76px] sticky left-0 z-[60] text-[#ffffff] font-black shadow-sm" style={{ top: '40px', height: '40px' }}>職稱</th>
                  <th className="bg-[#10b981] border border-[#64748b] p-1 w-[80px] sticky left-[76px] z-[60] text-[#ffffff] font-black shadow-sm" style={{ top: '40px', height: '40px' }}>姓名</th>
                  <th className="bg-[#10b981] border border-[#64748b] p-1 w-[40px] text-xs leading-tight sticky left-[156px] z-[60] text-[#ffffff] font-black shadow-sm" style={{ top: '40px', height: '40px' }}>休假<br/>天數</th>
                  {daysInMonth.map(day => (
                    <th key={`day-${day.dateNum}`} className={`border border-[#64748b] p-1 text-center sticky z-[50] shadow-sm font-bold text-sm ${getHeaderBg(day.dateString, day.isWeekend)}`} style={{ top: '40px', height: '40px' }}>{day.dayOfWeek}</th>
                  ))}
                 </tr>
                 <tr>
                  <th colSpan={3} className="bg-[#ffffff] border border-[#64748b] p-1 text-right text-xs text-[#94a3b8] font-bold sticky left-0 z-[60] shadow-sm" style={{ top: '80px', height: '60px' }}>{isManager && !isDownloading ? '特殊節日 (點擊設定) ➔' : '特殊節日 ➔'}</th>
                  {daysInMonth.map(day => {
                    const h = getHolidayData(day.dateString);
                    const isEditingHolidayCell = isManager && !isDownloading && selectedCell?.type === 'holiday' && selectedCell?.date === day.dateString;
                    return (
                     <th key={`holiday-${day.dateNum}`} onClick={(e) => { e.stopPropagation(); openHolidayEdit(day.dateString); }} className={`border border-[#64748b] p-0 text-center align-top relative sticky shadow-sm ${isEditingHolidayCell ? 'z-[200]' : 'z-[50]'} ${isManager && !isDownloading ? 'cursor-pointer hover:brightness-95' : ''} ${getCellBg(day.dateString, day.isWeekend)}`} style={{ top: '80px', height: '60px', zIndex: isEditingHolidayCell ? 200 : 50 }}>
                       {isEditingHolidayCell ? (
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[150px] z-[300] bg-white border-2 border-[#94a3b8] p-2 rounded-xl flex flex-col gap-2" style={{ backgroundColor: '#ffffff', opacity: 1, outline: '8px solid #ffffff', outlineOffset: '-1px', boxShadow: '0 0 0 8px #ffffff, 0 18px 34px rgba(15,23,42,0.28)' }} onClick={e=>e.stopPropagation()}>
                          <input autoFocus type="text" value={holidayInputText} onChange={(e) => setHolidayInputText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && saveHoliday(day.dateString)} className="w-full text-xs border border-[#cbd5e1] rounded p-1.5 outline-none font-bold text-[#1e293b] text-center bg-white" style={{ backgroundColor: '#ffffff', opacity: 1 }} placeholder="節日或備註" />
                          <label className="flex items-center justify-center gap-1.5 text-[10px] text-[#475569] cursor-pointer bg-[#f8fafc] py-1.5 rounded border border-slate-200" style={{ backgroundColor: '#f8fafc', opacity: 1 }}>
                           <input type="checkbox" checked={holidayInputIsRed} onChange={(e) => setHolidayInputIsRed(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded"/>
                           標示為紅字休假
                          </label>
                          <div className="flex gap-1.5">
                           <button onClick={() => deleteHoliday(day.dateString)} className="flex-1 py-1.5 bg-[#f1f5f9] text-[#64748b] text-xs font-bold rounded hover:bg-[#fef2f2] hover:text-[#ef4444] border border-[#e2e8f0] active:scale-95 transition-all">清空</button>
                           <button onClick={() => saveHoliday(day.dateString)} className="flex-[1.5] py-1.5 bg-brand-red text-[#ffffff] text-xs font-bold rounded shadow-sm active:scale-95 transition-all">儲存</button>
                          </div>
                        </div>
                       ) : (
                        h && <div className={`font-black text-[13px] mx-auto pt-1 tracking-widest ${h.isRed ? 'text-[var(--accent)]' : 'text-slate-600'}`} style={{ writingMode: 'vertical-rl', textOrientation: 'upright', lineHeight: 1.1, maxHeight: '56px', overflow: 'hidden' }}>{h.text}</div>
                       )}
                     </th>
                    );
                  })}
                 </tr>
               </thead>
               <tbody>
                 {staffList.map((staff, index) => {
                  const isDragging = draggedStaffId === staff.id;
                  const isOver = overStaffId === staff.id;
                  return (
                  <tr 
                    key={staff.id} 
                    draggable={isManager && !isDownloading}
                    onDragStart={() => handleDragStart(staff.id)}
                    onDragOver={(e) => handleDragOver(e, staff.id)}
                    onDragEnd={handleDragEnd}
                    className={`${isManager && !isDownloading ? 'group cursor-grab active:cursor-grabbing' : ''} ${isDragging ? 'opacity-40' : ''} ${isOver ? 'border-y-2 border-brand-red shadow-sm relative z-20' : ''}`}
                  >
                    <td className={`border border-[#64748b] p-0 sticky left-0 z-[30] transition-colors title-cell`} style={(() => { const s = getTitleColorStyle(staff.title); return { '--cell-bg': s.backgroundColor, '--cell-color': s.color }; })()}>
                     <div className="flex items-center h-full">
                       {isManager && !isDownloading && <div className="pl-1 opacity-50 shrink-0"><Icon name="grip-vertical" size={14} /></div>}
                       {isDownloading ? (
                        <div className={`w-full h-full min-h-[36px] flex items-center justify-center text-[11px] font-bold ${isManager ? 'pl-1' : 'pl-2'}`}>
                          {staff.title}
                        </div>
                       ) : (
                        <SyncInput value={staff.title} onChange={(val) => updateStaffInfo(staff.id, 'title', val)} readOnly={!isManager} className={`w-full h-full py-2 pr-1 ${isManager ? 'pl-1' : 'pl-2'} bg-transparent text-center outline-none font-bold ${isManager ? '' : 'cursor-default'}`} />
                       )}
                     </div>
                    </td>
                    <td className={`border border-[#64748b] p-0 sticky left-[76px] z-[30] relative transition-colors name-cell`} style={(() => { const s = getTitleColorStyle(staff.title); return { '--cell-bg': s.backgroundColor, '--cell-color': s.color }; })()}>
                     {isDownloading ? (
                       <div className="w-full h-full min-h-[36px] px-0.5 flex items-center justify-center font-black text-sm" style={{color:'inherit'}}>
                        {staff.name}
                       </div>
                     ) : (
                       <SyncInput value={staff.name} onChange={(val) => updateStaffInfo(staff.id, 'name', val)} readOnly={!isManager} className={`w-full h-full px-0.5 py-2 bg-transparent text-center font-black text-sm outline-none ${isManager ? '' : 'cursor-default'}`} style={{color:'inherit'}} />
                     )}
                     {isManager && !isDownloading && <button onClick={() => removeStaff(staff.id)} className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 text-[#ffffff] bg-[#ef4444] hover:bg-red-600 transition-opacity p-0.5 rounded-bl-lg shadow-sm z-10"><Icon name="x" size={10} /></button>}
                    </td>
                    <td className="border border-[#64748b] p-1 text-center font-black text-lg sticky left-[156px] z-[30] off-days-cell">{calculateOffDays(staff.shifts)}</td>
                    {daysInMonth.map(day => {
                     const cellKey = `${staff.id}_${day.dateString}`;
                     const isHighlighted = (activeMonthData?.cellColors || {})[cellKey] === 'bg-yellow-300';
                     const baseBg = getCellBg(day.dateString, day.isWeekend);
                     const finalBg = isHighlighted ? 'sc-yellow' : baseBg;
                     
                     return (
                       <td key={`${staff.id}-${day.dateNum}`} 
                        onClick={() => { if (isHighlightMode) toggleCellColor(staff.id, day.dateString); }}
                        className={`border border-[#64748b] p-0 relative ${isHighlighted ? 'sc-yellow' : finalBg} ${isHighlightMode ? 'cursor-pointer hover:opacity-80' : ''}`}>
                        {isDownloading ? (
                          <div className="w-full h-full min-h-[36px] flex items-center justify-center font-black uppercase text-[14px] text-[#1e293b]">
                           {(staff.shifts || {})[day.dateString] || ''}
                          </div>
                        ) : (
                          <SyncInput 
                           value={(staff.shifts || {})[day.dateString] || ''} 
                           onChange={(val) => updateShift(staff.id, day.dateString, val.toUpperCase())} 
                           readOnly={!isManager || isHighlightMode} 
                           className={`w-full h-[36px] text-center bg-transparent outline-none font-black uppercase text-[14px] ${isManager && !isHighlightMode ? 'focus:bg-yellow-100 focus:ring-1 focus:ring-blue-400 text-slate-800' : 'text-slate-700 cursor-default'} ${isHighlightMode ? 'pointer-events-none' : ''}`} 
                           maxLength={4} 
                          />
                        )}
                       </td>
                     );
                    })}
                  </tr>
                  );
                 })}
               </tbody>
               <tfoot className="font-bold text-[10px] sticky bottom-0 z-[40] shadow-[0_-4px_10px_rgba(0,0,0,0.15)]">
                 <tr>
                  <td colSpan={3} className="border border-[#64748b] p-2 text-right bg-[#fff7ed] text-[#9a3412] sticky left-0 z-[60] text-sm">早班總人數 (含全天)</td>
                  {daysInMonth.map(day => <td key={`morning-${day.dateNum}`} className="border border-[#64748b] p-1 text-center bg-[#fff7ed] text-[#9a3412] font-black text-lg">{calculateDailyStats(day.dateString).morning || ''}</td>)}
                 </tr>
                 <tr>
                  <td colSpan={3} className="border border-[#64748b] p-2 text-right bg-[#eef2ff] text-[#3730a3] sticky left-0 z-[60] text-sm">晚班總人數 (含全天)</td>
                  {daysInMonth.map(day => <td key={`evening-${day.dateNum}`} className="border border-[#64748b] p-1 text-center bg-[#eef2ff] text-[#3730a3] font-black text-lg">{calculateDailyStats(day.dateString).evening || ''}</td>)}
                 </tr>
                 <tr>
                  <td colSpan={3} className="border border-[#64748b] p-2 text-right bg-[#1e293b] text-[#ffffff] sticky left-0 z-[60] font-black text-sm">當日總上班人數</td>
                  {daysInMonth.map(day => <td key={`total-${day.dateNum}`} className="border border-[#64748b] p-1 text-center bg-[#1e293b] text-[#ffffff] font-black text-lg">{calculateDailyStats(day.dateString).total || ''}</td>)}
                 </tr>
               </tfoot>
              </table>
            </div>
           </div>
         </div>
        </div>
        
        {/* 新增：高畫質圖片預覽 Modal，用於修復 iOS 無法直接下載的問題 */}
        {previewImage && (
         <div className="fixed inset-0 z-[100000] bg-slate-900/95 flex flex-col items-center justify-center p-4 sm:p-8 animate-in fade-in">
           <div className="w-full max-w-6xl flex flex-col sm:flex-row justify-between items-center mb-4 gap-4">
            <p className="text-[#ffffff] font-black text-sm bg-brand-red px-5 py-2.5 rounded-full shadow-lg text-center leading-relaxed">
              💡 手機用戶請「長按圖片」選擇儲存至相簿
            </p>
            <button onClick={() => setPreviewImage(null)} className="text-[#ffffff] bg-slate-700 hover:bg-slate-600 px-6 py-2.5 rounded-full font-black shadow-lg transition-all active:scale-95 text-sm">
              關閉預覽
            </button>
           </div>
           <div className="overflow-auto w-full max-w-6xl bg-[#ffffff] rounded-2xl shadow-2xl custom-scrollbar border-4 border-slate-800" style={{ maxHeight: 'calc(100vh - 180px)' }}>
            <img src={previewImage} alt="班表圖片預覽" className="w-max min-w-full" style={{ touchAction: 'pan-x pan-y' }} />
           </div>
           <div className="mt-6 flex justify-center w-full max-w-6xl">
            <button onClick={() => {
              const link = document.createElement('a');
              link.download = `${currentBranch}-${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月班表.jpg`;
              link.href = previewImage;
              link.click();
            }} className="bg-[#3b82f6] hover:bg-[#2563eb] text-[#ffffff] px-8 py-3.5 rounded-2xl font-black shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all text-sm">
              <Icon name="download" size={18} /> 電腦版點此下載圖片
            </button>
           </div>
         </div>
        )}
      </div>
     );
    };

    const MenuDisplayPage = ({ onBack, items = [] }) => {
     const [selectedRecipe, setSelectedRecipe] = useState(null);

     const groupedItems = useMemo(() => {
      const groups = { '未分類': [] };
      MENU_CATEGORIES.forEach(c => groups[c] = []);
      items.forEach(item => {
        const c = item.category && MENU_CATEGORIES.includes(item.category) ? item.category : '未分類';
        groups[c].push(item);
      });
      return groups;
     }, [items]);

     const availableCats = useMemo(() => {
      return MENU_CATEGORIES.concat('未分類').filter(cat => groupedItems[cat] && groupedItems[cat].length > 0);
     }, [groupedItems]);

     const [activeCat, setActiveCat] = useState('');

     useEffect(() => {
      if (availableCats.length > 0 && (!activeCat || !availableCats.includes(activeCat))) {
        setActiveCat(availableCats[0]);
      }
     }, [availableCats, activeCat]);

     const normalizeDisplayIngredient = (ing) => {
      if (typeof ing === 'string') return { name: ing, qty: '', vendor: '' };
      return { name: ing?.name || '', qty: ing?.qty || '', vendor: ing?.vendor || '' };
     };

     const renderIngredientRow = (rawIng, idx) => {
      const ing = normalizeDisplayIngredient(rawIng);
      return (
       <div key={idx} className="border-b border-orange-200/50 pb-2">
        <div className="flex justify-between items-start gap-2">
         <div className="flex flex-wrap items-center gap-2 flex-1 min-w-0">
          <span className="text-sm font-bold text-slate-700 break-words min-w-0">{ing.name}</span>
          {ing.vendor && (
           <details className="relative group">
            <summary className="inline-flex items-center gap-1.5 text-[10px] font-black text-slate-500 bg-white/70 border border-orange-100 px-2 py-1 rounded-lg cursor-pointer select-none active:scale-95 transition-all">
             <Icon name="store" size={12} /> 查看廠商
            </summary>
            <div className="mt-2 text-xs font-black text-slate-700 bg-white/90 border border-orange-100 rounded-xl px-3 py-2 break-words">
             {ing.vendor}
            </div>
           </details>
          )}
         </div>
         <span className="text-sm font-black text-orange-600 bg-orange-100/50 px-2 py-0.5 rounded-md shrink-0 whitespace-nowrap">{ing.qty}</span>
        </div>
       </div>
      );
     };

     const normalizeDisplayRecipeSections = (item) => {
      const source = Array.isArray(item?.recipeSections) && item.recipeSections.length > 0
        ? item.recipeSections
        : [{ id: 'legacy-main', title: '主配方', ingredientsList: item?.ingredientsList || [], instructions: item?.instructions || item?.content || '' }];
      return source.map((section, index) => ({
        id: section?.id || `section-${index}`,
        title: section?.title || section?.name || (index === 0 ? '主配方' : `配方 ${index + 1}`),
        ingredientsList: Array.isArray(section?.ingredientsList) && section.ingredientsList.length > 0 ? section.ingredientsList : (index === 0 ? (item?.ingredientsList || []) : []),
        instructions: section?.instructions || section?.steps || (index === 0 ? (item?.instructions || item?.content || '') : '')
      })).filter(section => section.ingredientsList.length > 0 || section.instructions || section.title);
     };

     const buildPrintIngredientsTable = (ingredients, fallback = '') => {
      return ingredients && ingredients.length > 0
        ? `<table style="width:100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed;">
         ${ingredients.map(rawIng => {
           const ing = normalizeDisplayIngredient(rawIng);
           return `
           <tr>
            <td style="padding: 8px 0; border-bottom: 1px dashed #cbd5e1; font-size: 15px; color: #334155; word-break: break-word;">
              <div>${ing.name}</div>
              ${ing.vendor ? `<div style="font-size:11px; color:#94a3b8; margin-top:3px;">${ing.vendor}</div>` : ''}
            </td>
            <td style="padding: 8px 0; border-bottom: 1px dashed #cbd5e1; font-size: 15px; font-weight: 900; color: #d97706; text-align: right; width: 35%; white-space: nowrap;">${ing.qty}</td>
           </tr>
         `;
         }).join('')}
         </table>`
        : `<pre>${fallback || '無提供'}</pre>`;
     };

     const handlePrint = (item) => {
      const printWindow = window.open('', '_blank');
      const printSections = normalizeDisplayRecipeSections(item);
      const sectionsHtml = printSections.map(section => `
        <div class="recipe-section">
          <h2 class="section-title">${section.title}</h2>
          <div class="section-grid">
            <div class="col-half">
              <h3>食材</h3>
              ${buildPrintIngredientsTable(section.ingredientsList, item.ingredients || '')}
            </div>
            <div class="col-half">
              <h3>做法：</h3>
              <pre>${section.instructions || '無提供'}</pre>
            </div>
          </div>
        </div>
      `).join('');

      const htmlContent = `
        <!DOCTYPE html>
        <html>
         <head>
           <title>${item.title} - 食譜列印</title>
           <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
            body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; color: #333; -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: #fff; }
            .print-container { max-width: 1000px; margin: 0 auto; overflow-x: hidden; }
            .header { background-color: #3b4252; padding: 50px 20px; text-align: center; }
            .title-wrapper { display: inline-block; border-bottom: 6px solid #ef4444; padding-bottom: 12px; max-width: 100%; word-break: break-word; }
            .title { font-size: 42px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px; }
            .content { padding: 40px; display: flex; gap: 40px; align-items: flex-start; max-width: 100%; }
            .image-col { flex: 0 0 32%; max-width: 32%; }
            .image-col img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; }
            .sections-col { flex: 1; min-width: 0; }
            .recipe-section { padding-bottom: 28px; margin-bottom: 28px; border-bottom: 1px dashed #cbd5e1; }
            .recipe-section:last-child { border-bottom: 0; margin-bottom: 0; }
            .section-title { font-size: 20px; font-weight: 900; color: #1e293b; margin: 0 0 18px 0; }
            .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
            .col-half { min-width: 0; }
            h3 { font-size: 16px; font-weight: 900; color: #1e293b; margin-top: 0; margin-bottom: 12px; }
            pre { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; line-height: 1.8; margin: 0; white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word; color: #475569; max-width: 100%; }
            .notes-section { padding: 0 40px 40px 40px; min-width: 0; }
            .footer-bar { border-bottom: 3px solid #ef4444; margin: 0 40px 20px 40px; }
            .print-footer { text-align: center; font-size: 12px; color: #94a3b8; padding-bottom: 20px; }
           </style>
         </head>
         <body>
           <div class="print-container">
            <div class="header">
              <div class="title-wrapper">
               <h1 class="title">${item.title}</h1>
              </div>
            </div>
            <div class="content">
              ${item.img ? `<div class="image-col"><img src="${item.img}" alt="Recipe Image"/></div>` : ''}
              <div class="sections-col" style="${!item.img ? 'width: 100%;' : ''}">
               ${sectionsHtml}
              </div>
            </div>
            ${item.notes ? `
            <div class="notes-section">
              <h3>備註：</h3>
              <pre>${item.notes}</pre>
            </div>` : ''}
            <div class="footer-bar"></div>
            <div class="print-footer">EATJOY 廚務管理系統 - 列印時間：${new Date().toLocaleString()}</div>
           </div>
         </body>
        </html>
      `;
      printWindow.document.write(htmlContent);
      printWindow.document.close();
      printWindow.focus();
      
      setTimeout(() => { 
        printWindow.print(); 
        printWindow.close(); 
      }, 500);
     };

     const selectedRecipeSections = selectedRecipe ? normalizeDisplayRecipeSections(selectedRecipe) : [];

     return (
      <div className="p-4 space-y-4 page-enter pb-24 text-left font-bold relative">
        <BackButton onClick={onBack} title="本季菜單與食譜" />
        
        {availableCats.length > 0 ? (
         <>
           {/* 頂部滑動導覽列 */}
           <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 pt-1 sticky top-[60px] z-30 bg-[#f8fafc] -mx-4 px-4 shadow-sm mb-4">
            {availableCats.map(cat => (
              <button 
               key={cat} 
               onClick={() => setActiveCat(cat)}
               className={`shrink-0 px-5 py-2.5 rounded-xl text-xs font-black transition-all border ${activeCat === cat ? 'bg-brand-red text-white border-brand-red shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
              >
               {cat}
              </button>
            ))}
           </div>

           {/* 下方菜色卡片網格 */}
           <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            {(groupedItems[activeCat] || []).map(item => (
              <div 
               key={item.id} 
               onClick={() => setSelectedRecipe(item)}
               className="bg-white rounded-[1.5rem] overflow-hidden shadow-sm border border-slate-100 flex flex-col active:scale-95 transition-all cursor-pointer group"
              >
               <div className="h-28 sm:h-36 bg-slate-100 relative overflow-hidden flex items-center justify-center">
                 {item.img ? (
                  <img src={item.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt={item.title} />
                 ) : (
                  <Icon name="image" size={28} className="opacity-30 text-slate-400" />
                 )}
               </div>
               <div className="p-3 text-center bg-white z-10 border-t border-slate-50">
                 <h4 className="font-black text-slate-800 text-sm truncate">{item.title}</h4>
               </div>
              </div>
            ))}
           </div>
         </>
        ) : (
         <div className="py-20 mt-6 text-center glass-panel rounded-[3rem] border border-slate-100 bg-white text-slate-300 font-bold uppercase text-[10px]">
           目前尚未發佈任何菜單
         </div>
        )}

        {/* 食譜彈跳視窗 */}
        {selectedRecipe && (
         <div className="fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 page-enter">
           <div className="bg-white rounded-[2rem] w-full max-w-3xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border border-slate-100">
            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
              <h2 className="text-2xl font-black text-slate-800 truncate pr-4 flex items-center gap-2">
               <Icon name="utensils" className="text-brand-red" />
               {selectedRecipe.title}
              </h2>
              <button onClick={() => setSelectedRecipe(null)} className="text-slate-400 hover:text-brand-red transition-colors p-1 bg-white rounded-lg border shadow-sm active:scale-90"><Icon name="x" size={24} /></button>
            </div>
            <div className="p-6 overflow-y-auto no-scrollbar font-bold text-left space-y-6 flex-1">
              <div className="flex flex-col md:flex-row gap-6">
               {selectedRecipe.img && (
                 <div className="md:w-1/3 shrink-0">
                  <img src={selectedRecipe.img} className="w-full rounded-2xl object-cover border shadow-sm max-h-64 md:max-h-full" alt="菜色圖片" />
                 </div>
               )}
               <div className={`space-y-4 ${selectedRecipe.img ? 'md:w-2/3' : 'w-full'}`}>
                 {selectedRecipeSections.map((section, sectionIdx) => (
                  <div key={section.id || sectionIdx} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-inner min-w-0">
                    <h4 className="text-sm font-black text-slate-800 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2">
                     <Icon name="layers" size={16} className="text-brand-red" /> {section.title}
                    </h4>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                     <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 min-w-0">
                      <h5 className="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-3 flex items-center gap-1.5"><Icon name="shopping-bag" size={14} /> 食材清單</h5>
                      {section.ingredientsList && section.ingredientsList.length > 0 ? (
                        <div className="space-y-1.5">
                         {section.ingredientsList.map(renderIngredientRow)}
                        </div>
                      ) : (
                        <p className="text-sm font-bold text-slate-700 whitespace-pre-wrap break-all leading-relaxed">{selectedRecipe.ingredients || '未提供'}</p>
                      )}
                     </div>
                     <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 min-w-0">
                      <h5 className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-3 flex items-center gap-1.5"><Icon name="chef-hat" size={14} /> 詳細作法</h5>
                      <p className="text-sm font-bold text-slate-700 whitespace-pre-wrap break-all leading-relaxed w-full">{section.instructions || '未提供'}</p>
                     </div>
                    </div>
                  </div>
                 ))}
               </div>
              </div>
              
              {(selectedRecipe.notes || (!selectedRecipe.ingredients && !selectedRecipe.instructions && !selectedRecipe.content && selectedRecipeSections.length === 0)) && (
               <div className="bg-slate-50 p-5 rounded-2xl border shadow-inner min-w-0">
                 <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-1.5"><Icon name="info" size={14} /> 備註</h4>
                 <p className="text-sm font-bold text-slate-700 whitespace-pre-wrap break-all leading-relaxed">{selectedRecipe.notes || selectedRecipe.content}</p>
               </div>
              )}
            </div>
            <div className="p-5 border-t border-slate-100 bg-white shrink-0 flex justify-end gap-3">
              <button onClick={() => setSelectedRecipe(null)} className="px-8 py-3.5 rounded-xl bg-slate-100 text-slate-600 font-black text-sm active:scale-95 transition-all">關閉</button>
              <button onClick={() => handlePrint(selectedRecipe)} className="px-8 py-3.5 rounded-xl bg-blue-600 text-white font-black text-sm shadow-lg shadow-blue-600/20 active:scale-95 transition-all flex items-center justify-center gap-2">
               <Icon name="printer" size={16} /> 列印食譜
              </button>
            </div>
           </div>
         </div>
        )}
      </div>
     );
    };

    const MonthlyReportPage = ({ onBack, report }) => {
     const hasReport = report?.title && report?.url;
     return (
      <div className="p-4 space-y-4 page-enter text-left pb-10">
        <BackButton onClick={onBack} title="廚房月報" />
        {hasReport ? (
         <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-5">
           <div className="flex items-start gap-4">
            <div className="w-12 h-12 rounded-2xl bg-rose-50 text-brand-red flex items-center justify-center shrink-0 shadow-inner">
             <Icon name="presentation" size={24} />
            </div>
            <div className="min-w-0">
             <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Monthly Briefing</p>
             <h3 className="text-xl font-black text-slate-800 leading-tight break-words">{report.title}</h3>
             {report.publishedAt && <p className="text-[10px] text-slate-400 mt-2">發布時間：{new Date(report.publishedAt).toLocaleString()}</p>}
            </div>
           </div>
           <button onClick={() => window.open(report.url, '_blank')} className="w-full bg-brand-red text-white font-black py-4 rounded-2xl active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
            <Icon name="external-link" size={18} /> 開啟簡報
           </button>
         </div>
        ) : (
         <div className="py-20 text-center glass-panel rounded-[3rem] border border-dashed bg-white text-slate-300 font-bold text-xs">
          目前尚未發布廚房月報
         </div>
        )}
      </div>
     );
    };

    const IngredientManagementPage = ({ onBack, goSpecs, goWaste }) => (
     <div className="p-4 space-y-4 page-enter text-left">
      <BackButton onClick={onBack} title="食材管理" />
      <SectionItem title="食材規格" iconName="clipboard-list" onClick={goSpecs} />
      <SectionItem title="食材報廢回報" iconName="trash-2" onClick={goWaste} />
     </div>
    );

    const IngredientSpecsPage = ({ onBack, items = [] }) => (
     <div className="p-4 space-y-4 page-enter text-left pb-10">
      <BackButton onClick={onBack} title="食材規格" />
      {items.length > 0 ? items.map((item, idx) => (
       <RuleStandardBlock key={item.id || idx} id={idx + 1} title={item.title} desc={item.content} img={item.img} />
      )) : (
       <div className="py-20 text-center glass-panel rounded-[3rem] border border-dashed bg-white text-slate-300 font-bold text-xs">
        目前尚未建立食材規格
       </div>
      )}
     </div>
    );

    const IngredientWasteReportPage = ({ onBack, currentBranch, currentUser, getPublicPath, triggerNotify }) => {
     const [form, setForm] = useState({ item: '', qty: '', reason: '' });
     const [isSending, setIsSending] = useState(false);

     const submitReport = async () => {
      if (!form.item.trim() || !form.qty.trim() || !form.reason.trim()) return triggerNotify("請完整填寫報廢品項、數量與原因", "error");
      setIsSending(true);
      try {
        await db.collection(getPublicPath(`ingredient_waste_${currentBranch}`)).add({
         item: form.item.trim(),
         qty: form.qty.trim(),
         reason: form.reason.trim(),
         userName: currentUser?.name || '未登入',
         phone: currentUser?.phone || '',
         branch: currentBranch,
         timestamp: Date.now()
        });
        setForm({ item: '', qty: '', reason: '' });
        triggerNotify("報廢回報已送出", "success");
      } catch (e) {
        triggerNotify("送出失敗，請稍後再試", "error");
      } finally {
        setIsSending(false);
      }
     };

     return (
      <div className="p-4 space-y-4 page-enter text-left pb-10">
       <BackButton onClick={onBack} title="食材報廢回報" />
       <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
        <div>
         <p className="text-[10px] font-black text-slate-400 mb-1 uppercase">報廢品項</p>
         <input value={form.item} onChange={e=>setForm({...form, item: e.target.value})} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="例如：牛肉片" />
        </div>
        <div>
         <p className="text-[10px] font-black text-slate-400 mb-1 uppercase">數量 / 規格</p>
         <input value={form.qty} onChange={e=>setForm({...form, qty: e.target.value})} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="例如：2包、500g" />
        </div>
        <div>
         <p className="text-[10px] font-black text-slate-400 mb-1 uppercase">報廢原因</p>
         <textarea value={form.reason} onChange={e=>setForm({...form, reason: e.target.value})} rows="4" className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" placeholder="請簡述原因..." />
        </div>
        <button onClick={submitReport} disabled={isSending} className="w-full bg-brand-red text-white font-black py-4 rounded-2xl active:scale-95 transition-all shadow-lg disabled:opacity-60">
         {isSending ? "送出中" : "送出回報"}
        </button>
       </div>
      </div>
     );
    };

    const UnifiedRulesPage = ({ rulesData, onBack, user, currentBranch, triggerNotify, getPublicPath, signatures = [] }) => {
     const [activeTab, setActiveTab] = useState('廚房規則');
     
     const hasSignedCurrent = signatures.some(s => s.category === `守則簽署 - ${activeTab}` && s.phone === user?.phone);

     const handleSign = async (img) => {
      if (!user) return;
      try {
        await db.collection(getPublicPath(`signatures_${currentBranch}`)).add({ userName: user.name, phone: user.phone, branch: currentBranch, category: `守則簽署 - ${activeTab}`, signature: img, timestamp: Date.now() });
        triggerNotify(`[${activeTab}] 簽名成功`, "success");
      } catch (e) { triggerNotify("簽署失敗", "error"); }
     };

     const handlePrint = () => {
      let htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
         <title>${currentBranch} - 員工守則簽署紀錄</title>
         <style>
           @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
           @page { margin: 12mm; }
           body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; color: #1e293b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
           .print-container { max-width: 800px; margin: 0 auto; }
           h1 { text-align: center; font-size: 22px; border-bottom: 2px solid #b9121b; padding-bottom: 8px; margin-bottom: 15px; color: #b9121b; letter-spacing: 2px;}
           .category-section { margin-bottom: 24px; } /* 移除 page-break-inside: avoid，避免大片留白 */
           h2 { font-size: 16px; color: #1e293b; margin-top: 0; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; background-color: #f8fafc; padding: 6px 10px; border-radius: 4px; page-break-after: avoid; }
           .rule-item { margin-bottom: 12px; padding-left: 10px; page-break-inside: avoid; } /* 確保單一守則不斷頁 */
           .rule-title { font-weight: 900; font-size: 13px; margin-bottom: 4px; color: #334155; }
           .rule-desc { font-size: 11px; color: #475569; white-space: pre-wrap; line-height: 1.5; margin: 0; }
           .rule-img { max-width: 100%; max-height: 160px; margin-top: 8px; border-radius: 6px; border: 1px solid #cbd5e1; }
           .signature-box { margin-top: 12px; padding: 12px; border: 2px dashed #cbd5e1; background-color: #f8fafc; text-align: center; border-radius: 8px; page-break-inside: avoid; } /* 確保簽名框不斷頁 */
           .signature-img { max-height: 60px; max-width: 100%; mix-blend-mode: multiply; }
           .no-sig { color: #ef4444; font-weight: bold; font-size: 11px; }
           .footer { text-align: center; font-size: 9px; color: #94a3b8; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
         </style>
        </head>
        <body>
         <div class="print-container">
           <h1>${currentBranch} - 員工守則與簽署紀錄</h1>
           <div style="text-align: center; font-weight: bold; margin-bottom: 24px; font-size: 13px; background: #f1f5f9; padding: 10px; border-radius: 8px;">
            員工姓名：<span style="color:#b9121b;">${user?.name || '未登入'}</span> &nbsp;&nbsp;|&nbsp;&nbsp; 
            聯絡電話：<span style="color:#b9121b;">${user?.phone || '無'}</span>
           </div>
      `;

      RULE_CATEGORIES.forEach(cat => {
        const catRules = rulesData[cat] || [];
        const catSig = signatures.find(s => s.category === `守則簽署 - ${cat}` && s.phone === user?.phone);

        htmlContent += `<div class="category-section">`;
        htmlContent += `<h2>${cat}</h2>`;

        if (catRules.length === 0) {
         htmlContent += `<p class="rule-desc" style="padding-left:10px;">目前尚無守則內容</p>`;
        } else {
         catRules.forEach((rule, idx) => {
           htmlContent += `
            <div class="rule-item">
              <div class="rule-title">${idx + 1}. ${rule.title}</div>
              <div class="rule-desc">${rule.content || ''}</div>
              ${rule.img ? `<img src="${rule.img}" class="rule-img" />` : ''}
            </div>
           `;
         });
        }

        htmlContent += `<div class="signature-box">`;
        htmlContent += `<strong style="color: #334155;">【${cat}】簽署確認</strong><br/>`;
        if (catSig) {
         htmlContent += `<img src="${catSig.signature}" class="signature-img" /><br/>`;
         htmlContent += `<span style="font-size:10px; color:#64748b;">簽署時間：${new Date(catSig.timestamp).toLocaleString()}</span>`;
        } else {
         htmlContent += `<br/><span class="no-sig">尚未簽署</span>`;
        }
        htmlContent += `</div></div>`;
      });

      htmlContent += `
           <div class="footer">EATJOY 廚務管理系統 - 列印時間：${new Date().toLocaleString()}</div>
         </div>
        </body>
        </html>
      `;

      const printWindow = window.open('', '_blank');
      printWindow.document.write(htmlContent);
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => { 
        printWindow.print(); 
        printWindow.close(); 
      }, 500);
     };

     return (
      <div className="page-enter pb-20 text-left">
        <div className="p-3 sm:p-4 border-b bg-white/80 backdrop-blur sticky top-[60px] z-40 shadow-sm space-y-3">
         <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
           <div className="flex items-center gap-3 w-full md:w-auto">
            <button onClick={onBack} className="p-2 sm:p-2.5 glass-panel rounded-xl sm:rounded-2xl border active:scale-90 transition-all bg-white shadow-sm shrink-0"><Icon name="arrow-left" size={20}/></button>
            <h2 className="text-lg sm:text-xl font-black text-slate-800 tracking-tighter truncate">員工守則</h2>
           </div>
           <button onClick={handlePrint} className="w-full md:w-auto justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-emerald-600 text-white rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
            <Icon name="printer" size={14} /> 列印守則與簽名紀錄
           </button>
         </div>
         <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
           {RULE_CATEGORIES.map(cat => (
            <button key={cat} onClick={() => setActiveTab(cat)} className={`shrink-0 px-5 py-2.5 rounded-2xl text-xs font-black border transition-all ${activeTab === cat ? 'bg-brand-red text-white border-brand-red shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}>{cat}</button>
           ))}
         </div>
        </div>
        <div className="p-4 space-y-4">
         <h3 className="text-[10px] font-black text-brand-red mb-4 pl-1 uppercase tracking-widest"><Icon name="bookmark" size={14} /> 當前分類：{activeTab}</h3>
         {rulesData[activeTab] && rulesData[activeTab].length > 0 ? rulesData[activeTab].map((item, idx) => (
           <RuleStandardBlock key={item.id || idx} id={idx + 1} title={item.title} desc={item.content} img={item.img} />
         )) : <div className="p-20 text-center text-slate-300 font-bold text-[10px] glass-panel rounded-3xl bg-white border shadow-inner">內容讀取中...</div>}
         {!hasSignedCurrent ? <SignaturePad onSave={handleSign} /> : (
           <div className="glass-panel p-10 rounded-[3rem] bg-emerald-50 border-emerald-100 text-emerald-600 text-center font-bold shadow-sm"><Icon name="check-circle" size={48} className="mx-auto mb-2" /> 您已完成 [{activeTab}] 的簽署</div>
         )}
        </div>
      </div>
     );
    };

     const InspectionPage = ({ onBack, standards, completedZones, triggerNotify, branchZones, currentBranch, getPublicPath, currentUser, isManager, isSuperAdmin }) => {
   const [activeZone, setActiveZone] = useState(null);
   const [dailyPhotos, setDailyPhotos] = useState({});
   const [loading, setLoading] = useState(false);
   const [isSubmitted, setIsSubmitted] = useState(false);
   const [isResetting, setIsResetting] = useState(false);
   const [isCleaningPhotos, setIsCleaningPhotos] = useState(false);
   const [uploadingPhotoKeys, setUploadingPhotoKeys] = useState({});
   const [photoErrors, setPhotoErrors] = useState({});
   const inspectionBusinessDate = getInspectionBusinessDate();

  useEffect(() => {
    const unsubscribe = db.collection(getPublicPath(`daily_photos_${currentBranch}`)).onSnapshot(snapshot => {
     const allPhotos = {}; 
     snapshot.forEach(doc => { 
       const data = doc.data(); 
       const photoBusinessDate = data.businessDate || getInspectionBusinessDate(data.timestamp || Date.now());
       if (photoBusinessDate !== inspectionBusinessDate || data.status === 'reset_archived') return;
       allPhotos[`${data.zoneId}_${data.itemIdx}`] = {
         photo: data.photo,
         uploaderName: data.uploaderName || '未知',
         uploaderPhone: data.uploaderPhone || '',
         timestamp: data.timestamp || null,
         compressedBytes: data.compressedBytes || 0,
         fileName: data.fileName || '',
         businessDate: photoBusinessDate
       }; 
      });
      setDailyPhotos(allPhotos);
     }, () => {
      setDailyPhotos({});
      triggerNotify("巡視照讀取失敗，請檢查網路後重新整理", "error");
     });
    return () => unsubscribe();
  }, [currentBranch, getPublicPath, inspectionBusinessDate]);

   const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onloadend = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
   });

   const handleFile = async (e, idx) => {
     const file = e.target.files?.[0]; 
     if (!file || !activeZone) return;
     const docKey = `${activeZone.id}_${idx}`;
     if (!String(file.type || '').startsWith('image/')) {
      triggerNotify("請選擇照片檔案", "error");
      e.target.value = '';
      return;
     }
     setUploadingPhotoKeys(prev => ({...prev, [docKey]: true}));
     setPhotoErrors(prev => ({...prev, [docKey]: ''}));
     try {
      triggerNotify("照片處理中，請勿離開頁面", "info");
      const base64 = await readFileAsDataUrl(file);
      const compressed = await compressImageToLimit(base64, { maxWidth: 820, quality: 0.62, maxBytes: 520000, minWidth: 480, minQuality: 0.28 });
      const compressedBytes = dataUrlBytes(compressed);
      if (compressedBytes > 520000) throw new Error('image-too-large');
      const now = Date.now();
      const businessDate = getInspectionBusinessDate(now);
      const photoData = { 
       photo: compressed, 
       zoneId: activeZone.id, 
       zoneName: activeZone.name || activeZone.label || activeZone.id,
       itemIdx: idx, 
       status: 'active',
       businessDate,
       timestamp: now,
       clientTime: new Date(now).toISOString(),
       uploaderName: currentUser?.name || '未知',
       uploaderPhone: currentUser?.phone || '',
       fileName: file.name || '',
       fileSize: file.size || 0,
       compressedBytes
      };
      const ref = db.collection(getPublicPath(`daily_photos_${currentBranch}`)).doc(docKey);
      await ref.set(photoData);
      const verifySnap = await ref.get();
      if (!verifySnap.exists || !verifySnap.data()?.photo) throw new Error('upload-verify-failed');
      db.collection(getPublicPath(`daily_photo_audit_${currentBranch}`)).add({
       zoneId: photoData.zoneId,
       zoneName: photoData.zoneName,
       itemIdx: idx,
       docKey,
       uploaderName: photoData.uploaderName,
       uploaderPhone: photoData.uploaderPhone,
       fileName: photoData.fileName,
       fileSize: photoData.fileSize,
       compressedBytes,
       businessDate,
       status: 'uploaded',
       timestamp: now
      }).catch(err => console.warn("寫入巡視照稽核紀錄失敗", err));
      db.collection(getPublicPath(`daily_photo_archive_${currentBranch}`)).add({
       ...photoData,
       docKey,
       archivedAt: now
      }).catch(err => console.warn("寫入巡視照歸檔失敗", err));
      triggerNotify("實拍照已寫入並確認", "success");
     } catch (err) {
      console.error("巡視照上傳失敗", err);
      const msg = err?.message === 'image-too-large' ? '照片仍過大，請改用相機低解析度或截圖後重傳。' : '照片上傳失敗，請確認網路後重傳。';
      setPhotoErrors(prev => ({...prev, [docKey]: msg}));
      triggerNotify(msg, "error");
      db.collection(getPublicPath(`daily_photo_audit_${currentBranch}`)).add({
       zoneId: activeZone.id,
       zoneName: activeZone.name || activeZone.label || activeZone.id,
       itemIdx: idx,
       docKey,
       uploaderName: currentUser?.name || '未知',
       uploaderPhone: currentUser?.phone || '',
       fileName: file.name || '',
       fileSize: file.size || 0,
       businessDate: getInspectionBusinessDate(),
       status: 'failed',
       error: String(err?.message || err),
       timestamp: Date.now()
      }).catch(()=>{});
     } finally {
      setUploadingPhotoKeys(prev => ({...prev, [docKey]: false}));
      e.target.value = '';
     }
   };

  const isAllUploaded = useMemo(() => {
    if (!activeZone) return false;
    const currentStandards = standards[activeZone.id] || [];
    if (currentStandards.length === 0) return true;
    const hasUploading = Object.values(uploadingPhotoKeys).some(Boolean);
    return !hasUploading && currentStandards.every((_, i) => !!dailyPhotos[`${activeZone.id}_${i}`]?.photo);
  }, [activeZone, standards, dailyPhotos, uploadingPhotoKeys]);

  const hasUploadingPhotos = Object.values(uploadingPhotoKeys).some(Boolean);

  const handleSubmit = async () => {
    if (!activeZone || loading) return;
    if (hasUploadingPhotos) {
     triggerNotify("照片仍在上傳確認中，請稍候", "info");
     return;
    }
    setLoading(true);
    try {
     const currentStandards = standards[activeZone.id] || [];
     const photoCol = db.collection(getPublicPath(`daily_photos_${currentBranch}`));
     const checks = await Promise.all(currentStandards.map((_, i) => photoCol.doc(`${activeZone.id}_${i}`).get()));
     const missing = checks.map((snap, i) => {
      const data = snap.exists ? (snap.data() || {}) : {};
      const photoBusinessDate = data.businessDate || getInspectionBusinessDate(data.timestamp || Date.now());
      return (!snap.exists || !data.photo || data.status === 'reset_archived' || photoBusinessDate !== inspectionBusinessDate) ? i + 1 : null;
     }).filter(Boolean);
     if (missing.length) {
      triggerNotify(`第 ${missing.join('、')} 張實拍照尚未成功寫入，請重傳後再提交`, "error");
      setIsSubmitted(false);
      return;
     }
      if (!completedZones.includes(activeZone.id)) {
      const progressRef = db.doc(getPublicPath(`system/progress_${currentBranch}`));
      await progressRef.set({ 
         completedZones: firebase.firestore.FieldValue.arrayUnion(activeZone.id),
         businessDate: inspectionBusinessDate,
         updatedAt: Date.now()
       }, { merge: true });
         const snap = await progressRef.get();
         const latestCompleted = snap.exists ? (snap.data().completedZones || []) : [];
         const currentHour = new Date().getHours();
         if (latestCompleted.length >= branchZones.length && branchZones.length > 0 && currentHour < 23) {
          triggerLineAlert("COMPLETION", { branch: currentBranch, time: new Date().toLocaleTimeString() });
         }
      }
      db.collection(getPublicPath(`daily_photo_submissions_${currentBranch}`)).add({
       zoneId: activeZone.id,
       zoneName: activeZone.name || activeZone.label || activeZone.id,
       submitterName: currentUser?.name || '未知',
       submitterPhone: currentUser?.phone || '',
       photoKeys: currentStandards.map((_, i) => `${activeZone.id}_${i}`),
       photoCount: currentStandards.length,
       businessDate: inspectionBusinessDate,
       timestamp: Date.now()
      }).catch(err => console.warn("寫入巡視提交紀錄失敗", err));
      setLoading(false); 
      setIsSubmitted(true); 
      triggerNotify("善後巡視已上傳", "success");
    } catch (e) {
     console.error("更新巡視進度失敗", e);
     triggerNotify("提交失敗，請檢查網路後再試", "error");
     setIsSubmitted(false);
    } finally {
     setLoading(false);
    }
   };

  const handleResetAll = async () => {
    if (!window.confirm("確定要手動重置今天的巡視進度嗎？\n照片會從今日畫面移除，但會保留稽核紀錄以便日後查詢。")) return;
    setIsResetting(true);
    try {
     const resetAt = Date.now();
     const resetBatchId = `${currentBranch}_${inspectionBusinessDate}_${resetAt}`;
     const photosRef = await db.collection(getPublicPath(`daily_photos_${currentBranch}`)).get();
     const batch = db.batch();
     let archivedCount = 0;
     photosRef.forEach(d => {
      const data = d.data() || {};
      const photoBusinessDate = data.businessDate || getInspectionBusinessDate(data.timestamp || resetAt);
      if (photoBusinessDate !== inspectionBusinessDate || data.status === 'reset_archived') return;
      archivedCount++;
      batch.set(d.ref, {
       status: 'reset_archived',
       publicVisible: false,
       resetBatchId,
       resetAt,
       resetBy: currentUser?.phone || '',
       resetByName: currentUser?.name || '未知'
      }, { merge: true });
     });
     await batch.commit();
     await db.doc(getPublicPath(`system/progress_${currentBranch}`)).set({
      completedZones: [],
      businessDate: inspectionBusinessDate,
      resetAt,
      resetMode: 'manual',
      resetBy: currentUser?.phone || '',
      resetByName: currentUser?.name || '未知'
     }, {merge: true});
     await db.collection(getPublicPath(`daily_photo_resets_${currentBranch}`)).add({
      branch: currentBranch,
      businessDate: inspectionBusinessDate,
      resetBatchId,
      mode: 'manual',
      archivedCount,
      resetAt,
      resetBy: currentUser?.phone || '',
      resetByName: currentUser?.name || '未知'
     });
     setDailyPhotos({});
     triggerNotify("已重置今日巡視進度，照片已保留稽核紀錄", "success");
    } catch (e) {
     console.error(e);
     triggerNotify("重置失敗", "error");
    }
    setIsResetting(false);
  };

  const handleCleanupOldPhotos = async () => {
    if (!isSuperAdmin || isCleaningPhotos) return;
    if (!window.confirm("確定要清除 7 天前的善後巡視照片嗎？\n會刪除舊照片與照片歸檔以節省資料庫空間，但會保留上傳、重置、清理紀錄。")) return;
    setIsCleaningPhotos(true);
    try {
     const result = await cleanupInspectionPhotoStorage({
      branch: currentBranch,
      retainDays: 7,
      mode: 'manual',
      actor: { phone: currentUser?.phone || '', name: currentUser?.name || '最高權限' }
     });
     triggerNotify(`已清除 ${result.total} 筆 7 天前巡視照片`, "success");
    } catch (error) {
     console.error("清理巡視照片失敗", error);
     triggerNotify("清理失敗，請稍後再試", "error");
    }
    setIsCleaningPhotos(false);
  };

  if(activeZone) return (
    <div className="p-4 space-y-6 page-enter pb-24 text-left font-bold">
     <button onClick={()=>{setActiveZone(null);setIsSubmitted(false);}} className="p-3 bg-white rounded-2xl shadow-sm border active:scale-90 transition-all"><Icon name="arrow-left" size={20}/></button>
      <div className="space-y-4">
       {(standards[activeZone.id] || []).map((item, i) => {
        const photoKey = `${activeZone.id}_${i}`;
        const photoInfo = dailyPhotos[photoKey] || {};
        const isUploadingPhoto = !!uploadingPhotoKeys[photoKey];
        const photoError = photoErrors[photoKey] || '';
        return (
         <div key={i} className="glass-panel p-4 rounded-[2rem] border border-slate-100 bg-white">
          <p className="text-[11px] font-black text-slate-700 mb-3 bg-slate-50 p-3 rounded-xl flex items-center gap-2 border shadow-inner"><Icon name="info" size={14} className="text-brand-red" />要求：{item.note || "無說明"}</p>
          <div className="grid grid-cols-2 gap-3">
            <div className="text-center"><span className="text-[9px] font-black text-emerald-600">標準照</span><img src={item.url} className="w-full aspect-square object-cover rounded-2xl border mt-2 shadow-inner" /></div>
            
            <div className="text-center">
             <span className="text-[9px] font-black text-brand-red">實拍照</span>
             {photoInfo.photo ? (
               <div className="relative mt-2">
                <img src={photoInfo.photo} className="w-full aspect-square object-cover rounded-2xl border" />
                
                <div className="absolute top-1.5 left-1.5 bg-slate-900/70 backdrop-blur-sm text-white text-[9px] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm font-bold z-10">
                  <Icon name="user" size={10} />
                  {photoInfo.uploaderName}
                </div>
                {photoInfo.timestamp && (
                 <div className="absolute bottom-1.5 left-1.5 bg-slate-900/70 backdrop-blur-sm text-white text-[9px] px-2 py-0.5 rounded-full shadow-sm font-bold z-10">
                  {new Date(photoInfo.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                 </div>
                )}

                <label className="absolute bottom-1 right-1 bg-white/90 p-1.5 rounded-lg cursor-pointer border shadow-sm text-slate-600 hover:text-brand-red transition-colors z-10">
                  <Icon name="refresh-cw" size={14}/>
                  <input type="file" accept="image/*" capture="environment" className="hidden" disabled={isUploadingPhoto} onChange={(e)=>handleFile(e, i)} />
                </label>
                {isUploadingPhoto && <div className="absolute inset-0 bg-slate-900/60 rounded-2xl flex items-center justify-center text-white text-[10px] font-black z-20">寫入確認中...</div>}
               </div>
             ) : (
               <label className="w-full aspect-square bg-slate-50 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center mt-2 cursor-pointer active:bg-slate-100">
                <Icon name={isUploadingPhoto ? "loader-2" : "plus"} size={20} className={`text-slate-300 ${isUploadingPhoto ? 'animate-spin' : ''}`}/>
                <span className="text-[10px] font-black text-slate-400 mt-2">{isUploadingPhoto ? '寫入確認中...' : '選擇照片'}</span>
                <input type="file" accept="image/*" capture="environment" className="hidden" disabled={isUploadingPhoto} onChange={(e)=>handleFile(e, i)} />
               </label>
             )}
             {photoError && <div className="mt-2 text-[10px] font-black text-red-500 leading-relaxed">{photoError}</div>}
            </div>
          </div>
         </div>
        );
       })}
      </div>
      {!isSubmitted ? (
       <div className="space-y-3">
         {!isAllUploaded && <p className="text-[10px] text-red-500 font-bold text-center animate-pulse"><Icon name="alert-circle" size={12} /> 請完成所有善後巡視照上傳</p>}
         {hasUploadingPhotos && <p className="text-[10px] text-amber-600 font-bold text-center animate-pulse"><Icon name="loader-2" size={12} className="animate-spin" /> 照片仍在寫入確認，請不要離開頁面</p>}
         <button onClick={handleSubmit} disabled={!isAllUploaded || loading || hasUploadingPhotos} className={`w-full py-5 rounded-[2rem] font-black text-white shadow-xl flex items-center justify-center gap-2 ${isAllUploaded && !hasUploadingPhotos ? 'bg-brand-red active:scale-95' : 'bg-slate-300 cursor-not-allowed'}`}>{loading ? "提交中..." : "確認提交結果"}</button>
       </div>
     ) : <div className="p-8 rounded-[3rem] bg-emerald-50 text-emerald-700 text-center font-black">提交完成 ✅</div>}
    </div>
  );

  return (
    <div className="p-4 space-y-4 page-enter pb-20 text-left font-bold">
     <BackButton onClick={onBack} title="巡視崗位清單" />
     <div className="bg-brand-red p-7 rounded-[2.5rem] text-white shadow-lg flex justify-between items-center mb-2">
      <div><p className="text-[10px] font-black uppercase opacity-60 mb-1 leading-none tracking-widest">巡視進度 (18:00切換營業日)</p><p className="text-3xl font-black mt-2 font-bold">{completedZones.length} / {branchZones.length || 1}</p></div>
      <div className="w-14 h-14 rounded-full border-4 border-white/20 flex items-center justify-center font-bold text-xs">{branchZones.length > 0 ? Math.round((completedZones.length/branchZones.length)*100) : 0}%</div>
     </div>
     <div className="rounded-2xl px-4 py-3 text-[10px] font-black leading-relaxed flex items-start gap-2 shadow-sm" style={{background:'linear-gradient(135deg,rgba(255,247,237,.96),rgba(255,237,213,.9))',border:'1px solid rgba(251,191,36,.42)',color:'#9f1239',boxShadow:'0 8px 24px rgba(76,5,25,.12)'}}>
      <span className="shrink-0 w-6 h-6 rounded-full flex items-center justify-center" style={{background:'rgba(159,18,57,.09)',color:'#be123c'}}><Icon name="calendar-days" size={13}/></span>
      <span>今日營業日：{inspectionBusinessDate}。18:00 只切換今日進度，不會刪除已上傳照片。</span>
     </div>

     {(isManager || isSuperAdmin) && (
     <div className="flex justify-end gap-2 mb-4 px-1 flex-wrap">
      <button onClick={handleResetAll} disabled={isResetting || (completedZones.length === 0 && Object.keys(dailyPhotos).length === 0)} className={`text-[10px] px-4 py-2.5 rounded-xl font-black flex items-center gap-1.5 transition-all shadow-sm border ${isResetting || (completedZones.length === 0 && Object.keys(dailyPhotos).length === 0) ? 'cursor-not-allowed opacity-45' : 'active:scale-95'}`} style={{background:'linear-gradient(135deg,rgba(114,15,48,.82),rgba(76,5,25,.92))',borderColor:'rgba(255,255,255,.18)',color:'#fff7ed',boxShadow:'0 10px 22px rgba(76,5,25,.22)'}}>
        <Icon name="refresh-cw" size={14} className={isResetting ? "animate-spin" : ""} />
        {isResetting ? "重置中..." : "重置今日巡視進度"}
      </button>
      {isSuperAdmin && (
       <button onClick={handleCleanupOldPhotos} disabled={isCleaningPhotos} className={`text-[10px] px-4 py-2.5 rounded-xl font-black flex items-center gap-1.5 transition-all shadow-sm border ${isCleaningPhotos ? 'cursor-wait opacity-50' : 'active:scale-95'}`} style={{background:'linear-gradient(135deg,rgba(45,8,22,.92),rgba(88,10,38,.9))',borderColor:'rgba(251,191,36,.24)',color:'#fde68a',boxShadow:'0 10px 22px rgba(76,5,25,.28)'}}>
        <Icon name="trash-2" size={14} className={isCleaningPhotos ? "animate-pulse" : ""} />
        {isCleaningPhotos ? "清理中..." : "清除7天前照片"}
       </button>
      )}
     </div>
     )}

     {branchZones.length === 0 && <p className="text-center text-slate-400 py-10 text-xs">此分店尚未設定任何區站，請至後台設定。</p>}
     <div className="grid grid-cols-1 gap-3">
      {branchZones.map(z => {
        const isCompleted = completedZones.includes(z.id);
        return (
         <div 
           key={z.id} 
           onClick={() => setActiveZone(z)} 
           className={`p-6 rounded-[2rem] flex items-center justify-between cursor-pointer transition-all shadow-sm border ${
            isCompleted 
            ? 'bg-emerald-50 border-emerald-200 active:bg-emerald-100' 
            : 'bg-white border-slate-100 active:bg-slate-50 glass-panel'
           }`}
         >
           <div className={`flex items-center gap-4 font-bold ${isCompleted ? 'text-emerald-500' : 'text-slate-400'}`}>
            <Icon name={isCompleted ? "check-circle" : "camera"} size={22} />
            <span className={`text-sm font-bold leading-none ${isCompleted ? 'text-emerald-700' : 'text-slate-800'}`}>{z.name}</span>
           </div>
           {isCompleted ? (
            <span className="text-[10px] font-black text-emerald-600 bg-emerald-100 px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm"><Icon name="check" size={12}/> 已完成</span>
           ) : (
            <Icon name="chevron-right" size={18} className="text-slate-300" />
           )}
         </div>
        );
      })}
     </div>
    </div>
  );
};

    const OrderingSystem = ({ onBack, triggerNotify, globalBranches, currentBranch, isSuperAdmin, getPublicPath }) => {
     const [storeDatabases, setStoreDatabases] = useState({});
     const branches = isSuperAdmin ? globalBranches : [currentBranch];
     const [selectedBranch, setSelectedBranch] = useState(currentBranch);
     const orderingDefaultDb = { ingredients: [], zones: [...INITIAL_ORDER_ZONES], vendors: [], history: [], activeQuantities: {} };
     const normalizeOrderingDb = (data = {}) => ({
      ...orderingDefaultDb,
      ...data,
      ingredients: Array.isArray(data.ingredients) ? data.ingredients.filter(Boolean).map((item, idx) => ({ ...item, id: item.id || `${item.name || 'ingredient'}_${idx}` })) : [],
      zones: Array.isArray(data.zones) && data.zones.filter(Boolean).length > 0 ? data.zones.filter(Boolean) : [...INITIAL_ORDER_ZONES],
      vendors: Array.isArray(data.vendors) ? data.vendors.filter(Boolean) : [],
      history: Array.isArray(data.history) ? data.history.filter(Boolean) : [],
      activeQuantities: data.activeQuantities && typeof data.activeQuantities === 'object' ? data.activeQuantities : {}
     });
     const currentDb = useMemo(() => normalizeOrderingDb(storeDatabases[selectedBranch]), [storeDatabases, selectedBranch]);
     const lastOrderingBackupAtRef = useRef({});

     const isMeaningfulOrderingDb = (data = {}) => {
      const normalized = normalizeOrderingDb(data);
      const activeValues = Object.values(normalized.activeQuantities || {});
      return normalized.ingredients.length > 0 ||
        normalized.vendors.length > 0 ||
        normalized.history.length > 0 ||
        activeValues.some(v => parseFloat(v || 0) > 0);
     };

     const getOrderingLocalBackupKey = (branch) => `eatjoy_ordering_backup_${branch}`;

     const saveOrderingLocalBackup = (branch, data) => {
      if (!branch || !isMeaningfulOrderingDb(data)) return;
      try {
        localStorage.setItem(getOrderingLocalBackupKey(branch), JSON.stringify({
         savedAt: Date.now(),
         data: normalizeOrderingDb(data)
        }));
      } catch(e) {
        console.warn("叫貨本機備份失敗", e);
      }
     };

     const loadOrderingLocalBackup = (branch) => {
      try {
        const raw = localStorage.getItem(getOrderingLocalBackupKey(branch));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed?.data ? normalizeOrderingDb(parsed.data) : null;
