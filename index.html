            <div className="space-y-4">
              <div className="relative">
                <select value={branch} onChange={e => setBranch(e.target.value)} className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm appearance-none text-slate-700 px-5 text-left bg-white">
                  {globalBranches.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
                <Icon name="chevron-down" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-800 pointer-events-none" />
              </div>

              {mode === 'register' && (
                <>
                  <input placeholder="真實姓名" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5" value={name} onChange={e => setName(e.target.value)} />
                  <div className="relative">
                    <select value={role} onChange={e => setRole(e.target.value)} className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm appearance-none text-slate-700 px-5 text-left bg-white">
                      <option value="正職人員">正職人員</option>
                      <option value="計時人員">計時人員</option>
                      <option value="主管">主管 (需行政主廚審核)</option>
                    </select>
                    <Icon name="chevron-down" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-800 pointer-events-none" />
                  </div>
                </>
              )}
              
              {mode === 'admin' ? (
                <input type="password" placeholder="最高權限驗證碼" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5 tracking-[0.2em]" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
              ) : (
                <input placeholder="手機號碼 (登入帳號)" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5 placeholder:text-slate-400" value={phone} onChange={e => setPhone(e.target.value)} />
              )}
              
              <button onClick={handleAuth} className="w-full bg-brand-red text-white font-black py-4 rounded-xl shadow-lg shadow-brand-red/20 active:scale-95 transition-all text-sm mt-2 tracking-widest">
                進入系統
              </button>
            </div>
          </div>
          
          <div className="absolute bottom-8 w-full text-center left-0">
            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">© EATJOY TECH MANAGEMENT</p>
          </div>
        </div>
      );
    };

    const ListDetailPage = ({ onBack, title, list = [] }) => (
      <div className="p-4 space-y-6 page-enter pb-20 text-left font-bold">
        <BackButton onClick={onBack} title={title} />
        <div className="space-y-4">
          {list && list.length > 0 ? list.map((item, idx) => (
            <RuleStandardBlock key={item.id || idx} id={idx + 1} title={item.title} desc={item.content} img={item.img} />
          )) : <div className="py-20 text-center glass-panel rounded-[3rem] border border-slate-100 bg-white text-slate-300 font-bold uppercase text-[10px]">目前尚未發佈內容</div>}
        </div>
      </div>
    );

    // --- 優化輸入體驗 (解決注音輸入法中斷問題) ---
    const SyncInput = ({ value, onChange, readOnly, className, maxLength, placeholder, autoFocus }) => {
      const [localVal, setLocalVal] = useState(value || '');
      useEffect(() => { setLocalVal(value || ''); }, [value]);
      return (
        <input
          type="text"
          value={localVal}
          onChange={e => setLocalVal(e.target.value)}
          onBlur={() => { if(localVal !== (value || '')) onChange(localVal); }}
          onKeyDown={e => { if(e.key === 'Enter') e.target.blur(); }}
          readOnly={readOnly}
          className={className}
          maxLength={maxLength}
          placeholder={placeholder}
          autoFocus={autoFocus}
        />
      );
    };
    
    // --- 叫貨專用數字輸入框 ---
    const OrderQtyInput = ({ value, onChange, unit }) => {
      const [localVal, setLocalVal] = useState(value || 0);
      useEffect(() => { setLocalVal(value || 0); }, [value]);
      
      return (
        <div className="w-12 text-center flex flex-col items-center justify-center">
          <input 
            type="number" 
            min="0"
            step="any"
            value={localVal === 0 || localVal === '0' ? '' : localVal} 
            onChange={(e) => setLocalVal(e.target.value)}
            onBlur={(e) => {
              const val = parseFloat(e.target.value) || 0;
              setLocalVal(val);
              if (val !== (value || 0)) onChange(val);
            }}
            onKeyDown={e => { if(e.key === 'Enter') e.target.blur(); }}
            placeholder="0"
            className={`w-full text-xl font-black text-center bg-transparent outline-none p-0 border-none m-0 h-6 ${(!localVal || localVal === 0) ? 'text-slate-300' : 'text-[var(--accent)]'}`}
            style={{ WebkitAppearance: 'none', margin: 0, MozAppearance: 'textfield' }}
          />
          <p className="text-[9px] text-slate-400 font-black leading-none mt-1">{unit}</p>
        </div>
      );
    };

    // --- 進階班表系統 (整合權限管控與單月獨立資料、節日顏色切換、下載圖片) ---
    const ScheduleSystem = ({ onBack, currentBranch, isManager, getPublicPath, triggerNotify }) => {
      const defaultShiftRules = [
        { code: 'A-5', name: '早班A5', type: 'morning' },
        { code: 'A-6', name: '早班A6', type: 'morning' },
        { code: 'P1', name: '晚班P1', type: 'evening' },
        { code: 'P4', name: '晚班P4', type: 'evening' },
        { code: 'P5', name: '晚班P5', type: 'evening' },
        { code: 'P6', name: '晚班P6', type: 'evening' },
        { code: 'F', name: '全天班', type: 'full' },
        { code: '特', name: '特休', type: 'off' },
        { code: 'X', name: '排休', type: 'off' },
        { code: '/', name: '劃休', type: 'off' }
      ];

      const [scheduleData, setScheduleData] = useState({
        shiftRules: defaultShiftRules,
        roleColors: {},
        months: {} // 存放各月份獨立資料
      });
      const [currentDate, setCurrentDate] = useState(new Date()); 
      const [newShiftCode, setNewShiftCode] = useState('');
      const [newShiftType, setNewShiftType] = useState('morning');
      const [showSettings, setShowSettings] = useState(false);
      const [selectedCell, setSelectedCell] = useState(null);
      
      // 標記修改模式狀態
      const [isHighlightMode, setIsHighlightMode] = useState(false);
      
      // 節日編輯專用狀態
      const [holidayInputText, setHolidayInputText] = useState('');
      const [holidayInputIsRed, setHolidayInputIsRed] = useState(true);

      const [draggedStaffId, setDraggedStaffId] = useState(null);
      const [overStaffId, setOverStaffId] = useState(null);
      const [isDownloading, setIsDownloading] = useState(false);
      const [previewImage, setPreviewImage] = useState(null);
      const tableRef = useRef(null);

      // 同步該分店的班表資料
      useEffect(() => {
        const docRef = db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`));
        const unsubscribe = docRef.onSnapshot(doc => {
          if (doc.exists) {
            setScheduleData(doc.data());
          } else {
            const defaultData = { shiftRules: defaultShiftRules, roleColors: {}, months: {} };
            if(isManager) docRef.set(defaultData);
            setScheduleData(defaultData);
          }
        });
        return () => unsubscribe();
      }, [currentBranch, isManager]);

      const { shiftRules = defaultShiftRules, roleColors = {} } = scheduleData;
      
      const monthKey = useMemo(() => `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`, [currentDate]);
      const activeMonthData = scheduleData.months?.[monthKey] || null;

      const staffList = useMemo(() => {
        if (activeMonthData && activeMonthData.staffList) return activeMonthData.staffList;
        if (scheduleData.months) {
          const pastMonths = Object.keys(scheduleData.months)
            .filter(k => k < monthKey)
            .sort((a, b) => b.localeCompare(a));
          if (pastMonths.length > 0) {
            const latestPastMonth = pastMonths[0];
            return (scheduleData.months[latestPastMonth].staffList || []).map(s => ({...s, shifts: {}}));
          }
        }
        return scheduleData.staffList || []; 
      }, [activeMonthData, scheduleData.months, scheduleData.staffList, monthKey]);

      const holidays = useMemo(() => {
        if (activeMonthData && activeMonthData.holidays) return activeMonthData.holidays;
        if (!scheduleData.months) return scheduleData.holidays || {};
        return {};
      }, [activeMonthData, scheduleData.months, scheduleData.holidays]);

      // 解析舊版字串與新版物件的節日資料
      const getHolidayData = useCallback((dateString) => {
        const h = holidays[dateString];
        if (!h) return null;
        if (typeof h === 'string') return { text: h, isRed: true };
        return h;
      }, [holidays]);

      const updateData = (updates) => {
        if (!isManager) return;
        db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`)).set(updates, { merge: true });
      };

      // 請替換原本的 updateMonthData
      const updateMonthData = async (updateCallback) => {
        if (!isManager) return;
        const docRef = db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`));

        try {
          await db.runTransaction(async (transaction) => {
            const docSnap = await transaction.get(docRef);
      
            // 情境 1：如果該分店「完全沒有」班表文件 (全新分店)
            if (!docSnap.exists) {
              const currentMonthData = { staffList: [], holidays: {} };
              const updatedMonthData = updateCallback(currentMonthData);
              const finalMonthData = { ...currentMonthData, ...updatedMonthData };
        
              transaction.set(docRef, {
                shiftRules: defaultShiftRules,
                roleColors: {},
                months: { [monthKey]: finalMonthData }
              });
              return; // 直接寫入並結束，不報錯
            }

            const data = docSnap.data();
            const currentMonthData = (data.months && data.months[monthKey]) 
              ? data.months[monthKey] 
              : { staffList: [], holidays: {} };
      
            const updatedMonthData = updateCallback(currentMonthData);
            const finalMonthData = { ...currentMonthData, ...updatedMonthData };

            // 情境 2：文件存在，但這家分店是「舊版資料」，還沒建立 months 結構
            if (data.months === undefined) {
              // 使用 set + merge 安全建立母資料夾
              transaction.set(docRef, {
                months: { [monthKey]: finalMonthData }
              }, { merge: true });
            } 
            // 情境 3：正常情況，已有 months 結構
            else {
              // 使用 update 覆寫單月，這樣「清空節日 (delete)」的操作才會在資料庫確實生效
              transaction.update(docRef, {
                [`months.${monthKey}`]: finalMonthData
              });
            }
          });
        } catch (e) {
          console.error("更新班表失敗: ", e);
          triggerNotify("排班儲存異常，請稍後再試", "error");
        }
      };

      const setShiftRules = (newRules) => updateData({ shiftRules: newRules });
      const addShiftRule = () => {
        if (!newShiftCode.trim()) return;
        const code = newShiftCode.trim().toUpperCase();
        if (shiftRules.some(r => r.code === code)) return triggerNotify('班別代碼已存在！', 'error');
        setShiftRules([...shiftRules, { code, name: code, type: newShiftType }]);
        setNewShiftCode('');
      };
      const removeShiftRule = (codeToRemove) => setShiftRules(shiftRules.filter(r => r.code !== codeToRemove));

      const daysInMonth = useMemo(() => {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const days = new Date(year, month + 1, 0).getDate();
        return Array.from({ length: days }, (_, i) => {
          const date = new Date(year, month, i + 1);
          return {
            dateNum: i + 1,
            dayOfWeek: ['日', '一', '二', '三', '四', '五', '六'][date.getDay()],
            isWeekend: date.getDay() === 0 || date.getDay() === 6,
            dateString: `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`
          };
        });
      }, [currentDate]);

      const changeMonth = (offset) => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));

      const updateShift = (staffId, dateString, value) => {
        if (!isManager) return;
        const safeValue = value || '';
  
        // 使用 callback 拿取最新的 latestMonthData
        updateMonthData((latestMonthData) => {
          const currentStaffList = latestMonthData.staffList || [];
          const newStaffList = currentStaffList.map(staff => 
            staff.id === staffId 
              ? { ...staff, shifts: { ...(staff.shifts || {}), [dateString]: safeValue } } 
              : staff
          );
          return { staffList: newStaffList };
        });
      };

      // 切換格子黃色背景標記功能
      const toggleCellColor = (staffId, dateString) => {
        if (!isManager) return;
        const cellKey = `${staffId}_${dateString}`;
  
        updateMonthData((latestMonthData) => {
          const currentColors = latestMonthData.cellColors || {};
          const newColors = { ...currentColors };
    
          if (newColors[cellKey] === 'bg-yellow-300') {
            delete newColors[cellKey];
          } else {
            newColors[cellKey] = 'bg-yellow-300';
          }
          return { cellColors: newColors };
        });
      };
      const addStaff = () => {
        if (!isManager) return;
        const newId = Date.now().toString(); 
  
        updateMonthData((latestMonthData) => {
          const currentStaffList = latestMonthData.staffList || [];
          return { staffList: [...currentStaffList, { id: newId, title: '新職位', name: '新員工', shifts: {} }] };
        });
      };

      const updateStaffInfo = (id, field, value) => {
        if (!isManager) return;
  
        updateMonthData((latestMonthData) => {
          const currentStaffList = latestMonthData.staffList || [];
          const newStaffList = currentStaffList.map(staff => 
            staff.id === id ? { ...staff, [field]: value } : staff
          );
          return { staffList: newStaffList };
        });
      };

      const removeStaff = (id) => {
        if (!isManager) return;
        if(window.confirm('確定刪除此人員本月班表？')) {
          updateMonthData((latestMonthData) => {
            const currentStaffList = latestMonthData.staffList || [];
            return { staffList: currentStaffList.filter(staff => staff.id !== id) };
          });
        }
      };
      
      const importPreviousData = () => {
        if (!isManager) return;
        
        // 找出所有過去的月份並由近到遠排序
        const pastMonths = scheduleData.months 
          ? Object.keys(scheduleData.months).filter(k => k < monthKey).sort((a, b) => b.localeCompare(a)) 
          : [];

        if (pastMonths.length === 0) {
          triggerNotify("找不到過去的月份資料可供載入", "error");
          return;
        }

        const lastMonthKey = pastMonths[0];
        const lastStaffList = scheduleData.months[lastMonthKey].staffList || [];

        if (lastStaffList.length === 0) {
          triggerNotify(`上個月 (${lastMonthKey}) 沒有人員資料`, "error");
          return;
        }

        if (window.confirm(`確定要載入 ${lastMonthKey} 的人員名單與職位嗎？\n(注意：這會清空當月已排的班表，並套用上月名單)`)) {
          // 複製人員，但清空 shifts (班別) 以便重新排班
          const importedStaff = lastStaffList.map(staff => ({
            ...staff,
            shifts: {} 
          }));

          updateMonthData((latestMonthData) => {
            return { staffList: importedStaff };
          });
          triggerNotify(`已成功載入 ${lastMonthKey} 人員名單！`, "success");
        }
      };

      const openHolidayEdit = (dateString) => {
        if (!isManager) return;
        const h = getHolidayData(dateString);
        setHolidayInputText(h ? h.text : '');
        setHolidayInputIsRed(h ? h.isRed : true);
        setSelectedCell({ type: 'holiday', date: dateString });
      };

      const saveHoliday = (dateString) => {
        if (!isManager) return;
  
        updateMonthData((latestMonthData) => {
          const currentHolidays = latestMonthData.holidays || {};
          const newHolidays = { ...currentHolidays };
    
          // 如果輸入為空，代表要刪除該節日
          if (holidayInputText.trim() === '') {
            delete newHolidays[dateString];
          } else {
            newHolidays[dateString] = { 
              text: holidayInputText.trim(), 
              isRed: holidayInputIsRed 
            };
          }
    
          return { holidays: newHolidays };
        });
  
        setSelectedCell(null);
      };

      // 修改：刪除特殊節日
      const deleteHoliday = (dateString) => {
        if (!isManager) return;
  
        updateMonthData((latestMonthData) => {
          const currentHolidays = latestMonthData.holidays || {};
          const newHolidays = { ...currentHolidays };
          delete newHolidays[dateString];
    
          return { holidays: newHolidays };
        });
  
        setSelectedCell(null);
      };
      const handleDragStart = (id) => { if (!isManager) return; setDraggedStaffId(id); };
      const handleDragOver = (e, id) => { e.preventDefault(); if (!isManager) return; if (id !== draggedStaffId) setOverStaffId(id); };
      const handleDragEnd = () => {
        if (!isManager) return;
        if (draggedStaffId !== null && overStaffId !== null && draggedStaffId !== overStaffId) {
    
          updateMonthData((latestMonthData) => {
            const currentStaffList = latestMonthData.staffList || [];
            const newList = [...currentStaffList];
            const fromIndex = newList.findIndex(s => s.id === draggedStaffId);
            const toIndex = newList.findIndex(s => s.id === overStaffId);

            if (fromIndex !== -1 && toIndex !== -1) {
              const [moved] = newList.splice(fromIndex, 1);
              newList.splice(toIndex, 0, moved);
              return { staffList: newList };
            }
            return {}; // 沒變動就回傳空物件
          });
        }
        setDraggedStaffId(null);
        setOverStaffId(null);
      };

      const calculateOffDays = (shifts = {}) => {
        let count = 0;
        daysInMonth.forEach(day => {
          const code = shifts[day.dateString];
          if (!code) return;
          const rule = shiftRules.find(r => r.code === code);
          if (rule && rule.type === 'off') {
            count++;
          } else if (code === 'X' || code === '/' || code === '特') {
            count++;
          }
        });
        return count;
      };

      const calculateDailyStats = (dateString) => {
        let morning = 0; let evening = 0; let total = 0;
        staffList.forEach(staff => {
          const shifts = staff.shifts || {};
          const shiftCode = shifts[dateString] || '';
          if (shiftCode === '') { morning++; evening++; total++; return; }
          const rule = shiftRules.find(r => r.code === shiftCode);
          if (rule) {
            if (rule.type === 'morning' || rule.type === 'full') morning++;
            if (rule.type === 'evening' || rule.type === 'full') evening++;
            if (rule.type !== 'off') total++;
          } else if (shiftCode !== 'X' && shiftCode !== '/' && shiftCode !== '特') {
            total++;
          }
        });
        return { morning, evening, total };
      };

      const getTitleColorStyle = useCallback((title) => {
        if (!title) return { backgroundColor: '#f8fafc', color: '#64748b' };
        if (roleColors[title]) {
          const bg = roleColors[title];
          const hex = bg.replace('#', '');
          const r = parseInt(hex.substr(0, 2), 16) || 255;
          const g = parseInt(hex.substr(2, 2), 16) || 255;
          const b = parseInt(hex.substr(4, 2), 16) || 255;
          const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
          const text = (yiq >= 128) ? '#1e293b' : '#ffffff';
          return { backgroundColor: bg, color: text };
        }
        const colors = [
          {bg: '#dcfce7', text: '#065f46'}, {bg: '#dbeafe', text: '#3730a3'}, 
          {bg: '#ffedd5', text: '#c2410c'}, {bg: '#fce7f3', text: '#be123c'}, 
          {bg: '#e0e7ff', text: '#3f0071'}, {bg: '#f3e8ff', text: '#4338ca'}, 
          {bg: '#cffafe', text: '#1e40af'}, 
        ];
        let hash = 0;
        for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
        const colorIdx = Math.abs(hash) % colors.length;
        return { backgroundColor: colors[colorIdx].bg, color: colors[colorIdx].text };
      }, [roleColors]);

      const getCellBg = useCallback((dateString, isWeekend) => {
        const h = getHolidayData(dateString);
        if (h && h.isRed) return 'sc-red-hol';
        if (h && !h.isRed) return 'sc-gray-hol';
        if (isWeekend) return 'sc-weekend';
        return 'sc-white';
      }, [getHolidayData]);

      // 判斷某日是否為紅色行（週末 or 紅色假日）
      const isRedDay = useCallback((dateString, isWeekend) => {
        const h = getHolidayData(dateString);
        return isWeekend || (h && h.isRed);
      }, [getHolidayData]);

      const getHeaderBg = useCallback((dateString, isWeekend) => {
        const h = getHolidayData(dateString);
        if (h && h.isRed) return 'sc-hdr-red font-black';
        if (h && !h.isRed) return 'sc-hdr-gray font-black';
        if (isWeekend) return 'sc-hdr-wknd font-black';
        return 'sc-hdr-plain font-bold';
      }, [getHolidayData]);

      // 存為圖片功能 (進階修正：確保不裁切與防破圖)
      const handleDownloadImage = async () => {
        if (!tableRef.current) return;
        
        setIsDownloading(true);
        triggerNotify("正在展開表格並準備拍攝，請稍候...", "info");
        
        // 給 React 一點時間將輸入框 (input) 轉換為純文字 (div)，避免字體偏移
        setTimeout(async () => {
          const target = tableRef.current;
          const parent = target.parentElement;
          
          // 暫存原本的佈局樣式
          const originalOverflow = parent.style.overflow;
          const originalWidth = parent.style.width;
          const originalPosition = parent.style.position;
          
          // 強制完全展開容器，避免 html2canvas 裁切可視範圍以外的內容
          parent.style.overflow = 'visible';
          parent.style.width = 'max-content';
          parent.style.position = 'static';
          
          try {
            const canvas = await window.html2canvas(target, {
              scale: 2, 
              useCORS: true,
              backgroundColor: '#ffffff',
              width: target.scrollWidth,
              height: target.scrollHeight,
              windowWidth: target.scrollWidth,
              windowHeight: target.scrollHeight
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            
            // 開啟預覽對話框，提供手機端安全長按儲存
            setPreviewImage(imgData);
            triggerNotify("班表截圖成功！", "success");
          } catch (error) {
            console.error("產生圖片失敗", error);
            triggerNotify("下載圖片失敗，請稍後再試", "error");
          } finally {
            // 恢復所有原始樣式與編輯模式
            parent.style.overflow = originalOverflow;
            parent.style.width = originalWidth;
            parent.style.position = originalPosition;
            setIsDownloading(false);
          }
        }, 500);
      };

      const handlePrint = () => {
        const monthStr = `${currentDate.getMonth() + 1}月`;
        const yearMonthTitle = `${currentDate.getFullYear()}年 ${monthStr} 班表`;
        
        const htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>${currentBranch} - ${yearMonthTitle}</title>
            <style>
              @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
              @page { size: landscape; margin: 5mm; }
              body { font-family: 'Noto Sans TC', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; color: #1e293b; }
              h1 { text-align: center; font-size: 20px; font-weight: 900; margin-bottom: 12px; color: #b9121b; letter-spacing: 2px; }
              table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
              th, td { border: 1px solid #475569; padding: 2px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 700; }
              .bg-header { background-color: #a7f3d0 !important; font-size: 12px; }
              .bg-header-dark { background-color: #34d399 !important; color: white; font-size: 11px; }
              .bg-weekend { background-color: #ffe4e6 !important; color: #e11d48 !important; }
              .bg-holiday { background-color: #fecaca !important; color: #b91c1c !important; } 
              .text-holiday { color: #b91c1c !important; font-size: 12px; writing-mode: vertical-lr; letter-spacing: 1px; font-weight: 900; margin: 0 auto; padding-top: 2px;}
              .bg-gray { background-color: #f8fafc !important; }
              .bg-dark { background-color: #1e293b !important; color: white !important; font-size: 11px; }
              .bg-orange { background-color: #ffedd5 !important; color: #9a3412 !important; font-size: 11px; }
              .bg-indigo { background-color: #e0e7ff !important; color: #3730a3 !important; font-size: 11px; }
              .print-footer { text-align: right; font-size: 9px; color: #94a3b8; margin-top: 10px; }
            </style>
          </head>
          <body>
            <h1>${currentBranch} - ${yearMonthTitle}</h1>
            <table>
              <colgroup>
                <col style="width: 60px;" />
                <col style="width: 65px;" />
                <col style="width: 28px;" />
                ${daysInMonth.map(() => `<col />`).join('')}
              </colgroup>
              <thead>
                <tr>
                  <th colspan="3" class="bg-header">${monthStr}</th>
                  ${daysInMonth.map(d => {
                    const h = getHolidayData(d.dateString);
                    return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : 'bg-gray'))}">${d.dateNum}</th>`;
                  }).join('')}
                </tr>
                <tr>
                  <th class="bg-header-dark">職稱</th>
                  <th class="bg-header-dark">姓名</th>
                  <th class="bg-header-dark">休假</th>
                  ${daysInMonth.map(d => {
                    const h = getHolidayData(d.dateString);
                    return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : 'bg-gray'))}">${d.dayOfWeek}</th>`;
                  }).join('')}
                </tr>
                <tr>
                  <th colspan="3" style="text-align:right; font-size: 9px; color: #94a3b8; font-weight: normal; padding-right: 4px;">特殊節日 ➔</th>
                  ${daysInMonth.map(d => {
                    const h = getHolidayData(d.dateString);
                    return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : ''))}" style="height: 60px; vertical-align: top;">
                      ${h ? `<div class="text-holiday" style="${!h.isRed ? 'color:#475569 !important;' : ''}">${h.text}</div>` : ''}
                    </th>`;
                  }).join('')}
                </tr>
              </thead>
              <tbody>
                ${staffList.map((staff, idx) => {
                  const roleStyle = getTitleColorStyle(staff.title);
                  return `
                  <tr>
                    <td style="font-weight:bold; font-size: 11px; background-color: ${roleStyle.backgroundColor} !important; color: ${roleStyle.color} !important;">${staff.title}</td>
                    <td class="${idx % 2 === 0 ? 'bg-gray' : ''}" style="font-size: 13px; letter-spacing: 1px;">${staff.name}</td>
                    <td class="bg-gray" style="color:#475569; font-size: 11px;">${calculateOffDays(staff.shifts)}</td>
                    ${daysInMonth.map(d => {
                      const shift = (staff.shifts || {})[d.dateString] || '';
                      const h = getHolidayData(d.dateString);
                      const cellKey = `${staff.id}_${d.dateString}`;
                      const isHighlighted = (activeMonthData?.cellColors || {})[cellKey] === 'bg-yellow-300';
                      
                      let tdClass = (h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : ''));
                      let tdStyle = "text-transform: uppercase; font-size: 10px;";
                      
                      if (isHighlighted) {
                        tdClass = '';
                        tdStyle += " background-color: #fde047 !important;";
                      }
                      
                      return `<td class="${tdClass}" style="${tdStyle}">${shift}</td>`;
                    }).join('')}
                  </tr>
                  `;
                }).join('')}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3" class="bg-orange" style="text-align: right; padding-right: 4px;">早班總人數</td>
                  ${daysInMonth.map(d => `<td class="bg-orange">${calculateDailyStats(d.dateString).morning || ''}</td>`).join('')}
                </tr>
                <tr>
                  <td colspan="3" class="bg-indigo" style="text-align: right; padding-right: 4px;">晚班總人數</td>
                  ${daysInMonth.map(d => `<td class="bg-indigo">${calculateDailyStats(d.dateString).evening || ''}</td>`).join('')}
                </tr>
                <tr>
                  <td colspan="3" class="bg-dark" style="text-align: right; padding-right: 4px;">當日總人數</td>
                  ${daysInMonth.map(d => `<td class="bg-dark">${calculateDailyStats(d.dateString).total || ''}</td>`).join('')}
                </tr>
              </tfoot>
            </table>
            <div class="print-footer">EATJOY 廚務管理系統 - 列印時間：${new Date().toLocaleString()}</div>
          </body>
          </html>
        `;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(htmlContent);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => { 
          printWindow.print(); 
          printWindow.close(); 
        }, 500);
      };

      return (
        <div className="page-enter pb-24" id="schedule-root" onClick={() => setSelectedCell(null)}>
          <div className="p-3 sm:p-4 border-b bg-white/80 backdrop-blur sticky top-[60px] z-40 shadow-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
            <div className="flex items-center gap-3 w-full md:w-auto">
              <button onClick={onBack} className="p-2 sm:p-2.5 glass-panel rounded-xl sm:rounded-2xl border border-slate-300 active:scale-90 transition-all bg-white shadow-sm shrink-0"><Icon name="arrow-left" size={20}/></button>
              <h2 className="text-lg sm:text-xl font-black text-slate-800 tracking-tighter truncate">{currentBranch} <span className="text-brand-red">排班系統</span></h2>
            </div>
            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
              <button onClick={handleDownloadImage} disabled={isDownloading} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-blue-500 text-white rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap disabled:opacity-50">
                <Icon name="image" size={14} /> {isDownloading ? "處理中" : "存為圖片"}
              </button>
              <button onClick={handlePrint} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-emerald-600 text-white rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
                <Icon name="printer" size={14} /> 列印
              </button>
              {isManager && (
                <>
                  <button onClick={importPreviousData} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-indigo-600 text-white rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
                    <Icon name="copy" size={14} /> 載入上月
                  </button>
                  <button onClick={() => setIsHighlightMode(!isHighlightMode)} className={`flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap ${isHighlightMode ? 'bg-yellow-400 text-yellow-900 border border-yellow-500 shadow-inner' : 'bg-slate-100 text-slate-700 border border-slate-300'}`}>
                    <Icon name="edit-3" size={14} /> {isHighlightMode ? '結束標記' : '標記修改'}
                  </button>
                  <button onClick={addStaff} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-slate-800 text-white rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="plus" size={14} /> 新增</button>
                  <button onClick={() => setShowSettings(!showSettings)} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-slate-100 text-slate-700 rounded-xl border border-slate-300 active:scale-95 transition-all text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="settings" size={14} /> 設定</button>
                </>
              )}
            </div>
          </div>

          <div className="p-4">
            {isManager && showSettings && (
              <div className="mb-4 p-5 bg-blue-50 border border-blue-200 rounded-3xl shadow-sm text-left animate-in slide-in-from-top-2">
                <h3 className="font-black text-blue-800 mb-3 flex items-center gap-2 text-sm"><Icon name="settings" size={16} /> 班別代碼與統計歸類設定</h3>
                <div className="flex flex-wrap gap-2 mb-4">
                  {shiftRules.map((rule, idx) => (
                    <div key={idx} className="flex items-center bg-white py-1.5 px-3 rounded-xl shadow-sm border border-blue-200 text-xs font-bold group">
                      <span className="w-8 text-center text-blue-700">{rule.code}</span>
                      <span className="mx-2 text-slate-300">|</span>
                      <select value={rule.type} onChange={(e) => { const newRules = [...shiftRules]; newRules[idx].type = e.target.value; setShiftRules(newRules); }} className="outline-none bg-transparent text-slate-600 cursor-pointer appearance-none">
                        <option value="morning">早班</option><option value="evening">晚班</option><option value="full">全天(早+晚)</option><option value="off">休假(不計入)</option>
                      </select>
                      <button onClick={() => removeShiftRule(rule.code)} className="ml-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button>
                    </div>
                  ))}
                </div>
                <div className="pt-3 border-t border-blue-200 flex flex-wrap items-center gap-2">
                  <input type="text" value={newShiftCode} onChange={(e) => setNewShiftCode(e.target.value)} placeholder="代碼 (例: A-7)" className="px-3 py-2 text-xs rounded-xl border border-slate-300 outline-none w-28 uppercase font-bold" maxLength={4} />
                  <select value={newShiftType} onChange={(e) => setNewShiftType(e.target.value)} className="px-3 py-2 text-xs rounded-xl border border-slate-300 outline-none font-bold">
                    <option value="morning">歸類：早班</option><option value="evening">歸類：晚班</option><option value="full">歸類：全天</option><option value="off">歸類：休假</option>
                  </select>
                  <button onClick={addShiftRule} disabled={!newShiftCode.trim()} className="px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-xl active:scale-95 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-1"><Icon name="plus" size={14} /> 新增班別</button>
                </div>

                <div className="mt-6 pt-4 border-t border-blue-200">
                  <h3 className="font-black text-blue-800 mb-3 flex items-center gap-2 text-sm"><Icon name="palette" size={16} /> 職位顏色自訂</h3>
                  <div className="flex flex-wrap gap-2">
                    {Array.from(new Set(staffList.map(s => s.title).filter(Boolean))).map(role => (
                      <div key={role} className="flex items-center bg-white py-1 pl-3 pr-2 rounded-xl shadow-sm border border-blue-200 text-xs font-bold gap-2">
                        <span className="text-slate-700 max-w-[80px] truncate" title={role}>{role}</span>
                        <input 
                          type="color" 
                          value={roleColors[role] || '#ffffff'} 
                          onChange={(e) => updateData({ roleColors: { ...(roleColors || {}), [role]: e.target.value } })}
                          className="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent"
                        />
                        {roleColors[role] && (
                          <button onClick={() => {
                            const newColors = {...roleColors};
                            delete newColors[role];
                            // 避免 merge:true 無法刪除屬性，改用 update 覆寫
                            db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`)).update({
                              roleColors: newColors
                            }).catch(() => {
                              updateData({ roleColors: newColors });
                            });
                          }} className="text-slate-300 hover:text-red-500"><Icon name="x" size={14} /></button>
                        )}
                      </div>
                    ))}
                    {Array.from(new Set(staffList.map(s => s.title).filter(Boolean))).length === 0 && <span className="text-xs text-slate-500">尚無職位，請先於下方班表新增人員。</span>}
                  </div>
                  <p className="text-[10px] text-blue-500 mt-2">提示：點擊色塊可自訂該職位的背景顏色，未設定則使用系統自動配色。列印時也會自動套用！</p>
                </div>
              </div>
            )}

            <div className="bg-white rounded-[2rem] shadow-sm border border-slate-400 overflow-hidden mb-8">
              <div className="flex items-center justify-between p-4 bg-slate-50 border-b border-slate-400">
                <button onClick={() => changeMonth(-1)} className="p-2 bg-white rounded-xl shadow-sm active:scale-90 transition-all text-slate-600 border border-slate-300"><Icon name="chevron-left" size={18} /></button>
                <div className="font-black text-slate-800 flex items-center gap-2 text-xl"><Icon name="calendar" size={20} className="text-brand-red" /> {currentDate.getFullYear()} 年 {currentDate.getMonth() + 1} 月</div>
                <button onClick={() => changeMonth(1)} className="p-2 bg-white rounded-xl shadow-sm active:scale-90 transition-all text-slate-600 border border-slate-300"><Icon name="chevron-right" size={18} /></button>
              </div>

              <div className="overflow-x-auto overflow-y-visible custom-scrollbar bg-white relative pb-2 w-full">
                <div ref={tableRef} className="w-max min-w-full bg-white relative">
                  <table className="w-full border-collapse min-w-max text-xs select-none schedule-table">
                    <thead>
                      <tr>
                        <th colSpan={3} className="bg-emerald-100 border border-slate-500 p-2 text-lg font-black tracking-widest sticky left-0 top-0 z-[60] shadow-sm" style={{ height: '40px' }}>{currentDate.getMonth() + 1}月</th>
                        {daysInMonth.map(day => (
                          <th key={`date-${day.dateNum}`} className={`border border-slate-500 p-1 text-center font-black text-base w-9 sticky top-0 z-[50] shadow-sm ${getHeaderBg(day.dateString, day.isWeekend)}`} style={{ height: '40px', borderLeft: isRedDay(day.dateString, day.isWeekend) ? '2px solid #f43f5e' : undefined }}>{day.dateNum}</th>
                        ))}
                      </tr>
                      <tr>
                        <th className="bg-emerald-500 border border-slate-500 p-1 w-[76px] sticky left-0 z-[60] text-white font-black shadow-sm" style={{ top: '40px', height: '40px' }}>職稱</th>
                        <th className="bg-emerald-500 border border-slate-500 p-1 w-[80px] sticky left-[76px] z-[60] text-white font-black shadow-sm" style={{ top: '40px', height: '40px' }}>姓名</th>
                        <th className="bg-emerald-500 border border-slate-500 p-1 w-[40px] text-xs leading-tight sticky left-[156px] z-[60] text-white font-black shadow-sm" style={{ top: '40px', height: '40px' }}>休假<br/>天數</th>
                        {daysInMonth.map(day => (
                          <th key={`day-${day.dateNum}`} className={`border border-slate-500 p-1 text-center sticky z-[50] shadow-sm font-bold text-sm ${getHeaderBg(day.dateString, day.isWeekend)}`} style={{ top: '40px', height: '40px' }}>{day.dayOfWeek}</th>
                        ))}
                      </tr>
                      <tr>
                        <th colSpan={3} className="bg-white border border-slate-500 p-1 text-right text-xs text-slate-400 font-bold sticky left-0 z-[60] shadow-sm" style={{ top: '80px', height: '60px' }}>{isManager && !isDownloading ? '特殊節日 (點擊設定) ➔' : '特殊節日 ➔'}</th>
                        {daysInMonth.map(day => {
                          const h = getHolidayData(day.dateString);
                          return (
                            <th key={`holiday-${day.dateNum}`} onClick={(e) => { e.stopPropagation(); openHolidayEdit(day.dateString); }} className={`border border-slate-500 p-0 text-center align-top relative sticky z-[50] shadow-sm ${isManager && !isDownloading ? 'cursor-pointer hover:brightness-95' : ''} ${getCellBg(day.dateString, day.isWeekend)}`} style={{ top: '80px', height: '60px' }}>
                              {isManager && !isDownloading && selectedCell?.type === 'holiday' && selectedCell?.date === day.dateString ? (
                                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[140px] z-[100] bg-white border-2 border-slate-300 shadow-2xl p-2 rounded-xl flex flex-col gap-2" onClick={e=>e.stopPropagation()}>
                                  <input autoFocus type="text" value={holidayInputText} onChange={(e) => setHolidayInputText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && saveHoliday(day.dateString)} className="w-full text-xs border border-slate-200 rounded p-1.5 outline-none font-bold text-slate-800 text-center" placeholder="節日或備註" />
                                  <label className="flex items-center justify-center gap-1.5 text-[10px] text-slate-600 cursor-pointer bg-slate-50 py-1.5 rounded border border-slate-100">
                                    <input type="checkbox" checked={holidayInputIsRed} onChange={(e) => setHolidayInputIsRed(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded"/>
                                    標示為紅字休假
                                  </label>
                                  <div className="flex gap-1.5">
                                    <button onClick={() => deleteHoliday(day.dateString)} className="flex-1 py-1.5 bg-slate-100 text-slate-500 text-xs font-bold rounded hover:bg-red-50 hover:text-red-500 border border-slate-200 active:scale-95 transition-all">清空</button>
                                    <button onClick={() => saveHoliday(day.dateString)} className="flex-[1.5] py-1.5 bg-brand-red text-white text-xs font-bold rounded shadow-sm active:scale-95 transition-all">儲存</button>
                                  </div>
                                </div>
                              ) : (
                                h && <div className={`writing-vertical-lr font-black text-[13px] mx-auto pt-1 tracking-widest ${h.isRed ? 'text-[var(--accent)]' : 'text-slate-600'}`}>{h.text}</div>
                              )}
                            </th>
                          );
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {staffList.map((staff, index) => {
                        const isDragging = draggedStaffId === staff.id;
                        const isOver = overStaffId === staff.id;
                        return (
                        <tr 
                          key={staff.id} 
                          draggable={isManager && !isDownloading}
                          onDragStart={() => handleDragStart(staff.id)}
                          onDragOver={(e) => handleDragOver(e, staff.id)}
                          onDragEnd={handleDragEnd}
                          className={`${isManager && !isDownloading ? 'group cursor-grab active:cursor-grabbing' : ''} ${isDragging ? 'opacity-40' : ''} ${isOver ? 'border-y-2 border-brand-red shadow-sm relative z-20' : ''}`}
                        >
                          <td className={`border border-slate-500 p-0 sticky left-0 z-[30] transition-colors title-cell`} style={getTitleColorStyle(staff.title)}>
                            <div className="flex items-center h-full">
                              {isManager && !isDownloading && <div className="pl-1 opacity-50 shrink-0"><Icon name="grip-vertical" size={14} /></div>}
                              {isDownloading ? (
                                <div className={`w-full h-full min-h-[36px] flex items-center justify-center text-[11px] font-bold ${isManager ? 'pl-1' : 'pl-2'}`}>
                                  {staff.title}
                                </div>
                              ) : (
                                <SyncInput value={staff.title} onChange={(val) => updateStaffInfo(staff.id, 'title', val)} readOnly={!isManager} className={`w-full h-full py-2 pr-1 ${isManager ? 'pl-1' : 'pl-2'} bg-transparent text-center outline-none font-bold ${isManager ? '' : 'cursor-default'}`} />
                              )}
                            </div>
                          </td>
                          <td className={`border border-slate-500 p-0 sticky left-[76px] z-[30] bg-white group-hover:bg-blue-50 relative`}>
                            {isDownloading ? (
                              <div className="w-full h-full min-h-[36px] px-0.5 flex items-center justify-center font-black text-sm text-slate-800">
                                {staff.name}
                              </div>
                            ) : (
                              <SyncInput value={staff.name} onChange={(val) => updateStaffInfo(staff.id, 'name', val)} readOnly={!isManager} className={`w-full h-full px-0.5 py-2 bg-transparent text-center font-black text-sm outline-none ${isManager ? 'text-slate-800' : 'text-slate-700 cursor-default'}`} />
                            )}
                            {isManager && !isDownloading && <button onClick={() => removeStaff(staff.id)} className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 text-white bg-red-500 hover:bg-red-600 transition-opacity p-0.5 rounded-bl-lg shadow-sm z-10"><Icon name="x" size={10} /></button>}
                          </td>
                          <td className="border border-slate-500 p-1 text-center font-black text-lg sticky left-[156px] z-[30]" style={{backgroundColor:'var(--leather-lift,#f1f5f9)',color:'var(--t2,#475569)'}}>{calculateOffDays(staff.shifts)}</td>
                          {daysInMonth.map(day => {
                            const cellKey = `${staff.id}_${day.dateString}`;
                            const isHighlighted = (activeMonthData?.cellColors || {})[cellKey] === 'bg-yellow-300';
                            const baseBg = getCellBg(day.dateString, day.isWeekend);
                            const finalBg = isHighlighted ? 'sc-yellow' : baseBg;
                            
                            return (
                              <td key={`${staff.id}-${day.dateNum}`} 
                                onClick={() => { if (isHighlightMode) toggleCellColor(staff.id, day.dateString); }}
                                className={`border border-slate-500 p-0 relative ${isHighlighted ? 'sc-yellow' : finalBg} ${isHighlightMode ? 'cursor-pointer hover:opacity-80' : ''}`}>
                                {isDownloading ? (
                                  <div className="w-full h-full min-h-[36px] flex items-center justify-center font-black uppercase text-[14px] text-slate-800">
                                    {(staff.shifts || {})[day.dateString] || ''}
                                  </div>
                                ) : (
                                  <SyncInput 
                                    value={(staff.shifts || {})[day.dateString] || ''} 
                                    onChange={(val) => updateShift(staff.id, day.dateString, val.toUpperCase())} 
                                    readOnly={!isManager || isHighlightMode} 
                                    className={`w-full h-[36px] text-center bg-transparent outline-none font-black uppercase text-[14px] ${isManager && !isHighlightMode ? 'focus:bg-yellow-100 focus:ring-1 focus:ring-blue-400 text-slate-800' : 'text-slate-700 cursor-default'} ${isHighlightMode ? 'pointer-events-none' : ''}`} 
                                    maxLength={4} 
                                  />
                                )}
                              </td>
                            );
                          })}
                        </tr>
                        );

          newHistory[existingRecordIndex] = {

function moveJoystick(cx,cy){
const r=jWrap.getBoundingClientRect();
const cx2=r.left+r.width/2,cy2=r.top+r.height/2;
let dx=cx-cx2,dy=cy-cy2;
const d=Math.sqrt(dx*dx+dy*dy);
if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}
jDx=dx/JR;jDy=dy/JR;
jThumb.style.transform=\`translate(calc(-50% + \${dx}px), calc(-50% + \${dy}px))\`;
}
function resetJoystick(){jActive=false;jTouchId=null;jDx=0;jDy=0;jThumb.style.transform='translate(-50%,-50%)';}

window.addEventListener('touchmove',e=>{if(!jActive)return;for(const t of e.changedTouches){if(t.identifier===jTouchId){moveJoystick(t.clientX,t.clientY);break;}}},{passive:false});

let dx=jDx,dy=jDy;
if(keys['ArrowLeft']||keys['KeyA'])dx-=1;if(keys['ArrowRight']||keys['KeyD'])dx+=1;
if(keys['ArrowUp']||keys['KeyW'])dy-=1;if(keys['ArrowDown']||keys['KeyS'])dy+=1;
const m=Math.sqrt(dx*dx+dy*dy);if(m>1){dx/=m;dy/=m;}

}

class Bullet{
constructor(x,y,vx,vy,dmg,color,r,pierce=false,homing=false,burn=false){
 Object.assign(this,{x,y,vx,vy,dmg,color,r,pierce,homing,burn,age:0,hitTargets:new Set()});
}
update(){
 this.age++;
 if(this.homing){
 const t=findClosest(this.x,this.y,350);
 if(t){const a=Math.atan2(t.y-this.y,t.x-this.x),ca=Math.atan2(this.vy,this.vx);let na=ca+(a-ca)*.12;this.vx=Math.cos(na)*8;this.vy=Math.sin(na)*8;}
 }
 this.x+=this.vx;this.y+=this.vy;
}
draw(){ctx.save();ctx.fillStyle=this.color;ctx.shadowBlur=8;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();}
dead(){return this.x<-20||this.x>CW+20||this.y<-20||this.y>CH+20||this.age>200;}
}
class Enemy{
constructor(x,y,type,hp,sv){
 Object.assign(this,{x,y,type,maxHp:hp,hp,scoreVal:sv,r:type===2?18:14,timer:0,vy:type===1?3:type===2?1.5:2,vx:0,frozenTimer:0});
 if(type===3)this.startX=x;
}
update(){
 this.timer++;const sm=this.frozenTimer>0?.4:1;if(this.frozenTimer>0)this.frozenTimer--;
 if(this.type===1){this.vx=player.x>this.x?1.2:-1.2;this.x+=this.vx*sm;this.y+=this.vy*sm;}
 else if(this.type===2){this.y+=this.vy*sm;if(this.timer%90===0&&this.y>0&&this.y<CH*.5){const a=Math.atan2(player.y-this.y,player.x-this.x);eBullets.push(new Bullet(this.x,this.y,Math.cos(a)*4,Math.sin(a)*4,12,'#f43f5e',5));}}
 else{this.x=this.startX+Math.sin(this.timer*.05)*50;this.y+=this.vy*sm;}
 if(this.y>CH+60)this.hp=0;
}
draw(){
 ctx.save();ctx.translate(this.x,this.y);
 ctx.fillStyle=this.frozenTimer>0?'#bfdbfe':(this.type===1?'#c084fc':this.type===2?'#f87171':'#fcd34d');
 ctx.shadowBlur=7;ctx.shadowColor=ctx.fillStyle;
 ctx.beginPath();
 if(this.type===1){ctx.moveTo(0,16);ctx.lineTo(13,-12);ctx.lineTo(-13,-12);}
 else if(this.type===2){ctx.moveTo(0,16);ctx.lineTo(16,0);ctx.lineTo(0,-16);ctx.lineTo(-16,0);}
 else ctx.arc(0,0,14,0,Math.PI*2);
 ctx.closePath();ctx.fill();
 if(this.hp<this.maxHp){ctx.fillStyle='#fde8c8';ctx.fillRect(-12,-22,24,4);ctx.fillStyle='#ef4444';ctx.fillRect(-12,-22,24*(this.hp/this.maxHp),4);}
 ctx.restore();
}
takeDamage(amt){
 this.hp-=amt*atkMult;addText(Math.floor(amt*atkMult).toString(),this.x,this.y,'#78350f');
 if(this.hp<=0){
 burst(this.x,this.y,'#fb923c',14);score+=this.scoreVal;
 const goldChance=currentForm.name==='炒飯型'?.45:.3;
 if(Math.random()<goldChance){
const earn=currentForm.name==='炒飯型'?2:1;gold+=earn;
addText('+'+earn+'💰',this.x,this.y-20,'#92400e');updateHUD();
 }
 reportKill();
 }
}
}

 super(CW/2,-90,10,Math.floor((200+stg*80)*Math.pow(1/atkMult,.5)),stg<=1?500:stg===2?1000:2000);
 this.r=64;this.phase=0;this.stg=stg;this.targetX=CW/2;this.targetY=130;this.atkTimer=0;this._defeated=false;

 if(this.timer%100===0)this.targetX=50+Math.random()*(CW-100);
 this.x+=(this.targetX-this.x)*.025*sm;this.y+=(this.targetY-this.y)*.025*sm;
 this.atkTimer++;const intv=this.phase>=2?100:this.phase===1?140:200;
 if(this.atkTimer>=intv){this.atkTimer=0;this.fire();}
}

 else if(this.phase===1){for(let i=-2;i<=2;i++)eBullets.push(new Bullet(bx,by,i*2.5,5,18,'#d8b4fe',6));eBullets.push(new Bullet(bx,by,Math.cos(a)*6,Math.sin(a)*6,22,'#f87171',7));}
 else{for(let i=0;i<10;i++){const ang=(Math.PI*2/10)*i;eBullets.push(new Bullet(this.x,this.y,Math.cos(ang)*4.5,Math.sin(ang)*4.5,16,'#f472b6',5));}for(let i=-1;i<=1;i++)eBullets.push(new Bullet(bx,by,i*3,6,20,'#fbbf24',7));}
}
draw(){
 ctx.save();ctx.translate(this.x,this.y);ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.fillStyle=this.color;
 ctx.beginPath();
 if(this.stg<=1){ctx.moveTo(0,48);ctx.lineTo(48,0);ctx.lineTo(48,-26);ctx.lineTo(-48,-26);ctx.lineTo(-48,0);}
 else if(this.stg===2){ctx.moveTo(0,52);ctx.lineTo(36,12);ctx.lineTo(52,-12);ctx.lineTo(0,-36);ctx.lineTo(-52,-12);ctx.lineTo(-36,12);}
 else{ctx.rotate(this.timer*.018);ctx.arc(0,0,48,0,Math.PI*2);}
 ctx.closePath();ctx.fill();
 ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(0,0,12+Math.sin(this.timer*.1)*6,0,Math.PI*2);ctx.fill();ctx.restore();
}

function addText(t,x,y,color,sz=15,vy=-0.8){texts.push({t,x:x+(Math.random()-.5)*20,y,color,sz,life:1,vy});}
function findClosest(x,y,range){let best=null,bd=range*range;for(const e of enemies){const d=(e.x-x)**2+(e.y-y)**2;if(d<bd){bd=d;best=e;}}if(boss&&!boss._defeated){const d=(boss.x-x)**2+(boss.y-y)**2;if(d<bd)best=boss;}return best;}

function autoFire(){

if(currentWeapon==='melee'){
 player.weaponCd=MELEE_CD;
 startSwipe();
 const sRange=68;
 enemies.forEach(e=>{const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);if(d<sRange){e.takeDamage(currentForm.bulletDmg*2.0);burst(e.x,e.y,currentForm.bulletColor,5);}});
 if(boss&&!boss._defeated&&Math.hypot(boss.x-player.x,boss.y-player.y)<sRange+20)boss.takeDamage(currentForm.bulletDmg*2.0);
 // 子彈反彈
 let reflected=0;
 for(let i=eBullets.length-1;i>=0;i--){
 const b=eBullets[i];
 if(reflected<4&&Math.hypot(b.x-player.x,b.y-player.y)<sRange+24){
bullets.push(new Bullet(b.x,b.y,-b.vx*1.4,-b.vy*1.4,b.dmg*.8,currentForm.bulletColor,b.r+2));
eBullets.splice(i,1);reflected++;
 }
 }
} else {
 player.weaponCd=WEAPON_CD;
 const f=currentForm,sc=f.spreadCount||0;
 if(sc>0){for(let i=-sc;i<=sc;i++)fire(player.x,player.y,Math.sin(i*.25)*10,-Math.cos(i*.25)*10,f.bulletColor,f.bulletDmg,5);}
 else{fire(player.x,player.y,1,-12,f.bulletColor,f.bulletDmg,5);fire(player.x,player.y,-1,-12,f.bulletColor,f.bulletDmg,5);}
}
}

if(sk2Cd>0){sk2Cd-=dt;const el=document.getElementById('sk2Cd');el.style.display='flex';el.textContent=Math.ceil(sk2Cd/1000)+'s';if(sk2Cd<=0){sk2Cd=0;el.style.display='none';}}
// Partner passive

if((currentForm.name==='豆腐型'||currentForm.name==='豚骨型'||pb.regen>0)&&passiveTimer>=5000){
 passiveTimer=0;const regen=(pb.regen||0)+(currentForm.name==='豆腐型'||currentForm.name==='豚骨型'?5:0);
 player.hp=Math.min(player.maxHp,player.hp+regen);if(charSlots[activeChar])charSlots[activeChar].hp=player.hp;burst(player.x,player.y,'#a3e635',5);
} else passiveTimer+=dt;

// Enemies
for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.update();if(Math.hypot(player.x-e.x,player.y-e.y)<player.radius+e.r&&player.invTimer<=0)hurtPlayer(10);if(e.hp<=0)enemies.splice(i,1);}

// Bullets
for(let i=bullets.length-1;i>=0;i--){
 const b=bullets[i];b.update();let rm=false;
 for(const e of enemies){if(b.hitTargets.has(e))continue;if(Math.hypot(b.x-e.x,b.y-e.y)<b.r+e.r){e.takeDamage(b.dmg);burst(b.x,b.y,b.color,3);if(b.burn)setTimeout(()=>{if(e.hp>0)e.hp-=4;},800);if(!b.pierce)rm=true;else b.hitTargets.add(e);break;}}
 if(boss&&!boss._defeated&&!qaActive&&Math.hypot(b.x-boss.x,b.y-boss.y)<b.r+boss.r){boss.takeDamage(b.dmg);burst(b.x,b.y,b.color,3);rm=true;}
 if(b.dead())rm=true;if(rm)bullets.splice(i,1);
}
for(let i=eBullets.length-1;i>=0;i--){const b=eBullets[i];b.update();if(!qaActive&&Math.hypot(b.x-player.x,b.y-player.y)<b.r+player.radius&&player.invTimer<=0){hurtPlayer(b.dmg);burst(b.x,b.y,b.color,5);eBullets.splice(i,1);continue;}if(b.dead())eBullets.splice(i,1);}
// Auto fire
if(player.weaponCd>0)player.weaponCd--; else if(!qaActive)autoFire();
// Coins
for(let i=coins.length-1;i>=0;i--){const c=coins[i];c.update();if(Math.hypot(player.x-c.x,player.y-c.y)<player.radius+c.r){gold+=1;addText('+1💰',c.x,c.y,'#92400e');updateHUD();coins.splice(i,1);continue;}if(c.y>CH+20)coins.splice(i,1);}

   if (pos.x === snake[0].x + dx && pos.y === snake[0].y + dy) conflict = true;
   if (!conflict) break;
  }
  optionsOnBoard.push({ ...pos, letter: letters[i], index: i });
 }
 updateWandUI();
}

function spawnItem(type) {
 let pos, attempts = 0;
 while (attempts < 100) {
  pos = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * (TILE_COUNT - 3)) + 3 };
  let conflict = snake.some(s => s.x === pos.x && s.y === pos.y) || optionsOnBoard.some(o => o.x === pos.x && o.y === pos.y) || itemsOnBoard.some(i => i.x === pos.x && i.y === pos.y);
  if (pos.x === snake[0].x + dx && pos.y === snake[0].y + dy) conflict = true;
  if (!conflict) break;
  attempts++;
 }
 if (attempts < 100) itemsOnBoard.push({ x: pos.x, y: pos.y, type: type });
}

function applyItemEffect(type) {
 flashScreen('bg-yellow-200'); 
 if (type === 'heart') {
  lives++; updateUI();
 } else if (type === 'shield') {
  hasShield = true; updateBuffUI();
 } else if (type === 'helmet') {
  hasHelmet = true; updateBuffUI();
 } else if (type === 'sword') {
  hasSword = true; updateBuffUI();
 } else if (type === 'wand') {
  if (!hasWand) {
   hasWand = true; updateBuffUI();
   const correctAnsIndex = questionsData[currentQ][5];
   let wrongs = optionsOnBoard.filter(o => o.index !== correctAnsIndex);
   if (wrongs.length > 0) {
    let toRemove = wrongs[Math.floor(Math.random() * wrongs.length)];
    skippedOptionIndex = toRemove.index;
    optionsOnBoard = optionsOnBoard.filter(o => o.index !== skippedOptionIndex);
    updateWandUI();
   }
  }
 } else if (type === 'book') {
  showAnswerHint = true; updateUI();
 } else if (type === 'pill') {
  if (snake.length > 3) snake = snake.slice(0, Math.max(3, snake.length - 5));
 }
}

function gameLoop(currentTime) {
 if (!isPlaying) return;
 if (currentTime - lastTickTime >= tickSpeed) { lastTickTime = currentTime; updateLogic(); }
 drawCanvas(); if (isPlaying) animationFrameId = requestAnimationFrame(gameLoop);
}

function updateLogic() {
 dx = nextDx; dy = nextDy; inputLocked = false; 
 let head = { x: snake[0].x + dx, y: snake[0].y + dy };
 
 if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) { 
  if (hasHelmet) {
   if (head.x < 0) head.x = TILE_COUNT - 1; else if (head.x >= TILE_COUNT) head.x = 0;
   if (head.y < 0) head.y = TILE_COUNT - 1; else if (head.y >= TILE_COUNT) head.y = 0;
  } else {
   handleDamage("撞牆了！"); return; 
  }
 }

 for (let i = 0; i < snake.length; i++) { if (snake[i].x === head.x && snake[i].y === head.y) { handleDamage("咬到自己了！"); return; } }
 
 let attackChance = 0.05 + ((MAX_BOSS_HP - bossHP) / MAX_BOSS_HP) * 0.15;
 if (Math.random() < attackChance) {
  projectiles.push({ x: Math.floor(Math.random() * TILE_COUNT), y: 0 });
  const bossBar = document.getElementById('boss-bar-container');
  if(bossBar) { bossBar.classList.remove('boss-shake'); void bossBar.offsetWidth; bossBar.classList.add('boss-shake'); }
 }
 
 for (let i = 0; i < projectiles.length; i++) projectiles[i].y += 1;
 projectiles = projectiles.filter(p => p.y < TILE_COUNT);
 
 let hitProjectile = false;
 for (let p of projectiles) {
  if (p.x === head.x && p.y === head.y) hitProjectile = true;
  for (let s of snake) { if (p.x === s.x && p.y === s.y) hitProjectile = true; }
 }
 if (hitProjectile) { handleDamage("被火焰擊中！"); return; }
 
 let hitFoodIndex = -1;
 for (let i = 0; i < optionsOnBoard.length; i++) { if (optionsOnBoard[i].x === head.x && optionsOnBoard[i].y === head.y) { hitFoodIndex = i; break; } }
 
 let hitItemIndex = -1;
 for (let i = 0; i < itemsOnBoard.length; i++) { if (itemsOnBoard[i].x === head.x && itemsOnBoard[i].y === head.y) { hitItemIndex = i; break; } }

 snake.unshift(head);
 
 if (hitFoodIndex !== -1) {
  const correctAnsIndex = questionsData[currentQ][5];
  if (optionsOnBoard[hitFoodIndex].index === correctAnsIndex) { 
   handleCorrectAnswer(); 
  } else { 
   snake.pop(); handleDamage("吃錯了！"); return; 
  }
 } else {
  snake.pop();
  if (hitItemIndex !== -1) {
   let item = itemsOnBoard[hitItemIndex];
   itemsOnBoard.splice(hitItemIndex, 1);
   applyItemEffect(item.type);
  }
 }
}

function handleDamage(reason) {
 if (hasShield) {
  hasShield = false; updateBuffUI(); flashScreen('bg-blue-300'); resetBoardState(); return;
 }

 lives--; updateUI(); flashScreen('bg-red-500');
 if (lives <= 0) { 
  isPlaying = false; 
  const damageDealt = MAX_BOSS_HP - bossHP;
  document.getElementById('end-boss-hp').innerText = bossHP; 
  document.getElementById('damage-dealt').innerText = damageDealt; 
  document.getElementById('modal-gameover').classList.remove('hidden');
  window.parent.postMessage({ type: 'GAME_OVER', score: damageDealt }, '*');
 } else { resetBoardState(); }
}

function handleCorrectAnswer() {
 bossHP -= (hasSword ? 2 : 1); 
 flashScreen('bg-green-500'); tickSpeed = Math.max(125, tickSpeed - 2.5); 
 showAnswerHint = false; 

 const dropRates = { 'heart': 10, 'shield': 10, 'helmet': 10, 'book': 5, 'pill': 5, 'sword': 2, 'wand': 2 };
 let roll = Math.random() * 100;
 let itemToSpawn = null;
 let currentThreshold = 0;
 for (const [item, rate] of Object.entries(dropRates)) {
  currentThreshold += rate;
  if (roll < currentThreshold && rate > 0) {
   itemToSpawn = item; break;
  }
 }
 if (itemToSpawn) spawnItem(itemToSpawn);

 if (bossHP <= 0) { 
  isPlaying = false; updateUI(); 
  document.getElementById('modal-victory').classList.remove('hidden');
  window.parent.postMessage({ type: 'GAME_OVER', score: MAX_BOSS_HP }, '*');
 } else { 
  pickNextQuestion();
  updateUI(); spawnOptions(); 
 }
}

function flashScreen(colorClass) {

function drawCanvas() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 
 ctx.strokeStyle = COLORS.gridLines; ctx.lineWidth = 1;
 for(let i = 0; i <= TILE_COUNT; i++) {
  ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
 }
 
 itemsOnBoard.forEach(item => {
  let icon = '';
  if(item.type === 'heart') icon = '❤️'; if(item.type === 'shield') icon = '🛡️';
  if(item.type === 'helmet') icon = '⛑️'; if(item.type === 'book') icon = '📖';
  if(item.type === 'pill') icon = '💊'; if(item.type === 'sword') icon = '⚔️';
  if(item.type === 'wand') icon = '🪄';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath();
  ctx.arc(item.x * GRID_SIZE + GRID_SIZE/2, item.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 + 2, 0, Math.PI*2); ctx.fill();
  ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(icon, item.x * GRID_SIZE + GRID_SIZE / 2, item.y * GRID_SIZE + GRID_SIZE / 2 + 2);
 });

 optionsOnBoard.forEach(opt => {
  ctx.fillStyle = COLORS.opts[opt.index]; ctx.beginPath();
  ctx.roundRect(opt.x * GRID_SIZE + 1, opt.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(opt.letter, opt.x * GRID_SIZE + GRID_SIZE / 2, opt.y * GRID_SIZE + GRID_SIZE / 2 + 1);
 });

 snake.forEach((segment, index) => {
  ctx.fillStyle = index === 0 ? COLORS.snakeHead : COLORS.snakeBody; ctx.beginPath();
  ctx.roundRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4); ctx.fill();
  if (index === 0) {
   ctx.fillStyle = 'white'; let eye1X, eye1Y, eye2X, eye2Y;
   if (dy === -1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+6; } 
   else if (dy === 1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+14; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+14; } 
   else if (dx === -1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+6; eye2Y = segment.y*GRID_SIZE+14; } 
   else { eye1X = segment.x*GRID_SIZE+14; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+14; } 
   ctx.beginPath(); ctx.arc(eye1X, eye1Y, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(eye2X, eye2Y, 2, 0, Math.PI*2); ctx.fill();
  }
 });

 ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
 projectiles.forEach(p => {
  ctx.shadowColor = 'rgba(239, 68, 68, 0.5)'; ctx.shadowBlur = 5; ctx.fillText('🔥', p.x * GRID_SIZE + GRID_SIZE / 2, p.y * GRID_SIZE + GRID_SIZE / 2 + 2); ctx.shadowBlur = 0; 
 });
}

 updateWandUI();

function updateBuffUI() {

 });

function handleInput(direction) {
 if (inputLocked) return;
 if (direction === 'up' && dy !== 1) { nextDx = 0; nextDy = -1; inputLocked = true; }
 else if (direction === 'down' && dy !== -1) { nextDx = 0; nextDy = 1; inputLocked = true; }
 else if (direction === 'left' && dx !== 1) { nextDx = -1; nextDy = 0; inputLocked = true; }
 else if (direction === 'right' && dx !== -1) { nextDx = 1; nextDy = 0; inputLocked = true; }
}

window.addEventListener('keydown', (e) => {
 if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
 if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') handleInput('up');
 if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') handleInput('down');
 if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') handleInput('left');
 if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') handleInput('right');
});

let touchStartX = 0; let touchStartY = 0;
canvas.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchend', function(e) {
 let deltaX = e.changedTouches[0].screenX - touchStartX;
 let deltaY = e.changedTouches[0].screenY - touchStartY;
 if(Math.abs(deltaX) > Math.abs(deltaY)) { if(Math.abs(deltaX) > 25) handleInput(deltaX > 0 ? 'right' : 'left'); } 
 else { if(Math.abs(deltaY) > 25) handleInput(deltaY > 0 ? 'down' : 'up'); }
 e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});

    const App = () => {

      const [currentUser, setCurrentUser] = useState(() => { const saved = localStorage.getItem('k_active_user'); return saved ? JSON.parse(saved) : null; });

      const [fbReady, setFbReady] = useState(false);

      const [completedZones, setCompletedZones] = useState([]);

      const logout = () => { 
        setCurrentUser(null); setIsManager(false); setIsSuperAdmin(false); setCurrentPage('auth'); 
        localStorage.removeItem('k_active_user');

      const triggerNotify = useCallback((msg, type = "info") => {
        const id = Date.now(); setNotifications(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
      }, []);

      const openAnnouncement = (a) => {
        setActiveAnnouncement(a);
        const readBy = a.readBy || [];
        if (currentUser && !readBy.includes(currentUser.name)) {
          const newReadBy = [...readBy, currentUser.name];
          
          // 更新新的獨立文件結構
          db.collection(getPublicPath(`announcements/branch_${currentBranch}/items`)).doc(String(a.id)).set({ readBy: newReadBy }, { merge: true });
          
          // 為了向下相容，也同步更新舊版陣列中的已讀狀態
          db.doc(getPublicPath(`announcements/branch_${currentBranch}`)).get().then(doc => {
            if(doc.exists && doc.data().items) {
              const items = doc.data().items;
              const idx = items.findIndex(i => String(i.id) === String(a.id));
              if(idx > -1) {
                items[idx].readBy = newReadBy;
