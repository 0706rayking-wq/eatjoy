<!DOCTYPE html>
<html lang="zh-TW" style="overflow-x:hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饗麻饗辣廚房OS</title>
    <!-- 引入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            // 改為動態 CSS 變數，支援透過透明度語法 (如 bg-brand-red/20) 使用
                            red: 'rgb(var(--brand-red) / <alpha-value>)',
                            dark: 'rgb(var(--brand-red) / <alpha-value>)', 
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 截圖轉圖片套件 (用於下載班表) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK (相容模式 v8) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        /* ═══ CSS Variables 預設值（由 JS 主題切換覆蓋）═══ */
        :root {
            --brand-red: 185 18 27;
            --app-bg: #f8fafc;
            --accent: rgb(185,18,27);
            --accent-10: rgba(185,18,27,0.15);
            --accent-20: rgba(185,18,27,0.25);
            --accent-30: rgba(185,18,27,0.40);
            --leather-deep:   #f8fafc;
            --leather-base:   #f8fafc;
            --leather-mid:    #ffffff;
            --leather-light:  #f8fafc;
            --leather-lift:   #f1f5f9;
            --leather-hover:  #e2e8f0;
            --gold-bright:    #b9121b;
            --gold-mid:       #b9121b;
            --gold-dim:       #b9121b;
            --gold-shadow:    #b9121b;
            --gold-glow:      rgba(185,18,27,0.2);
            --gold-subtle:    rgba(185,18,27,0.08);
            --gold-border:    rgba(185,18,27,0.25);
            --gold-gradient:  linear-gradient(135deg,#b9121b,#b9121b);
            --gold-gradient-h:linear-gradient(90deg,#b9121b,#b9121b);
            --t1: #1e293b;
            --t2: #475569;
            --t3: #94a3b8;
            --t4: #cbd5e1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', serif;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--leather-base, #f8fafc);
            color: var(--t1, #1e293b);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ══ SCHEDULE 完全隔離主題（強制白色底） ══ */

        /* Step1：所有子元素先清空背景、還原顏色 */
        #schedule-root,
        #schedule-root *:not(table):not(thead):not(tbody):not(tfoot):not(tr):not(td):not(th) {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
            color: #1e293b !important;
        }

        /* Step2：容器本身白底 */
        #schedule-root {
            background: #f8fafc !important;
            background-color: #f8fafc !important;
            color: #1e293b !important;
            font-family: 'Noto Sans TC', sans-serif !important;
        }

        /* Step3：所有 td/th 強制白底黑字 */
        #schedule-root table td,
        #schedule-root table th {
            background: #ffffff !important;
            background-color: #ffffff !important;
            color: #1e293b !important;
        }

        /* Step4：特殊格子顏色（覆蓋 Step3） */
        #schedule-root table td.sc-weekend,
        #schedule-root table th.sc-weekend  { background: #fed7d7 !important; background-color: #fed7d7 !important; color: #9f1239 !important; }
        #schedule-root table td.sc-red-hol,
        #schedule-root table th.sc-red-hol  { background: #fca5a5 !important; background-color: #fca5a5 !important; color: #7f1d1d !important; }
        #schedule-root table td.sc-gray-hol,
        #schedule-root table th.sc-gray-hol { background: #e2e8f0 !important; background-color: #e2e8f0 !important; color: #334155 !important; }
        #schedule-root table td.sc-white,
        #schedule-root table th.sc-white    { background: #ffffff !important; background-color: #ffffff !important; color: #1e293b !important; }
        #schedule-root table td.sc-yellow,
        #schedule-root table th.sc-yellow   { background: #fde047 !important; background-color: #fde047 !important; color: #713f12 !important; }

        /* Step5：表頭顏色 */
        #schedule-root table th.sc-hdr-wknd  { background: #fecdd3 !important; background-color: #fecdd3 !important; color: #9f1239 !important; }
        #schedule-root table th.sc-hdr-red   { background: #fca5a5 !important; background-color: #fca5a5 !important; color: #7f1d1d !important; }
        #schedule-root table th.sc-hdr-gray  { background: #e2e8f0 !important; background-color: #e2e8f0 !important; color: #334155 !important; }
        #schedule-root table th.sc-hdr-plain { background: #f1f5f9 !important; background-color: #f1f5f9 !important; color: #1e293b !important; }

        /* Step6：職稱/姓名欄：CSS var 控制顏色（由 React 傳入） */
        #schedule-root table td.title-cell,
        #schedule-root table td.name-cell {
            background-color: var(--cell-bg, #f8fafc) !important;
            color: var(--cell-color, #1e293b) !important;
        }

        /* Step7：input/select 透明 */
        #schedule-root input,
        #schedule-root textarea,
        #schedule-root select {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
            color: inherit !important;
            border-color: transparent !important;
        }

        /* Step8：特定元件固定顏色 */
        #schedule-root .bg-emerald-500 { background: #10b981 !important; background-color: #10b981 !important; color: #ffffff !important; }
        #schedule-root .bg-red-500     { background: #ef4444 !important; background-color: #ef4444 !important; color: #ffffff !important; }
        #schedule-root .bg-slate-800,
        #schedule-root .bg-slate-900   { background: #1e293b !important; background-color: #1e293b !important; color: #ffffff !important; }
        #schedule-root .bg-yellow-300  { background: #fde047 !important; background-color: #fde047 !important; }
        #schedule-root .bg-white\/80  { background: rgba(255,255,255,.9) !important; }

        /* Step9：文字顏色 */
        #schedule-root .text-slate-800,
        #schedule-root .text-slate-900 { color: #1e293b !important; }
        #schedule-root .text-slate-700  { color: #334155 !important; }
        #schedule-root .text-slate-600  { color: #475569 !important; }
        #schedule-root .text-slate-500  { color: #64748b !important; }
        #schedule-root .text-slate-400  { color: #94a3b8 !important; }
        #schedule-root .text-white      { color: #ffffff !important; }
        #schedule-root .text-brand-red,
        #schedule-root .text-red-700,
        #schedule-root .text-red-600    { color: #b9121b !important; }
        #schedule-root .text-emerald-700 { color: #047857 !important; }

        /* Step10：border */
        #schedule-root .border-slate-200  { border-color: #e2e8f0 !important; }
        #schedule-root .border-slate-500   { border-color: #64748b !important; }
        #schedule-root .border-brand-red   { border-color: #b9121b !important; }
        #schedule-root .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,.05) !important; }


        /* Emerald → 翠玉色 */
        .text-emerald-600, .text-emerald-700 { color: #6ee7b7 !important; }
        .bg-emerald-600    { background-color: #064e3b !important; }
        .bg-emerald-50     { background-color: rgba(6,78,59,0.3) !important; }
        .border-l-emerald-500 { border-left-color: #34d399 !important; }
        .border-emerald-100,.border-emerald-200 { border-color: rgba(52,211,153,0.3) !important; }

        /* Blue → 寶石藍 */
        .text-blue-500,.text-blue-600,.text-blue-700,.text-blue-800 { color: #93c5fd !important; }
        .bg-blue-500, .bg-blue-600 { background-color: #1e3a8a !important; }
        .bg-blue-50, .border-blue-200 { background-color: rgba(30,58,138,0.25) !important; border-color: rgba(147,197,253,0.3) !important; }
        .bg-blue-800 { background-color: #1e3a5f !important; }
        .border-l-blue-500 { border-left-color: #93c5fd !important; }
        .shadow-blue-500\/10, .shadow-blue-600\/20 { box-shadow: 0 4px 16px -4px rgba(30,58,138,0.4) !important; }

        /* Orange/Amber → 暖銅色 */
        .text-orange-600   { color: #fbbf24 !important; }
        .bg-orange-50      { background-color: rgba(120,53,15,0.3) !important; }
        .border-orange-100,.border-orange-200 { border-color: rgba(251,191,36,0.3) !important; }
        .text-amber-600,.text-amber-700 { color: #fcd34d !important; }

        /* Yellow highlight */
        .bg-yellow-400     { background-color: #d97706 !important; }
        .text-yellow-900   { color: #451a03 !important; }

        /* Red */
        .text-red-500,.text-red-600 { color: #fca5a5 !important; }
        .bg-red-50         { background-color: rgba(127,29,29,0.3) !important; }
        .border-red-100    { border-color: rgba(252,165,165,0.25) !important; }

        /* Modal overlays */
        .bg-slate-900\/60 { background-color: rgba(20,4,6,0.78) !important; }
        .bg-slate-900\/80 { background-color: rgba(20,4,6,0.88) !important; }

        /* Shadows */
        .shadow-sm  { box-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 6px var(--gold-subtle) !important; }
        .shadow-md  { box-shadow: 0 3px 12px rgba(0,0,0,0.6), 0 0 8px var(--gold-subtle) !important; }
        .shadow-lg  { box-shadow: 0 6px 20px rgba(0,0,0,0.65), 0 0 16px var(--gold-subtle) !important; }
        .shadow-xl  { box-shadow: 0 10px 32px rgba(0,0,0,0.7), 0 0 20px var(--gold-subtle) !important; }
        .shadow-2xl { box-shadow: 0 18px 48px rgba(0,0,0,0.75), 0 0 30px var(--gold-subtle) !important; }
        .shadow-inner { box-shadow: inset 0 2px 8px rgba(0,0,0,0.55) !important; }

        /* Backdrop */
        .backdrop-blur-md, .backdrop-blur-sm {
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px);
        }

        /* theme-dark compat */
        body.theme-dark .glass-panel   { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; border-color: var(--gold-border) !important; }
        body.theme-dark .input-light   { background: var(--leather-deep) !important; color: var(--t1) !important; border-color: var(--gold-border) !important; }
        body.theme-dark input, body.theme-dark textarea, body.theme-dark select { background: var(--leather-deep) !important; color: var(--t1) !important; }
        body.theme-dark .bg-white      { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; }
        body.theme-dark .bg-white\/95,
        body.theme-dark .bg-white\/90,
        body.theme-dark .bg-white\/80  { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; }
        body.theme-dark .bg-slate-50   { background-color: var(--leather-base) !important; }
        body.theme-dark .bg-slate-100  { background-color: var(--leather-mid) !important; }

        /* ─── 深色主題：文字顏色全面覆蓋 ─── */
        body.theme-dark .text-slate-900,
        body.theme-dark .text-slate-800 { color: var(--t1) !important; }
        body.theme-dark .text-slate-700,
        body.theme-dark .text-slate-600 { color: var(--t2) !important; }
        body.theme-dark .text-slate-500,
        body.theme-dark .text-slate-400 { color: var(--t3) !important; }
        body.theme-dark .text-slate-300 { color: var(--t4) !important; }

        /* ─── 深色主題：公告/卡片區塊背景 ─── */
        body.theme-dark .bg-rose-50\/80, body.theme-dark .bg-rose-50\/50,
        body.theme-dark .bg-emerald-50\/50, body.theme-dark .bg-indigo-50\/50,
        body.theme-dark .bg-blue-50\/50, body.theme-dark .bg-yellow-50\/50,
        body.theme-dark .bg-rose-50, body.theme-dark .bg-emerald-50, body.theme-dark .bg-emerald-100,
        body.theme-dark .bg-blue-50, body.theme-dark .bg-indigo-50 {
            background-color: var(--leather-lift) !important;
            border-color: var(--gold-border) !important;
        }

        /* ─── 深色主題：border 顏色 ─── */
        body.theme-dark .border-slate-200,
        body.theme-dark .border-slate-100 { border-color: var(--gold-border) !important; }

        /* ═══════════════════════════════════════════════════════
           COMPONENT ENHANCEMENTS — 純 CSS，不動 JSX
        ═══════════════════════════════════════════════════════ */

        /* ── Header → 深皮革頂欄 + 金底線 ── */
        header.sticky {
            background: linear-gradient(180deg, var(--leather-deep) 0%, rgba(42,5,8,0.95) 100%) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--gold-border) !important;
            box-shadow: 0 2px 16px rgba(0,0,0,0.6), 0 1px 0 var(--gold-glow) !important;
        }

        /* ── Logo icon → 金色印章 ── */
        .bg-brand-red.rounded-xl.flex.items-center.justify-center.text-white {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            box-shadow: 0 3px 12px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.2) !important;
        }

        /* ── 主要按鈕 → 金色漸層 ── */
        button.bg-brand-red, a.bg-brand-red {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            font-weight: 900 !important;
            box-shadow: 0 4px 16px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.2) !important;
            border: 1px solid var(--gold-bright) !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        button.bg-brand-red:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px var(--gold-glow) !important;
        }

        /* ── Ghost buttons → 皮革鏤空 ── */
        button.bg-slate-100 {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            color: var(--t2) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,200,80,0.08) !important;
        }
        button.bg-slate-100:hover { background: linear-gradient(145deg, var(--leather-hover), var(--leather-lift)) !important; }

        /* bg-slate-900 buttons */
        button.bg-slate-900 {
            background: linear-gradient(145deg, var(--leather-base), var(--leather-deep)) !important;
            color: var(--t1) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* Emerald/Blue/Indigo action buttons */
        button.bg-emerald-600 { background: linear-gradient(135deg, #064e3b, #065f46) !important; color: #6ee7b7 !important; border: 1px solid rgba(52,211,153,0.4) !important; }
        button.bg-blue-500, button.bg-blue-600 { background: linear-gradient(135deg, #1e3a8a, #1d4ed8) !important; color: #bfdbfe !important; border: 1px solid rgba(147,197,253,0.3) !important; }
        button.bg-indigo-600 { background: linear-gradient(135deg, #312e81, #3730a3) !important; color: #c7d2fe !important; border: 1px solid rgba(199,210,254,0.3) !important; }

        /* ── Nav cards → 皮革鑲嵌卡片 ── */
        .rounded-\[2\.5rem\].border.border-slate-100.shadow-sm,
        .rounded-\[2rem\].border.border-slate-100.shadow-sm {
            background: linear-gradient(145deg, var(--leather-light) 0%, var(--leather-mid) 100%) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,200,80,0.1), 0 0 8px var(--gold-subtle) !important;
            position: relative;
        }

        /* ── 進度條 → 金色流光 ── */
        .bg-brand-red.opacity-80 {
            background: var(--gold-gradient-h) !important;
            opacity: 1 !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }
        .bg-brand-red.h-full {
            background: var(--gold-gradient-h) !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }
        .bg-slate-100.h-3\.5 {
            background: var(--leather-deep) !important;
            border: 1px solid var(--gold-shadow) !important;
        }

        /* ── Tab bars → 皮革切換欄 ── */
        .flex.bg-slate-100.p-1\.5,
        .flex.bg-\[\#f1f5f9\].p-1\.5 {
            background: linear-gradient(145deg, var(--leather-deep), var(--leather-base)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4) !important;
        }
        button.bg-brand-red.shadow-md {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            box-shadow: 0 2px 8px var(--gold-glow) !important;
        }
        .flex.bg-\[\#f1f5f9\] button.bg-white,
        .flex.bg-slate-100 button.bg-white {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* Auth tabs active */
        button.bg-white.shadow-sm.text-brand-red {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            color: var(--gold-bright) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* ── Auth card ── */
        .glass-panel.p-6.rounded-\[2rem\],
        .glass-panel.p-6.sm\:p-8.rounded-\[2rem\] {
            background: linear-gradient(160deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--gold-subtle) !important;
        }

        /* ── Toast → 金邊通知 ── */
        .toast-enter.glass-panel {
            background: linear-gradient(135deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-mid) !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7), 0 0 20px var(--gold-glow) !important;
        }

        /* ── Modals → 皮革彈窗 ── */
        .bg-white.rounded-\[2\.5rem\],
        .bg-white.rounded-\[2rem\] {
            background: linear-gradient(160deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.75), 0 0 30px var(--gold-subtle) !important;
        }

        /* ── Section item active ── */
        .glass-panel:active {
            background: linear-gradient(145deg, var(--leather-hover), var(--leather-lift)) !important;
        }

        /* ── Table → 皮革表格 ── */
        table { border-collapse: collapse; }
        th {
            background: linear-gradient(180deg, var(--leather-base), var(--leather-deep)) !important;
            color: var(--t2) !important;
            border-color: var(--gold-border) !important;
        }
        td { border-color: rgba(212,160,23,0.2) !important; }

        /* ── 公告未讀點 → 金色脈衝 ── */
        .bg-brand-red.animate-pulse {
            background: var(--gold-bright) !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }

        /* ── 公告未讀邊框 ── */
        .border-brand-red\/30 { border-color: var(--gold-border) !important; }

        /* ── Ordering items ── */
        .bg-slate-50.rounded-2xl { background-color: var(--leather-base) !important; }

        /* ── 金色標題文字效果 ── */
        h1, h2 {
            font-family: 'Noto Serif TC', 'Noto Sans TC', serif;
        }

        /* ── 金色光暈動畫（裝飾用） ── */
        @keyframes goldShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .text-brand-red {
            background: var(--gold-gradient-h);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShimmer 4s linear infinite;
        }

        /* ── 特殊：bg-brand-red.text-white 修正 ── */
        .bg-brand-red { color: var(--leather-deep) !important; }
        .bg-brand-red * { color: var(--leather-deep) !important; }
        .bg-brand-red.text-white { color: var(--leather-deep) !important; }

        /* ── 跑馬燈 ── */
        .ticker-wrap { overflow: hidden; width: 100%; }
        .ticker-move {
            display: inline-flex;
            white-space: nowrap;
            animation: tickerScroll 18s linear infinite;
            min-width: 200%;
        }
        .ticker-wrap:hover .ticker-move { animation-play-state: paused; }
        @keyframes tickerScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(20px); }

     return new Promise((resolve) => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width; let height = img.height;
        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
     });

    const UniversalListManager = ({ categoryPath, currentBranch, globalBranches, isSuperAdmin, items = [], titleLabel = "名稱", triggerNotify, getPublicPath, categories = null }) => {
     const [newT, setNewT] = useState(''); 
     const [newC, setNewC] = useState(''); 
     const [newI, setNewI] = useState(null);
     const [newCat, setNewCat] = useState(categories ? categories[0] : '');
     const [editingId, setEditingId] = useState(null);
     const [syncToAll, setSyncToAll] = useState(false);

     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);

     const startEdit = (item) => {
      setEditingId(item.id);
      setNewT(item.title);
      setNewC(item.content || '');
      setNewI(item.img || null);
      if (categories) setNewCat(item.category || categories[0]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
     };

     const cancelEdit = () => {
      setEditingId(null); setNewT(''); setNewC(''); setNewI(null);
      if (categories) setNewCat(categories[0]);
     };

     const handleSave = async () => {
      if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
      let imgToSave = newI; 
      if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const sharedId = editingId ? String(editingId) : crypto.randomUUID();
      const now = Date.now();

      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
         if (!editingId) {
           itemData.timestamp = now;
           itemData.sortOrder = items.length; // 預設放在最後面
         }
         if (categories) itemData.category = newCat;

         const colPath = getPublicPath(`${categoryPath}_${branch}/items`);
         return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
        }));
        triggerNotify(editingId ? "更新成功" : "發佈成功", "success");
        cancelEdit();
      } catch (e) { triggerNotify("存檔失敗 (可能是圖片太大)", "error"); }
     };

     const deleteItem = async (id) => {
      const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該項目。" : "確定要刪除嗎？");
      if(!isConfirmed) return;

      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const idStr = String(id);
         await db.collection(getPublicPath(`${categoryPath}_${branch}/items`)).doc(idStr).delete();
         
         const oldDocRef = db.doc(getPublicPath(`${categoryPath}_${branch}`));
         const oldSnap = await oldDocRef.get();
         if(oldSnap.exists && oldSnap.data().items) {
           const newItems = oldSnap.data().items.filter(i => String(i.id) !== idStr);
           await oldDocRef.set({ items: newItems });

        const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
        const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
        
        if (fromIndex !== -1 && toIndex !== -1) {
         const [movedItem] = newItems.splice(fromIndex, 1);
         newItems.splice(toIndex, 0, movedItem);

         try {
           const batch = db.batch();
           newItems.forEach((item, index) => {
            const docRef = db.collection(getPublicPath(`${categoryPath}_${currentBranch}/items`)).doc(String(item.id));

    const AnnouncementAdminManager = ({ currentBranch, globalBranches, isSuperAdmin, announcements, triggerNotify, getPublicPath }) => {

     const [newC, setNewC] = useState('');
     const [newI, setNewI] = useState(null);
     const [editingId, setEditingId] = useState(null);
     const [syncToAll, setSyncToAll] = useState(false);
     
     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);

     const startEdit = (item) => {
      setEditingId(item.id); setNewT(item.title); setNewC(item.content || ''); setNewI(item.img || null);
      window.scrollTo({ top: 0, behavior: 'smooth' });
     };
     const cancelEdit = () => { setEditingId(null); setNewT(''); setNewC(''); setNewI(null); };

     const handleSave = async () => {
      if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
      let imgToSave = newI;
      if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const sharedId = editingId ? String(editingId) : crypto.randomUUID();
      const now = Date.now();

      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
         if (!editingId) {
           itemData.timestamp = now;
           itemData.readBy = [];
           itemData.sortOrder = announcements.length;
         }
         const colPath = getPublicPath(`announcements/branch_${branch}/items`);
         return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
        }));

        if (!editingId && syncToAll === false) {
         triggerLineAlert("ANNOUNCEMENT", { branch: currentBranch, title: newT.trim(), content: newC.trim() });
        } else if (!editingId && syncToAll) {
         targetBranches.forEach(b => triggerLineAlert("ANNOUNCEMENT", { branch: b, title: newT.trim(), content: newC.trim() }));
        }

        triggerNotify(editingId ? "公告已更新" : "公告已發佈", "success");
        cancelEdit();
      } catch (e) { triggerNotify("儲存失敗", "error"); }
     };

     const deleteItem = async (id) => {
      const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該公告。" : "確定要刪除嗎？");

      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];

        await Promise.all(targetBranches.map(async (branch) => {
         const idStr = String(id);

         const oldDocRef = db.doc(getPublicPath(`announcements/branch_${branch}`));

         if(oldSnap.exists && oldSnap.data().items) {
           await oldDocRef.set({ items: oldSnap.data().items.filter(i => String(i.id) !== idStr) });

    const SignaturePad = ({ onSave }) => {
     const canvasRef = useRef(null);
     const [isDrawing, setIsDrawing] = useState(false);
     const getPos = (e) => {
      const rect = canvasRef.current.getBoundingClientRect();
      const clientX = (e.clientX || (e.touches && e.touches[0].clientX));
      const clientY = (e.clientY || (e.touches && e.touches[0].clientY));
      const x = (clientX - rect.left) * (canvasRef.current.width / rect.width);
      const y = (clientY - rect.top) * (canvasRef.current.height / rect.height);
      return { x, y };
     };
     const startDrawing = (e) => {
      if (e.type === 'touchstart') e.preventDefault();
      const pos = getPos(e);
      const ctx = canvasRef.current.getContext('2d');
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
      ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
      setIsDrawing(true);
     };
     const draw = (e) => {
      if (!isDrawing) return;
      const pos = getPos(e);
      const ctx = canvasRef.current.getContext('2d');
      ctx.lineTo(pos.x, pos.y); ctx.stroke();
     };
     return (
      <div className="glass-panel p-6 rounded-[2.5rem] mt-8 bg-white border border-slate-200 text-center shadow-lg">
        <h4 className="font-black text-slate-800 mb-4 flex items-center justify-center gap-2 font-bold"><Icon name="pen-tool" size={18} className="text-brand-red" />確認閱讀完畢並簽名</h4>
        <canvas ref={canvasRef} width={600} height={300} className="signature-canvas mb-4 mx-auto shadow-inner" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={()=>setIsDrawing(false)} onMouseLeave={()=>setIsDrawing(false)} onTouchStart={startDrawing} onTouchEnd={()=>setIsDrawing(false)} onTouchMove={draw}></canvas>
        <div className="flex gap-3">
         <button onClick={() => canvasRef.current.getContext('2d').clearRect(0,0,600,300)} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs uppercase">重寫</button>
         <button onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-[2] py-3 rounded-xl bg-brand-red text-white font-black text-xs uppercase active:scale-95 transition-all">提交簽署</button>
        </div>
      </div>
     );
    };

     const activeMonthData = scheduleData.months?.[monthKey] || null;

     const staffList = useMemo(() => {
      if (activeMonthData && activeMonthData.staffList) return activeMonthData.staffList;
      if (scheduleData.months) {
        const pastMonths = Object.keys(scheduleData.months)
         .filter(k => k < monthKey)
         .sort((a, b) => b.localeCompare(a));
        if (pastMonths.length > 0) {
         const latestPastMonth = pastMonths[0];
         return (scheduleData.months[latestPastMonth].staffList || []).map(s => ({...s, shifts: {}}));
        }
      }
      return scheduleData.staffList || []; 
     }, [activeMonthData, scheduleData.months, scheduleData.staffList, monthKey]);

     const holidays = useMemo(() => {
      if (activeMonthData && activeMonthData.holidays) return activeMonthData.holidays;
      if (!scheduleData.months) return scheduleData.holidays || {};
      return {};
     }, [activeMonthData, scheduleData.months, scheduleData.holidays]);

     const getHolidayData = useCallback((dateString) => {
      const h = holidays[dateString];
      if (!h) return null;
      if (typeof h === 'string') return { text: h, isRed: true };
      return h;
     }, [holidays]);

     const updateData = (updates) => {
      if (!isManager) return;
      db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`)).set(updates, { merge: true });
     };

     const updateMonthData = async (updateCallback) => {
      if (!isManager) return;
      const docRef = db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`));

      try {
        await db.runTransaction(async (transaction) => {
         const docSnap = await transaction.get(docRef);
     
         if (!docSnap.exists) {
           const currentMonthData = { staffList: [], holidays: {} };
           const updatedMonthData = updateCallback(currentMonthData);
           const finalMonthData = { ...currentMonthData, ...updatedMonthData };
      
           transaction.set(docRef, {
            shiftRules: defaultShiftRules,
            roleColors: {},
            months: { [monthKey]: finalMonthData }
           });
           return; // 直接寫入並結束，不報錯
         }

         const data = docSnap.data();
         const currentMonthData = (data.months && data.months[monthKey]) 
           ? data.months[monthKey] 
           : { staffList: [], holidays: {} };
     
         const updatedMonthData = updateCallback(currentMonthData);
         const finalMonthData = { ...currentMonthData, ...updatedMonthData };

         if (data.months === undefined) {
           transaction.set(docRef, {
            months: { [monthKey]: finalMonthData }
           }, { merge: true });
         } 
         else {
           transaction.update(docRef, {
            [`months.${monthKey}`]: finalMonthData
           });
         }
        });
      } catch (e) {
        console.error("更新班表失敗: ", e);
        triggerNotify("排班儲存異常，請稍後再試", "error");
      }
     };

     const setShiftRules = (newRules) => updateData({ shiftRules: newRules });
     const addShiftRule = () => {
      if (!newShiftCode.trim()) return;
      const code = newShiftCode.trim().toUpperCase();
      if (shiftRules.some(r => r.code === code)) return triggerNotify('班別代碼已存在！', 'error');
      setShiftRules([...shiftRules, { code, name: code, type: newShiftType }]);
      setNewShiftCode('');
     };
     const removeShiftRule = (codeToRemove) => setShiftRules(shiftRules.filter(r => r.code !== codeToRemove));

     const daysInMonth = useMemo(() => {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const days = new Date(year, month + 1, 0).getDate();
      return Array.from({ length: days }, (_, i) => {
        const date = new Date(year, month, i + 1);
        return {
         dateNum: i + 1,
         dayOfWeek: ['日', '一', '二', '三', '四', '五', '六'][date.getDay()],
         isWeekend: date.getDay() === 0 || date.getDay() === 6,
         dateString: `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`
        };
      });
     }, [currentDate]);

     const changeMonth = (offset) => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));

     const updateShift = (staffId, dateString, value) => {
      if (!isManager) return;
      const safeValue = value || '';
  
      updateMonthData((latestMonthData) => {
        const currentStaffList = latestMonthData.staffList || [];
        const newStaffList = currentStaffList.map(staff => 
         staff.id === staffId 
           ? { ...staff, shifts: { ...(staff.shifts || {}), [dateString]: safeValue } } 
           : staff
        );
        return { staffList: newStaffList };
      });
     };

     const toggleCellColor = (staffId, dateString) => {
      if (!isManager) return;
      const cellKey = `${staffId}_${dateString}`;
  
      updateMonthData((latestMonthData) => {
        const currentColors = latestMonthData.cellColors || {};
        const newColors = { ...currentColors };
    
        if (newColors[cellKey] === 'bg-yellow-300') {
         delete newColors[cellKey];
        } else {
         newColors[cellKey] = 'bg-yellow-300';
        }
        return { cellColors: newColors };
      });
     };
     const addStaff = () => {
      if (!isManager) return;
      const newId = Date.now().toString(); 
  
      updateMonthData((latestMonthData) => {
        const currentStaffList = latestMonthData.staffList || [];
        return { staffList: [...currentStaffList, { id: newId, title: '新職位', name: '新員工', shifts: {} }] };
      });
     };

     const updateStaffInfo = (id, field, value) => {
      if (!isManager) return;
  
      updateMonthData((latestMonthData) => {
        const currentStaffList = latestMonthData.staffList || [];
        const newStaffList = currentStaffList.map(staff => 
         staff.id === id ? { ...staff, [field]: value } : staff
        );
        return { staffList: newStaffList };
      });
     };

     const removeStaff = (id) => {
      if (!isManager) return;
      if(window.confirm('確定刪除此人員本月班表？')) {
        updateMonthData((latestMonthData) => {
         const currentStaffList = latestMonthData.staffList || [];
         return { staffList: currentStaffList.filter(staff => staff.id !== id) };
        });
      }
     };
     
     const importPreviousData = () => {
      if (!isManager) return;
      
      const pastMonths = scheduleData.months 
        ? Object.keys(scheduleData.months).filter(k => k < monthKey).sort((a, b) => b.localeCompare(a)) 
        : [];

      if (pastMonths.length === 0) {
        triggerNotify("找不到過去的月份資料可供載入", "error");
        return;
      }

      const lastMonthKey = pastMonths[0];
      const lastStaffList = scheduleData.months[lastMonthKey].staffList || [];

      if (lastStaffList.length === 0) {
        triggerNotify(`上個月 (${lastMonthKey}) 沒有人員資料`, "error");
        return;
      }

      if (window.confirm(`確定要載入 ${lastMonthKey} 的人員名單與職位嗎？\n(注意：這會清空當月已排的班表，並套用上月名單)`)) {
        const importedStaff = lastStaffList.map(staff => ({
         ...staff,
         shifts: {} 
        }));

        updateMonthData((latestMonthData) => {
         return { staffList: importedStaff };
        });
        triggerNotify(`已成功載入 ${lastMonthKey} 人員名單！`, "success");
      }
     };

     const openHolidayEdit = (dateString) => {
      if (!isManager) return;
      const h = getHolidayData(dateString);
      setHolidayInputText(h ? h.text : '');
      setHolidayInputIsRed(h ? h.isRed : true);
      setSelectedCell({ type: 'holiday', date: dateString });
     };

     const saveHoliday = (dateString) => {
      if (!isManager) return;
  
      updateMonthData((latestMonthData) => {
        const currentHolidays = latestMonthData.holidays || {};
        const newHolidays = { ...currentHolidays };
    
        if (holidayInputText.trim() === '') {
         delete newHolidays[dateString];
        } else {
         newHolidays[dateString] = { 
           text: holidayInputText.trim(), 
           isRed: holidayInputIsRed 
         };
        }
    
        return { holidays: newHolidays };
      });
  
      setSelectedCell(null);
     };

     const deleteHoliday = (dateString) => {
      if (!isManager) return;
  
      updateMonthData((latestMonthData) => {
        const currentHolidays = latestMonthData.holidays || {};
        const newHolidays = { ...currentHolidays };
        delete newHolidays[dateString];
    
        return { holidays: newHolidays };
      });
  
      setSelectedCell(null);
     };
     const handleDragStart = (id) => { if (!isManager) return; setDraggedStaffId(id); };
     const handleDragOver = (e, id) => { e.preventDefault(); if (!isManager) return; if (id !== draggedStaffId) setOverStaffId(id); };
     const handleDragEnd = () => {
      if (!isManager) return;
      if (draggedStaffId !== null && overStaffId !== null && draggedStaffId !== overStaffId) {
    
        updateMonthData((latestMonthData) => {
         const currentStaffList = latestMonthData.staffList || [];
         const newList = [...currentStaffList];
         const fromIndex = newList.findIndex(s => s.id === draggedStaffId);
         const toIndex = newList.findIndex(s => s.id === overStaffId);

         if (fromIndex !== -1 && toIndex !== -1) {
           const [moved] = newList.splice(fromIndex, 1);
           newList.splice(toIndex, 0, moved);
           return { staffList: newList };
         }
         return {}; // 沒變動就回傳空物件
        });
      }
      setDraggedStaffId(null);
      setOverStaffId(null);
     };

     const calculateOffDays = (shifts = {}) => {
      let count = 0;
      daysInMonth.forEach(day => {
        const code = shifts[day.dateString];
        if (!code) return;
        const rule = shiftRules.find(r => r.code === code);
        if (rule && rule.type === 'off') {
         count++;
        } else if (code === 'X' || code === '/' || code === '特') {
         count++;
        }
      });
      return count;
     };

     const calculateDailyStats = (dateString) => {
      let morning = 0; let evening = 0; let total = 0;
      staffList.forEach(staff => {
        const shifts = staff.shifts || {};
        const shiftCode = shifts[dateString] || '';
        if (shiftCode === '') { morning++; evening++; total++; return; }
        const rule = shiftRules.find(r => r.code === shiftCode);
        if (rule) {
         if (rule.type === 'morning' || rule.type === 'full') morning++;
         if (rule.type === 'evening' || rule.type === 'full') evening++;
         if (rule.type !== 'off') total++;
        } else if (shiftCode !== 'X' && shiftCode !== '/' && shiftCode !== '特') {
         total++;
        }
      });
      return { morning, evening, total };
     };

     const getTitleColorStyle = useCallback((title) => {
      if (!title) return { backgroundColor: '#f8fafc', color: '#64748b' };
      if (roleColors[title]) {
        const bg = roleColors[title];
        const hex = bg.replace('#', '');
        const r = parseInt(hex.substr(0, 2), 16) || 255;
        const g = parseInt(hex.substr(2, 2), 16) || 255;
        const b = parseInt(hex.substr(4, 2), 16) || 255;
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        const text = (yiq >= 128) ? '#1e293b' : '#ffffff';
        return { backgroundColor: bg, color: text };
      }
      const colors = [
        {bg: '#dcfce7', text: '#065f46'}, {bg: '#dbeafe', text: '#3730a3'}, 
        {bg: '#ffedd5', text: '#c2410c'}, {bg: '#fce7f3', text: '#be123c'}, 
        {bg: '#e0e7ff', text: '#3f0071'}, {bg: '#f3e8ff', text: '#4338ca'}, 
        {bg: '#cffafe', text: '#1e40af'}, 
      ];
      let hash = 0;
      for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
      const colorIdx = Math.abs(hash) % colors.length;
      return { backgroundColor: colors[colorIdx].bg, color: colors[colorIdx].text };
     }, [roleColors]);

     const getCellBg = useCallback((dateString, isWeekend) => {
      const h = getHolidayData(dateString);
      if (h && h.isRed) return 'sc-red-hol';
      if (h && !h.isRed) return 'sc-gray-hol';
      if (isWeekend) return 'sc-weekend';
      return 'sc-white';
     }, [getHolidayData]);

     const isRedDay = useCallback((dateString, isWeekend) => {
      const h = getHolidayData(dateString);
      return isWeekend || (h && h.isRed);
     }, [getHolidayData]);

     const getHeaderBg = useCallback((dateString, isWeekend) => {
      const h = getHolidayData(dateString);
      if (h && h.isRed) return 'sc-hdr-red font-black';
      if (h && !h.isRed) return 'sc-hdr-gray font-black';
      if (isWeekend) return 'sc-hdr-wknd font-black';
      return 'sc-hdr-plain font-bold';
     }, [getHolidayData]);

     const handleDownloadImage = async () => {
      if (!tableRef.current) return;
      
      setIsDownloading(true);
      triggerNotify("正在展開表格並準備拍攝，請稍候...", "info");
      
      setTimeout(async () => {
        const target = tableRef.current;
        const parent = target.parentElement;
        
        const originalOverflow = parent.style.overflow;
        const originalWidth = parent.style.width;
        const originalPosition = parent.style.position;
        
        parent.style.overflow = 'visible';
        parent.style.width = 'max-content';
        parent.style.position = 'static';
        
        try {
         const canvas = await window.html2canvas(target, {
           scale: 2, 
           useCORS: true,
           backgroundColor: '#ffffff',
           width: target.scrollWidth,
           height: target.scrollHeight,
           windowWidth: target.scrollWidth,
           windowHeight: target.scrollHeight
         });

         const imgData = canvas.toDataURL('image/jpeg', 0.9);
         
         setPreviewImage(imgData);
         triggerNotify("班表截圖成功！", "success");
        } catch (error) {
         console.error("產生圖片失敗", error);
         triggerNotify("下載圖片失敗，請稍後再試", "error");
        } finally {
         parent.style.overflow = originalOverflow;
         parent.style.width = originalWidth;
         parent.style.position = originalPosition;
         setIsDownloading(false);
        }
      }, 500);
     };

     const handlePrint = () => {
      const monthStr = `${currentDate.getMonth() + 1}月`;
      const yearMonthTitle = `${currentDate.getFullYear()}年 ${monthStr} 班表`;
      
      const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
         <title>${currentBranch} - ${yearMonthTitle}</title>
         <style>
           @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
           @page { size: landscape; margin: 5mm; }
           body { font-family: 'Noto Sans TC', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; color: #1e293b; }
           h1 { text-align: center; font-size: 20px; font-weight: 900; margin-bottom: 12px; color: #b9121b; letter-spacing: 2px; }
           table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
           th, td { border: 1px solid #475569; padding: 2px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 700; }
           .bg-header { background-color: #a7f3d0 !important; font-size: 12px; }
           .bg-header-dark { background-color: #34d399 !important; color: white; font-size: 11px; }
           .bg-weekend { background-color: #ffe4e6 !important; color: #e11d48 !important; }
           .bg-holiday { background-color: #fecaca !important; color: #b91c1c !important; } 
           .text-holiday { color: #b91c1c !important; font-size: 12px; writing-mode: vertical-lr; letter-spacing: 1px; font-weight: 900; margin: 0 auto; padding-top: 2px;}
           .bg-gray { background-color: #f8fafc !important; }
           .bg-dark { background-color: #1e293b !important; color: white !important; font-size: 11px; }
           .bg-orange { background-color: #ffedd5 !important; color: #9a3412 !important; font-size: 11px; }
           .bg-indigo { background-color: #e0e7ff !important; color: #3730a3 !important; font-size: 11px; }
           .print-footer { text-align: right; font-size: 9px; color: #94a3b8; margin-top: 10px; }
         </style>
        </head>
        <body>
         <h1>${currentBranch} - ${yearMonthTitle}</h1>
         <table>
           <colgroup>
            <col style="width: 60px;" />
            <col style="width: 65px;" />
            <col style="width: 28px;" />
            ${daysInMonth.map(() => `<col />`).join('')}
           </colgroup>
           <thead>
            <tr>
              <th colspan="3" class="bg-header">${monthStr}</th>
              ${daysInMonth.map(d => {
               const h = getHolidayData(d.dateString);
               return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : 'bg-gray'))}">${d.dateNum}</th>`;
              }).join('')}
            </tr>
            <tr>
              <th class="bg-header-dark">職稱</th>
              <th class="bg-header-dark">姓名</th>
              <th class="bg-header-dark">休假</th>
              ${daysInMonth.map(d => {
               const h = getHolidayData(d.dateString);
               return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : 'bg-gray'))}">${d.dayOfWeek}</th>`;
              }).join('')}
            </tr>
            <tr>
              <th colspan="3" style="text-align:right; font-size: 9px; color: #94a3b8; font-weight: normal; padding-right: 4px;">特殊節日 ➔</th>
              ${daysInMonth.map(d => {
               const h = getHolidayData(d.dateString);
               return `<th class="${(h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : ''))}" style="height: 60px; vertical-align: top;">
                 ${h ? `<div class="text-holiday" style="${!h.isRed ? 'color:#475569 !important;' : ''}">${h.text}</div>` : ''}
               </th>`;
              }).join('')}
            </tr>
           </thead>
           <tbody>
            ${staffList.map((staff, idx) => {
              const roleStyle = getTitleColorStyle(staff.title);
              return `
              <tr>
               <td style="font-weight:bold; font-size: 11px; background-color: ${roleStyle.backgroundColor} !important; color: ${roleStyle.color} !important;">${staff.title}</td>
               <td class="${idx % 2 === 0 ? 'bg-gray' : ''}" style="font-size: 13px; letter-spacing: 1px;">${staff.name}</td>
               <td class="bg-gray" style="color:#475569; font-size: 11px;">${calculateOffDays(staff.shifts)}</td>
               ${daysInMonth.map(d => {
                 const shift = (staff.shifts || {})[d.dateString] || '';
                 const h = getHolidayData(d.dateString);
                 const cellKey = `${staff.id}_${d.dateString}`;
                 const isHighlighted = (activeMonthData?.cellColors || {})[cellKey] === 'bg-yellow-300';
                 
                 let tdClass = (h && h.isRed) ? 'bg-holiday' : ((h && !h.isRed) ? 'bg-gray' : (d.isWeekend ? 'bg-weekend' : ''));
                 let tdStyle = "text-transform: uppercase; font-size: 10px;";
                 
                 if (isHighlighted) {
                  tdClass = '';
                  tdStyle += " background-color: #fde047 !important;";
                 }
                 
                 return `<td class="${tdClass}" style="${tdStyle}">${shift}</td>`;
               }).join('')}
              </tr>
              `;
            }).join('')}
           </tbody>
           <tfoot>
            <tr>
              <td colspan="3" class="bg-orange" style="text-align: right; padding-right: 4px;">早班總人數</td>
              ${daysInMonth.map(d => `<td class="bg-orange">${calculateDailyStats(d.dateString).morning || ''}</td>`).join('')}
            </tr>
            <tr>
              <td colspan="3" class="bg-indigo" style="text-align: right; padding-right: 4px;">晚班總人數</td>
              ${daysInMonth.map(d => `<td class="bg-indigo">${calculateDailyStats(d.dateString).evening || ''}</td>`).join('')}
            </tr>
            <tr>
              <td colspan="3" class="bg-dark" style="text-align: right; padding-right: 4px;">當日總人數</td>
              ${daysInMonth.map(d => `<td class="bg-dark">${calculateDailyStats(d.dateString).total || ''}</td>`).join('')}
            </tr>
           </tfoot>
         </table>
         <div class="print-footer">EATJOY 廚務管理系統 - 列印時間：${new Date().toLocaleString()}</div>
        </body>
        </html>
      `;
      
      const printWindow = window.open('', '_blank');
      printWindow.document.write(htmlContent);
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => { 
        printWindow.print(); 
        printWindow.close(); 
      }, 500);
     };

     return (
      <div className="page-enter pb-24" id="schedule-root" onClick={() => setSelectedCell(null)}>
        
        <div className="p-3 sm:p-4 border-b bg-[rgba(255,255,255,0.8)] backdrop-blur sticky top-[60px] z-40 shadow-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
         <div className="flex items-center gap-3 w-full md:w-auto">
           <button onClick={onBack} className="p-2 sm:p-2.5 glass-panel rounded-xl sm:rounded-2xl border border-[#cbd5e1] active:scale-90 transition-all bg-[#ffffff] shadow-sm shrink-0"><Icon name="arrow-left" size={20}/></button>
           <h2 className="text-lg sm:text-xl font-black text-[#1e293b] tracking-tighter truncate">{currentBranch} <span className="text-brand-red">排班系統</span></h2>
         </div>
         <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
           <button onClick={handleDownloadImage} disabled={isDownloading} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#3b82f6] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap disabled:opacity-50">
            <Icon name="image" size={14} /> {isDownloading ? "處理中" : "存為圖片"}
           </button>
           <button onClick={handlePrint} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#059669] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
            <Icon name="printer" size={14} /> 列印
           </button>
           {isManager && (
            <>
              <button onClick={importPreviousData} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#4f46e5] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap">
               <Icon name="copy" size={14} /> 載入上月
              </button>
              <button onClick={() => setIsHighlightMode(!isHighlightMode)} className={`flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap ${isHighlightMode ? 'bg-yellow-400 text-[#713f12] border border-[#eab308] shadow-inner' : 'bg-[#f1f5f9] text-[#334155] border border-[#cbd5e1]'}`}>
               <Icon name="edit-3" size={14} /> {isHighlightMode ? '結束標記' : '標記修改'}
              </button>
              <button onClick={addStaff} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#1e293b] text-[#ffffff] rounded-xl active:scale-95 transition-all shadow-sm text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="plus" size={14} /> 新增</button>
              <button onClick={() => setShowSettings(!showSettings)} className="flex-1 md:flex-none justify-center flex items-center gap-1.5 px-3 py-2 sm:py-2.5 bg-[#f1f5f9] text-[#334155] rounded-xl border border-[#cbd5e1] active:scale-95 transition-all text-xs sm:text-sm font-bold whitespace-nowrap"><Icon name="settings" size={14} /> 設定</button>
            </>
           )}
         </div>
        </div>

         htmlContent += `<p class="rule-desc" style="padding-left:10px;">目前尚無守則內容</p>`;
        } else {
         catRules.forEach((rule, idx) => {
           htmlContent += `
            <div class="rule-item">
              <div class="rule-title">${idx + 1}. ${rule.title}</div>

         </div>

     return (

           {RULE_CATEGORIES.map(cat => (
            <button key={cat} onClick={() => setActiveTab(cat)} className={`shrink-0 px-5 py-2.5 rounded-2xl text-xs font-black border transition-all ${activeTab === cat ? 'bg-brand-red text-white border-brand-red shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}>{cat}</button>

           <RuleStandardBlock key={item.id || idx} id={idx + 1} title={item.title} desc={item.content} img={item.img} />
