<!DOCTYPE html>
<html lang="zh-TW" style="overflow-x:hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饗麻饗辣廚房OS</title>
    <!-- 引入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            // 改為動態 CSS 變數，支援透過透明度語法 (如 bg-brand-red/20) 使用
                            red: 'rgb(var(--brand-red) / <alpha-value>)',
                            dark: 'rgb(var(--brand-red) / <alpha-value>)', 
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 截圖轉圖片套件 (用於下載班表) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK (相容模式 v8) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        /* ═══ CSS Variables 預設值（由 JS 主題切換覆蓋）═══ */
        :root {
            --brand-red: 185 18 27;
            --app-bg: #f8fafc;
            --accent: rgb(185,18,27);
            --accent-10: rgba(185,18,27,0.15);
            --accent-20: rgba(185,18,27,0.25);
            --accent-30: rgba(185,18,27,0.40);
            --leather-deep:   #f8fafc;
            --leather-base:   #f8fafc;
            --leather-mid:    #ffffff;
            --leather-light:  #f8fafc;
            --leather-lift:   #f1f5f9;
            --leather-hover:  #e2e8f0;
            --gold-bright:    #b9121b;
            --gold-mid:       #b9121b;
            --gold-dim:       #b9121b;
            --gold-shadow:    #b9121b;
            --gold-glow:      rgba(185,18,27,0.2);
            --gold-subtle:    rgba(185,18,27,0.08);
            --gold-border:    rgba(185,18,27,0.25);
            --gold-gradient:  linear-gradient(135deg,#b9121b,#b9121b);
            --gold-gradient-h:linear-gradient(90deg,#b9121b,#b9121b);
            --t1: #1e293b;
            --t2: #475569;
            --t3: #94a3b8;
            --t4: #cbd5e1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', serif;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--leather-base, #f8fafc);
            color: var(--t1, #1e293b);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ══ SCHEDULE 完全隔離主題（強制白色底） ══ */

        /* Step1：所有子元素先清空背景、還原顏色 */
        #schedule-root,
        #schedule-root *:not(table):not(thead):not(tbody):not(tfoot):not(tr):not(td):not(th) {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
            color: #1e293b !important;
        }

        /* Step2：容器本身白底 */
        #schedule-root {
            background: #f8fafc !important;
            background-color: #f8fafc !important;
            color: #1e293b !important;
            font-family: 'Noto Sans TC', sans-serif !important;
        }

        /* Step3：所有 td/th 強制白底黑字 */
        #schedule-root table td,
        #schedule-root table th {
            background: #ffffff !important;
            background-color: #ffffff !important;
            color: #1e293b !important;
        }

        /* Step4：特殊格子顏色（覆蓋 Step3） */
        #schedule-root table td.sc-weekend,
        #schedule-root table th.sc-weekend  { background: #fed7d7 !important; background-color: #fed7d7 !important; color: #9f1239 !important; }
        #schedule-root table td.sc-red-hol,
        #schedule-root table th.sc-red-hol  { background: #fca5a5 !important; background-color: #fca5a5 !important; color: #7f1d1d !important; }
        #schedule-root table td.sc-gray-hol,
        #schedule-root table th.sc-gray-hol { background: #e2e8f0 !important; background-color: #e2e8f0 !important; color: #334155 !important; }
        #schedule-root table td.sc-white,
        #schedule-root table th.sc-white    { background: #ffffff !important; background-color: #ffffff !important; color: #1e293b !important; }
        #schedule-root table td.sc-yellow,
        #schedule-root table th.sc-yellow   { background: #fde047 !important; background-color: #fde047 !important; color: #713f12 !important; }

        /* Step5：表頭顏色 */
        #schedule-root table th.sc-hdr-wknd  { background: #fecdd3 !important; background-color: #fecdd3 !important; color: #9f1239 !important; }
        #schedule-root table th.sc-hdr-red   { background: #fca5a5 !important; background-color: #fca5a5 !important; color: #7f1d1d !important; }
        #schedule-root table th.sc-hdr-gray  { background: #e2e8f0 !important; background-color: #e2e8f0 !important; color: #334155 !important; }
        #schedule-root table th.sc-hdr-plain { background: #f1f5f9 !important; background-color: #f1f5f9 !important; color: #1e293b !important; }

        /* Step6：職稱/姓名欄：CSS var 控制顏色（由 React 傳入） */
        #schedule-root table td.title-cell,
        #schedule-root table td.name-cell {
            background-color: var(--cell-bg, #f8fafc) !important;
            color: var(--cell-color, #1e293b) !important;
        }

        /* Step7：input/select 透明 */
        #schedule-root input,
        #schedule-root textarea,
        #schedule-root select {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
            color: inherit !important;
            border-color: transparent !important;
        }

        /* Step8：特定元件固定顏色 */
        #schedule-root .bg-emerald-500 { background: #10b981 !important; background-color: #10b981 !important; color: #ffffff !important; }
        #schedule-root .bg-red-500     { background: #ef4444 !important; background-color: #ef4444 !important; color: #ffffff !important; }
        #schedule-root .bg-slate-800,
        #schedule-root .bg-slate-900   { background: #1e293b !important; background-color: #1e293b !important; color: #ffffff !important; }
        #schedule-root .bg-yellow-300  { background: #fde047 !important; background-color: #fde047 !important; }
        #schedule-root .bg-white\/80  { background: rgba(255,255,255,.9) !important; }

        /* Step9：文字顏色 */
        #schedule-root .text-slate-800,
        #schedule-root .text-slate-900 { color: #1e293b !important; }
        #schedule-root .text-slate-700  { color: #334155 !important; }
        #schedule-root .text-slate-600  { color: #475569 !important; }
        #schedule-root .text-slate-500  { color: #64748b !important; }
        #schedule-root .text-slate-400  { color: #94a3b8 !important; }
        #schedule-root .text-white      { color: #ffffff !important; }
        #schedule-root .text-brand-red,
        #schedule-root .text-red-700,
        #schedule-root .text-red-600    { color: #b9121b !important; }
        #schedule-root .text-emerald-700 { color: #047857 !important; }

        /* Step10：border */
        #schedule-root .border-slate-200  { border-color: #e2e8f0 !important; }
        #schedule-root .border-slate-500   { border-color: #64748b !important; }
        #schedule-root .border-brand-red   { border-color: #b9121b !important; }
        #schedule-root .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,.05) !important; }


        /* Emerald → 翠玉色 */
        .text-emerald-600, .text-emerald-700 { color: #6ee7b7 !important; }
        .bg-emerald-600    { background-color: #064e3b !important; }
        .bg-emerald-50     { background-color: rgba(6,78,59,0.3) !important; }
        .border-l-emerald-500 { border-left-color: #34d399 !important; }
        .border-emerald-100,.border-emerald-200 { border-color: rgba(52,211,153,0.3) !important; }

        /* Blue → 寶石藍 */
        .text-blue-500,.text-blue-600,.text-blue-700,.text-blue-800 { color: #93c5fd !important; }
        .bg-blue-500, .bg-blue-600 { background-color: #1e3a8a !important; }
        .bg-blue-50, .border-blue-200 { background-color: rgba(30,58,138,0.25) !important; border-color: rgba(147,197,253,0.3) !important; }
        .bg-blue-800 { background-color: #1e3a5f !important; }
        .border-l-blue-500 { border-left-color: #93c5fd !important; }
        .shadow-blue-500\/10, .shadow-blue-600\/20 { box-shadow: 0 4px 16px -4px rgba(30,58,138,0.4) !important; }

        /* Orange/Amber → 暖銅色 */
        .text-orange-600   { color: #fbbf24 !important; }
        .bg-orange-50      { background-color: rgba(120,53,15,0.3) !important; }
        .border-orange-100,.border-orange-200 { border-color: rgba(251,191,36,0.3) !important; }
        .text-amber-600,.text-amber-700 { color: #fcd34d !important; }

        /* Yellow highlight */
        .bg-yellow-400     { background-color: #d97706 !important; }
        .text-yellow-900   { color: #451a03 !important; }

        /* Red */
        .text-red-500,.text-red-600 { color: #fca5a5 !important; }
        .bg-red-50         { background-color: rgba(127,29,29,0.3) !important; }
        .border-red-100    { border-color: rgba(252,165,165,0.25) !important; }

        /* Modal overlays */
        .bg-slate-900\/60 { background-color: rgba(20,4,6,0.78) !important; }
        .bg-slate-900\/80 { background-color: rgba(20,4,6,0.88) !important; }

        /* Shadows */
        .shadow-sm  { box-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 6px var(--gold-subtle) !important; }
        .shadow-md  { box-shadow: 0 3px 12px rgba(0,0,0,0.6), 0 0 8px var(--gold-subtle) !important; }
        .shadow-lg  { box-shadow: 0 6px 20px rgba(0,0,0,0.65), 0 0 16px var(--gold-subtle) !important; }
        .shadow-xl  { box-shadow: 0 10px 32px rgba(0,0,0,0.7), 0 0 20px var(--gold-subtle) !important; }
        .shadow-2xl { box-shadow: 0 18px 48px rgba(0,0,0,0.75), 0 0 30px var(--gold-subtle) !important; }
        .shadow-inner { box-shadow: inset 0 2px 8px rgba(0,0,0,0.55) !important; }

        /* Backdrop */
        .backdrop-blur-md, .backdrop-blur-sm {
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px);
        }

        /* theme-dark compat */
        body.theme-dark .glass-panel   { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; border-color: var(--gold-border) !important; }
        body.theme-dark .input-light   { background: var(--leather-deep) !important; color: var(--t1) !important; border-color: var(--gold-border) !important; }
        body.theme-dark input, body.theme-dark textarea, body.theme-dark select { background: var(--leather-deep) !important; color: var(--t1) !important; }
        body.theme-dark .bg-white      { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; }
        body.theme-dark .bg-white\/95,
        body.theme-dark .bg-white\/90,
        body.theme-dark .bg-white\/80  { background: linear-gradient(145deg, var(--leather-light), var(--leather-mid)) !important; }
        body.theme-dark .bg-slate-50   { background-color: var(--leather-base) !important; }
        body.theme-dark .bg-slate-100  { background-color: var(--leather-mid) !important; }

        /* ─── 深色主題：文字顏色全面覆蓋 ─── */
        body.theme-dark .text-slate-900,
        body.theme-dark .text-slate-800 { color: var(--t1) !important; }
        body.theme-dark .text-slate-700,
        body.theme-dark .text-slate-600 { color: var(--t2) !important; }
        body.theme-dark .text-slate-500,
        body.theme-dark .text-slate-400 { color: var(--t3) !important; }
        body.theme-dark .text-slate-300 { color: var(--t4) !important; }

        /* ─── 深色主題：公告/卡片區塊背景 ─── */
        body.theme-dark .bg-rose-50\/80, body.theme-dark .bg-rose-50\/50,
        body.theme-dark .bg-emerald-50\/50, body.theme-dark .bg-indigo-50\/50,
        body.theme-dark .bg-blue-50\/50, body.theme-dark .bg-yellow-50\/50,
        body.theme-dark .bg-rose-50, body.theme-dark .bg-emerald-50, body.theme-dark .bg-emerald-100,
        body.theme-dark .bg-blue-50, body.theme-dark .bg-indigo-50 {
            background-color: var(--leather-lift) !important;
            border-color: var(--gold-border) !important;
        }

        /* ─── 深色主題：border 顏色 ─── */
        body.theme-dark .border-slate-200,
        body.theme-dark .border-slate-100 { border-color: var(--gold-border) !important; }

        /* ═══════════════════════════════════════════════════════
           COMPONENT ENHANCEMENTS — 純 CSS，不動 JSX
        ═══════════════════════════════════════════════════════ */

        /* ── Header → 深皮革頂欄 + 金底線 ── */
        header.sticky {
            background: linear-gradient(180deg, var(--leather-deep) 0%, rgba(42,5,8,0.95) 100%) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--gold-border) !important;
            box-shadow: 0 2px 16px rgba(0,0,0,0.6), 0 1px 0 var(--gold-glow) !important;
        }

        /* ── Logo icon → 金色印章 ── */
        .bg-brand-red.rounded-xl.flex.items-center.justify-center.text-white {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            box-shadow: 0 3px 12px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.2) !important;
        }

        /* ── 主要按鈕 → 金色漸層 ── */
        button.bg-brand-red, a.bg-brand-red {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            font-weight: 900 !important;
            box-shadow: 0 4px 16px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.2) !important;
            border: 1px solid var(--gold-bright) !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        button.bg-brand-red:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px var(--gold-glow) !important;
        }

        /* ── Ghost buttons → 皮革鏤空 ── */
        button.bg-slate-100 {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            color: var(--t2) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,200,80,0.08) !important;
        }
        button.bg-slate-100:hover { background: linear-gradient(145deg, var(--leather-hover), var(--leather-lift)) !important; }

        /* bg-slate-900 buttons */
        button.bg-slate-900 {
            background: linear-gradient(145deg, var(--leather-base), var(--leather-deep)) !important;
            color: var(--t1) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* Emerald/Blue/Indigo action buttons */
        button.bg-emerald-600 { background: linear-gradient(135deg, #064e3b, #065f46) !important; color: #6ee7b7 !important; border: 1px solid rgba(52,211,153,0.4) !important; }
        button.bg-blue-500, button.bg-blue-600 { background: linear-gradient(135deg, #1e3a8a, #1d4ed8) !important; color: #bfdbfe !important; border: 1px solid rgba(147,197,253,0.3) !important; }
        button.bg-indigo-600 { background: linear-gradient(135deg, #312e81, #3730a3) !important; color: #c7d2fe !important; border: 1px solid rgba(199,210,254,0.3) !important; }

        /* ── Nav cards → 皮革鑲嵌卡片 ── */
        .rounded-\[2\.5rem\].border.border-slate-100.shadow-sm,
        .rounded-\[2rem\].border.border-slate-100.shadow-sm {
            background: linear-gradient(145deg, var(--leather-light) 0%, var(--leather-mid) 100%) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,200,80,0.1), 0 0 8px var(--gold-subtle) !important;
            position: relative;
        }

        /* ── 進度條 → 金色流光 ── */
        .bg-brand-red.opacity-80 {
            background: var(--gold-gradient-h) !important;
            opacity: 1 !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }
        .bg-brand-red.h-full {
            background: var(--gold-gradient-h) !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }
        .bg-slate-100.h-3\.5 {
            background: var(--leather-deep) !important;
            border: 1px solid var(--gold-shadow) !important;
        }

        /* ── Tab bars → 皮革切換欄 ── */
        .flex.bg-slate-100.p-1\.5,
        .flex.bg-\[\#f1f5f9\].p-1\.5 {
            background: linear-gradient(145deg, var(--leather-deep), var(--leather-base)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4) !important;
        }
        button.bg-brand-red.shadow-md {
            background: var(--gold-gradient) !important;
            color: var(--leather-deep) !important;
            box-shadow: 0 2px 8px var(--gold-glow) !important;
        }
        .flex.bg-\[\#f1f5f9\] button.bg-white,
        .flex.bg-slate-100 button.bg-white {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* Auth tabs active */
        button.bg-white.shadow-sm.text-brand-red {
            background: linear-gradient(145deg, var(--leather-lift), var(--leather-mid)) !important;
            color: var(--gold-bright) !important;
            border: 1px solid var(--gold-border) !important;
        }

        /* ── Auth card ── */
        .glass-panel.p-6.rounded-\[2rem\],
        .glass-panel.p-6.sm\:p-8.rounded-\[2rem\] {
            background: linear-gradient(160deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--gold-subtle) !important;
        }

        /* ── Toast → 金邊通知 ── */
        .toast-enter.glass-panel {
            background: linear-gradient(135deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-mid) !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7), 0 0 20px var(--gold-glow) !important;
        }

        /* ── Modals → 皮革彈窗 ── */
        .bg-white.rounded-\[2\.5rem\],
        .bg-white.rounded-\[2rem\] {
            background: linear-gradient(160deg, var(--leather-light), var(--leather-mid)) !important;
            border: 1px solid var(--gold-border) !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.75), 0 0 30px var(--gold-subtle) !important;
        }

        /* ── Section item active ── */
        .glass-panel:active {
            background: linear-gradient(145deg, var(--leather-hover), var(--leather-lift)) !important;
        }

        /* ── Table → 皮革表格 ── */
        table { border-collapse: collapse; }
        th {
            background: linear-gradient(180deg, var(--leather-base), var(--leather-deep)) !important;
            color: var(--t2) !important;
            border-color: var(--gold-border) !important;
        }
        td { border-color: rgba(212,160,23,0.2) !important; }

        /* ── 公告未讀點 → 金色脈衝 ── */
        .bg-brand-red.animate-pulse {
            background: var(--gold-bright) !important;
            box-shadow: 0 0 8px var(--gold-glow) !important;
        }

        /* ── 公告未讀邊框 ── */
        .border-brand-red\/30 { border-color: var(--gold-border) !important; }

        /* ── Ordering items ── */
        .bg-slate-50.rounded-2xl { background-color: var(--leather-base) !important; }

        /* ── 金色標題文字效果 ── */
        h1, h2 {
            font-family: 'Noto Serif TC', 'Noto Sans TC', serif;
        }

        /* ── 金色光暈動畫（裝飾用） ── */
        @keyframes goldShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .text-brand-red {
            background: var(--gold-gradient-h);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShimmer 4s linear infinite;
        }

        /* ── 特殊：bg-brand-red.text-white 修正 ── */
        .bg-brand-red { color: var(--leather-deep) !important; }
        .bg-brand-red * { color: var(--leather-deep) !important; }
        .bg-brand-red.text-white { color: var(--leather-deep) !important; }

        /* ── 跑馬燈 ── */
        .ticker-wrap { overflow: hidden; width: 100%; }
        .ticker-move {
            display: inline-flex;
            white-space: nowrap;
            animation: tickerScroll 18s linear infinite;
            min-width: 200%;
        }
        .ticker-wrap:hover .ticker-move { animation-play-state: paused; }
        @keyframes tickerScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(20px); }

    const useCustomUnits = () => {

      const saveCustomUnits = (units) => { setCustomUnits(units); _saveCustomUnitsStorage(units); };

    const compressImage = (base64Str, maxWidth = 800, quality = 0.5) => {
     return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width; let height = img.height;
        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('image-load-failed'));
      img.src = base64Str;
      });
     };

    const dataUrlBytes = (dataUrl) => {
     const raw = String(dataUrl || '').split(',')[1] || '';
     return Math.ceil(raw.length * 3 / 4);

     const y = date.getFullYear();

     return `${y}-${m}-${d}`;

    const getInspectionCleanupCutoffDate = (retainDays = 7, time = Date.now()) => {

      { key: 'archive', col: `daily_photo_archive_${branch}` }

      "Chart": "bar-chart-3", "History": "history", "Carrot": "carrot", "Fish": "fish", "Soup": "soup",
      "UtensilsCrossed": "utensils-crossed", "IceCream": "ice-cream", "Coffee": "coffee", "Timer": "timer",
      "Calendar": "calendar", "Image": "image", "Download": "download", "RotateCcw": "rotate-ccw"
     };
     return <Icon name={symbols[name] || "help-circle"} className={className} />;
    };

    const ChefHatIcon = ({ size = 24 }) => (
     <svg viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
      <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/>
     </svg>
    );

    const Ticker = ({ text }) => {
     const msg1 = text || "歡迎使用 EATJOY廚務 OS 系統 ...";
     const msg2 = text || "使用上有BUG或優化建議可以私訊小雷神";
     return (
      <div className="bg-slate-900 text-white py-2.5 px-4 ticker-wrap" style={{maxWidth:"100vw"}}>
       <div className="ticker-move font-bold text-[11px] uppercase tracking-wider items-center">
         <span className="flex items-center gap-8 pr-16" style={{display:"inline-flex"}}>
          <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span>{msg1}</span>
          <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span>{msg2}</span>
         </span>
         <span className="flex items-center gap-8 pr-16" style={{display:"inline-flex"}} aria-hidden="true">
          <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span>{msg1}</span>
          <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span>{msg2}</span>
         </span>
       </div>
      </div>
     );
    };

    const BackButton = ({ onClick, title }) => (
     <div className="flex items-center gap-4 mb-8 text-left border-b border-slate-200/50 pb-4">
      <button onClick={onClick} className="p-3 glass-panel rounded-2xl border active:scale-90 transition-all bg-white shadow-sm"><Icon name="arrow-left" size={20}/></button>
      <h2 className="text-2xl font-black text-slate-800 tracking-tighter leading-tight font-bold">{title}</h2>
     </div>
    );

    const NotificationDot = ({ show }) => show ? (
     <span className="absolute top-4 right-4 w-3 h-3 rounded-full bg-red-500 border-2 border-white shadow-lg animate-pulse" aria-label="未讀提醒"></span>
    ) : null;

    const SectionItem = ({ title, iconName, onClick, unread = false }) => (
     <div onClick={onClick} className="relative glass-panel p-6 rounded-[2rem] flex items-center justify-between active:bg-slate-50 cursor-pointer group transition-all mb-3 text-left bg-white shadow-sm">
      <NotificationDot show={unread} />
      <div className="flex items-center gap-4 text-slate-400 group-active:text-brand-red font-bold">
        {iconName && <Icon name={iconName} size={18} />}
        <span className="text-slate-800 text-sm font-bold leading-none">{title}</span>
      </div>
      <Icon name="chevron-right" size={18} className="text-slate-300" />
     </div>
    );

    const NavCard = ({ title, onClick, colorClass, iconName, unread = false }) => (
     <button onClick={onClick} className={`relative ${colorClass} py-10 flex flex-col items-center justify-center rounded-[2.5rem] border border-slate-100 shadow-sm active:scale-95 transition-all group`}>
      <NotificationDot show={unread} />
      {/* 重點修改：將顏色改為 text-brand-red，並在 hover 時稍微改變亮度或不透明度 */}
      <div className="mb-3 text-brand-red/80 group-hover:text-brand-red transition-colors">
        <Icon name={iconName} size={28} />
      </div>
      <span className="font-black text-slate-800 text-sm tracking-widest uppercase font-bold">{title}</span>
     </button>
    );

    const RuleStandardBlock = ({ id, title, desc, img }) => (
     <div className="glass-panel rounded-3xl p-6 border border-slate-100 mb-4 bg-white shadow-sm flex flex-col gap-4 text-left">
      <div className="flex gap-4">
        <div className="w-9 h-9 bg-rose-50 text-brand-red border border-rose-100 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 font-bold">{id}</div>
        <div className="space-y-1">
         <h3 className="font-bold text-slate-800 text-sm leading-tight font-black">{title}</h3>
         <p className="text-[10px] text-slate-600 leading-relaxed font-bold whitespace-pre-wrap">{desc}</p>
        </div>
      </div>
      {img && <img src={img} className="w-full rounded-2xl border border-slate-100 shadow-inner object-cover max-h-64" alt="附圖" />}
     </div>
    );

    const UniversalListManager = ({ categoryPath, currentBranch, globalBranches, isSuperAdmin, items = [], titleLabel = "名稱", triggerNotify, getPublicPath, categories = null }) => {
     const [newT, setNewT] = useState(''); 
     const [newC, setNewC] = useState(''); 
     const [newI, setNewI] = useState(null);
     const [newCat, setNewCat] = useState(categories ? categories[0] : '');
     const [editingId, setEditingId] = useState(null);
     const [syncToAll, setSyncToAll] = useState(false);

     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);

     const startEdit = (item) => {
      setEditingId(item.id);
      setNewT(item.title);
      setNewC(item.content || '');
      setNewI(item.img || null);
      if (categories) setNewCat(item.category || categories[0]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
     };

     const cancelEdit = () => {
      setEditingId(null); setNewT(''); setNewC(''); setNewI(null);
      if (categories) setNewCat(categories[0]);
     };

     const handleSave = async () => {
      if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
      let imgToSave = newI; 
      if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const sharedId = editingId ? String(editingId) : crypto.randomUUID();
      const now = Date.now();

      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
         if (!editingId) {
           itemData.timestamp = now;
           itemData.sortOrder = items.length; // 預設放在最後面
         }
         if (categories) itemData.category = newCat;

         const colPath = getPublicPath(`${categoryPath}_${branch}/items`);
         return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
        }));
        triggerNotify(editingId ? "更新成功" : "發佈成功", "success");
        cancelEdit();
      } catch (e) { triggerNotify("存檔失敗 (可能是圖片太大)", "error"); }
     };

     const deleteItem = async (id) => {
      const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該項目。" : "確定要刪除嗎？");
      if(!isConfirmed) return;

      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const idStr = String(id);
         await db.collection(getPublicPath(`${categoryPath}_${branch}/items`)).doc(idStr).delete();
         
         const oldDocRef = db.doc(getPublicPath(`${categoryPath}_${branch}`));
         const oldSnap = await oldDocRef.get();
         if(oldSnap.exists && oldSnap.data().items) {
           const newItems = oldSnap.data().items.filter(i => String(i.id) !== idStr);
           await oldDocRef.set({ items: newItems });
         }
        }));
        triggerNotify("項目已刪除", "info");
      } catch(e) { triggerNotify("刪除失敗", "error"); console.error(e); }
     };

     const handleDragStart = (id) => setDraggedId(id);
     const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
     const handleDragEnd = async () => {
      if (draggedId !== null && overId !== null && draggedId !== overId) {
        const newItems = [...items];
        const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
        const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
        
        if (fromIndex !== -1 && toIndex !== -1) {
         const [movedItem] = newItems.splice(fromIndex, 1);
         newItems.splice(toIndex, 0, movedItem);

         try {
           const batch = db.batch();
           newItems.forEach((item, index) => {
            const docRef = db.collection(getPublicPath(`${categoryPath}_${currentBranch}/items`)).doc(String(item.id));
            batch.set(docRef, { ...item, sortOrder: index }, { merge: true });
           });
           await batch.commit();
         } catch(e) {
           triggerNotify("排序儲存失敗", "error");
         }
        }
      }
      setDraggedId(null);
      setOverId(null);
     };

     return (
      <div className="space-y-4">
        <div className={`glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white shadow-sm border transition-all ${editingId ? 'border-blue-500/30 shadow-blue-500/10' : 'border-slate-100'}`}>
         <div className="flex justify-between items-center mb-2">
           <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest">
            {editingId ? <><Icon name="edit" size={16} className="text-blue-500" /> 編輯項目</> : <><Icon name="plus-circle" size={16} className="text-brand-red" /> 新增項目</>}
           </h3>
           {isSuperAdmin && (
            <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
              <input type="checkbox" checked={syncToAll} onChange={e=>setSyncToAll(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded" />
              套用至全部分店
            </label>
           )}
         </div>
         {categories && (
           <select value={newCat} onChange={e=>setNewCat(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none appearance-none">
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
           </select>
         )}
         <input placeholder={titleLabel} value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" />
         <textarea placeholder="詳細描述..." rows="3" value={newC} onChange={e=>setNewC(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
         
         <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
           {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳附圖"}
           <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>
         </label>
         {newI && (
           <div className="relative w-full h-32 rounded-xl overflow-hidden border">
            <img src={newI} className="w-full h-full object-cover" />
            <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
           </div>
         )}
         
         <div className="flex gap-3 pt-2">
           {editingId && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消編輯</button>}
           <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${editingId ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
            {editingId ? "儲存修改" : "確認發佈"}
           </button>
         </div>
        </div>
        <div className="space-y-3">
         {items.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
         {items.map((r) => (
           <div 
            key={r.id} 
            draggable
            onDragStart={() => handleDragStart(r.id)}
            onDragOver={(e) => handleDragOver(e, r.id)}
            onDragEnd={handleDragEnd}
            className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 items-center shadow-sm transition-all duration-200 ${draggedId === r.id ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === r.id ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
           >
            <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-center justify-center">
              <Icon name="grip-vertical" size={18} />
            </div>
            {r.img && <img src={r.img} className="w-12 h-12 rounded-xl object-cover border shrink-0" alt="圖" />}
            <div className="flex-1 min-w-0 text-left">
              <div className="flex items-center gap-2 mb-0.5">
               <p className="font-bold text-slate-800 text-sm truncate">{r.title || "(無標題)"}</p>
               {r.category && <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] rounded-md font-bold whitespace-nowrap">{r.category}</span>}
              </div>
              <p className="text-[10px] text-slate-400 mt-1 line-clamp-1">{r.content || ""}</p>
            </div>
            <div className="flex gap-1.5 shrink-0 border-l pl-2 border-slate-100">
              <button onClick={() => startEdit(r)} className="text-slate-400 hover:text-blue-500 p-2 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16} /></button>
              <button onClick={() => deleteItem(r.id)} className="text-slate-400 hover:text-red-500 p-2 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16} /></button>
            </div>
           </div>
         ))}
         {items.length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">尚未發佈任何項目</p>}
        </div>
      </div>
     );
    };

    const RecipeAdminManager = ({ categoryPath, currentBranch, globalBranches, isSuperAdmin, items = [], triggerNotify, getPublicPath, categories, globalRecipes = [] }) => {
     const createBlankRecipeSection = (title = '主配方') => ({
      id: crypto.randomUUID(),
      title,
      ingredientsList: [{ name: '', qty: '', vendor: '' }],
      instructions: ''
     });

     const [newT, setNewT] = useState(''); 
     const [newCat, setNewCat] = useState(categories ? categories[0] : '');
     const [newIngList, setNewIngList] = useState([{ name: '', qty: '', vendor: '' }]);
     const [newInst, setNewInst] = useState('');
     const [newSections, setNewSections] = useState([createBlankRecipeSection()]);
     const [newNote, setNewNote] = useState('');
     const [newI, setNewI] = useState(null);
     const [editingId, setEditingId] = useState(null);
     const [editingGlobalRecipeDocId, setEditingGlobalRecipeDocId] = useState(null);
     const [editingGlobalRecipeItemId, setEditingGlobalRecipeItemId] = useState(null);
     const [syncToAll, setSyncToAll] = useState(false);
     const [showLibrary, setShowLibrary] = useState(false);
     const [activeMenuCategory, setActiveMenuCategory] = useState('全部');

     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);
     const [draggedIngIndex, setDraggedIngIndex] = useState(null);
     const [overIngIndex, setOverIngIndex] = useState(null);

     const getItemKey = (item, index = 0) => String(item?.id || item?.title || item?.name || item?.timestamp || item?.updateTime || item?.content || `legacy_${index}`);
     const normalizeIngredientList = (list, fallback = '') => {
      const source = Array.isArray(list) && list.length > 0
        ? list
        : (fallback ? [{ name: fallback, qty: '', vendor: '' }] : [{ name: '', qty: '', vendor: '' }]);
      return source.map(ing => {
        if (typeof ing === 'string') return { name: ing, qty: '', vendor: '' };
        return { name: ing?.name || '', qty: ing?.qty || '', vendor: ing?.vendor || '' };
      });
     };

     const cleanIngredientList = (list) => normalizeIngredientList(list)
      .map(i => ({ name: String(i.name || '').trim(), qty: String(i.qty || '').trim(), vendor: String(i.vendor || '').trim() }))
      .filter(i => i.name !== '');

     const normalizeRecipeSections = (sections, legacyList, legacyIngredients = '', legacyInstructions = '') => {
      const source = Array.isArray(sections) && sections.length > 0
        ? sections
        : [{ id: 'legacy-main', title: '主配方', ingredientsList: legacyList, instructions: legacyInstructions || '' }];
      const normalized = source.map((section, index) => ({
        id: section?.id || crypto.randomUUID(),
        title: section?.title || section?.name || (index === 0 ? '主配方' : `配方 ${index + 1}`),
        ingredientsList: normalizeIngredientList(section?.ingredientsList || section?.ingredients, index === 0 ? legacyIngredients : ''),
        instructions: section?.instructions || section?.steps || ''
      }));
      return normalized.length > 0 ? normalized : [createBlankRecipeSection()];
     };

     const updateRecipeSection = (sectionIndex, patch) => {
      setNewSections(prev => prev.map((section, idx) => idx === sectionIndex ? { ...section, ...patch } : section));
     };

     const updateRecipeSectionIngredient = (sectionIndex, ingIndex, field, value) => {
      setNewSections(prev => prev.map((section, idx) => {
        if (idx !== sectionIndex) return section;
        const nextIngredients = normalizeIngredientList(section.ingredientsList).map((ing, i) => i === ingIndex ? { ...ing, [field]: value } : ing);
        return { ...section, ingredientsList: nextIngredients };
      }));
     };

     const addRecipeSection = () => {
      setNewSections(prev => [...prev, createBlankRecipeSection(`配方 ${prev.length + 1}`)]);
     };

     const removeRecipeSection = (sectionIndex) => {
      setNewSections(prev => prev.length > 1 ? prev.filter((_, idx) => idx !== sectionIndex) : [createBlankRecipeSection()]);
     };

     const addRecipeSectionIngredient = (sectionIndex) => {
      setNewSections(prev => prev.map((section, idx) => idx === sectionIndex
        ? { ...section, ingredientsList: [...normalizeIngredientList(section.ingredientsList), { name: '', qty: '', vendor: '' }] }
        : section
      ));
     };

     const removeRecipeSectionIngredient = (sectionIndex, ingIndex) => {
      setNewSections(prev => prev.map((section, idx) => {
        if (idx !== sectionIndex) return section;
        const currentList = normalizeIngredientList(section.ingredientsList);
        const nextList = currentList.length > 1 ? currentList.filter((_, i) => i !== ingIndex) : [{ name: '', qty: '', vendor: '' }];
        return { ...section, ingredientsList: nextList };
      }));
     };

     const fillFormFromRecipe = (item) => {
      setEditingId(getItemKey(item));
      setNewT(item.title || '');
      
      const recipeSections = normalizeRecipeSections(item.recipeSections, item.ingredientsList, item.ingredients || '', item.instructions || item.content || '');
      setNewSections(recipeSections);
      setNewIngList(recipeSections[0]?.ingredientsList || normalizeIngredientList(item.ingredientsList, item.ingredients || ''));
      setNewInst(recipeSections[0]?.instructions || item.instructions || item.content || ''); 
      setNewNote(item.notes || '');
      setNewI(item.img || null);
      if (categories) setNewCat(item.category || categories[0]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
     };

     const startEdit = (item) => {
      setEditingGlobalRecipeDocId(null);
      setEditingGlobalRecipeItemId(null);
      fillFormFromRecipe(item);
     };

     const startEditGlobalRecipe = (item) => {
      setEditingId(null);
      setEditingGlobalRecipeDocId(item.docId || item.title || item.id);
      setEditingGlobalRecipeItemId(item.id || item.title || crypto.randomUUID());
      fillFormFromRecipe({ ...item, id: null });
      setShowLibrary(false);
     };

     const cancelEdit = () => {
      setEditingId(null); setNewT(''); setNewIngList([{ name: '', qty: '', vendor: '' }]); setNewInst(''); setNewSections([createBlankRecipeSection()]); setNewNote(''); setNewI(null);
      setEditingGlobalRecipeDocId(null); setEditingGlobalRecipeItemId(null);
      if (categories) setNewCat(categories[0]);
     };

     const handleSave = async () => {
      if (!newT.trim()) return triggerNotify("菜單名稱不能為空", "error");
      let imgToSave = newI; 
      if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const sharedId = editingId ? String(editingId) : (editingGlobalRecipeItemId ? String(editingGlobalRecipeItemId) : crypto.randomUUID());
      const now = Date.now();
      
      const validRecipeSections = newSections.map((section, index) => ({
        id: section.id || crypto.randomUUID(),
        title: String(section.title || '').trim() || (index === 0 ? '主配方' : `配方 ${index + 1}`),
        ingredientsList: cleanIngredientList(section.ingredientsList),
        instructions: String(section.instructions || '').trim()
      })).filter(section => section.ingredientsList.length > 0 || section.instructions);
      const primarySection = validRecipeSections[0] || { ingredientsList: cleanIngredientList(newIngList), instructions: newInst.trim() };
      const primaryInstructions = primarySection.instructions || newInst.trim();

      const itemData = { 
        id: sharedId, 
        title: newT.trim(), 
        recipeSections: validRecipeSections,
        ingredientsList: primarySection.ingredientsList, 
        instructions: primaryInstructions,
        notes: newNote.trim(),
        content: primaryInstructions, 
        img: imgToSave, 
        updateTime: now 
      };

      try {
        const globalRecipeData = { ...itemData, timestamp: now };
        if (categories) globalRecipeData.category = newCat;

        if (editingGlobalRecipeDocId) {
         const nextDocId = newT.trim();
         await db.collection(getPublicPath('global_recipes')).doc(nextDocId).set(globalRecipeData, { merge: true });
         if (editingGlobalRecipeDocId !== nextDocId) {
           await db.collection(getPublicPath('global_recipes')).doc(editingGlobalRecipeDocId).delete();
         }
         triggerNotify("資料庫菜色已更新", "success");
         cancelEdit();
         return;
        }

        await Promise.all(targetBranches.map(async (branch) => {
         const branchItemData = { ...itemData };
         if (!editingId) {
           branchItemData.timestamp = now;
           branchItemData.sortOrder = items.length;
         }
         if (categories) branchItemData.category = newCat;

         const colPath = getPublicPath(`${categoryPath}_${branch}/items`);
         return db.collection(colPath).doc(sharedId).set(branchItemData, { merge: true });
        }));

        await db.collection(getPublicPath('global_recipes')).doc(newT.trim()).set(globalRecipeData, { merge: true });

        triggerNotify(editingId ? "更新成功" : "發佈成功，已同步至資料庫", "success");
        cancelEdit();
      } catch (e) { 
        console.error(e);
        triggerNotify("存檔失敗 (檔案太大或網路異常)", "error"); 
      }
     };

     const deleteItem = async (item) => {
      const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該食譜。" : "確定要刪除嗎？");
      if(!isConfirmed) return;

      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const idStr = getItemKey(item);
         await db.collection(getPublicPath(`${categoryPath}_${branch}/items`)).doc(idStr).delete();
         
         const oldDocRef = db.doc(getPublicPath(`${categoryPath}_${branch}`));
         const oldSnap = await oldDocRef.get();
         if(oldSnap.exists && oldSnap.data().items) {
           const newItems = oldSnap.data().items.filter((i, idx) => getItemKey(i, idx) !== idStr);
           await oldDocRef.set({ items: newItems });
         }
        }));
        triggerNotify("食譜已刪除", "info");
      } catch(e) { triggerNotify("刪除失敗", "error"); console.error(e); }
     };

     const deleteAllSeasonItems = async () => {
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const scopeText = targetBranches.length > 1 ? `所有分店（${targetBranches.join('、')}）` : `${currentBranch}`;
      const confirmText = `確定要刪除「${scopeText}」本季所有菜色嗎？\n\n此動作會清空後台菜單頁目前發佈的所有菜色，且無法復原。`;
      if (!window.confirm(confirmText)) return;
      if (!window.confirm("再次確認：真的要刪除本季所有菜色？")) return;

      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const colRef = db.collection(getPublicPath(`${categoryPath}_${branch}/items`));
         const snap = await colRef.get();
         let batch = db.batch();
         let count = 0;
         const commits = [];
         snap.forEach(doc => {
           batch.delete(doc.ref);
           count += 1;
           if (count >= 450) {
            commits.push(batch.commit());
            batch = db.batch();
            count = 0;
           }
         });
         if (count > 0) commits.push(batch.commit());
         await Promise.all(commits);

         await db.doc(getPublicPath(`${categoryPath}_${branch}`)).set({ items: [] }, { merge: true });
        }));
        cancelEdit();
        triggerNotify("本季所有菜色已刪除", "info");
      } catch(e) {
        console.error(e);
        triggerNotify("刪除本季菜色失敗", "error");
      }
     };

     const deleteGlobalRecipe = async (item) => {
      const docId = item.docId || item.title || item.id;
      if (!docId) return triggerNotify("找不到資料庫菜色 ID", "error");
      if (!window.confirm(`確定要刪除資料庫菜色「${item.title || docId}」嗎？`)) return;
      try {
        await db.collection(getPublicPath('global_recipes')).doc(docId).delete();
        triggerNotify("資料庫菜色已刪除", "info");
      } catch(e) {
        console.error(e);
        triggerNotify("刪除資料庫菜色失敗", "error");
      }
     };

     const handleDragStart = (id) => setDraggedId(id);
     const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
     const handleDragEnd = async () => {
      if (draggedId !== null && overId !== null && draggedId !== overId) {
        const newItems = [...items];
        const fromIndex = newItems.findIndex((i, idx) => getItemKey(i, idx) === String(draggedId));
        const toIndex = newItems.findIndex((i, idx) => getItemKey(i, idx) === String(overId));
        
        if (fromIndex !== -1 && toIndex !== -1) {
         const [movedItem] = newItems.splice(fromIndex, 1);
         newItems.splice(toIndex, 0, movedItem);

         try {
           const batch = db.batch();
           newItems.forEach((item, index) => {
            const itemId = getItemKey(item, index);
            const docRef = db.collection(getPublicPath(`${categoryPath}_${currentBranch}/items`)).doc(itemId);
            batch.set(docRef, { ...item, id: itemId, sortOrder: index }, { merge: true });
           });
           await batch.commit();
         } catch(e) {
           triggerNotify("排序儲存失敗", "error");
         }
        }
      }
      setDraggedId(null);
      setOverId(null);
     };

     const handleIngredientDragStart = (index) => setDraggedIngIndex(index);
     const handleIngredientDragOver = (e, index) => {
      e.preventDefault();
      if (index !== draggedIngIndex) setOverIngIndex(index);
     };
     const handleIngredientDragEnd = () => {
      if (draggedIngIndex !== null && overIngIndex !== null && draggedIngIndex !== overIngIndex) {
        const nextList = [...newIngList];
        const [movedIngredient] = nextList.splice(draggedIngIndex, 1);
        nextList.splice(overIngIndex, 0, movedIngredient);
        setNewIngList(nextList);
      }
      setDraggedIngIndex(null);
      setOverIngIndex(null);
     };

     const isEditingRecipe = !!editingId || !!editingGlobalRecipeDocId;
     const uncategorizedLabel = '未分類';
     const categoryTabs = useMemo(() => {
      if (!categories) return ['全部'];
      const hasUncategorized = items.some(i => !i.category || !categories.includes(i.category));
      return ['全部', ...categories, ...(hasUncategorized ? [uncategorizedLabel] : [])];
     }, [items, categories]);
     const visibleItems = useMemo(() => {
      if (!categories || activeMenuCategory === '全部') return items;
      if (activeMenuCategory === uncategorizedLabel) return items.filter(i => !i.category || !categories.includes(i.category));
      return items.filter(i => i.category === activeMenuCategory);
     }, [items, categories, activeMenuCategory]);
     const countByCategory = (cat) => {
      if (cat === '全部') return items.length;
      if (cat === uncategorizedLabel) return items.filter(i => !i.category || !categories?.includes(i.category)).length;
      return items.filter(i => i.category === cat).length;
     };
     const libraryCategoryTabs = useMemo(() => {
      if (!categories) return [uncategorizedLabel];
      const hasUncategorized = globalRecipes.some(i => !i.category || !categories.includes(i.category));
      return [...categories, ...(hasUncategorized ? [uncategorizedLabel] : [])];
     }, [globalRecipes, categories]);

     return (
      <div className="space-y-4">
        <div className={`glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white shadow-sm border transition-all ${isEditingRecipe ? 'border-blue-500/30 shadow-blue-500/10' : 'border-slate-100'}`}>
         <div className="flex justify-between items-center mb-2">
           <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest">
            {isEditingRecipe ? <><Icon name="edit" size={16} className="text-blue-500" /> {editingGlobalRecipeDocId ? '編輯資料庫菜色' : '編輯食譜'}</> : <><Icon name="plus-circle" size={16} className="text-brand-red" /> 新增食譜</>}
           </h3>
           <div className="flex items-center gap-3">
            {!isEditingRecipe && (
              <button onClick={() => setShowLibrary(true)} className="px-3 py-1.5 bg-rose-50 text-brand-red rounded-lg text-[10px] font-black flex items-center gap-1 hover:bg-brand-red hover:text-white transition-colors">
               <Icon name="database" size={14} /> 從資料庫導入
              </button>
            )}
            {isSuperAdmin && !editingGlobalRecipeDocId && (
              <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
               <input type="checkbox" checked={syncToAll} onChange={e=>setSyncToAll(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded" />
               套用至全部分店
              </label>
            )}
           </div>
         </div>
         {categories && (
           <select value={newCat} onChange={e=>setNewCat(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none appearance-none">
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
           </select>
         )}
         <input placeholder="輸入菜單名稱..." value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none border-brand-red/30 focus:border-brand-red" />
         
         <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner space-y-4">
           <div className="flex items-center justify-between gap-3">
            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-1.5"><Icon name="layers" size={14}/> 配方區塊配置</h4>
            <button type="button" onClick={addRecipeSection} className="px-3 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-[10px] font-black flex items-center gap-1 hover:border-brand-red/40 hover:text-brand-red transition-colors">
              <Icon name="plus" size={13} /> 新增區塊
            </button>
           </div>
           {newSections.map((section, sectionIdx) => (
            <div key={section.id || sectionIdx} className="bg-white rounded-2xl border border-slate-200 p-3 space-y-3 shadow-sm">
              <div className="flex items-center gap-2">
               <input placeholder="區塊名稱 (例: 雞腿醃漬、松露白醬)" value={section.title} onChange={e => updateRecipeSection(sectionIdx, { title: e.target.value })} className="flex-1 min-w-0 input-light p-3 rounded-lg text-sm font-black outline-none" />
               <button type="button" onClick={() => removeRecipeSection(sectionIdx)} className={`h-11 px-3 rounded-lg transition-colors flex items-center justify-center ${newSections.length > 1 ? 'text-slate-400 hover:bg-red-50 hover:text-red-500' : 'text-slate-200 cursor-not-allowed'}`} disabled={newSections.length === 1} title="刪除此區塊">
                <Icon name="trash-2" size={16}/>
               </button>
              </div>
              <div className="space-y-2">
               <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Icon name="shopping-bag" size={12}/> 食材與比例</p>
               {normalizeIngredientList(section.ingredientsList).map((ing, idx) => (
                <div key={idx} className="grid grid-cols-[minmax(130px,1.25fr)_minmax(95px,0.8fr)_minmax(110px,0.9fr)_auto] gap-2 items-center overflow-x-auto no-scrollbar">
                  <input placeholder="食材 (例: 雞腿排)" value={ing.name} onChange={e => updateRecipeSectionIngredient(sectionIdx, idx, 'name', e.target.value)} className="w-full min-w-0 input-light p-3 rounded-lg text-sm font-bold outline-none" />
                  <input placeholder="數量單位" value={ing.qty} onChange={e => updateRecipeSectionIngredient(sectionIdx, idx, 'qty', e.target.value)} className="w-full min-w-0 input-light p-3 rounded-lg text-sm font-bold outline-none" />
                  <input placeholder="廠商/備註" value={ing.vendor || ''} onChange={e => updateRecipeSectionIngredient(sectionIdx, idx, 'vendor', e.target.value)} className="w-full min-w-0 input-light p-3 rounded-lg text-sm font-bold outline-none" />
                  <button type="button" onClick={() => removeRecipeSectionIngredient(sectionIdx, idx)} className="h-11 px-2 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500 transition-colors flex items-center justify-center"><Icon name="x" size={17}/></button>
                </div>
               ))}
               <button type="button" onClick={() => addRecipeSectionIngredient(sectionIdx)} className="w-full py-2.5 rounded-lg border-2 border-dashed border-slate-200 text-slate-500 font-bold text-xs hover:border-brand-red/50 hover:text-brand-red transition-colors flex items-center justify-center gap-2">
                <Icon name="plus" size={14} /> 新增食材
               </button>
              </div>
              <textarea placeholder="填寫此區塊做法步驟..." rows="3" value={section.instructions || ''} onChange={e => updateRecipeSection(sectionIdx, { instructions: e.target.value })} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
            </div>
           ))}
         </div>
         
         <textarea placeholder="填寫備註 (選填)..." rows="2" value={newNote} onChange={e=>setNewNote(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
         
         <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
           {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳菜色照片"}
           <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>
         </label>
         {newI && (
           <div className="relative w-full h-32 rounded-xl overflow-hidden border">
            <img src={newI} className="w-full h-full object-cover" />
            <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
           </div>
         )}
         
         <div className="flex gap-3 pt-2">
           {isEditingRecipe && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消</button>}
           <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${isEditingRecipe ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
            {isEditingRecipe ? "儲存修改" : "確認發佈"}
           </button>
         </div>
        </div>
        
        {/* 食譜資料庫彈窗 */}
        {showLibrary && (
         <div className="fixed inset-0 z-[10000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 page-enter">
           <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-6 max-h-[85vh] overflow-y-auto relative shadow-2xl">
            <h3 className="font-black text-xl mb-6 text-slate-800 flex items-center gap-2 border-b pb-4"><Icon name="database" className="text-brand-red" /> 全域菜色資料庫</h3>
            <button onClick={()=>setShowLibrary(false)} className="absolute top-6 right-6 text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors"><Icon name="x" size={20}/></button>
            
            {globalRecipes.length === 0 ? (
              <div className="py-10 text-center text-slate-400 text-xs font-bold">目前資料庫中尚未建立任何食譜</div>
            ) : (
              <div className="space-y-6">
               {libraryCategoryTabs.map(cat => {
                 const catRecipes = cat === uncategorizedLabel
                  ? globalRecipes.filter(r => !r.category || !categories?.includes(r.category))
                  : globalRecipes.filter(r => r.category === cat);
                 if (catRecipes.length === 0) return null;
                 return (
                  <div key={cat} className="space-y-3">
                    <h4 className="font-black text-sm text-slate-700 border-l-4 border-brand-red pl-2">{cat}</h4>
                    <div className="grid grid-cols-1 gap-2">
                     {catRecipes.map(r => (
                       <div
                        key={r.id} 
                        className="bg-slate-50 border border-slate-200 rounded-2xl p-3 flex items-center gap-3 shadow-sm"
                       >
                        {r.img && <img src={r.img} className="w-12 h-12 rounded-xl object-cover border bg-white shrink-0" alt="菜色" />}
                        <div className="flex-1 min-w-0">
                         <p className="font-black text-sm text-slate-800 truncate">{r.title}</p>
                         <p className="text-[10px] text-slate-400 line-clamp-1">{Array.isArray(r.recipeSections) && r.recipeSections.length > 0 ? `${r.recipeSections.length} 個配方區塊` : (r.instructions || r.content || '無描述')}</p>
                        </div>
                        <div className="flex gap-1.5 shrink-0">
                         <button
                          onClick={() => {
                            setNewT(r.title); 
                            setNewCat(r.category || categories[0]); 
                            const importedSections = normalizeRecipeSections(r.recipeSections, r.ingredientsList, r.ingredients || '', r.instructions || r.content || '');
                            setNewSections(importedSections);
                            setNewIngList(importedSections[0]?.ingredientsList || normalizeIngredientList(r.ingredientsList, r.ingredients || '')); 
                            setNewInst(importedSections[0]?.instructions || r.instructions || r.content || ''); 
                            setNewNote(r.notes || ''); 
                            setNewI(r.img || null); 
                            setShowLibrary(false);
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                          }} 
                          className="p-2 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-brand-red hover:border-brand-red transition-colors"
                          title="導入"
                         >
                          <Icon name="download" size={15} />
                         </button>
                         <button onClick={() => startEditGlobalRecipe(r)} className="p-2 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-blue-500 hover:border-blue-200 transition-colors" title="編輯資料庫菜色">
                          <Icon name="edit-3" size={15} />
                         </button>
                         <button onClick={() => deleteGlobalRecipe(r)} className="p-2 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-red-500 hover:border-red-200 transition-colors" title="刪除資料庫菜色">
                          <Icon name="trash-2" size={15} />
                         </button>
                        </div>
                       </div>
                     ))}
                    </div>
                  </div>
                 )
               })}
              </div>
            )}
           </div>
         </div>
        )}

        <div className="space-y-3">
         {categories && (
          <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm p-4 space-y-3">
           <div className="flex items-center justify-between">
            <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><Icon name="utensils" size={16} className="text-brand-red" /> 現有菜色</h3>
            <span className="text-[10px] font-black text-slate-400">{visibleItems.length}/{items.length} 道</span>
           </div>
           <button
            onClick={deleteAllSeasonItems}
            disabled={items.length === 0}
            className={`w-full py-3 rounded-2xl text-[11px] font-black flex items-center justify-center gap-2 border transition-all ${items.length === 0 ? 'bg-slate-50 text-slate-300 border-slate-100 cursor-not-allowed' : 'bg-rose-50 text-brand-red border-rose-100 hover:bg-brand-red hover:text-white active:scale-95'}`}
           >
            <Icon name="trash-2" size={14} /> 刪除本季所有菜色
           </button>
           <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            {categoryTabs.map(cat => {
             const count = countByCategory(cat);
             return (
              <button
               key={cat}
               onClick={() => setActiveMenuCategory(cat)}
               className={`shrink-0 px-3.5 py-2 rounded-xl text-[10px] font-black border transition-all ${activeMenuCategory === cat ? 'bg-brand-red text-white border-brand-red shadow-sm' : 'bg-slate-50 text-slate-500 border-slate-100 hover:border-brand-red/30'}`}
              >
               {cat} <span className={activeMenuCategory === cat ? 'text-white/70' : 'text-slate-300'}>{count}</span>
              </button>
             );
            })}
           </div>
          </div>
         )}
         {visibleItems.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
         {visibleItems.map((r, idx) => (
           <div 
            key={getItemKey(r, idx)} 
            draggable
            onDragStart={() => handleDragStart(getItemKey(r, idx))}
            onDragOver={(e) => handleDragOver(e, getItemKey(r, idx))}
            onDragEnd={handleDragEnd}
            className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 items-center shadow-sm transition-all duration-200 ${draggedId === getItemKey(r, idx) ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === getItemKey(r, idx) ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
           >
            <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-center justify-center">
              <Icon name="grip-vertical" size={18} />
            </div>
            {r.img && <img src={r.img} className="w-12 h-12 rounded-xl object-cover border shrink-0" alt="圖" />}
            <div className="flex-1 min-w-0 text-left">
              <div className="flex items-center gap-2 mb-0.5">
               <p className="font-bold text-slate-800 text-sm truncate">{r.title || "(無標題)"}</p>
               {r.category && <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] rounded-md font-bold whitespace-nowrap">{r.category}</span>}
              </div>
              <p className="text-[10px] text-slate-400 mt-1 line-clamp-1">{r.instructions || r.content || '無描述'}</p>
            </div>
            <div className="flex gap-1.5 shrink-0 border-l pl-2 border-slate-100">
              <button onClick={() => startEdit(r)} className="text-slate-400 hover:text-blue-500 p-2 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16} /></button>
              <button onClick={() => deleteItem(r)} className="text-slate-400 hover:text-red-500 p-2 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16} /></button>
            </div>
           </div>
         ))}
         {items.length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">尚未發佈任何食譜</p>}
         {items.length > 0 && visibleItems.length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">此分類目前沒有菜色</p>}
        </div>
      </div>
     );
    };

    const AnnouncementAdminManager = ({ currentBranch, globalBranches, isSuperAdmin, announcements, triggerNotify, getPublicPath }) => {
     const [newT, setNewT] = useState('');
     const [newC, setNewC] = useState('');
     const [newI, setNewI] = useState(null);
     const [editingId, setEditingId] = useState(null);
     const [syncToAll, setSyncToAll] = useState(false);
     
     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);

     const startEdit = (item) => {
      setEditingId(item.id); setNewT(item.title); setNewC(item.content || ''); setNewI(item.img || null);
      window.scrollTo({ top: 0, behavior: 'smooth' });
     };
     const cancelEdit = () => { setEditingId(null); setNewT(''); setNewC(''); setNewI(null); };

     const handleSave = async () => {
      if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
      let imgToSave = newI;
      if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      const sharedId = editingId ? String(editingId) : crypto.randomUUID();
      const now = Date.now();

      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
         if (!editingId) {
           itemData.timestamp = now;
           itemData.readBy = [];
           itemData.sortOrder = announcements.length;
         }
         const colPath = getPublicPath(`announcements/branch_${branch}/items`);
         return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
        }));

        if (!editingId && syncToAll === false) {
         triggerLineAlert("ANNOUNCEMENT", { branch: currentBranch, title: newT.trim(), content: newC.trim() });
        } else if (!editingId && syncToAll) {
         targetBranches.forEach(b => triggerLineAlert("ANNOUNCEMENT", { branch: b, title: newT.trim(), content: newC.trim() }));
        }

        triggerNotify(editingId ? "公告已更新" : "公告已發佈", "success");
        cancelEdit();
      } catch (e) { triggerNotify("儲存失敗", "error"); }
     };

     const deleteItem = async (id) => {
      const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該公告。" : "確定要刪除嗎？");
      if(!isConfirmed) return;
      
      const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
      try {
        await Promise.all(targetBranches.map(async (branch) => {
         const idStr = String(id);
         await db.collection(getPublicPath(`announcements/branch_${branch}/items`)).doc(idStr).delete();
         
         const oldDocRef = db.doc(getPublicPath(`announcements/branch_${branch}`));
         const oldSnap = await oldDocRef.get();
         if(oldSnap.exists && oldSnap.data().items) {
           await oldDocRef.set({ items: oldSnap.data().items.filter(i => String(i.id) !== idStr) });
         }
        }));
        triggerNotify("公告已刪除", "info");
      } catch(e) { console.error(e); triggerNotify("刪除失敗", "error"); }
     };

     const handleDragStart = (id) => setDraggedId(id);
     const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
     const handleDragEnd = async () => {
      if (draggedId !== null && overId !== null && draggedId !== overId) {
        const newItems = [...announcements];
        const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
        const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
        
        if (fromIndex !== -1 && toIndex !== -1) {
         const [movedItem] = newItems.splice(fromIndex, 1);
         newItems.splice(toIndex, 0, movedItem);

         try {
           const batch = db.batch();
           newItems.forEach((item, index) => {
            const docRef = db.collection(getPublicPath(`announcements/branch_${currentBranch}/items`)).doc(String(item.id));
            batch.set(docRef, { ...item, sortOrder: index }, { merge: true });
           });
           await batch.commit();
         } catch(e) {
           triggerNotify("排序儲存失敗", "error");
         }

      }
      setDraggedId(null);
      setOverId(null);

           </h3>
           {isSuperAdmin && (
            <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">

         <input placeholder="公告標題" value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" />
         <textarea placeholder="詳細描述..." rows="3" value={newC} onChange={e=>setNewC(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
         
         <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
           {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳附圖"}
           <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>

           <div className="relative w-full h-32 rounded-xl overflow-hidden border">
            <img src={newI} className="w-full h-full object-cover" />
            <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
           </div>
         )}

         <div className="flex gap-3 pt-2">
           {editingId && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消編輯</button>}
           <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${editingId ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
            {editingId ? "儲存修改" : "發佈"}
           </button>
         </div>
        </div>
        <div className="space-y-3">
         {announcements.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
         {(announcements||[]).map((a) => (
           <div 
            key={a.id} 
            draggable
            onDragStart={() => handleDragStart(a.id)}
            onDragOver={(e) => handleDragOver(e, a.id)}
            onDragEnd={handleDragEnd}
            className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 shadow-sm transition-all duration-200 text-left ${draggedId === a.id ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === a.id ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
           >
            <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-start justify-center pt-2">
              <Icon name="grip-vertical" size={18} />
            </div>
            <div className="flex-1 min-w-0 space-y-3">
              <div className="flex justify-between items-start">
               <div>
