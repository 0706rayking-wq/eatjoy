         {!hasSignedCurrent ? <SignaturePad onSave={handleSign} /> : (
           <div className="glass-panel p-10 rounded-[3rem] bg-emerald-50 border-emerald-100 text-emerald-600 text-center font-bold shadow-sm"><Icon name="check-circle" size={48} className="mx-auto mb-2" /> 您已完成 [{activeTab}] 的簽署</div>
         )}
        </div>
      </div>
     );
    };

    const InspectionPage = ({ onBack, standards, completedZones, triggerNotify, branchZones, currentBranch, getPublicPath, currentUser, isManager, isSuperAdmin }) => {
  const [activeZone, setActiveZone] = useState(null);
  const [dailyPhotos, setDailyPhotos] = useState({});
  const [loading, setLoading] = useState(false);
  const [isSubmitted, setIsSubmitted] = useState(false);
  const [isResetting, setIsResetting] = useState(false);

  useEffect(() => {
    const unsubscribe = db.collection(getPublicPath(`daily_photos_${currentBranch}`)).onSnapshot(snapshot => {
     const allPhotos = {}; 
     snapshot.forEach(doc => { 
      const data = doc.data(); 
      allPhotos[`${data.zoneId}_${data.itemIdx}`] = {
        photo: data.photo,
        uploaderName: data.uploaderName || '未知'
      }; 
     });
     setDailyPhotos(allPhotos);
    });
    return () => unsubscribe();
  }, [currentBranch, getPublicPath]);

  const handleFile = (e, idx) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader(); r.onloadend = async () => {
     const compressed = await compressImage(r.result, 800, 0.5);
     db.collection(getPublicPath(`daily_photos_${currentBranch}`)).doc(`${activeZone.id}_${idx}`).set({ 
      photo: compressed, 
      zoneId: activeZone.id, 
      itemIdx: idx, 
      timestamp: Date.now(),
      uploaderName: currentUser?.name || '未知'
     }).then(() => triggerNotify("實拍照已更新", "success"));
    };
    r.readAsDataURL(file);
  };

  const isAllUploaded = useMemo(() => {
    if (!activeZone) return false;
    const currentStandards = standards[activeZone.id] || [];
    if (currentStandards.length === 0) return true;
    return currentStandards.every((_, i) => !!dailyPhotos[`${activeZone.id}_${i}`]?.photo);
  }, [activeZone, standards, dailyPhotos]);

  const handleSubmit = () => {
    setLoading(true);
    setTimeout(() => {
     if (!completedZones.includes(activeZone.id)) {
      const progressRef = db.doc(getPublicPath(`system/progress_${currentBranch}`));
      progressRef.set({ 
        completedZones: firebase.firestore.FieldValue.arrayUnion(activeZone.id) 
      }, { merge: true }).then(async () => { 
        const snap = await progressRef.get();
        const latestCompleted = snap.exists ? (snap.data().completedZones || []) : [];
        const currentHour = new Date().getHours();
        if (latestCompleted.length >= branchZones.length && branchZones.length > 0 && currentHour < 23) {
         triggerLineAlert("COMPLETION", { branch: currentBranch, time: new Date().toLocaleTimeString() });
        }
      }).catch(e => console.error("更新進度失敗", e));
     }
     setLoading(false); 
     setIsSubmitted(true); 
     triggerNotify("善後巡視已上傳", "success");
    }, 800);
  };

  const handleResetAll = async () => {
    if (!window.confirm("確定要手動重置今天的「所有巡視紀錄與照片」嗎？\n(此動作無法復原)")) return;
    setIsResetting(true);
    try {
     const photosRef = await db.collection(getPublicPath(`daily_photos_${currentBranch}`)).get();
     const batch = db.batch();
     photosRef.forEach(d => batch.delete(d.ref));
     await batch.commit();
     await db.doc(getPublicPath(`system/progress_${currentBranch}`)).set({ completedZones: [] }, {merge: true});
     triggerNotify("已清空所有巡視紀錄", "success");
    } catch (e) {
     console.error(e);
     triggerNotify("重置失敗", "error");
    }
    setIsResetting(false);
  };

  if(activeZone) return (
    <div className="p-4 space-y-6 page-enter pb-24 text-left font-bold">
     <button onClick={()=>{setActiveZone(null);setIsSubmitted(false);}} className="p-3 bg-white rounded-2xl shadow-sm border active:scale-90 transition-all"><Icon name="arrow-left" size={20}/></button>
     <div className="space-y-4">
      {(standards[activeZone.id] || []).map((item, i) => (
        <div key={i} className="glass-panel p-4 rounded-[2rem] border border-slate-100 bg-white">
         <p className="text-[11px] font-black text-slate-700 mb-3 bg-slate-50 p-3 rounded-xl flex items-center gap-2 border shadow-inner"><Icon name="info" size={14} className="text-brand-red" />要求：{item.note || "無說明"}</p>
         <div className="grid grid-cols-2 gap-3">
           <div className="text-center"><span className="text-[9px] font-black text-emerald-600">標準照</span><img src={item.url} className="w-full aspect-square object-cover rounded-2xl border mt-2 shadow-inner" /></div>
           
           <div className="text-center">
            <span className="text-[9px] font-black text-brand-red">實拍照</span>
            {dailyPhotos[`${activeZone.id}_${i}`]?.photo ? (
              <div className="relative mt-2">
               <img src={dailyPhotos[`${activeZone.id}_${i}`].photo} className="w-full aspect-square object-cover rounded-2xl border" />
               
               <div className="absolute top-1.5 left-1.5 bg-slate-900/70 backdrop-blur-sm text-white text-[9px] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm font-bold z-10">
                 <Icon name="user" size={10} />
                 {dailyPhotos[`${activeZone.id}_${i}`].uploaderName}
               </div>

               <label className="absolute bottom-1 right-1 bg-white/90 p-1.5 rounded-lg cursor-pointer border shadow-sm text-slate-600 hover:text-brand-red transition-colors z-10">
                 <Icon name="refresh-cw" size={14}/>
                 <input type="file" className="hidden" onChange={(e)=>handleFile(e, i)} />
               </label>
              </div>
            ) : (
              <label className="w-full aspect-square bg-slate-50 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center mt-2 cursor-pointer active:bg-slate-100">
               <Icon name="plus" size={20} className="text-slate-300"/>
               <input type="file" className="hidden" onChange={(e)=>handleFile(e, i)} />
              </label>
            )}
           </div>
         </div>
        </div>
      ))}
     </div>
     {!isSubmitted ? (
      <div className="space-y-3">
        {!isAllUploaded && <p className="text-[10px] text-red-500 font-bold text-center animate-pulse"><Icon name="alert-circle" size={12} /> 請完成所有善後巡視照上傳</p>}
        <button onClick={handleSubmit} disabled={!isAllUploaded || loading} className={`w-full py-5 rounded-[2rem] font-black text-white shadow-xl flex items-center justify-center gap-2 ${isAllUploaded ? 'bg-brand-red active:scale-95' : 'bg-slate-300 cursor-not-allowed'}`}>{loading ? "提交中..." : "確認提交結果"}</button>
      </div>
     ) : <div className="p-8 rounded-[3rem] bg-emerald-50 text-emerald-700 text-center font-black">提交完成 ✅</div>}
    </div>
  );

  return (
    <div className="p-4 space-y-4 page-enter pb-20 text-left font-bold">
     <BackButton onClick={onBack} title="巡視崗位清單" />
     <div className="bg-brand-red p-7 rounded-[2.5rem] text-white shadow-lg flex justify-between items-center mb-2">
      <div><p className="text-[10px] font-black uppercase opacity-60 mb-1 leading-none tracking-widest">巡視進度 (18:00刷新)</p><p className="text-3xl font-black mt-2 font-bold">{completedZones.length} / {branchZones.length || 1}</p></div>
      <div className="w-14 h-14 rounded-full border-4 border-white/20 flex items-center justify-center font-bold text-xs">{branchZones.length > 0 ? Math.round((completedZones.length/branchZones.length)*100) : 0}%</div>
     </div>

     {(isManager || isSuperAdmin) && (
     <div className="flex justify-end mb-4 px-1">
      <button onClick={handleResetAll} disabled={isResetting || (completedZones.length === 0 && Object.keys(dailyPhotos).length === 0)} className={`text-[10px] px-4 py-2.5 rounded-xl font-black flex items-center gap-1.5 transition-all shadow-sm ${isResetting || (completedZones.length === 0 && Object.keys(dailyPhotos).length === 0) ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-rose-50 text-brand-red border border-rose-100 active:scale-95'}`}>
        <Icon name="refresh-cw" size={14} className={isResetting ? "animate-spin" : ""} />
        {isResetting ? "重置中..." : "重置所有巡視紀錄"}
      </button>
     </div>
     )}

     {branchZones.length === 0 && <p className="text-center text-slate-400 py-10 text-xs">此分店尚未設定任何區站，請至後台設定。</p>}
     <div className="grid grid-cols-1 gap-3">
      {branchZones.map(z => {
        const isCompleted = completedZones.includes(z.id);
        return (
         <div 
           key={z.id} 
           onClick={() => setActiveZone(z)} 
           className={`p-6 rounded-[2rem] flex items-center justify-between cursor-pointer transition-all shadow-sm border ${
            isCompleted 
            ? 'bg-emerald-50 border-emerald-200 active:bg-emerald-100' 
            : 'bg-white border-slate-100 active:bg-slate-50 glass-panel'
           }`}
         >
           <div className={`flex items-center gap-4 font-bold ${isCompleted ? 'text-emerald-500' : 'text-slate-400'}`}>
            <Icon name={isCompleted ? "check-circle" : "camera"} size={22} />
            <span className={`text-sm font-bold leading-none ${isCompleted ? 'text-emerald-700' : 'text-slate-800'}`}>{z.name}</span>
           </div>
           {isCompleted ? (
            <span className="text-[10px] font-black text-emerald-600 bg-emerald-100 px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm"><Icon name="check" size={12}/> 已完成</span>
           ) : (
            <Icon name="chevron-right" size={18} className="text-slate-300" />
           )}
         </div>
        );
      })}
     </div>
    </div>
  );
};

    const OrderingSystem = ({ onBack, triggerNotify, globalBranches, currentBranch, isSuperAdmin, getPublicPath }) => {
     const [storeDatabases, setStoreDatabases] = useState({});
     const branches = isSuperAdmin ? globalBranches : [currentBranch];
     const [selectedBranch, setSelectedBranch] = useState(currentBranch);
     const currentDb = storeDatabases[selectedBranch] || { ingredients: [], zones: [...INITIAL_ORDER_ZONES], vendors: [], history: [] };

     const [orderQuantities, setOrderQuantities] = useState({});

     useEffect(() => {
      if (!selectedBranch) return;
      const docPath = getPublicPath(`ordering/db_${selectedBranch}`);
      const unsubscribe = db.doc(docPath).onSnapshot(docSnap => {
        if (docSnap.exists) {
         const data = docSnap.data();
         setStoreDatabases(prev => ({ ...prev, [selectedBranch]: data }));
         if (data.activeQuantities) {
           setOrderQuantities(data.activeQuantities);
         } else {
           setOrderQuantities({});
         }
        } else {
         const defaultDb = { ingredients: [], zones: [...INITIAL_ORDER_ZONES], vendors: [], history: [], activeQuantities: {} };
         setStoreDatabases(prev => ({ ...prev, [selectedBranch]: defaultDb }));
         db.doc(docPath).set(defaultDb);
        }
      }, err => {
        console.error("讀取叫貨資料庫失敗:", err);
        triggerNotify("讀取叫貨資料庫失敗", "error");
      });
      return () => unsubscribe();
     }, [selectedBranch]);

     const [view, setView] = useState('setup'); 
     const [adminTab, setAdminTab] = useState('ingredients');
     const [analyticsZone, setAnalyticsZone] = useState(null);
     const [expandedAnalyticsItem, setExpandedAnalyticsItem] = useState(null);
     const [analyticsMonth, setAnalyticsMonth] = useState(() => new Date().toISOString().substring(0, 7));
     
     const [orderDate, setOrderDate] = useState(() => {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.toISOString().split('T')[0];
     });

     const [selectedZone, setSelectedZone] = useState(null);
     const [searchQuery, setSearchQuery] = useState('');
     const [copyStatus, setCopyStatus] = useState({});
     const [draggedId, setDraggedId] = useState(null);
     const [overId, setOverId] = useState(null);
     const [editedOrderTexts, setEditedOrderTexts] = useState({});

     const [adminZoneFilter, setAdminZoneFilter] = useState('全部');
     const [adminVendorFilter, setAdminVendorFilter] = useState('全部');
     const [adminItemLimit, setAdminItemLimit] = useState(30); 
     
     const { customUnits, ALL_UNITS, addCustomUnit, removeCustomUnit } = useCustomUnits();
     const [newItem, setNewItem] = useState({ name: '', vendor: '', unit: '包', zone: '菜區' });
     const [newVendorName, setNewVendorName] = useState('');
     const [newZoneName, setNewZoneName] = useState('');

     const [editingIngredientId, setEditingIngredientId] = useState(null);
     const [editIngredientData, setEditIngredientData] = useState(null);

     const [editingVendorName, setEditingVendorName] = useState(null);
     const [editVendorNewName, setEditVendorNewName] = useState('');

     const updateCurrentDb = (newData) => {
      const updatedDb = { ...currentDb, ...newData };
      setStoreDatabases(prev => ({ ...prev, [selectedBranch]: updatedDb }));
      db.doc(getPublicPath(`ordering/db_${selectedBranch}`)).set(updatedDb, { merge: true }).catch(e => {
        console.error("更新叫貨資料失敗", e);
        triggerNotify("儲存失敗，請檢查網路連線", "error");
      });
     };

     const saveOrderToHistory = () => {
      const orderItems = currentDb.ingredients
        .map(item => ({
         name: item.name,
         qty: parseFloat(orderQuantities[item.id] || 0),
         unit: item.unit
        }))
        .filter(i => i.qty > 0);
        
      if (orderItems.length === 0) return;

      const existingRecordIndex = currentDb.history.findIndex(r => r.date === orderDate);
      let newHistory = [...currentDb.history];

      if (existingRecordIndex > -1) {
        newHistory[existingRecordIndex] = {
         ...newHistory[existingRecordIndex],
         timestamp: new Date().toLocaleString(),
         items: orderItems
        };
      } else {
        const newHistoryRecord = {
         id: Date.now(),
         date: orderDate,
         timestamp: new Date().toLocaleString(),
         items: orderItems
        };
        newHistory.push(newHistoryRecord);
      }

      if (newHistory.length > 365) {
        newHistory = newHistory.slice(-365);
      }

      updateCurrentDb({ history: newHistory });
     };

     const monthlyStats = useMemo(() => {
      const stats = {};
      currentDb.history.forEach(record => {
        if (record.date.startsWith(analyticsMonth)) {
         record.items.forEach(item => {
           stats[item.name] = (stats[item.name] || 0) + item.qty;
         });
        }
      });
      return stats;
     }, [currentDb.history, analyticsMonth]); // 👈 這裡的依賴陣列也要改

     const handleDragStart = (id) => setDraggedId(id);
     const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
     const handleDragEnd = () => {
      if (draggedId !== null && overId !== null) {
        const newIngredients = [...currentDb.ingredients];
        const fromIndex = newIngredients.findIndex(i => i.id === draggedId);
        const toIndex = newIngredients.findIndex(i => i.id === overId);
        const [movedItem] = newIngredients.splice(fromIndex, 1);
        newIngredients.splice(toIndex, 0, movedItem);
        updateCurrentDb({ ingredients: newIngredients });
      }
      setDraggedId(null);
      setOverId(null);
     };

        const groupedOrders = useMemo(() => {
         const list = currentDb.ingredients
           .map(item => ({ ...item, orderQty: parseFloat(orderQuantities[item.id] || 0) }))
           .filter(i => i.orderQty > 0);

         return list.reduce((acc, item) => {
           if (!acc[item.vendor]) acc[item.vendor] = [];
    
           const existingItem = acc[item.vendor].find(i => i.name === item.name);
    
           if (existingItem) {
            existingItem.orderQty += item.orderQty;
           } else {
            acc[item.vendor].push({ ...item });
           }
    
           return acc;
         }, {});
        }, [currentDb.ingredients, orderQuantities]);

     useEffect(() => {
      if (view === 'result') {
        const initialTexts = {};
        const [y, m, d] = orderDate.split('-');
        const dateStr = `${parseInt(m)}/${parseInt(d)}`;
        Object.entries(groupedOrders).forEach(([vendor, items]) => {
         let text = `${selectedBranch} ${dateStr}\n`;
         items.forEach(item => { text += `${item.name} ${item.orderQty}${item.unit}\n`; });
         initialTexts[vendor] = text.trim();
        });
        setEditedOrderTexts(initialTexts);
      }
     }, [view, groupedOrders, selectedBranch, orderDate]);

     const handleTextChange = (vendor, newText) => {
      setEditedOrderTexts(prev => ({ ...prev, [vendor]: newText }));
     };

     const handleShare = async (vendorName) => {
      saveOrderToHistory();
      const text = editedOrderTexts[vendorName] || "";

      // 1. 優先用 navigator.share（iOS 原生分享，可直接選 LINE）
      if (navigator.share) {
        try {
          await navigator.share({ title: `訂貨單-${vendorName}`, text });
          setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
          triggerNotify(`${vendorName} 訂單已分享！`, 'success');
          setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
          return;
        } catch (err) {
          // 用戶取消分享、或 share 失敗 → fallback 到複製
          if (err.name === 'AbortError') return; // 主動取消不需提示
        }
      }

      // 2. Fallback：複製到剪貼簿（現代 API）
      try {
        await navigator.clipboard.writeText(text);
        setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
        triggerNotify(`${vendorName} 訂單已複製！請貼到 LINE 傳送`, 'success');
        setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
      } catch (clipErr) {
        // 最後備援：舊版 execCommand
        try {
          const el = document.createElement('textarea');
          el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
          document.body.appendChild(el); el.focus(); el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopyStatus(prev => ({ ...prev, [vendorName]: true }));
          triggerNotify(`${vendorName} 訂單已複製！請貼到 LINE 傳送`, 'success');
          setTimeout(() => setCopyStatus(prev => ({ ...prev, [vendorName]: false })), 3000);
        } catch (e) {
          triggerNotify('複製失敗，請手動複製訂單內容', 'error');
        }
      }
     };

     const handleQuantityChange = (itemId, newVal) => {
      const val = Math.max(0, parseFloat(newVal) || 0);
      setOrderQuantities(prev => ({ ...prev, [itemId]: val }));
      
      const docRef = db.doc(getPublicPath(`ordering/db_${selectedBranch}`));
      docRef.update({
        [`activeQuantities.${itemId}`]: val
      }).catch(() => {
        docRef.set({ activeQuantities: { [itemId]: val } }, { merge: true });
      });
     };

     const Nav = ({ title, onBackAction, rightAction }) => (
      <div className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200 px-4 py-4 flex items-center justify-between shadow-sm" style={{background:"var(--s1, rgba(255,255,255,0.95))", borderColor:"var(--gold-border, #e2e8f0)"}}>
        <div className="flex items-center gap-3">
         {onBackAction && (
           <button onClick={onBackAction} className="w-10 h-10 bg-slate-100 rounded-xl active-scale btn-touch flex items-center justify-center" style={{background:"var(--s2, #f1f5f9)"}}>
            <OrderSymbolIcon name="ChevronLeft" className="text-slate-700" />
           </button>
         )}
         <h1 className="text-lg font-black text-slate-800 tracking-tight">{title}</h1>
        </div>
        {rightAction}
      </div>
     );

     return (
      <div className="text-slate-900 pb-24 selection:bg-rose-100 overflow-x-hidden page-enter" style={{background:"var(--s0, transparent)", color:"var(--t1, inherit)"}}>
        {/* 1. 設定頁面 */}
        {view === 'setup' && (
         <div className="max-w-md mx-auto px-6 pt-10">
           <div className="flex justify-center mb-8">
            <div className="bg-brand-red w-20 h-20 rounded-[2.5rem] shadow-2xl shadow-brand-red/20 flex items-center justify-center rotate-3 font-black text-white text-3xl">
              <OrderSymbolIcon name="Package" className="text-4xl" />
            </div>
           </div>
           <h2 className="text-3xl font-black text-center text-slate-800 mb-1">簡易下單系統</h2>
           <p className="text-center text-slate-400 text-sm mb-8 font-medium">各區下單完成後整合送出</p>

           <div className="bg-white rounded-[3rem] shadow-xl border border-white overflow-hidden">
            <div className="flex flex-col">
              <div className="bg-slate-50 px-8 py-5 border-b border-slate-100">
               <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{isSuperAdmin ? '選擇分店' : '當前分店'}</label>
               {isSuperAdmin ? (
                 <select value={selectedBranch} onChange={e => setSelectedBranch(e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black outline-none mt-1 text-brand-red">
                  {branches.map(b => <option key={b} value={b}>{b}</option>)}
                 </select>
               ) : (
                 <div className="w-full text-xl font-black mt-1 text-brand-red py-1">{selectedBranch}</div>
               )}
              </div>
              <div className="px-8 py-5 border-b border-slate-100">
               <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">進貨日期</label>
               <input type="date" value={orderDate} onChange={e => setOrderDate(e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black outline-none mt-1" />
              </div>
              
              <div className="p-8">
               <button onClick={() => setView('zone_select')} className="w-full bg-brand-red text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-brand-red/20 flex items-center justify-center gap-3 active-scale transition-all">
                 開始點貨 <OrderSymbolIcon name="ArrowRight" className="text-xl" />
               </button>
               
               <div className="grid grid-cols-2 gap-3 mt-4">
                 <button onClick={() => { setView('analytics'); setSelectedItemName(''); setAnalyticsSearch(''); }} className="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 active-scale transition-all">
                  <OrderSymbolIcon name="Chart" /> 數據分析報表
                 </button>
                 <button onClick={() => { setView('admin'); setAdminTab('ingredients'); }} className="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 active-scale transition-all">
                  <OrderSymbolIcon name="Settings" /> 食材廠商設定
                 </button>
               </div>
               <button onClick={onBack} className="w-full py-4 text-slate-400 font-bold text-xs uppercase mt-4">返回廚務OS</button>
              </div>
            </div>
           </div>
         </div>
        )}

        {/* 2. 區站選擇 */}
        {view === 'zone_select' && (
         <div className="max-w-md mx-auto">
           <Nav title={`${selectedBranch} - 區站`} onBackAction={() => setView('setup')} />
           <div className="p-6 space-y-6 pb-20 mt-4">
            <div className="grid grid-cols-1 gap-4">
              {currentDb.zones.map((zone) => {
               const zoneItems = currentDb.ingredients.filter(i => i.zone === zone.name);
               const activeCount = zoneItems.filter(i => (orderQuantities[i.id] || 0) > 0).length;
               return (
                 <button key={zone.name} onClick={() => { setSelectedZone(zone.name); setView('inventory'); }} className={`p-5 rounded-[2.5rem] border transition-all active-scale flex items-center justify-between bg-white shadow-sm hover:border-brand-red/30 ${activeCount > 0 ? 'border-brand-red/30 ring-4 ring-rose-50' : 'border-slate-100'}`}>
                  <div className="flex items-center gap-4">
                    <div className={`${zone.color} w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center font-black text-white text-2xl`}>
                     <OrderSymbolIcon name={zone.icon} />
                    </div>
                    <div className="text-left">
                     <h3 className="font-black text-lg text-slate-800">{zone.name}</h3>
                     <p className="text-xs font-bold text-slate-400">{activeCount > 0 ? `已點: ${activeCount} 項` : `清單共 ${zoneItems.length} 項`}</p>
                    </div>
                  </div>
                  <OrderSymbolIcon name="ChevronRight" className="text-slate-300 text-xl" />
                 </button>
               );
              })}
            </div>

            {Object.keys(groupedOrders).length > 0 && (
              <button 
               onClick={() => setView('result')} 
               className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-2xl flex items-center justify-center gap-2 active-scale transition-all mt-2"
              >
               <OrderSymbolIcon name="ClipboardCheck" /> 生成廠商訂單 ({Object.keys(groupedOrders).length})
              </button>
            )}
           </div>
         </div>
        )}

        {/* 3. 食材點貨頁面 */}
        {view === 'inventory' && (
         <div className="max-w-md mx-auto">
           <Nav title={selectedZone} onBackAction={() => { setView('zone_select'); setSearchQuery(''); }} />
           <div className="bg-white/80 backdrop-blur-md sticky top-[61px] z-40 px-4 py-4 border-b border-slate-100 shadow-sm" style={{background:"var(--s1, rgba(255,255,255,0.8))", borderColor:"var(--gold-border, #f1f5f9)"}}>
            <div className="relative flex items-center">
              <div className="absolute left-4 font-black text-slate-300 flex items-center"><OrderSymbolIcon name="Search" /></div>
              <input type="text" placeholder={`搜尋${selectedZone}...`} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 text-sm font-bold focus:ring-2 focus:ring-brand-red/50 outline-none" style={{color:"var(--t1, inherit)"}} />
            </div>
           </div>
           <div className="p-4 space-y-4 pb-40">
            {currentDb.ingredients.filter(i => i.zone === selectedZone && i.name.includes(searchQuery)).map((item) => {
              const qty = orderQuantities[item.id] || 0;
              const isDragging = draggedId === item.id;
              const isOver = overId === item.id;
              return (
               <div key={item.id} draggable onDragStart={() => handleDragStart(item.id)} onDragOver={(e) => handleDragOver(e, item.id)} onDragEnd={handleDragEnd} className={`bg-white p-5 rounded-[2rem] border shadow-sm flex items-center justify-between transition-all duration-300 ${isDragging ? 'drag-ghost' : 'border-slate-100'} ${isOver ? 'border-brand-red/40 translate-y-1 shadow-md' : ''}`}>
                 <div className="flex items-center gap-4 flex-1 min-w-0">
                  <div className="p-1.5 text-slate-300 drag-handle font-black text-xl flex items-center"><OrderSymbolIcon name="GripVertical" /></div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-black text-slate-800 text-lg truncate leading-tight">{item.name}</h4>
                    <p className="text-[10px] font-black text-brand-red uppercase mt-0.5">{item.vendor}</p>
                  </div>
                 </div>
                 <div className="flex items-center gap-2 bg-slate-100/50 p-1.5 rounded-3xl shrink-0 ml-4">
                  <button onClick={() => handleQuantityChange(item.id, qty - 1)} className="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center active-scale btn-touch text-slate-400 font-black text-2xl"><OrderSymbolIcon name="Minus" /></button>
                  
                  <OrderQtyInput value={qty} onChange={(val) => handleQuantityChange(item.id, val)} unit={item.unit} />
                  
                  <button onClick={() => handleQuantityChange(item.id, qty + 1)} className="w-12 h-12 bg-brand-red rounded-2xl shadow-lg flex items-center justify-center text-white active-scale btn-touch font-black text-2xl"><OrderSymbolIcon name="Plus" /></button>
                 </div>
               </div>
              );
            })}
            <div className="mt-12 pt-6 border-t border-slate-200">
              <button 
               onClick={() => { setView('zone_select'); window.scrollTo(0,0); }}
               className="w-full bg-white border-2 border-brand-red text-brand-red py-5 rounded-3xl font-black text-lg active-scale transition-all shadow-lg flex items-center justify-center gap-2"
              >
               <OrderSymbolIcon name="ChevronLeft" /> 點貨完畢，返回區站選擇
              </button>
            </div>
           </div>
         </div>
        )}

        {/* 4. 結果頁面 */}
        {view === 'result' && (
         <div className="max-w-md mx-auto px-6">
           <Nav title="確認訂單並編輯" onBackAction={() => setView('zone_select')} />
           <div className="space-y-8 pb-32 mt-6">
            <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-xs font-bold text-amber-700 leading-relaxed">
              提示：點擊「發送」後系統會自動保存此次叫貨紀錄至數據報表中。
            </div>
            {Object.keys(groupedOrders).length === 0 ? (
              <div className="text-center py-24 bg-white rounded-[3rem] border border-dashed border-slate-200">
               <div className="font-black text-slate-200 text-5xl mb-4">?</div>
               <p className="text-slate-400 font-black">尚未叫貨</p>
              </div>
            ) : (
              Object.entries(groupedOrders).map(([vendor, items]) => (
               <div key={vendor} className="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden animate-in zoom-in-95 duration-300">
                 <div className="p-6 bg-slate-900 flex items-center justify-between">
                  <div>
                    <h3 className="text-white font-black text-xl">{vendor}</h3>
                    <p className="text-rose-200 text-[10px] font-bold uppercase mt-1 flex items-center gap-1"><OrderSymbolIcon name="Edit" className="w-3 h-3" /> 文字框可編輯</p>
                  </div>
                  <div className="bg-white/10 px-4 py-1.5 rounded-full text-[10px] text-white font-black uppercase">{items.length} 項</div>
                 </div>
                 <div className="p-6 space-y-5">
                  <textarea className="editable-order-text no-scrollbar" rows={Math.max(4, (editedOrderTexts[vendor]?.split('\n').length || 0) + 1)} value={editedOrderTexts[vendor] || ""} onChange={(e) => handleTextChange(vendor, e.target.value)} />
                  <button onClick={() => handleShare(vendor)} className={`w-full py-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg active-scale transition-all ${copyStatus[vendor] ? 'bg-emerald-500 text-white' : 'bg-brand-red text-white shadow-brand-red/20'}`}>
                    <OrderSymbolIcon name={copyStatus[vendor] ? "CheckCircle2" : "Share2"} /> {copyStatus[vendor] ? '紀錄已保存！已複製內容' : `發送訂單給 ${vendor}`}
                  </button>
                 </div>
               </div>
              ))
            )}
           </div>
         </div>
        )}

        {/* 數據分析報表頁面 (區站分類版) */}
        {view === 'analytics' && (
         <div className="max-w-md mx-auto">
           <Nav 
            title={`${selectedBranch} - 數據報表`} 
            onBackAction={() => {
              if (analyticsZone) {
               setAnalyticsZone(null);
               setExpandedAnalyticsItem(null);
              } else {
               setView('setup');
              }
            }} 
           />
           <div className="p-6 space-y-6">
            {!analyticsZone ? (
              <div className="space-y-4 animate-in fade-in">
               <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-xs font-bold text-amber-700 leading-relaxed shadow-inner flex flex-col gap-2">
                 <div className="flex justify-between items-center">
                  <span>💡 提示：請先選擇要檢視的月份 ➔</span>
                  <input 
                    type="month" 
                    value={analyticsMonth} 
                    onChange={(e) => setAnalyticsMonth(e.target.value)} 
                    className="bg-white border border-amber-300 text-amber-900 rounded-lg px-2 py-1.5 outline-none font-black text-sm shadow-sm"
                  />
                 </div>
                 <div className="text-amber-600/80 mt-1 border-t border-amber-200/50 pt-2">
                  目前正顯示 <span className="font-black text-brand-red">{analyticsMonth}</span> 累計叫貨數據。
                 </div>
               </div>
               <div className="grid grid-cols-2 gap-3">
                 {currentDb.zones.map(zone => {
                  const activeItemsCount = currentDb.ingredients.filter(i => 
                    i.zone === zone.name && monthlyStats[i.name] > 0
                  ).length;

                  return (
                    <button 
                     key={zone.name} 
                     onClick={() => {
                       setAnalyticsZone(zone.name);
                       window.scrollTo(0, 0);
                     }}
                     className="p-5 bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:border-brand-red/30 active:scale-95 transition-all text-left flex flex-col justify-between aspect-square group"
                    >                                              <div className={`${zone.color} w-12 h-12 rounded-2xl shadow-sm flex items-center justify-center font-black text-white text-xl mb-2 group-hover:scale-110 transition-transform`}>
                       <OrderSymbolIcon name={zone.icon} />
                     </div>
                     <div>
                       <h3 className="font-black text-slate-800 text-base">{zone.name}</h3>
                       <p className="text-[10px] font-bold text-slate-400 mt-1">
                        {activeItemsCount > 0 ? <span className="text-brand-red">已叫貨 {activeItemsCount} 項</span> : '尚無叫貨紀錄'}
                       </p>
                     </div>
                    </button>
                  );
                 })}
               </div>
              </div>
            ) : (

                       <button onClick={() => updateCurrentDb({ ingredients: currentDb.ingredients.filter(i => i.id !== item.id) })} className="bg-rose-50 text-rose-400 hover:text-rose-600 p-2.5 rounded-xl"><OrderSymbolIcon name="Trash2" /></button>

                 {/* 分頁載入更多按鈕 */}
                 {currentDb.ingredients.filter(i => (adminZoneFilter === '全部' || i.zone === adminZoneFilter) && (adminVendorFilter === '全部' || i.vendor === adminVendorFilter)).length > adminItemLimit && (

                 <button onClick={() => { if(newVendorName && !currentDb.vendors.includes(newVendorName)) { updateCurrentDb({ vendors: [...currentDb.vendors, newVendorName] }); setNewVendorName(''); triggerNotify('新增廠商成功', 'success'); } else if (currentDb.vendors.includes(newVendorName)) { triggerNotify('廠商已存在', 'error'); } }} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black shrink-0 whitespace-nowrap shadow-sm">新增</button>

    };
    // WarlogPhase 獨立子組件（避免 hook 在 if 中問題）
    const WarlogPhase = ({ currentUser, getPublicPath, loadSave, writeSave, campBg, cardStyle, NavBar, setFrPhase }) => {
     const { useState: useS, useEffect: useE } = React;
     const [warlogEntries, setWarlogEntries] = useS([]);
     const [wlLines, setWlLines] = useS(() => {
      const s = loadSave(); return s.warlogLines || { entry:'', defeat:'', rivalEntry:'', rivalDefeat:'' };
     });
     const [todayClaimed, setTodayClaimed] = useS(0);
     const MAX_DAILY_COINS = 300;
     const today = new Date().toDateString();

     useE(() => {
      if (!currentUser?.phone) return;
      const unsub = db.collection(getPublicPath(`warlog_${currentUser.phone}`))
       .orderBy('timestamp','desc').limit(30)
       .onSnapshot(snap => {
        const entries = snap.docs.map(d=>({id:d.id,...d.data()}));
        setWarlogEntries(entries);
        const claimed = entries.filter(e=>e.date===today&&e.claimed).reduce((s,e)=>s+(e.coins||0),0);
        setTodayClaimed(claimed);
       }, ()=>{});
      return () => unsub();
     }, [currentUser?.phone]);

     const saveLines = (newLines) => {
      setWlLines(newLines);
      writeSave({ warlogLines: newLines });
      if (currentUser?.phone) {
       db.collection(getPublicPath('users')).doc(currentUser.phone)
        .update({ warlogLines: newLines }).catch(()=>{});
      }
     };

     const claimEntry = async (entry) => {
      if (entry.claimed) return;
      if (todayClaimed >= MAX_DAILY_COINS) { alert('今日戰況金幣已達上限 ' + MAX_DAILY_COINS + ' 💰'); return; }
      const canClaim = Math.min(entry.coins, MAX_DAILY_COINS - todayClaimed);
      const newGold = (loadSave().gold||0) + canClaim;
      writeSave({ gold: newGold });
      await db.collection(getPublicPath(`warlog_${currentUser.phone}`)).doc(entry.id).update({ claimed: true }).catch(()=>{});
     };

     const typeLabel = {
      selected_as_partner: '🤝 被選為夥伴',
      rival_win: '🏆 亂入戰場獲勝',
      rival_lose: '💀 亂入戰場落敗',
      rival_lose_entry: '👻 被玩家擊敗',
      rival_selected: '👻 被亂入玩家選中出戰'
     };

     return (
      <div className="fixed inset-0 z-[10000] flex flex-col" style={campBg}>
       <NavBar title="📊 戰況" onBack={()=>setFrPhase('camp')} />
       <div className="flex-1 overflow-y-auto p-4 space-y-3">
        <div style={{...cardStyle}}>
         <div style={{fontSize:'11px', fontWeight:900, color:'#fbbf24', marginBottom:'10px', letterSpacing:'1px'}}>✍️ 台詞設定</div>
         {[
          {key:'entry', label:'🗡️ 被選中出征台詞', ph: (currentUser?.name||'你')+'：「我來幫你」'},
          {key:'defeat', label:'💀 出征戰敗台詞', ph: (currentUser?.name||'你')+'：「下次一定贏回來」'},
          {key:'rivalEntry', label:'👻 亂入出場台詞', ph: (currentUser?.name||'你')+'：「讓我來考驗你！」'},
          {key:'rivalDefeat', label:'🏳️ 亂入戰敗台詞', ph: (currentUser?.name||'你')+'：「你果然很強...」'},
         ].map(item=>(
          <div key={item.key} style={{marginBottom:'8px'}}>
           <div style={{fontSize:'10px', color:'#8b949e', marginBottom:'4px', fontWeight:700}}>{item.label}</div>
           <input
            value={wlLines[item.key]||''}
            onChange={e=>{const nl={...wlLines,[item.key]:e.target.value};saveLines(nl);}}
            placeholder={item.ph}
            style={{width:'100%',background:'#0d1117',border:'1px solid #30363d',borderRadius:'8px',padding:'8px 10px',color:'#e6edf3',fontSize:'12px',fontWeight:700,outline:'none'}}
           />
          </div>
         ))}
        </div>
        <div style={{...cardStyle, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
         <span style={{fontSize:'11px', color:'#8b949e', fontWeight:700}}>今日已領取</span>
         <span style={{color:'#fde047', fontWeight:900, fontSize:'15px'}}>💰 {todayClaimed} / {MAX_DAILY_COINS}</span>
        </div>
        <div style={{fontSize:'11px', fontWeight:900, color:'#8b949e', letterSpacing:'1px', marginBottom:'6px'}}>📜 戰況紀錄</div>
        {warlogEntries.length === 0 ? (
         <div style={{textAlign:'center', padding:'30px 0', color:'#8b949e'}}>
          <div style={{fontSize:'32px', marginBottom:'8px'}}>🕊️</div>
          <div style={{fontSize:'12px', fontWeight:700}}>尚無戰況紀錄</div>
          <div style={{fontSize:'10px', marginTop:'4px'}}>出征或被選為夥伴後會出現紀錄</div>

    const CampChat = ({ currentUser, currentBranch, getPublicPath, db, allUsers }) => {
     const { useState: uS, useEffect: uE, useRef: uR } = React;
     const [channel, setChannel] = uS('branch'); // 'branch' | 'all'
     const [messages, setMessages] = uS([]);
     const [input, setInput] = uS('');
     const [sending, setSending] = uS(false);
     const bottomRef = uR(null);

     uE(() => {
      if (!currentUser?.phone) return;
      // chat_branch 按分店隔離，chat_all 為跨店公頻（不走 getPublicPath）
      const colPath = channel === 'branch'
       ? getPublicPath(`chat_${currentBranch}`)
       : 'global_chat_all';
      const unsub = db.collection(colPath)
       .orderBy('ts', 'asc').limit(40)
       .onSnapshot(snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setMessages(msgs);
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
       }, (err) => { console.warn('chat error', err); });
      return () => unsub();
     }, [channel, currentUser?.phone, currentBranch]);

     const sendMsg = async () => {
      const text = input.trim();
      if (!text || !currentUser?.phone || sending) return;
      setSending(true);
      // chat_branch 按分店隔離，chat_all 為跨店公頻（不走 getPublicPath）
      const colPath = channel === 'branch'
       ? getPublicPath(`chat_${currentBranch}`)
       : 'global_chat_all';
      await db.collection(colPath).add({
       text, name: currentUser.name || '玩家',
       branch: currentBranch || '',
       phone: currentUser.phone,
       ts: Date.now()
      }).catch(() => {});
      setInput('');
      setSending(false);
     };

     const chLabel = { branch: `🏠 ${currentBranch || '本店'}`, all: '🌐 全分店' };

     return (
      <div style={{
       background:'#0d1117', borderTop:'1px solid #21262d',
       display:'flex', flexDirection:'column', maxHeight:'220px', minHeight:'160px', flexShrink:0
      }}>
       {/* Header */}
       <div style={{display:'flex', alignItems:'center', gap:'6px', padding:'6px 10px',
        borderBottom:'1px solid #21262d', flexShrink:0}}>
        <span style={{fontSize:'12px', fontWeight:900, color:'#8b949e'}}>聊天室</span>
        <div style={{display:'flex', gap:'6px', marginLeft:'4px'}}>
         {['branch','all'].map(ch => (
          <button key={ch} onClick={()=>setChannel(ch)}
           style={{
            padding:'3px 10px', borderRadius:'20px', border:'none', cursor:'pointer',
            fontSize:'11px', fontWeight:900,
            background: channel===ch ? '#1f6feb' : '#21262d',
            color: channel===ch ? '#fff' : '#8b949e',
           }}>
           {chLabel[ch]}
          </button>
         ))}
        </div>
       </div>

       {/* Messages */}
       <div style={{flex:1, overflowY:'auto', padding:'5px 10px', display:'flex', flexDirection:'column', gap:'6px'}}>
        {messages.length === 0 && (
         <div style={{color:'#484f58', fontSize:'11px', textAlign:'center', padding:'16px 0'}}>
          {channel==='branch'?'本店還沒有訊息':'跨店頻道還沒有訊息'}，來打個招呼吧 👋
         </div>
        )}
        {messages.map(m => {
         const isMine = m.phone === currentUser?.phone;
         return (
          <div key={m.id} style={{
           display:'flex', flexDirection: isMine?'row-reverse':'row',
           gap:'6px', alignItems:'flex-end'
          }}>
           <div style={{
            maxWidth:'72%', padding:'6px 10px', borderRadius: isMine?'12px 12px 2px 12px':'12px 12px 12px 2px',
            background: isMine ? '#1f6feb' : '#21262d',
            color: isMine ? '#fff' : '#e6edf3',
            fontSize:'12px', fontWeight:700, wordBreak:'break-all', lineHeight:1.4
           }}>
            {!isMine && <div style={{fontSize:'9px',color:'#8b949e',marginBottom:'3px',fontWeight:900}}>
             {m.branch && m.branch !== currentBranch ? `[${m.branch}] ` : ''}{m.name}
            </div>}
            {m.text}
           </div>
          </div>
         );
        })}
        <div ref={bottomRef} />
       </div>

       {/* Input */}
       <div style={{display:'flex', gap:'6px', padding:'6px 10px', borderTop:'1px solid #21262d', flexShrink:0}}>
        <input
         value={input}
         onChange={e => setInput(e.target.value)}
         onKeyDown={e => e.key === 'Enter' && !e.shiftKey && sendMsg()}
         placeholder={`傳送到 ${chLabel[channel]}...`}
         maxLength={100}
         style={{
          flex:1, background:'#161b22', border:'1px solid #30363d',
          borderRadius:'20px', padding:'8px 12px', color:'#e6edf3',
          fontSize:'12px', fontWeight:700, outline:'none'
         }}
        />
        <button onClick={sendMsg} disabled={sending || !input.trim()}
         style={{
          background: input.trim() ? '#1f6feb' : '#21262d',
          border:'none', borderRadius:'50%', width:'36px', height:'36px',
          cursor: input.trim() ? 'pointer' : 'not-allowed',
          color:'#fff', fontSize:'16px', flexShrink:0,
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'background .15s'
         }}>
         {sending ? '…' : '➤'}
        </button>
       </div>
      </div>
     );
    };

function drawCanvas() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 
 ctx.strokeStyle = COLORS.gridLines; ctx.lineWidth = 1;
 for(let i = 0; i <= TILE_COUNT; i++) {
  ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
 }
 
 itemsOnBoard.forEach(item => {
  let icon = '';
  if(item.type === 'heart') icon = '❤️'; if(item.type === 'shield') icon = '🛡️';
  if(item.type === 'helmet') icon = '⛑️'; if(item.type === 'book') icon = '📖';
  if(item.type === 'pill') icon = '💊'; if(item.type === 'sword') icon = '⚔️';
  if(item.type === 'wand') icon = '🪄';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath();
  ctx.arc(item.x * GRID_SIZE + GRID_SIZE/2, item.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 + 2, 0, Math.PI*2); ctx.fill();
  ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(icon, item.x * GRID_SIZE + GRID_SIZE / 2, item.y * GRID_SIZE + GRID_SIZE / 2 + 2);
 });

 optionsOnBoard.forEach(opt => {
  ctx.fillStyle = COLORS.opts[opt.index]; ctx.beginPath();
  ctx.roundRect(opt.x * GRID_SIZE + 1, opt.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(opt.letter, opt.x * GRID_SIZE + GRID_SIZE / 2, opt.y * GRID_SIZE + GRID_SIZE / 2 + 1);
 });

 snake.forEach((segment, index) => {
  ctx.fillStyle = index === 0 ? COLORS.snakeHead : COLORS.snakeBody; ctx.beginPath();
  ctx.roundRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4); ctx.fill();
  if (index === 0) {
   ctx.fillStyle = 'white'; let eye1X, eye1Y, eye2X, eye2Y;
   if (dy === -1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+6; } 
   else if (dy === 1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+14; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+14; } 
   else if (dx === -1) { eye1X = segment.x*GRID_SIZE+6; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+6; eye2Y = segment.y*GRID_SIZE+14; } 
   else { eye1X = segment.x*GRID_SIZE+14; eye1Y = segment.y*GRID_SIZE+6; eye2X = segment.x*GRID_SIZE+14; eye2Y = segment.y*GRID_SIZE+14; } 
   ctx.beginPath(); ctx.arc(eye1X, eye1Y, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(eye2X, eye2Y, 2, 0, Math.PI*2); ctx.fill();
  }
 });

 ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
 projectiles.forEach(p => {
  ctx.shadowColor = 'rgba(239, 68, 68, 0.5)'; ctx.shadowBlur = 5; ctx.fillText('🔥', p.x * GRID_SIZE + GRID_SIZE / 2, p.y * GRID_SIZE + GRID_SIZE / 2 + 2); ctx.shadowBlur = 0; 
 });
}

function handleInput(direction) {
 if (inputLocked) return;
 if (direction === 'up' && dy !== 1) { nextDx = 0; nextDy = -1; inputLocked = true; }
 else if (direction === 'down' && dy !== -1) { nextDx = 0; nextDy = 1; inputLocked = true; }
 else if (direction === 'left' && dx !== 1) { nextDx = -1; nextDy = 0; inputLocked = true; }
 else if (direction === 'right' && dx !== -1) { nextDx = 1; nextDy = 0; inputLocked = true; }
}

window.addEventListener('keydown', (e) => {
 if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
 if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') handleInput('up');
 if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') handleInput('down');
 if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') handleInput('left');
 if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') handleInput('right');
});

let touchStartX = 0; let touchStartY = 0;
canvas.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchend', function(e) {
 let deltaX = e.changedTouches[0].screenX - touchStartX;
 let deltaY = e.changedTouches[0].screenY - touchStartY;
 if(Math.abs(deltaX) > Math.abs(deltaY)) { if(Math.abs(deltaX) > 25) handleInput(deltaX > 0 ? 'right' : 'left'); } 
 else { if(Math.abs(deltaY) > 25) handleInput(deltaY > 0 ? 'down' : 'up'); }
 e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});

` + scriptEnd + `

            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
              {[{id:'list',n:'清單'},{id:'parking',n:'停車'},{id:'video',n:'影片'}].map(c=>(
               <button key={c.id} onClick={()=>setSubCat(c.id)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${subCat===c.id?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c.n}</button>
              ))}
            </div>
            {subCat === 'video' ? (
              <div className="space-y-4 bg-white p-6 rounded-[2.5rem] border shadow-sm">
               {[{f:'routeBusUrl', l:'大眾運輸引導影片連結'}, {f:'routeCarUrl', l:'自行前往引導影片連結'}].map(x => (
                 <div key={x.f} className="space-y-2">
                  <p className="text-[10px] font-black text-slate-400 ml-1 uppercase">{x.l}</p>
                  <input placeholder="貼上外部連結..." className="w-full input-light p-4 rounded-xl text-xs outline-none" onBlur={(e) => db.doc(getPublicPath(`onboarding/settings_${currentBranch}`)).set({ [x.f]: e.target.value }, {merge:true}).then(()=>triggerNotify("網址儲存成功","success"))} defaultValue={onboarding?.[x.f] || ''} />
                 </div>
               ))}
              </div>
            ) : <UniversalListManager categoryPath={subCat==='list'?'onboarding/list':'onboarding/parking'} currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={subCat==='list'?(onboarding?.list || []):(onboarding?.parking || [])} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />}
           </div>
         )}

         {tab === 'benefit' && (
           <div>
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
              {[{id:'eval',n:'考核'},{id:'wel',n:'福利'}].map(c=>(
               <button key={c.id} onClick={()=>setSubCat(c.id)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${subCat===c.id?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c.n}</button>
              ))}
            </div>
            <UniversalListManager categoryPath={subCat==='eval'?'benefits/eval':'benefits/welfare'} currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={subCat==='eval'?(benefits?.evaluation || []):(benefits?.welfare || [])} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
           </div>
         )}

         {tab === 'rules' && (
           <div>
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4 overflow-x-auto no-scrollbar">
              {RULE_CATEGORIES.map(c=>(<button key={c} onClick={()=>setSubCat(c)} className={`shrink-0 px-4 py-2 rounded-lg text-[10px] font-bold ${subCat===c?'bg-white text-brand-red shadow-sm':'text-slate-400'}`}>{c}</button>))}
            </div>
            <UniversalListManager categoryPath={`rules/${subCat}`} currentBranch={currentBranch} globalBranches={globalBranches} isSuperAdmin={isSuperAdmin} items={rulesData[subCat] || []} triggerNotify={triggerNotify} getPublicPath={getPublicPath} />
           </div>
         )}

         {tab === 'safety' && (
           <div className="space-y-4">
            <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
              <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="layout-grid" size={18} /> {currentBranch} 區站管理</h3>
              <div className="flex gap-3">
               <input placeholder="新區站名稱..." value={newZoneName} onChange={e=>setNewZoneName(e.target.value)} className="flex-1 input-light p-4 rounded-xl text-sm min-w-0" />
               <button onClick={()=>{
                 if(!newZoneName.trim()) return;
                 const newZ = [...branchZones, { id: Date.now().toString(), name: newZoneName }];
                 db.doc(getPublicPath(`config/zones_${currentBranch}`)).set({ zones: newZ }).then(()=>{setNewZoneName(''); triggerNotify("區站新增成功", "success");});
               }} className="bg-slate-900 text-white px-6 py-4 rounded-xl text-sm font-black shrink-0 whitespace-nowrap shadow-sm">新增</button>
              </div>
              <div className="grid grid-cols-2 gap-2 mt-2">
               {branchZones.map(z => (
                 <div key={z.id} className="bg-slate-50 px-3 py-2 rounded-xl text-xs flex justify-between items-center border">
                  <span>{z.name}</span>
                  <button onClick={()=>{
                    const newZ = branchZones.filter(bz => bz.id !== z.id);
                    db.doc(getPublicPath(`config/zones_${currentBranch}`)).set({ zones: newZ });
                  }} className="text-slate-400 hover:text-red-500"><Icon name="x" size={14}/></button>
                 </div>
               ))}
              </div>
            </div>

            {branchZones.length > 0 && (
              <div className="glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white border text-left">
               <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="camera" size={18} /> {currentBranch} 巡視標準設定</h3>
               <select value={selectedZone} onChange={e=>setSelectedZone(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none">
                 {branchZones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
               </select>
               <div className="bg-slate-50 p-4 rounded-2xl space-y-3 border shadow-inner">
                 <input id="std-note" placeholder="檢查標註..." className="w-full input-light p-3 rounded-xl text-xs outline-none" />
                 <label className="bg-slate-900 text-white w-full block py-4 rounded-xl text-[10px] font-black text-center cursor-pointer active:scale-95 transition-all">上傳標準照<input type="file" className="hidden" onChange={e=>{const f=e.target.files[0]; if(f){const r=new FileReader(); const note=document.getElementById('std-note').value; r.onloadend=async ()=>{ const compressed = await compressImage(r.result, 800, 0.5); db.collection(getPublicPath(`standards_${currentBranch}`)).add({ zoneId: selectedZone, url: compressed, note: note, timestamp: Date.now() }).then(() => { document.getElementById('std-note').value=''; triggerNotify("標準圖已同步","success"); }); }; r.readAsDataURL(f);}}}/></label>
               </div>
               <div className="space-y-3 mt-4">{(standards[selectedZone] || []).map(item => (<div key={item.id} className="bg-white p-3 rounded-2xl border flex gap-4 items-center shadow-sm"><img src={item.url} className="w-12 h-12 rounded-lg object-cover" /><div className="flex-1 text-xs">{item.note}</div><button onClick={()=>db.collection(getPublicPath(`standards_${currentBranch}`)).doc(item.id).delete()} className="text-slate-300 active:text-red-500"><Icon name="x" size={14}/></button></div>))}</div>
              </div>
            )}
           </div>
         )}
         {tab === 'sign' && (
           <div className="space-y-4">
            <div className="flex bg-slate-100 p-1 rounded-xl mb-4 overflow-x-auto no-scrollbar">{RULE_CATEGORIES.map(c => (<button key={c} onClick={() => setSignSubCat(c)} className={`shrink-0 px-4 py-2 rounded-lg text-[10px] font-bold transition-all ${signSubCat === c ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{c}</button>))}</div>

               <div key={s.id || i} className="bg-white rounded-[2rem] border shadow-sm overflow-hidden transition-all">
                 <div onClick={()=>setExpandedSig(expandedSig === i ? null : i)} className="p-5 flex justify-between items-center cursor-pointer active:bg-slate-50">
                  <div className="flex items-center gap-3">
                    <span className="font-bold text-slate-800">{s.userName}</span>
                    {isSuperAdmin && s.branch !== currentBranch && <span className="text-[9px] bg-slate-100 text-slate-400 px-2 rounded-full">{s.branch}</span>}
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-[10px] text-slate-400">{new Date(s.timestamp).toLocaleDateString()}</span>
                    <button onClick={(e) => { e.stopPropagation(); db.collection(getPublicPath(`signatures_${s.branch}`)).doc(s.id).delete().then(()=>triggerNotify("簽名紀錄已刪除","info")); }} className="p-1.5 text-slate-300 hover:text-red-500 transition-all rounded-lg active:bg-red-50">
                     <Icon name="trash-2" size={16} />
                    </button>
                    <Icon name={expandedSig === i ? "chevron-up" : "chevron-down"} size={16} className="text-slate-300 ml-1" />
                  </div>
                 </div>
                 {expandedSig === i && (
                  <div className="p-4 bg-slate-50 border-t">
                    <img src={s.signature} className="w-full h-32 object-contain bg-white rounded-xl border border-dashed border-slate-200" alt="簽名" />
                  </div>
                 )}
               </div>
              ))}
              {signatures.filter(s => s.category === `守則簽署 - ${signSubCat}` && (isSuperAdmin ? true : s.branch === currentBranch)).length === 0 && <p className="text-center py-10 text-slate-400 text-xs">目前無簽署紀錄</p>}
            </div>
           </div>
         )}
         {tab === 'game' && <GameAdminManager getPublicPath={getPublicPath} triggerNotify={triggerNotify} globalBranches={globalBranches} />}
         {tab === 'system' && isSuperAdmin && (
           <div className="glass-panel p-6 rounded-[2.5rem] bg-white border shadow-sm space-y-4">
            <h3 className="font-black text-brand-red text-sm flex items-center gap-2"><Icon name="building-2" size={18} /> 全域分店管理</h3>
            <div className="flex gap-3">
              <input placeholder="新分店名稱..." value={newBranchName} onChange={e=>setNewBranchName(e.target.value)} className="flex-1 input-light p-4 rounded-xl text-sm min-w-0" />
              <button onClick={()=>{
               if(!newBranchName.trim() || globalBranches.includes(newBranchName)) return;
               const newB = [...globalBranches, newBranchName.trim()];
               db.doc(getPublicPath('system/branches')).set({ list: newB }).then(()=>{
                 setNewBranchName(''); 
                 triggerNotify("分店新增成功", "success");
               });
              }} className="bg-slate-900 text-white px-6 py-4 rounded-xl text-sm font-black shrink-0 whitespace-nowrap shadow-sm">新增分店</button>
            </div>
            <div className="space-y-2 mt-4">
              {globalBranches.map(b => (
               <div key={b} className="bg-slate-50 p-4 rounded-2xl font-bold flex justify-between items-center border">
                 <span>{b}</span>
                 {globalBranches.length > 1 && (
                  <button onClick={()=>{
                    const newB = globalBranches.filter(i => i !== b);
                    db.doc(getPublicPath('system/branches')).set({ list: newB });
                    if(currentBranch === b) setCurrentBranch(newB[0]);
                  }} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                 )}
               </div>
              ))}
            </div>
           </div>
         )}
        </div>
      </div>
     );
    };

    const App = () => {
     const [currentPage, setCurrentPage] = useState('auth');
     const [showThemeModal, setShowThemeModal] = useState(false);
     const [activeTheme, setActiveTheme] = useState(() => localStorage.getItem('k_app_theme') || 'red');

         useEffect(() => {
            const themeObj = APP_THEMES.find(t => t.id === activeTheme) || APP_THEMES[0];
            const root = document.documentElement;
            const [r,g,b] = (themeObj.color || '185 18 27').split(' ');
            root.style.setProperty('--brand-red', themeObj.color || '185 18 27');
            root.style.setProperty('--app-bg', themeObj.bgHex || '#f8fafc');
            root.style.setProperty('--accent', `rgb(${r},${g},${b})`);
            root.style.setProperty('--accent-10', `rgba(${r},${g},${b},0.15)`);
            root.style.setProperty('--accent-20', `rgba(${r},${g},${b},0.25)`);
            root.style.setProperty('--accent-30', `rgba(${r},${g},${b},0.40)`);
            if (themeObj.vars && Object.keys(themeObj.vars).length > 0) {
               Object.entries(themeObj.vars).forEach(([k,v]) => root.style.setProperty(k, v));
            } else {
               const reset = {
                  '--leather-deep': themeObj.bgHex || '#f8fafc',
                  '--leather-base': themeObj.bgHex || '#f8fafc',
                  '--leather-mid': '#ffffff',
                  '--leather-light': '#f8fafc',
                  '--leather-lift': '#f1f5f9',
                  '--leather-hover': '#e2e8f0',
                  '--gold-bright': themeObj.hex || '#b9121b',
                  '--gold-mid': themeObj.hex || '#b9121b',
                  '--gold-dim': themeObj.hex || '#b9121b',
                  '--gold-shadow': themeObj.hex || '#b9121b',
                  '--gold-glow': `rgba(${r},${g},${b},0.2)`,
                  '--gold-subtle': `rgba(${r},${g},${b},0.08)`,
                  '--gold-border': `rgba(${r},${g},${b},0.25)`,
                  '--t1': '#1e293b', '--t2': '#475569',
                  '--t3': '#94a3b8', '--t4': '#cbd5e1',
                  '--gold-gradient': `linear-gradient(135deg,${themeObj.hex},${themeObj.hex})`,
                  '--gold-gradient-h': `linear-gradient(90deg,${themeObj.hex},${themeObj.hex})`,
               };
               Object.entries(reset).forEach(([k,v]) => root.style.setProperty(k, v));
            }
            document.body.className = document.body.className.replace(/theme-\S+/g,'').trim();
            document.body.classList.add('theme-' + themeObj.id);
            // 判斷是否為深色主題（--leather-deep 的亮度低於閾值）

         }, [activeTheme]);
     const [currentUser, setCurrentUser] = useState(() => { const saved = localStorage.getItem('k_active_user'); return saved ? JSON.parse(saved) : null; });
     const [isSuperAdmin, setIsSuperAdmin] = useState(() => localStorage.getItem('k_super_admin') === 'true');

      return false;

     const triggerNotify = useCallback((msg, type = "info") => {
      const id = Date.now(); setNotifications(prev => [...prev, { id, msg, type }]);
      setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
     }, []);

     const openAnnouncement = (a) => {
      setActiveAnnouncement(a);
      const readBy = a.readBy || [];
      if (currentUser && !readBy.includes(currentUser.name)) {
        const newReadBy = [...readBy, currentUser.name];
        
        db.collection(getPublicPath(`announcements/branch_${currentBranch}/items`)).doc(String(a.id)).set({ readBy: newReadBy }, { merge: true });
        
        db.doc(getPublicPath(`announcements/branch_${currentBranch}`)).get().then(doc => {
         if(doc.exists && doc.data().items) {
           const items = doc.data().items;
           const idx = items.findIndex(i => String(i.id) === String(a.id));
           if(idx > -1) {
            items[idx].readBy = newReadBy;
            db.doc(getPublicPath(`announcements/branch_${currentBranch}`)).set({ items });
           }
         }
        });
      }
     };

     useEffect(() => {
      if (!currentUser || !currentBranch) return;

      let intervalId;
      const randomDelay = Math.floor(Math.random() * 15000);

      const checkCronTasks = async () => {
        try {
         const now = new Date();
         const h = now.getHours();

         const branchesToCheck = isSuperAdmin ? globalBranches : [currentBranch];

         for (const branch of branchesToCheck) {
           const cronRef = db.doc(getPublicPath(`system/cron_${branch}`));
           const docSnap = await cronRef.get();
           const data = docSnap.exists ? docSnap.data() : {};

           let targetResetDate = new Date(now);
           if (h < 18) targetResetDate.setDate(targetResetDate.getDate() - 1);
           const targetResetStr = `${targetResetDate.getFullYear()}-${targetResetDate.getMonth()+1}-${targetResetDate.getDate()}`;

           if (data.lastReset !== targetResetStr) {
            await cronRef.set({ lastReset: targetResetStr }, {merge: true});
            const photos = await db.collection(getPublicPath(`daily_photos_${branch}`)).get();
            const batch = db.batch();
            photos.forEach(d => batch.delete(d.ref));
            await batch.commit();
            await db.doc(getPublicPath(`system/progress_${branch}`)).set({ completedZones: [] }, {merge: true});
           }

           let targetAlertDate = new Date(now);
           if (h < 23) targetAlertDate.setDate(targetAlertDate.getDate() - 1);
           const targetAlertStr = `${targetAlertDate.getFullYear()}-${targetAlertDate.getMonth()+1}-${targetAlertDate.getDate()}`;

           if (h >= 23 && data.lastMissingAlert !== targetAlertStr) {
            await cronRef.set({ lastMissingAlert: targetAlertStr }, {merge: true});

            const progSnap = await db.doc(getPublicPath(`system/progress_${branch}`)).get();
            const completed = progSnap.exists ? (progSnap.data().completedZones || []) : [];
            const zoneSnap = await db.doc(getPublicPath(`config/zones_${branch}`)).get();
            const zones = zoneSnap.exists ? (zoneSnap.data().zones || []) : [];

            if (zones.length > 0 && completed.length < zones.length) {
              const missing = zones.filter(z => !completed.includes(z.id)).map(z => z.name);
              triggerLineAlert("INCOMPLETE_ALERT", { branch: branch, missingZones: missing.join(', ') });
            }
           }

           const targetOrderResetStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
           if (data.lastOrderReset !== targetOrderResetStr) {
            await cronRef.set({ lastOrderReset: targetOrderResetStr }, {merge: true});
            await db.doc(getPublicPath(`ordering/db_${branch}`)).set({ activeQuantities: {} }, {merge: true});
           }
         }
        } catch(e) { console.error("定時排程錯誤:", e); }
      };

      const timeoutId = setTimeout(() => {
        checkCronTasks(); 
        intervalId = setInterval(checkCronTasks, 60000);
      }, randomDelay);

      return () => {
        clearTimeout(timeoutId);
        if (intervalId) clearInterval(intervalId);
      };
     }, [currentUser, currentBranch, isSuperAdmin, globalBranches]);

     useEffect(() => {
      const initAuth = async () => { 
        try { 
         await auth.signInAnonymously(); 
         setFbReady(true); 
         if (currentUser || localStorage.getItem('k_super_admin') === 'true') setCurrentPage('home'); 
        } catch (e) { 
         triggerNotify("連線失敗", "error"); 
        } 
      };
      initAuth(); return auth.onAuthStateChanged(u => setUser(u));
     }, []);

     useEffect(() => {
      if (!user) return;
      const errH = () => triggerNotify("讀取失敗", "error");
      const subs = [
        db.doc(getPublicPath('system/branches')).onSnapshot(d => d.exists && d.data().list && setGlobalBranches(d.data().list), errH),
        db.collection(getPublicPath('global_recipes')).onSnapshot(s => {
         setGlobalRecipes(s.docs.map(d => ({id: d.id, ...d.data()})));
        }, errH),
        db.collection(getPublicPath('users')).onSnapshot(s => { 
         const all = s.docs.map(d => d.data()); setUsers(all); 
         if (currentUser) { 
           const upd = all.find(u => u.phone === currentUser.phone); 
           if (upd && (upd.status !== currentUser.status || upd.role !== currentUser.role)) { 
            setCurrentUser(upd); localStorage.setItem('k_active_user', JSON.stringify(upd)); 
            if(upd.status === 'approved' && upd.role === '主管') setIsManager(true);
           } 
         } 
        }, errH)
      ];
      return () => subs.forEach(un => un());
     }, [user, currentUser]);

     useEffect(() => {
      const handleVisibility = () => {
        if (document.hidden) {
         db.disableNetwork().catch(() => {});
        } else {
         db.enableNetwork().catch(() => {});
        }
      };
      document.addEventListener('visibilitychange', handleVisibility);
      window.addEventListener('pagehide', () => db.disableNetwork().catch(() => {}));
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) db.enableNetwork().catch(() => {});
      });
      return () => {
        document.removeEventListener('visibilitychange', handleVisibility);
      };
     }, []);

     useEffect(() => {
      if(!user || !currentBranch) return;
      const errH = () => {};
      
      const subZone = db.doc(getPublicPath(`config/zones_${currentBranch}`)).onSnapshot(d => { setBranchZones(d.exists && d.data().zones ? d.data().zones : DEFAULT_ZONES); }, errH);
      const subProg = db.doc(getPublicPath(`system/progress_${currentBranch}`)).onSnapshot(d => setCompletedZones(d.exists ? (d.data().completedZones || []) : []), errH);
      const subStd = db.collection(getPublicPath(`standards_${currentBranch}`)).onSnapshot(s => { const m = {}; s.forEach(doc => { const d = doc.data(); if (!m[d.zoneId]) m[d.zoneId] = []; m[d.zoneId].push({...d, id: doc.id}); }); setStandards(m); }, errH);
      const subTicker = db.doc(getPublicPath(`ticker/branch_${currentBranch}`)).onSnapshot(d => { setTickerText(d.exists ? d.data().text || '' : ''); }, errH);
      const subGame = db.doc(getPublicPath('system/game_config')).onSnapshot(d => {
        if (d.exists) setGameConfig(d.data());
      }, errH);
      const subOnboardVid = db.doc(getPublicPath(`onboarding/settings_${currentBranch}`)).onSnapshot(d => setOnboardingData(p => ({...p, ...(d.exists ? d.data() : {})})), errH);
      const subSigs = db.collection(getPublicPath(`signatures_${currentBranch}`)).onSnapshot(s => setSignatures(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b)=>b.timestamp-a.timestamp)), errH);

      const createMergedListener = (colPath, docPath, setter, sortDesc = true) => {
        return db.collection(getPublicPath(colPath)).onSnapshot(s => {
         const newItemsMap = new Map();
         s.docs.forEach(doc => {
           const data = doc.data();
           if (!data.id) data.id = doc.id;
           newItemsMap.set(String(data.id), data);
         });
         
         db.doc(getPublicPath(docPath)).get().then(d => {
           const oldItems = d.exists && d.data().items ? d.data().items : [];
           const merged = [];
           const processedNewIds = new Set();

           oldItems.forEach(oldItem => {
            const oldIdStr = String(oldItem.id);
            if (newItemsMap.has(oldIdStr)) {
              const newItem = newItemsMap.get(oldIdStr);
              if (!newItem.title && !newItem.content && !newItem.img && !newItem.instructions) {
               merged.push({ ...oldItem, ...newItem });
              } else {
               merged.push(newItem);
              }
              processedNewIds.add(oldIdStr);
            } else {
              merged.push(oldItem);
            }
           });

           newItemsMap.forEach((newItem, idStr) => {
            if (!processedNewIds.has(idStr)) {
              if (newItem.title || newItem.img || newItem.content) {
               merged.push(newItem);
              } else {
               db.collection(getPublicPath(colPath)).doc(idStr).delete().catch(()=>{});
              }
            }
           });
           
           merged.sort((a, b) => {
            const orderA = a.sortOrder !== undefined ? a.sortOrder : 999999;
            const orderB = b.sortOrder !== undefined ? b.sortOrder : 999999;
            if (orderA !== orderB) return orderA - orderB;
            if (sortDesc) return (b.timestamp || 0) - (a.timestamp || 0);
            return (a.timestamp || 0) - (b.timestamp || 0);
           });
           
           setter(merged);
         }).catch(() => {
           const pureNewItems = Array.from(newItemsMap.values()).filter(i => i.title || i.img || i.content);
           pureNewItems.sort((a, b) => {
            const orderA = a.sortOrder !== undefined ? a.sortOrder : 999999;
            const orderB = b.sortOrder !== undefined ? b.sortOrder : 999999;
            if (orderA !== orderB) return orderA - orderB;
            if (sortDesc) return (b.timestamp || 0) - (a.timestamp || 0);
            return (a.timestamp || 0) - (b.timestamp || 0);
           });
           setter(pureNewItems);
         });
        }, errH);
      };

      const subAnn = createMergedListener(`announcements/branch_${currentBranch}/items`, `announcements/branch_${currentBranch}`, items => setAnnouncements(items));
      const subMenu = createMergedListener(`menu/list_${currentBranch}/items`, `menu/list_${currentBranch}`, items => setMenuData({items}));
      const subOnboardList = createMergedListener(`onboarding/list_${currentBranch}/items`, `onboarding/list_${currentBranch}`, items => setOnboardingData(p => ({...p, list: items})));
      const subOnboardPark = createMergedListener(`onboarding/parking_${currentBranch}/items`, `onboarding/parking_${currentBranch}`, items => setOnboardingData(p => ({...p, parking: items})));
      const subBenEval = createMergedListener(`benefits/eval_${currentBranch}/items`, `benefits/eval_${currentBranch}`, items => setBenefitsData(p => ({...p, evaluation: items})));
      const subBenWel = createMergedListener(`benefits/welfare_${currentBranch}/items`, `benefits/welfare_${currentBranch}`, items => setBenefitsData(p => ({...p, welfare: items})));
      
      const ruleSubs = RULE_CATEGORIES.map(cat => 
        createMergedListener(`rules/${cat}_${currentBranch}/items`, `rules/${cat}_${currentBranch}`, items => setRulesData(prev => ({ ...prev, [cat]: items })))
      );

      return () => { 
        subZone(); subProg(); subStd(); subAnn(); subTicker(); subGame();subOnboardVid(); subSigs();
        subMenu(); subOnboardList(); subOnboardPark(); subBenEval(); subBenWel();
        ruleSubs.forEach(un => un());
      };
     }, [user, currentBranch]);

     useEffect(() => {
      if (!isSuperAdmin && currentUser && currentUser.branch) {
        const allowedBranches = Array.isArray(currentUser.branch) ? currentUser.branch : [currentUser.branch];
        if (!allowedBranches.includes(currentBranch)) {
         setCurrentBranch(allowedBranches[0]);
        }
      }
     }, [currentUser, isSuperAdmin, currentBranch]);

     const renderPage = () => {
      switch(currentPage) {
        case 'home': {

         return (

{/* 支援最高權限與多店主管：首頁快速切換分店 */}
              {(isSuperAdmin || (Array.isArray(currentUser?.branch) && currentUser.branch.length > 1)) && (

                  </select>

                 <div className="bg-brand-red w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                  <Icon name="building-2" size={20} className="text-white"/>
                 </div>
               </div>
              )}

              <div onClick={() => setCurrentPage('inspection')} className="glass-panel p-6 rounded-[2.5rem] border-l-4 border-l-brand-red bg-white shadow-sm active-scale cursor-pointer">
               <div className="flex justify-between items-end mb-4 px-1"><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">巡視進度 (18:00刷新)</p><h3 className="text-lg font-black text-slate-800 leading-tight">{completedZones.length >= branchZones.length && branchZones.length > 0 ? "✅ 全數巡視完成" : `進度：${completedZones.length} / ${branchZones.length || 1}`}</h3></div><span className="text-sm font-black text-brand-red">{progressPercent}%</span></div>
               <div className="bg-slate-100 h-3.5 rounded-full overflow-hidden border shadow-inner"><div className="h-full bg-brand-red opacity-80 transition-all duration-700" style={{ width: `${progressPercent}%` }}></div></div>
              </div>
              
              {/* 最新公告區塊 */}
              <div className="space-y-3">
               <h3 className="text-lg font-black tracking-tight flex items-center gap-2 mb-2" style={{color:'var(--t1,#1e293b)'}}><Icon name="bell" size={20} className="text-brand-red" /> {currentBranch} 最新公告</h3>
               {announcements.length > 0 ? announcements.slice(0, 3).map(a => {
                 const isRead = currentUser?.name ? a.readBy?.includes(currentUser.name) : false;
                 return (
                  <div key={a.id} onClick={() => openAnnouncement(a)}
                    className="glass-panel p-4 rounded-2xl border cursor-pointer active:scale-[0.98] transition-all flex gap-4"
                    style={{
                      background: isRead ? 'var(--leather-base,#f8fafc)' : 'linear-gradient(145deg,var(--leather-light,#fff),var(--leather-mid,#fff))',
                      borderColor: isRead ? 'var(--gold-border,rgba(0,0,0,0.1))' : 'var(--gold-bright,#b9121b)',
                      opacity: isRead ? 0.75 : 1,
                      boxShadow: isRead ? 'none' : '0 2px 8px var(--gold-subtle,rgba(0,0,0,0.06))'
                    }}>
                    {!isRead && <div className="w-2 h-2 rounded-full bg-brand-red mt-2 shrink-0 animate-pulse" />}
                    <div className="flex-1 min-w-0">
                     <h4 className="font-black truncate" style={{color: isRead ? 'var(--t2,#475569)' : 'var(--t1,#1e293b)'}}>{a.title}</h4>
                     <p className="text-xs mt-1 line-clamp-1" style={{color:'var(--t3,#94a3b8)'}}>{a.content}</p>

                    <div className="text-[10px] whitespace-nowrap pt-1" style={{color:'var(--t3,#94a3b8)'}}>
                     {new Date(a.timestamp).toLocaleDateString()}

               }) : <div className="text-center py-6 text-xs font-bold glass-panel rounded-2xl border border-dashed shadow-sm" style={{color:'var(--t3,#94a3b8)',borderColor:'var(--gold-border)'}}>目前無新公告</div>}
              </div>

              <section className="grid grid-cols-2 gap-4">
