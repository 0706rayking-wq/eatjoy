<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饗麻饗辣廚房OS</title>
    <!-- 引入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            // 改為動態 CSS 變數，支援透過透明度語法 (如 bg-brand-red/20) 使用
                            red: 'rgb(var(--brand-red) / <alpha-value>)',
                            dark: 'rgb(var(--brand-red) / <alpha-value>)',

                    }
                }

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root { 
            /* 預設配色 (已改為您圖片中沉穩的深紅色) */

        body.theme-dark .bg-slate-100 { background-color: #1e293b !important; }

        body.theme-dark .glass-panel { background: rgba(30, 41, 59, 0.95) !important; border-color: rgba(255,255,255,0.1) !important; }
        body.theme-dark .input-light { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        body.theme-dark input, body.theme-dark textarea, body.theme-dark select { color: #f8fafc !important; background-color: #0f172a !important; }
        body.theme-dark .text-white { color: #ffffff !important; }
        body.theme-dark .bg-slate-900 { background-color: #020617 !important; border-color: #1e293b !important; }
        body.theme-dark .shadow-sm, body.theme-dark .shadow-md, body.theme-dark .shadow-lg, body.theme-dark .shadow-xl, body.theme-dark .shadow-2xl { box-shadow: 0 4px 12px -1px rgba(0,0,0,0.5) !important; }
        
        /* 特殊漸層柔和背景色，在深色模式強制壓暗 */
        body.theme-dark .bg-rose-50\/80, body.theme-dark .bg-rose-50\/50, 
        body.theme-dark .bg-emerald-50\/50, body.theme-dark .bg-indigo-50\/50, 
        body.theme-dark .bg-blue-50\/50, body.theme-dark .bg-yellow-50\/50,
        body.theme-dark .bg-rose-50, body.theme-dark .bg-emerald-50, body.theme-dark .bg-emerald-100,
        body.theme-dark .bg-blue-50, body.theme-dark .bg-indigo-50 {

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page-enter { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: slideDown 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -100%); } to { opacity: 1; transform: translate(-50%, 0); } }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); 
        }
        .input-light { background: #ffffff; border: 1px solid #e2e8f0; color: #1e293b; transition: all 0.2s; }
        .input-light:focus { border-color: rgb(var(--brand-red)); outline: none; box-shadow: 0 0 0 3px rgba(var(--brand-red) / 0.1); }
        .ticker-wrap { overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .signature-canvas { border: 2px dashed #cbd5e1; background: #fff; cursor: crosshair; touch-action: none; border-radius: 1.5rem; width: 100%; height: 200px; }
        
        /* 點貨系統進階樣式 */
        .active-scale:active { transform: scale(0.95); }
        .drag-ghost { opacity: 0.2; transform: scale(0.95); border: 2px dashed rgb(var(--brand-red)) !important; background-color: rgba(var(--brand-red)/0.05) !important; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .btn-touch { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        
        .editable-order-text {
            background-color: #1e293b; color: #f8fafc; font-family: ui-monospace, monospace;
            line-height: 1.625; width: 100%; border-radius: 1.5rem; padding: 1.25rem; resize: none; outline: none; border: 2px solid transparent; transition: border-color 0.2s;
        }

        /* 班表系統專用樣式 */
        .writing-vertical-lr { writing-mode: vertical-lr; }
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 8px; border: 2px solid #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        th.sticky, td.sticky { background-clip: padding-box; } /* 防止 iOS Sticky 元素破圖 */

        /* 隱藏數字輸入框上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="pb-12">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // --- 1. 配置與核心常數 ---
        const appIdGlobal = 'kitchen-v16';
        const firebaseConfig = {
            apiKey: "AIzaSyA3zTUa8Whw5X_jEJzqBTkQIPWWq84koHY",
            authDomain: "nangangeatjoycook.firebaseapp.com",
            projectId: "nangangeatjoycook",
            storageBucket: "nangangeatjoycook.firebasestorage.app",
            messagingSenderId: "976247626913",
            appId: "1:976247626913:web:103bdd5c5c2fcc9a48e4e0",
            measurementId: "G-JYWNHMJV0T"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const getPublicPath = (col) => `artifacts/${appIdGlobal}/public/data/${col}`;

        const DEFAULT_ZONES = [
            { id: 'beverage', name: '飲調區' }, { id: 'light-meal', name: '輕食區' },
            { id: 'seafood', name: '海鮮區' }, { id: 'vegetable', name: '蔬菜區' },
            { id: 'meat', name: '切肉區' }, { id: 'cold-platter', name: '冷盤區' },
            { id: 'cooked-food', name: '熟食區' }, { id: 'soup', name: '湯品區' }
        ];

        const RULE_CATEGORIES = ['廚房規則', '食品衛生安全', '設備操作安全', '出缺勤規範'];

        const MENU_CATEGORIES = [
            '湯頭', '前菜/小菜', '沙拉', '壽司', '炸物/烤物',
            '披薩/濃湯', '主食', '熱道', '鐵板燒', '甜點',
            '自助吧飲料', '吧檯調飲', '限時限量', '壽星招待', '合作品牌'
        ];

        const INITIAL_ORDER_ZONES = [
            { name: "菜區", icon: 'Carrot', color: "bg-emerald-500" },
            { name: "海鮮", icon: 'Fish', color: "bg-blue-500" },
            { name: "湯區", icon: 'Soup', color: "bg-brand-red" }, 
            { name: "熟食", icon: 'UtensilsCrossed', color: "bg-rose-500" },
            { name: "冷台", icon: 'IceCream', color: "bg-cyan-500" },
            { name: "飲調", icon: 'Coffee', color: "bg-amber-600" },
            { name: "輕食區", icon: 'Timer', color: "bg-pink-500" }
        ];

        const DEFAULT_UNITS = ["件", "箱", "包", "斤", "公斤","兩" ,"顆", "條", "罐", "桶", "籃", "袋", "捲", "盒", "兩", "串", "瓶", "組", "板", "塊"];

        // --- 工具函式 ---
        const compressImage = (base64Str, maxWidth = 800, quality = 0.5) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const triggerLineAlert = async (type, payload = {}) => {
            try {
                await fetch("https://script.google.com/macros/s/AKfycbz-Sw4inNN2cxkyuo_G5LHBSYkS5M8b4aPtizJpBxp_gmOWuaU48sAwLKlC0SqFykPa/exec", {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: type, payload: payload })
                });
            } catch (e) { console.error("LINE 推播發送失敗", e); }
        };

        // --- 基礎組件 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { width: size, height: size, class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const OrderSymbolIcon = ({ name, className = "" }) => {
            const symbols = {
                "ChevronLeft": "chevron-left", "ChevronRight": "chevron-right", "Plus": "plus", "Minus": "minus", "Settings": "settings",
                "Trash2": "trash-2", "X": "x", "Search": "search", "Share2": "share-2", "ClipboardCheck": "clipboard-check",
                "Package": "package", "ArrowRight": "arrow-right", "GripVertical": "grip-vertical", "CheckCircle2": "check-circle-2",
                "Layers": "layers", "Filter": "filter", "Building2": "building-2", "LayoutGrid": "layout-grid", "Edit": "edit-3",
                "Chart": "bar-chart-3", "History": "history", "Carrot": "carrot", "Fish": "fish", "Soup": "soup",
                "UtensilsCrossed": "utensils-crossed", "IceCream": "ice-cream", "Coffee": "coffee", "Timer": "timer",
                "Calendar": "calendar", "Image": "image", "Download": "download"
            };
            return <Icon name={symbols[name] || "help-circle"} className={className} />;
        };

        const ChefHatIcon = ({ size = 24 }) => (
            <svg viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/>
            </svg>
        );

        const Ticker = ({ text }) => (
            <div className="bg-slate-900 text-white py-2.5 px-4 ticker-wrap">
                <div className="ticker-move flex gap-8 font-bold text-[11px] uppercase tracking-wider items-center">
                    <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span> {text || "歡迎使用 EATJOY廚務 OS 系統 ... "}</span>
                    <span className="flex items-center gap-2 whitespace-nowrap"><span className="text-brand-red">●</span> {text || "使用上有BUG或優化建議可以私訊小雷神"}</span>
                </div>
            </div>
        );

        const BackButton = ({ onClick, title }) => (
            <div className="flex items-center gap-4 mb-8 text-left border-b border-slate-200/50 pb-4">
                <button onClick={onClick} className="p-3 glass-panel rounded-2xl border active:scale-90 transition-all bg-white shadow-sm"><Icon name="arrow-left" size={20}/></button>
                <h2 className="text-2xl font-black text-slate-800 tracking-tighter leading-tight font-bold">{title}</h2>
            </div>
        );

        const SectionItem = ({ title, iconName, onClick }) => (
            <div onClick={onClick} className="glass-panel p-6 rounded-[2rem] flex items-center justify-between active:bg-slate-50 cursor-pointer group transition-all mb-3 text-left bg-white shadow-sm">
                <div className="flex items-center gap-4 text-slate-400 group-active:text-brand-red font-bold">
                    {iconName && <Icon name={iconName} size={18} />}
                    <span className="text-slate-800 text-sm font-bold leading-none">{title}</span>
                </div>
                <Icon name="chevron-right" size={18} className="text-slate-300" />
            </div>
        );

        const NavCard = ({ title, onClick, colorClass, iconName }) => (
            <button onClick={onClick} className={`${colorClass} py-10 flex flex-col items-center justify-center rounded-[2.5rem] border border-slate-100 shadow-sm active:scale-95 transition-all`}>
                <Icon name={iconName} size={24} className="mb-3 opacity-60 text-slate-800 font-bold" />
                <span className="font-black text-slate-800 text-sm tracking-widest uppercase font-bold">{title}</span>
            </button>
        );

        const RuleStandardBlock = ({ id, title, desc, img }) => (
            <div className="glass-panel rounded-3xl p-6 border border-slate-100 mb-4 bg-white shadow-sm flex flex-col gap-4 text-left">
                <div className="flex gap-4">
                    <div className="w-9 h-9 bg-rose-50 text-brand-red border border-rose-100 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 font-bold">{id}</div>
                    <div className="space-y-1">
                        <h3 className="font-bold text-slate-800 text-sm leading-tight font-black">{title}</h3>
                        <p className="text-[10px] text-slate-600 leading-relaxed font-bold whitespace-pre-wrap">{desc}</p>
                    </div>
                </div>
                {img && <img src={img} className="w-full rounded-2xl border border-slate-100 shadow-inner object-cover max-h-64" alt="附圖" />}
            </div>
        );

        // --- 進階共用模組管理 (支援編輯、全域同步、拖曳排序) ---
        const UniversalListManager = ({ categoryPath, currentBranch, globalBranches, isSuperAdmin, items = [], titleLabel = "名稱", triggerNotify, getPublicPath, categories = null }) => {
            const [newT, setNewT] = useState(''); 
            const [newC, setNewC] = useState(''); 
            const [newI, setNewI] = useState(null);
            const [newCat, setNewCat] = useState(categories ? categories[0] : '');
            const [editingId, setEditingId] = useState(null);
            const [syncToAll, setSyncToAll] = useState(false);

            // 拖曳狀態
            const [draggedId, setDraggedId] = useState(null);
            const [overId, setOverId] = useState(null);

            const startEdit = (item) => {
                setEditingId(item.id);
                setNewT(item.title);
                setNewC(item.content || '');
                setNewI(item.img || null);
                if (categories) setNewCat(item.category || categories[0]);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null); setNewT(''); setNewC(''); setNewI(null);
                if (categories) setNewCat(categories[0]);
            };

            const handleSave = async () => {
                if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
                let imgToSave = newI; 
                if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
                
                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                const sharedId = editingId ? String(editingId) : crypto.randomUUID();
                const now = Date.now();

                try {
                    await Promise.all(targetBranches.map(async (branch) => {
                        const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
                        if (!editingId) {
                            itemData.timestamp = now;
                            itemData.sortOrder = items.length; // 預設放在最後面
                        }
                        if (categories) itemData.category = newCat;

                        const colPath = getPublicPath(`${categoryPath}_${branch}/items`);
                        return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
                    }));
                    triggerNotify(editingId ? "更新成功" : "發佈成功", "success");
                    cancelEdit();
                } catch (e) { triggerNotify("存檔失敗 (可能是圖片太大)", "error"); }
            };

            const deleteItem = async (id) => {
                const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該項目。" : "確定要刪除嗎？");
                if(!isConfirmed) return;

                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                try {
                    await Promise.all(targetBranches.map(async (branch) => {
                        const idStr = String(id);
                        // 從新的獨立 Collection 刪除
                        await db.collection(getPublicPath(`${categoryPath}_${branch}/items`)).doc(idStr).delete();
                        
                        // 為了向下相容，同時也清空舊版陣列裡可能殘留的同名資料
                        const oldDocRef = db.doc(getPublicPath(`${categoryPath}_${branch}`));
                        const oldSnap = await oldDocRef.get();
                        if(oldSnap.exists && oldSnap.data().items) {
                            const newItems = oldSnap.data().items.filter(i => String(i.id) !== idStr);
                            await oldDocRef.set({ items: newItems });
                        }
                    }));
                    triggerNotify("項目已刪除", "info");
                } catch(e) { triggerNotify("刪除失敗", "error"); console.error(e); }
            };

            const handleDragStart = (id) => setDraggedId(id);
            const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
            const handleDragEnd = async () => {
                if (draggedId !== null && overId !== null && draggedId !== overId) {
                    const newItems = [...items];
                    const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
                    const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
                    
                    if (fromIndex !== -1 && toIndex !== -1) {
                        const [movedItem] = newItems.splice(fromIndex, 1);
                        newItems.splice(toIndex, 0, movedItem);

                        try {
                            const batch = db.batch();
                            newItems.forEach((item, index) => {
                                const docRef = db.collection(getPublicPath(`${categoryPath}_${currentBranch}/items`)).doc(String(item.id));
                                batch.set(docRef, { ...item, sortOrder: index }, { merge: true });
                            });
                            await batch.commit();
                        } catch(e) {
                            triggerNotify("排序儲存失敗", "error");
                        }
                    }
                }
                setDraggedId(null);
                setOverId(null);
            };

            return (
                <div className="space-y-4">
                    <div className={`glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white shadow-sm border transition-all ${editingId ? 'border-blue-500/30 shadow-blue-500/10' : 'border-slate-100'}`}>
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest">
                                {editingId ? <><Icon name="edit" size={16} className="text-blue-500" /> 編輯項目</> : <><Icon name="plus-circle" size={16} className="text-brand-red" /> 新增項目</>}
                            </h3>
                            {isSuperAdmin && (
                                <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
                                    <input type="checkbox" checked={syncToAll} onChange={e=>setSyncToAll(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded" />
                                    套用至全部分店
                                </label>
                            )}
                        </div>
                        {categories && (
                            <select value={newCat} onChange={e=>setNewCat(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none appearance-none">
                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        )}
                        <input placeholder={titleLabel} value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" />
                        <textarea placeholder="詳細描述..." rows="3" value={newC} onChange={e=>setNewC(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
                        
                        <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
                            {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳附圖"}
                            <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>
                        </label>
                        {newI && (
                            <div className="relative w-full h-32 rounded-xl overflow-hidden border">
                                <img src={newI} className="w-full h-full object-cover" />
                                <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
                            </div>
                        )}
                        
                        <div className="flex gap-3 pt-2">
                            {editingId && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消編輯</button>}
                            <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${editingId ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
                                {editingId ? "儲存修改" : "確認發佈"}
                            </button>
                        </div>
                    </div>
                    <div className="space-y-3">
                        {items.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
                        {items.map((r) => (
                            <div 
                                key={r.id} 
                                draggable
                                onDragStart={() => handleDragStart(r.id)}
                                onDragOver={(e) => handleDragOver(e, r.id)}
                                onDragEnd={handleDragEnd}
                                className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 items-center shadow-sm transition-all duration-200 ${draggedId === r.id ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === r.id ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
                            >
                                <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-center justify-center">
                                    <Icon name="grip-vertical" size={18} />
                                </div>
                                {r.img && <img src={r.img} className="w-12 h-12 rounded-xl object-cover border shrink-0" alt="圖" />}
                                <div className="flex-1 min-w-0 text-left">
                                    <div className="flex items-center gap-2 mb-0.5">
                                        <p className="font-bold text-slate-800 text-sm truncate">{r.title || "(無標題)"}</p>
                                        {r.category && <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] rounded-md font-bold whitespace-nowrap">{r.category}</span>}
                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-1 line-clamp-1">{r.content || ""}</p>
                                </div>
                                <div className="flex gap-1.5 shrink-0 border-l pl-2 border-slate-100">
                                    <button onClick={() => startEdit(r)} className="text-slate-400 hover:text-blue-500 p-2 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16} /></button>
                                    <button onClick={() => deleteItem(r.id)} className="text-slate-400 hover:text-red-500 p-2 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16} /></button>
                                </div>
                            </div>
                        ))}
                        {items.length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">尚未發佈任何項目</p>}
                    </div>
                </div>
            );
        };

        // --- 專屬食譜管理器 (支援食材、做法、備註與全域同步、拖曳排序，以及從資料庫匯入) ---
        const RecipeAdminManager = ({ categoryPath, currentBranch, globalBranches, isSuperAdmin, items = [], triggerNotify, getPublicPath, categories, globalRecipes = [] }) => {
            const [newT, setNewT] = useState(''); 
            const [newCat, setNewCat] = useState(categories ? categories[0] : '');
            const [newIngList, setNewIngList] = useState([{ name: '', qty: '' }]);
            const [newInst, setNewInst] = useState('');
            const [newNote, setNewNote] = useState('');
            const [newI, setNewI] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [syncToAll, setSyncToAll] = useState(false);
            const [showLibrary, setShowLibrary] = useState(false);

            // 拖曳狀態
            const [draggedId, setDraggedId] = useState(null);
            const [overId, setOverId] = useState(null);

            const startEdit = (item) => {
                setEditingId(item.id);
                setNewT(item.title || '');
                
                if (item.ingredientsList && item.ingredientsList.length > 0) {
                    setNewIngList(item.ingredientsList);
                } else if (item.ingredients) {
                    setNewIngList([{ name: item.ingredients, qty: '' }]);
                } else {
                    setNewIngList([{ name: '', qty: '' }]);
                }

                setNewInst(item.instructions || item.content || ''); 
                setNewNote(item.notes || '');
                setNewI(item.img || null);
                if (categories) setNewCat(item.category || categories[0]);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null); setNewT(''); setNewIngList([{ name: '', qty: '' }]); setNewInst(''); setNewNote(''); setNewI(null);
                if (categories) setNewCat(categories[0]);
            };

            const handleSave = async () => {
                if (!newT.trim()) return triggerNotify("菜單名稱不能為空", "error");
                let imgToSave = newI; 
                if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
                
                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                const sharedId = editingId ? String(editingId) : crypto.randomUUID();
                const now = Date.now();
                
                const validIngList = newIngList.filter(i => i.name.trim() !== '');

                const itemData = { 
                    id: sharedId, 
                    title: newT.trim(), 
                    ingredientsList: validIngList, 
                    instructions: newInst.trim(),
                    notes: newNote.trim(),
                    content: newInst.trim(), 
                    img: imgToSave, 
                    updateTime: now 
                };

                try {
                    // 1. 儲存到所選的分店菜單中
                    await Promise.all(targetBranches.map(async (branch) => {
                        const branchItemData = { ...itemData };
                        if (!editingId) {
                            branchItemData.timestamp = now;
                            branchItemData.sortOrder = items.length;
                        }
                        if (categories) branchItemData.category = newCat;

                        const colPath = getPublicPath(`${categoryPath}_${branch}/items`);
                        return db.collection(colPath).doc(sharedId).set(branchItemData, { merge: true });
                    }));

                    // 2. 同步備份到全域的「菜色資料庫」(以菜色名稱為 ID 防止重複)
                    const globalRecipeData = { ...itemData, timestamp: now };
                    if (categories) globalRecipeData.category = newCat;
                    await db.collection(getPublicPath('global_recipes')).doc(newT.trim()).set(globalRecipeData, { merge: true });

                    triggerNotify(editingId ? "更新成功" : "發佈成功，已同步至資料庫", "success");
                    cancelEdit();
                } catch (e) { 
                    console.error(e);
                    triggerNotify("存檔失敗 (檔案太大或網路異常)", "error"); 
                }
            };

            const deleteItem = async (id) => {
                const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該食譜。" : "確定要刪除嗎？");
                if(!isConfirmed) return;

                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                try {
                    await Promise.all(targetBranches.map(async (branch) => {
                        const idStr = String(id);
                        await db.collection(getPublicPath(`${categoryPath}_${branch}/items`)).doc(idStr).delete();
                        
                        const oldDocRef = db.doc(getPublicPath(`${categoryPath}_${branch}`));
                        const oldSnap = await oldDocRef.get();
                        if(oldSnap.exists && oldSnap.data().items) {
                            const newItems = oldSnap.data().items.filter(i => String(i.id) !== idStr);
                            await oldDocRef.set({ items: newItems });
                        }
                    }));
                    triggerNotify("食譜已刪除", "info");
                } catch(e) { triggerNotify("刪除失敗", "error"); console.error(e); }
            };

            const handleDragStart = (id) => setDraggedId(id);
            const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
            const handleDragEnd = async () => {
                if (draggedId !== null && overId !== null && draggedId !== overId) {
                    const newItems = [...items];
                    const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
                    const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
                    
                    if (fromIndex !== -1 && toIndex !== -1) {
                        const [movedItem] = newItems.splice(fromIndex, 1);
                        newItems.splice(toIndex, 0, movedItem);

                        try {
                            const batch = db.batch();
                            newItems.forEach((item, index) => {
                                const docRef = db.collection(getPublicPath(`${categoryPath}_${currentBranch}/items`)).doc(String(item.id));
                                batch.set(docRef, { ...item, sortOrder: index }, { merge: true });
                            });
                            await batch.commit();
                        } catch(e) {
                            triggerNotify("排序儲存失敗", "error");
                        }
                    }
                }
                setDraggedId(null);
                setOverId(null);
            };

            return (
                <div className="space-y-4">
                    <div className={`glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white shadow-sm border transition-all ${editingId ? 'border-blue-500/30 shadow-blue-500/10' : 'border-slate-100'}`}>
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest">
                                {editingId ? <><Icon name="edit" size={16} className="text-blue-500" /> 編輯食譜</> : <><Icon name="plus-circle" size={16} className="text-brand-red" /> 新增食譜</>}
                            </h3>
                            <div className="flex items-center gap-3">
                                {!editingId && (
                                    <button onClick={() => setShowLibrary(true)} className="px-3 py-1.5 bg-rose-50 text-brand-red rounded-lg text-[10px] font-black flex items-center gap-1 hover:bg-brand-red hover:text-white transition-colors">
                                        <Icon name="database" size={14} /> 從資料庫導入
                                    </button>
                                )}
                                {isSuperAdmin && (
                                    <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
                                        <input type="checkbox" checked={syncToAll} onChange={e=>setSyncToAll(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded" />
                                        套用至全部分店
                                    </label>
                                )}
                            </div>
                        </div>
                        {categories && (
                            <select value={newCat} onChange={e=>setNewCat(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none appearance-none">
                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        )}
                        <input placeholder="輸入菜單名稱..." value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none border-brand-red/30 focus:border-brand-red" />
                        
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner space-y-3">
                            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-1.5"><Icon name="shopping-bag" size={14}/> 食材清單配置</h4>
                            {newIngList.map((ing, idx) => (
                                <div key={idx} className="flex gap-2 items-center">
                                    <input placeholder="食材 (例: 牛油)" value={ing.name} onChange={e => { const l = [...newIngList]; l[idx].name = e.target.value; setNewIngList(l); }} className="flex-1 input-light p-3 rounded-lg text-sm font-bold outline-none" />
                                    <input placeholder="數量單位 (例: 4 kg)" value={ing.qty} onChange={e => { const l = [...newIngList]; l[idx].qty = e.target.value; setNewIngList(l); }} className="w-2/5 input-light p-3 rounded-lg text-sm font-bold outline-none" />
                                    <button onClick={() => { if(newIngList.length > 1) setNewIngList(newIngList.filter((_, i) => i !== idx)) }} className={`p-2 rounded-lg transition-colors ${newIngList.length > 1 ? 'text-slate-400 hover:bg-red-50 hover:text-red-500' : 'text-slate-200 cursor-not-allowed'}`} disabled={newIngList.length === 1}><Icon name="x" size={18}/></button>
                                </div>
                            ))}
                            <button onClick={() => setNewIngList([...newIngList, {name: '', qty: ''}])} className="w-full py-3 rounded-lg border-2 border-dashed border-slate-200 text-slate-500 font-bold text-xs hover:border-brand-red/50 hover:text-brand-red transition-colors flex items-center justify-center gap-2">
                                <Icon name="plus" size={14} /> 新增一列食材
                            </button>
                        </div>
                        
                        <textarea placeholder="填寫詳細做法步驟..." rows="4" value={newInst} onChange={e=>setNewInst(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
                        <textarea placeholder="填寫備註 (選填)..." rows="2" value={newNote} onChange={e=>setNewNote(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
                        
                        <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
                            {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳菜色照片"}
                            <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>
                        </label>
                        {newI && (
                            <div className="relative w-full h-32 rounded-xl overflow-hidden border">
                                <img src={newI} className="w-full h-full object-cover" />
                                <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
                            </div>
                        )}
                        
                        <div className="flex gap-3 pt-2">
                            {editingId && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消</button>}
                            <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${editingId ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
                                {editingId ? "儲存修改" : "確認發佈"}
                            </button>
                        </div>
                    </div>
                    
                    {/* 食譜資料庫彈窗 */}
                    {showLibrary && (
                        <div className="fixed inset-0 z-[10000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 page-enter">
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-6 max-h-[85vh] overflow-y-auto relative shadow-2xl">
                                <h3 className="font-black text-xl mb-6 text-slate-800 flex items-center gap-2 border-b pb-4"><Icon name="database" className="text-brand-red" /> 全域菜色資料庫</h3>
                                <button onClick={()=>setShowLibrary(false)} className="absolute top-6 right-6 text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors"><Icon name="x" size={20}/></button>
                                
                                {globalRecipes.length === 0 ? (
                                    <div className="py-10 text-center text-slate-400 text-xs font-bold">目前資料庫中尚未建立任何食譜</div>
                                ) : (
                                    <div className="space-y-6">
                                        {categories && categories.map(cat => {
                                            const catRecipes = globalRecipes.filter(r => r.category === cat);
                                            if (catRecipes.length === 0) return null;
                                            return (
                                                <div key={cat} className="space-y-3">
                                                    <h4 className="font-black text-sm text-slate-700 border-l-4 border-brand-red pl-2">{cat}</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {catRecipes.map(r => (
                                                            <button 
                                                                key={r.id} 
                                                                onClick={() => {
                                                                    setNewT(r.title); 
                                                                    setNewCat(r.category); 
                                                                    setNewIngList(r.ingredientsList || [{name: r.ingredients || '', qty: ''}]); 
                                                                    setNewInst(r.instructions || r.content || ''); 
                                                                    setNewNote(r.notes || ''); 
                                                                    setNewI(r.img || null); 
                                                                    setShowLibrary(false);
                                                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                                                }} 
                                                                className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-brand-red hover:text-white hover:border-brand-red active:scale-95 transition-all shadow-sm"
                                                            >
                                                                {r.title}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="space-y-3">
                        {items.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
                        {items.map((r) => (
                            <div 
                                key={r.id} 
                                draggable
                                onDragStart={() => handleDragStart(r.id)}
                                onDragOver={(e) => handleDragOver(e, r.id)}
                                onDragEnd={handleDragEnd}
                                className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 items-center shadow-sm transition-all duration-200 ${draggedId === r.id ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === r.id ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
                            >
                                <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-center justify-center">
                                    <Icon name="grip-vertical" size={18} />
                                </div>
                                {r.img && <img src={r.img} className="w-12 h-12 rounded-xl object-cover border shrink-0" alt="圖" />}
                                <div className="flex-1 min-w-0 text-left">
                                    <div className="flex items-center gap-2 mb-0.5">
                                        <p className="font-bold text-slate-800 text-sm truncate">{r.title || "(無標題)"}</p>
                                        {r.category && <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] rounded-md font-bold whitespace-nowrap">{r.category}</span>}
                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-1 line-clamp-1">{r.instructions || r.content || '無描述'}</p>
                                </div>
                                <div className="flex gap-1.5 shrink-0 border-l pl-2 border-slate-100">
                                    <button onClick={() => startEdit(r)} className="text-slate-400 hover:text-blue-500 p-2 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16} /></button>
                                    <button onClick={() => deleteItem(r.id)} className="text-slate-400 hover:text-red-500 p-2 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16} /></button>
                                </div>
                            </div>
                        ))}
                        {items.length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">尚未發佈任何食譜</p>}
                    </div>
                </div>
            );
        };

        // --- 分店專用公告管理器 (支援編輯、全域同步、拖曳排序、已讀名單) ---
        const AnnouncementAdminManager = ({ currentBranch, globalBranches, isSuperAdmin, announcements, triggerNotify, getPublicPath }) => {
            const [newT, setNewT] = useState('');
            const [newC, setNewC] = useState('');
            const [newI, setNewI] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [syncToAll, setSyncToAll] = useState(false);
            
            const [draggedId, setDraggedId] = useState(null);
            const [overId, setOverId] = useState(null);

            const startEdit = (item) => {
                setEditingId(item.id); setNewT(item.title); setNewC(item.content || ''); setNewI(item.img || null);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const cancelEdit = () => { setEditingId(null); setNewT(''); setNewC(''); setNewI(null); };

            const handleSave = async () => {
                if (!newT.trim() || !newC.trim()) return triggerNotify("標題與內容不能為空", "error");
                let imgToSave = newI;
                if (newI && newI.startsWith('data:')) imgToSave = await compressImage(newI);
                
                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                const sharedId = editingId ? String(editingId) : crypto.randomUUID();
                const now = Date.now();

                try {
                    await Promise.all(targetBranches.map(async (branch) => {
                        const itemData = { id: sharedId, title: newT.trim(), content: newC.trim(), img: imgToSave, updateTime: now };
                        if (!editingId) {
                            itemData.timestamp = now;
                            itemData.readBy = [];
                            itemData.sortOrder = announcements.length;
                        }
                        const colPath = getPublicPath(`announcements/branch_${branch}/items`);
                        return db.collection(colPath).doc(sharedId).set(itemData, { merge: true });
                    }));

                    if (!editingId && syncToAll === false) {
                         triggerLineAlert("ANNOUNCEMENT", { branch: currentBranch, title: newT.trim(), content: newC.trim() });
                    } else if (!editingId && syncToAll) {
                         targetBranches.forEach(b => triggerLineAlert("ANNOUNCEMENT", { branch: b, title: newT.trim(), content: newC.trim() }));
                    }

                    triggerNotify(editingId ? "公告已更新" : "公告已發佈", "success");
                    cancelEdit();
                } catch (e) { triggerNotify("儲存失敗", "error"); }
            };

            const deleteItem = async (id) => {
                const isConfirmed = window.confirm(syncToAll && isSuperAdmin ? "確定要刪除嗎？這會同時刪除所有分店的該公告。" : "確定要刪除嗎？");
                if(!isConfirmed) return;
                
                const targetBranches = (isSuperAdmin && syncToAll) ? globalBranches : [currentBranch];
                try {
                    await Promise.all(targetBranches.map(async (branch) => {
                        const idStr = String(id);
                        await db.collection(getPublicPath(`announcements/branch_${branch}/items`)).doc(idStr).delete();
                        
                        const oldDocRef = db.doc(getPublicPath(`announcements/branch_${branch}`));
                        const oldSnap = await oldDocRef.get();
                        if(oldSnap.exists && oldSnap.data().items) {
                            await oldDocRef.set({ items: oldSnap.data().items.filter(i => String(i.id) !== idStr) });
                        }
                    }));
                    triggerNotify("公告已刪除", "info");
                } catch(e) { console.error(e); triggerNotify("刪除失敗", "error"); }
            };

            const handleDragStart = (id) => setDraggedId(id);
            const handleDragOver = (e, id) => { e.preventDefault(); if (id !== draggedId) setOverId(id); };
            const handleDragEnd = async () => {
                if (draggedId !== null && overId !== null && draggedId !== overId) {
                    const newItems = [...announcements];
                    const fromIndex = newItems.findIndex(i => String(i.id) === String(draggedId));
                    const toIndex = newItems.findIndex(i => String(i.id) === String(overId));
                    
                    if (fromIndex !== -1 && toIndex !== -1) {
                        const [movedItem] = newItems.splice(fromIndex, 1);
                        newItems.splice(toIndex, 0, movedItem);

                        try {
                            const batch = db.batch();
                            newItems.forEach((item, index) => {
                                const docRef = db.collection(getPublicPath(`announcements/branch_${currentBranch}/items`)).doc(String(item.id));
                                batch.set(docRef, { ...item, sortOrder: index }, { merge: true });
                            });
                            await batch.commit();
                        } catch(e) {
                            triggerNotify("排序儲存失敗", "error");
                        }
                    }
                }
                setDraggedId(null);
                setOverId(null);
            };

            return (
                <div className="space-y-4">
                    <div className={`glass-panel p-6 rounded-[2.5rem] space-y-4 bg-white shadow-sm border transition-all ${editingId ? 'border-blue-500/30 shadow-blue-500/10' : 'border-slate-100'}`}>
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-black text-slate-800 text-xs flex items-center gap-2 uppercase tracking-widest">
                                {editingId ? <><Icon name="edit" size={16} className="text-blue-500" /> 編輯分店公告</> : <><Icon name="edit" size={16} className="text-brand-red" /> 發佈分店公告 ({currentBranch})</>}
                            </h3>
                            {isSuperAdmin && (
                                <label className="flex items-center gap-2 text-[10px] font-bold text-slate-600 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
                                    <input type="checkbox" checked={syncToAll} onChange={e=>setSyncToAll(e.target.checked)} className="accent-brand-red w-3.5 h-3.5 rounded" />
                                    套用至全部分店
                                </label>
                            )}
                        </div>
                        <input placeholder="公告標題" value={newT} onChange={e=>setNewT(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm font-bold outline-none" />
                        <textarea placeholder="詳細描述..." rows="3" value={newC} onChange={e=>setNewC(e.target.value)} className="w-full input-light p-4 rounded-xl text-sm outline-none" />
                        
                        <label className="block w-full bg-slate-50 border border-slate-200 py-3 rounded-xl text-[10px] font-black text-center cursor-pointer hover:bg-slate-100 transition-colors">
                            {newI ? "✅ 已選擇圖片 (點擊更換)" : "+ 上傳附圖"}
                            <input type="file" className="hidden" accept="image/*" onChange={e=>{const file = e.target.files[0]; if (file) { const r=new FileReader(); r.onloadend=()=>setNewI(r.result); r.readAsDataURL(file); }}}/>
                        </label>
                        {newI && (
                            <div className="relative w-full h-32 rounded-xl overflow-hidden border">
                                <img src={newI} className="w-full h-full object-cover" />
                                <button onClick={(e)=>{e.preventDefault(); setNewI(null);}} className="absolute top-2 right-2 bg-black/50 hover:bg-red-500 text-white p-1.5 rounded-full transition-colors"><Icon name="x" size={14}/></button>
                            </div>
                        )}

                        <div className="flex gap-3 pt-2">
                            {editingId && <button onClick={cancelEdit} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl active:scale-95 transition-all text-sm">取消編輯</button>}
                            <button onClick={handleSave} className={`flex-[2] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm ${editingId ? 'bg-blue-600 shadow-blue-500/20' : 'bg-brand-red shadow-brand-red/20'}`}>
                                {editingId ? "儲存修改" : "發佈"}
                            </button>
                        </div>
                    </div>
                    <div className="space-y-3">
                        {announcements.length > 1 && <p className="text-center text-[10px] text-slate-400 mb-2 mt-4 font-bold flex items-center justify-center gap-1"><Icon name="arrow-up-down" size={12}/> 按住左側圖示可拖曳排序</p>}
                        {(announcements||[]).map((a) => (
                            <div 
                                key={a.id} 
                                draggable
                                onDragStart={() => handleDragStart(a.id)}
                                onDragOver={(e) => handleDragOver(e, a.id)}
                                onDragEnd={handleDragEnd}
                                className={`bg-white p-4 rounded-[1.5rem] border flex gap-3 shadow-sm transition-all duration-200 text-left ${draggedId === a.id ? 'opacity-40 scale-95 border-brand-red/50' : 'border-slate-100'} ${overId === a.id ? 'border-brand-red shadow-md -translate-y-1' : ''}`}
                            >
                                <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-brand-red shrink-0 p-1 flex items-start justify-center pt-2">
                                    <Icon name="grip-vertical" size={18} />
                                </div>
                                <div className="flex-1 min-w-0 space-y-3">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-black text-slate-800">{a.title || "(無標題)"}</h4>
                                            <p className="text-[10px] text-slate-400 mt-1">{new Date(a.timestamp).toLocaleString()}</p>
                                        </div>
                                        <div className="flex gap-1.5 border-l pl-2 border-slate-100 shrink-0">
                                            <button onClick={() => startEdit(a)} className="text-slate-400 hover:text-blue-500 p-1.5 transition-colors bg-slate-50 hover:bg-blue-50 rounded-xl"><Icon name="edit-3" size={16}/></button>
                                            <button onClick={() => deleteItem(a.id)} className="text-slate-400 hover:text-red-500 p-1.5 transition-colors bg-slate-50 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-xl border shadow-inner">
                                        <p className="text-[10px] font-black text-slate-500 mb-2 flex items-center gap-1"><Icon name="eye" size={12}/> 已讀取人員 ({a.readBy?.length || 0})</p>
                                        <div className="flex flex-wrap gap-1">
                                            {a.readBy && a.readBy.length > 0 ? a.readBy.map(name => (
                                                <span key={name} className="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md font-bold">{name}</span>
                                            )) : <span className="text-[10px] text-slate-400">尚未有人讀取</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {(announcements||[]).length === 0 && <p className="text-center text-slate-400 text-xs py-10 glass-panel rounded-3xl">目前尚無分店公告</p>}
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = (e.clientX || (e.touches && e.touches[0].clientX));
                const clientY = (e.clientY || (e.touches && e.touches[0].clientY));
                const x = (clientX - rect.left) * (canvasRef.current.width / rect.width);
                const y = (clientY - rect.top) * (canvasRef.current.height / rect.height);
                return { x, y };
            };
            const startDrawing = (e) => {
                if (e.type === 'touchstart') e.preventDefault();
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };
            const draw = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y); ctx.stroke();
            };
            return (
                <div className="glass-panel p-6 rounded-[2.5rem] mt-8 bg-white border border-slate-200 text-center shadow-lg">
                    <h4 className="font-black text-slate-800 mb-4 flex items-center justify-center gap-2 font-bold"><Icon name="pen-tool" size={18} className="text-brand-red" />確認閱讀完畢並簽名</h4>
                    <canvas ref={canvasRef} width={600} height={300} className="signature-canvas mb-4 mx-auto shadow-inner" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={()=>setIsDrawing(false)} onMouseLeave={()=>setIsDrawing(false)} onTouchStart={startDrawing} onTouchEnd={()=>setIsDrawing(false)} onTouchMove={draw}></canvas>
                    <div className="flex gap-3">
                        <button onClick={() => canvasRef.current.getContext('2d').clearRect(0,0,600,300)} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs uppercase">重寫</button>
                        <button onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-[2] py-3 rounded-xl bg-brand-red text-white font-black text-xs uppercase active:scale-95 transition-all">提交簽署</button>
                    </div>
                </div>
            );
        };

        const AuthPage = ({ users, setCurrentUser, setCurrentPage, setIsManager, setIsSuperAdmin, setCurrentBranch, globalBranches, triggerNotify, getPublicPath }) => {
            const [phone, setPhone] = useState(''); 
            const [name, setName] = useState(''); 
            const [role, setRole] = useState('正職人員'); 
            const [mode, setMode] = useState('login'); 
            const [adminPass, setAdminPass] = useState('');
            const [branch, setBranch] = useState(globalBranches[0] || '南港Lalaport');

            useEffect(() => {
                if(globalBranches.length > 0 && !globalBranches.includes(branch)) setBranch(globalBranches[0]);
            }, [globalBranches, branch]);

            const handleAuth = async () => {
                if (mode === 'admin') {
                    if (adminPass.toLowerCase() === 'eatjoy07060112') { 
                        setIsSuperAdmin(true);
                        setIsManager(true); 
                        localStorage.setItem('k_super_admin', 'true');
                        setCurrentBranch(branch);
                        setCurrentPage('home'); 
                        triggerNotify("行政主廚權限", "success"); 
                    }
                    else {
                        triggerNotify("驗證碼錯誤", "error"); 
                    }
                    return;
                }
                
                if (!phone) {
                    triggerNotify("請輸入手機號碼", "error");
                    return;
                }
                
                const existing = users.find(u => u.phone === phone);
                
                if (mode === 'register') {
                    if (!name) {
                        triggerNotify("請輸入真實姓名", "error");
                        return;
                    }
                    if (existing) {
                        triggerNotify("此手機號碼已註冊過", "error");
                        return;
                    }
                    await db.collection(getPublicPath('users')).doc(phone).set({ phone, name, status: 'pending', branch, role });
                    triggerNotify(`申請已提交(${role})，請聯絡主管`, "info");
                } else {
                    if (existing) { 
                        if (existing.branch !== branch) {
                            triggerNotify(`登入失敗：您的帳號隸屬於「${existing.branch}」，請選擇正確的分店。`, "error");
                            return;
                        }
                        setCurrentUser(existing); localStorage.setItem('k_active_user', JSON.stringify(existing));
                        if (existing.status === 'approved') { 
                            if(existing.role === '主管') setIsManager(true);
                            setCurrentBranch(existing.branch);
                            setCurrentPage('home'); 
                            triggerNotify(`歡迎回來, ${existing.name} (${existing.role})`, "success"); 
                        } else {
                            triggerNotify('帳號審核中，請聯繫主管核准', 'info');
                        }
                    }
                    else { 
                        triggerNotify('帳號不存在，請先進行註冊', 'error'); 
                        setMode('register'); 
                    }
                }
            };
            
            return (
                <div className="p-6 pt-16 text-center page-enter min-h-screen flex flex-col items-center justify-center -mt-20">
                    <div className="w-[84px] h-[84px] bg-brand-red rounded-[1.5rem] shadow-xl shadow-brand-red/20 flex items-center justify-center mx-auto mb-6 text-white text-[40px] font-black leading-none">
                        饗
                    </div>
                    
                    <h2 className="text-[28px] font-black text-[#1e293b] mb-10 tracking-tight uppercase">
                        EATJOY廚務 <span className="text-brand-red">OS</span>
                    </h2>
                    
                    <div className="glass-panel p-6 sm:p-8 rounded-[2rem] w-full max-w-[340px] border border-slate-100 bg-white">
                        <div className="flex bg-[#f1f5f9] p-1.5 rounded-[1rem] mb-6 border border-slate-100">
                            <button onClick={() => setMode('login')} className={`flex-1 py-2.5 rounded-[0.85rem] font-bold text-xs transition-all ${mode === 'login' ? 'bg-white shadow-sm text-brand-red' : 'text-slate-400'}`}>登入</button>
                            <button onClick={() => setMode('register')} className={`flex-1 py-2.5 rounded-[0.85rem] font-bold text-xs transition-all ${mode === 'register' ? 'bg-white shadow-sm text-brand-red' : 'text-slate-400'}`}>註冊</button>
                            <button onClick={() => setMode('admin')} className={`flex-1 py-2.5 rounded-[0.85rem] font-bold text-xs transition-all ${mode === 'admin' ? 'bg-white shadow-sm text-brand-red' : 'text-slate-400'}`}>管理員</button>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="relative">
                                <select value={branch} onChange={e => setBranch(e.target.value)} className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm appearance-none text-slate-700 px-5 text-left bg-white">
                                    {globalBranches.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <Icon name="chevron-down" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-800 pointer-events-none" />
                            </div>

                            {mode === 'register' && (
                                <>
                                    <input placeholder="真實姓名" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5" value={name} onChange={e => setName(e.target.value)} />
                                    <div className="relative">
                                        <select value={role} onChange={e => setRole(e.target.value)} className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm appearance-none text-slate-700 px-5 text-left bg-white">
                                            <option value="正職人員">正職人員</option>
                                            <option value="計時人員">計時人員</option>
                                            <option value="主管">主管 (需行政主廚審核)</option>
                                        </select>
                                        <Icon name="chevron-down" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-800 pointer-events-none" />
                                    </div>
                                </>
                            )}
                            
                            {mode === 'admin' ? (
                                <input type="password" placeholder="最高權限驗證碼" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5 tracking-[0.2em]" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                            ) : (
                                <input placeholder="手機號碼 (登入帳號)" className="w-full input-light p-4 rounded-xl outline-none font-bold text-sm px-5 placeholder:text-slate-400" value={phone} onChange={e => setPhone(e.target.value)} />
                            )}
                            
                            <button onClick={handleAuth} className="w-full bg-brand-red text-white font-black py-4 rounded-xl shadow-lg shadow-brand-red/20 active:scale-95 transition-all text-sm mt-2 tracking-widest">
                                進入系統
                            </button>
                        </div>
                    </div>
                    
                    <div className="absolute bottom-8 w-full text-center left-0">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">© EATJOY TECH MANAGEMENT</p>
                    </div>
                </div>
            );
        };

        const ListDetailPage = ({ onBack, title, list = [] }) => (
            <div className="p-4 space-y-6 page-enter pb-20 text-left font-bold">
                <BackButton onClick={onBack} title={title} />
                <div className="space-y-4">
                    {list && list.length > 0 ? list.map((item, idx) => (
                        <RuleStandardBlock key={item.id || idx} id={idx + 1} title={item.title} desc={item.content} img={item.img} />
                    )) : <div className="py-20 text-center glass-panel rounded-[3rem] border border-slate-100 bg-white text-slate-300 font-bold uppercase text-[10px]">目前尚未發佈內容</div>}
                </div>
            </div>
        );

        // --- 優化輸入體驗 (解決注音輸入法中斷問題) ---
        const SyncInput = ({ value, onChange, readOnly, className, maxLength, placeholder, autoFocus }) => {
            const [localVal, setLocalVal] = useState(value || '');
            useEffect(() => { setLocalVal(value || ''); }, [value]);
            return (
                <input
                    type="text"
                    value={localVal}
                    onChange={e => setLocalVal(e.target.value)}
                    onBlur={() => { if(localVal !== (value || '')) onChange(localVal); }}
                    onKeyDown={e => { if(e.key === 'Enter') e.target.blur(); }}
                    readOnly={readOnly}
                    className={className}
                    maxLength={maxLength}
                    placeholder={placeholder}
                    autoFocus={autoFocus}
                />
            );
        };
        
        // --- 叫貨專用數字輸入框 ---
        const OrderQtyInput = ({ value, onChange, unit }) => {
            const [localVal, setLocalVal] = useState(value || 0);
            useEffect(() => { setLocalVal(value || 0); }, [value]);
            
            return (
                <div className="w-12 text-center flex flex-col items-center justify-center">
                    <input 
                        type="number" 
                        min="0"
                        step="any"
                        value={localVal === 0 || localVal === '0' ? '' : localVal} 
                        onChange={(e) => setLocalVal(e.target.value)}
                        onBlur={(e) => {
                            const val = parseFloat(e.target.value) || 0;
                            setLocalVal(val);
                            if (val !== (value || 0)) onChange(val);
                        }}
                        onKeyDown={e => { if(e.key === 'Enter') e.target.blur(); }}
                        placeholder="0"
                        className={`w-full text-xl font-black text-center bg-transparent outline-none p-0 border-none m-0 h-6 ${(!localVal || localVal === 0) ? 'text-slate-300' : 'text-brand-red'}`}
                        style={{ WebkitAppearance: 'none', margin: 0, MozAppearance: 'textfield' }}
                    />
                    <p className="text-[9px] text-slate-400 font-black leading-none mt-1">{unit}</p>
                </div>
            );
        };

        // --- 進階班表系統 (整合權限管控與單月獨立資料、節日顏色切換、下載圖片) ---
        const ScheduleSystem = ({ onBack, currentBranch, isManager, getPublicPath, triggerNotify }) => {
            const defaultShiftRules = [
                { code: 'A-5', name: '早班A5', type: 'morning' },
                { code: 'A-6', name: '早班A6', type: 'morning' },
                { code: 'P1', name: '晚班P1', type: 'evening' },
                { code: 'P4', name: '晚班P4', type: 'evening' },
                { code: 'P5', name: '晚班P5', type: 'evening' },
                { code: 'P6', name: '晚班P6', type: 'evening' },
                { code: 'F', name: '全天班', type: 'full' },
                { code: '特', name: '特休', type: 'off' },
                { code: 'X', name: '排休', type: 'off' },
                { code: '/', name: '劃休', type: 'off' }
            ];

            const [scheduleData, setScheduleData] = useState({
                shiftRules: defaultShiftRules,
                roleColors: {},
                months: {} // 存放各月份獨立資料
            });
            const [currentDate, setCurrentDate] = useState(new Date()); 
            const [newShiftCode, setNewShiftCode] = useState('');
            const [newShiftType, setNewShiftType] = useState('morning');
            const [showSettings, setShowSettings] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            
            // 標記修改模式狀態
            const [isHighlightMode, setIsHighlightMode] = useState(false);
            
            // 節日編輯專用狀態
            const [holidayInputText, setHolidayInputText] = useState('');
            const [holidayInputIsRed, setHolidayInputIsRed] = useState(true);

            const [draggedStaffId, setDraggedStaffId] = useState(null);
            const [overStaffId, setOverStaffId] = useState(null);
            const [isDownloading, setIsDownloading] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const tableRef = useRef(null);

            // 同步該分店的班表資料
            useEffect(() => {
                const docRef = db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`));
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setScheduleData(doc.data());
                    } else {
                        const defaultData = { shiftRules: defaultShiftRules, roleColors: {}, months: {} };
                        if(isManager) docRef.set(defaultData);
                        setScheduleData(defaultData);
                    }
                });
                return () => unsubscribe();
            }, [currentBranch, isManager]);

            const { shiftRules = defaultShiftRules, roleColors = {} } = scheduleData;
            
            const monthKey = useMemo(() => `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`, [currentDate]);
            const activeMonthData = scheduleData.months?.[monthKey] || null;

            const staffList = useMemo(() => {
                if (activeMonthData && activeMonthData.staffList) return activeMonthData.staffList;
                if (scheduleData.months) {
                    const pastMonths = Object.keys(scheduleData.months)
                        .filter(k => k < monthKey)
                        .sort((a, b) => b.localeCompare(a));
                    if (pastMonths.length > 0) {
                        const latestPastMonth = pastMonths[0];
                        return (scheduleData.months[latestPastMonth].staffList || []).map(s => ({...s, shifts: {}}));
                    }
                }
                return scheduleData.staffList || []; 
            }, [activeMonthData, scheduleData.months, scheduleData.staffList, monthKey]);

            const holidays = useMemo(() => {
                if (activeMonthData && activeMonthData.holidays) return activeMonthData.holidays;
                if (!scheduleData.months) return scheduleData.holidays || {};
                return {};
            }, [activeMonthData, scheduleData.months, scheduleData.holidays]);

            // 解析舊版字串與新版物件的節日資料
            const getHolidayData = useCallback((dateString) => {
                const h = holidays[dateString];
                if (!h) return null;
                if (typeof h === 'string') return { text: h, isRed: true };
                return h;
            }, [holidays]);

            const updateData = (updates) => {
                if (!isManager) return;
                db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`)).set(updates, { merge: true });
            };

            const updateMonthData = (updates) => {
                if (!isManager) return;
                const newMonths = { ...(scheduleData.months || {}) };
                const currentMonthData = {
                    staffList: staffList,
                    holidays: holidays,
                    ...(newMonths[monthKey] || {}),
                    ...updates
                };
                newMonths[monthKey] = currentMonthData;
                
                // 使用 update 覆寫該月份，解決 { merge: true } 無法刪除節日欄位的問題
                const docRef = db.doc(getPublicPath(`schedules_data/branch_${currentBranch}`));
                docRef.update({
                    [`months.${monthKey}`]: currentMonthData
                }).catch(() => {
                    docRef.set({ months: newMonths }, { merge: true });
                });
            };
